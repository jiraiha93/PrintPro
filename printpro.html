<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrintPro - Sistema Integral</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        .sidebar-item { transition: all 0.2s; border-radius: 12px; margin-bottom: 4px; }
        .sidebar-item.active { background-color: #1e293b; color: white; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(8px); border: 1px solid #e2e8f0; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .loader-ring { border-top-color: #3b82f6; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="text-slate-800">

    <!-- Pantalla de Carga -->
    <div id="app-loader" class="fixed inset-0 z-[100] flex flex-col items-center justify-center bg-white">
        <div class="loader-ring border-4 border-slate-200 h-16 w-16 rounded-full mb-4"></div>
        <p class="text-slate-500 font-medium animate-pulse">Sincronizando con la nube...</p>
    </div>

    <div id="app-container" class="flex h-screen overflow-hidden opacity-0 transition-opacity duration-500">
        
        <!-- Sidebar -->
        <aside class="w-64 bg-slate-900 text-slate-400 flex flex-col border-r border-slate-800">
            <div class="p-6 flex items-center space-x-3 text-white">
                <div class="bg-blue-600 p-2 rounded-xl">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"></path></svg>
                </div>
                <span class="text-xl font-bold tracking-tight">PrintPro <span class="text-blue-500 text-xs">VIP</span></span>
            </div>

            <nav class="flex-1 px-4 py-4 space-y-1 overflow-y-auto custom-scrollbar" id="nav-menu">
                <button onclick="navigate('PANEL')" data-view="PANEL" class="sidebar-item active w-full flex items-center space-x-3 px-4 py-3 hover:bg-slate-800 hover:text-white">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
                    <span class="font-medium">Panel Principal</span>
                </button>
                <button onclick="navigate('COTIZACIONES')" data-view="COTIZACIONES" class="sidebar-item w-full flex items-center space-x-3 px-4 py-3 hover:bg-slate-800 hover:text-white">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                    <span class="font-medium">Cotizaciones</span>
                </button>
                <button onclick="navigate('CATALOGO')" data-view="CATALOGO" class="sidebar-item w-full flex items-center space-x-3 px-4 py-3 hover:bg-slate-800 hover:text-white">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 6h16M4 10h16M4 14h16M4 18h16"></path></svg>
                    <span class="font-medium">Catálogo</span>
                </button>
                <button onclick="navigate('USUARIOS')" data-view="USUARIOS" class="sidebar-item w-full flex items-center space-x-3 px-4 py-3 hover:bg-slate-800 hover:text-white">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                    <span class="font-medium">Usuarios</span>
                </button>
            </nav>

            <div class="p-4 border-t border-slate-800">
                <div class="bg-slate-800/50 rounded-xl p-4 flex items-center space-x-3">
                    <div class="w-8 h-8 rounded-full bg-blue-500 flex items-center justify-center text-white font-bold text-xs" id="avatar-initial">A</div>
                    <div class="flex-1 min-w-0">
                        <p class="text-sm font-semibold text-white truncate" id="side-username">Admin</p>
                        <p class="text-[10px] uppercase tracking-wider font-bold text-slate-500">Nivel Pro</p>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 flex flex-col overflow-hidden relative">
            
            <!-- Top Bar -->
            <header class="h-16 bg-white border-b flex items-center justify-between px-8">
                <h2 id="view-title" class="text-xl font-bold text-slate-800">Panel Principal</h2>
                <div class="flex items-center space-x-4">
                    <button onclick="showNewCotizacion()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-xl text-sm font-semibold shadow-lg shadow-blue-200 transition-all">
                        + Nueva Cotización
                    </button>
                </div>
            </header>

            <!-- Dinamic Content Area -->
            <div id="main-content" class="flex-1 overflow-y-auto p-8 custom-scrollbar">
                <!-- Se inyecta por JS -->
            </div>

        </main>
    </div>

    <!-- Modales -->
    <div id="modal-container" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-2xl max-h-[90vh] overflow-hidden flex flex-col transform transition-all duration-300 scale-95 opacity-0" id="modal-content">
            <!-- Contenido dinámico del modal -->
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, onSnapshot, addDoc, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // CONFIGURACIÓN
        const firebaseConfig = JSON.parse(window.__firebase_config || '{}');
        const appId = window.__app_id || 'printpro-prod';
        
        let db, auth, currentUser;
        let dataStore = {
            cotizaciones: [],
            usuarios: [],
            catalogo: [],
            currentView: 'PANEL'
        };

        // INICIO
        async function init() {
            try {
                const app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);

                await signInAnonymously(auth);
                
                onAuthStateChanged(auth, (user) => {
                    if (user) {
                        currentUser = user;
                        document.getElementById('side-username').innerText = user.uid.substring(0, 8);
                        document.getElementById('avatar-initial').innerText = user.uid[0].toUpperCase();
                        syncData();
                    }
                });
            } catch (e) {
                console.error("Error en arranque:", e);
                // Si falla Firebase, permitir ver la UI con mocks para que no quede en blanco
                document.getElementById('app-loader').remove();
                document.getElementById('app-container').classList.remove('opacity-0');
                renderView();
            }
        }

        // SINCRONIZACIÓN FIREBASE
        function syncData() {
            if (!currentUser) return;

            const path = (coll) => collection(db, 'artifacts', appId, 'public', 'data', coll);

            // Escuchar Cotizaciones
            onSnapshot(path('cotizaciones'), (snap) => {
                dataStore.cotizaciones = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                if(dataStore.currentView === 'PANEL' || dataStore.currentView === 'COTIZACIONES') renderView();
                document.getElementById('app-loader').remove();
                document.getElementById('app-container').classList.remove('opacity-0');
            });

            // Escuchar Catálogo
            onSnapshot(path('catalogo'), (snap) => {
                dataStore.catalogo = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                if(dataStore.currentView === 'CATALOGO') renderView();
            });
        }

        // SISTEMA DE NAVEGACIÓN
        window.navigate = (view) => {
            dataStore.currentView = view;
            
            // UI Sidebar
            document.querySelectorAll('.sidebar-item').forEach(el => {
                el.classList.remove('active');
                if(el.dataset.view === view) el.classList.add('active');
            });

            document.getElementById('view-title').innerText = 
                view === 'PANEL' ? 'Panel Principal' :
                view === 'COTIZACIONES' ? 'Historial de Cotizaciones' :
                view === 'CATALOGO' ? 'Catálogo de Productos' : 'Gestión de Usuarios';

            renderView();
        };

        // RENDERIZADO DE VISTAS
        function renderView() {
            const container = document.getElementById('main-content');
            const view = dataStore.currentView;

            if (view === 'PANEL') {
                const total = dataStore.cotizaciones.length;
                const pendientes = dataStore.cotizaciones.filter(c => c.estado === 'Pendiente').length;
                const terminados = dataStore.cotizaciones.filter(c => c.estado === 'Finalizado / Entregado').length;

                container.innerHTML = `
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                        <div class="glass-card p-6 rounded-2xl shadow-sm border-l-4 border-blue-500">
                            <p class="text-slate-500 text-sm font-medium">Cotizaciones Totales</p>
                            <h3 class="text-3xl font-bold mt-1">${total}</h3>
                        </div>
                        <div class="glass-card p-6 rounded-2xl shadow-sm border-l-4 border-amber-500">
                            <p class="text-slate-500 text-sm font-medium">Pendientes de Aprobación</p>
                            <h3 class="text-3xl font-bold mt-1">${pendientes}</h3>
                        </div>
                        <div class="glass-card p-6 rounded-2xl shadow-sm border-l-4 border-emerald-500">
                            <p class="text-slate-500 text-sm font-medium">Entregas Exitosas</p>
                            <h3 class="text-3xl font-bold mt-1">${terminados}</h3>
                        </div>
                    </div>

                    <div class="glass-card rounded-2xl overflow-hidden shadow-sm">
                        <div class="p-6 border-b flex justify-between items-center">
                            <h3 class="font-bold text-slate-800">Actividad Reciente</h3>
                        </div>
                        <div class="overflow-x-auto">
                            <table class="w-full text-left">
                                <thead class="bg-slate-50 text-slate-400 text-[10px] uppercase font-bold">
                                    <tr>
                                        <th class="px-6 py-4">Proyecto</th>
                                        <th class="px-6 py-4">Estado</th>
                                        <th class="px-6 py-4">Total</th>
                                        <th class="px-6 py-4">Fecha</th>
                                    </tr>
                                </thead>
                                <tbody class="divide-y divide-slate-100">
                                    ${dataStore.cotizaciones.slice(0, 5).map(c => `
                                        <tr class="hover:bg-slate-50/50">
                                            <td class="px-6 py-4 font-semibold text-slate-700">${c.proyecto}</td>
                                            <td class="px-6 py-4">
                                                <span class="px-2 py-1 rounded-full text-[10px] font-bold ${getEstadoClase(c.estado)}">
                                                    ${c.estado}
                                                </span>
                                            </td>
                                            <td class="px-6 py-4 font-bold">$${c.total || 0}</td>
                                            <td class="px-6 py-4 text-xs text-slate-400">${c.fecha || 'Hoy'}</td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        </div>
                    </div>
                `;
            }

            if (view === 'COTIZACIONES') {
                container.innerHTML = `
                    <div class="glass-card rounded-2xl shadow-sm p-4 mb-6 flex gap-4">
                        <input type="text" placeholder="Buscar por cliente o proyecto..." class="flex-1 bg-slate-100 border-none rounded-xl px-4 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                        <select class="bg-slate-100 border-none rounded-xl px-4 py-2 text-sm outline-none">
                            <option>Todos los estados</option>
                            <option>Pendiente</option>
                            <option>En producción</option>
                        </select>
                    </div>
                    <div class="grid grid-cols-1 gap-4">
                        ${dataStore.cotizaciones.map(c => `
                            <div class="glass-card p-5 rounded-2xl flex items-center justify-between hover:shadow-md transition-shadow cursor-pointer">
                                <div class="flex items-center space-x-4">
                                    <div class="bg-slate-100 p-3 rounded-xl text-slate-400">
                                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"></path></svg>
                                    </div>
                                    <div>
                                        <h4 class="font-bold text-slate-800">${c.proyecto}</h4>
                                        <p class="text-xs text-slate-500">${c.cliente || 'Consumidor Final'} • ${c.id.substring(0,8)}</p>
                                    </div>
                                </div>
                                <div class="text-right">
                                    <div class="text-lg font-black text-slate-900">$${c.total}</div>
                                    <span class="text-[10px] font-bold uppercase ${getEstadoClase(c.estado)}">${c.estado}</span>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
            }

            if (view === 'CATALOGO') {
                container.innerHTML = `
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                        ${dataStore.catalogo.map(p => `
                            <div class="glass-card rounded-2xl overflow-hidden hover:scale-[1.02] transition-transform">
                                <div class="h-40 bg-slate-200 relative">
                                    ${p.url ? `<img src="${p.url}" class="w-full h-full object-cover">` : `<div class="flex items-center justify-center h-full text-slate-400 uppercase font-black">${p.nombre}</div>`}
                                </div>
                                <div class="p-5">
                                    <h4 class="font-bold text-lg text-slate-800">${p.nombre}</h4>
                                    <p class="text-sm text-slate-500 mb-4">${p.descripcion || 'Sin descripción'}</p>
                                    <div class="flex justify-between items-center">
                                        <span class="text-blue-600 font-bold">$${p.precioUnitario} <small class="text-slate-400">base</small></span>
                                        <button class="bg-slate-100 hover:bg-slate-200 p-2 rounded-lg text-slate-600 transition-colors">
                                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
            }
        }

        // FUNCIONES DE SOPORTE UI
        function getEstadoClase(estado) {
            const map = {
                'Pendiente': 'bg-amber-100 text-amber-700',
                'Cotización enviada': 'bg-sky-100 text-sky-700',
                'En producción': 'bg-indigo-100 text-indigo-700',
                'Finalizado / Entregado': 'bg-emerald-100 text-emerald-700',
                'Cancelado': 'bg-red-100 text-red-700'
            };
            return map[estado] || 'bg-slate-100 text-slate-600';
        }

        window.showNewCotizacion = () => {
            const modal = document.getElementById('modal-container');
            const content = document.getElementById('modal-content');
            
            modal.classList.remove('hidden');
            setTimeout(() => {
                content.classList.remove('scale-95', 'opacity-0');
            }, 10);

            content.innerHTML = `
                <div class="p-6 border-b flex justify-between items-center bg-slate-50">
                    <h3 class="text-xl font-bold text-slate-800">Nueva Cotización</h3>
                    <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"></path></svg>
                    </button>
                </div>
                <div class="p-8 overflow-y-auto custom-scrollbar space-y-6">
                    <div class="grid grid-cols-2 gap-4">
                        <div class="space-y-1">
                            <label class="text-xs font-bold text-slate-500 uppercase">Nombre del Proyecto</label>
                            <input id="form-proyecto" type="text" placeholder="Ej: Tarjetas Personales" class="w-full bg-slate-100 border-none rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-blue-500">
                        </div>
                        <div class="space-y-1">
                            <label class="text-xs font-bold text-slate-500 uppercase">Cliente</label>
                            <input id="form-cliente" type="text" placeholder="Nombre o Empresa" class="w-full bg-slate-100 border-none rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-blue-500">
                        </div>
                    </div>
                    <div class="space-y-1">
                        <label class="text-xs font-bold text-slate-500 uppercase">Producto</label>
                        <select id="form-producto" class="w-full bg-slate-100 border-none rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-blue-500">
                            ${dataStore.catalogo.map(p => `<option value="${p.id}">${p.nombre}</option>`).join('') || '<option disabled>Sin productos en catálogo</option>'}
                        </select>
                    </div>
                    <div class="grid grid-cols-3 gap-4">
                        <div class="space-y-1">
                            <label class="text-xs font-bold text-slate-500 uppercase">Cantidad</label>
                            <input id="form-cantidad" type="number" value="100" class="w-full bg-slate-100 border-none rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-blue-500">
                        </div>
                        <div class="space-y-1 col-span-2">
                            <label class="text-xs font-bold text-slate-500 uppercase">Precio Estimado</label>
                            <div class="w-full bg-blue-50 text-blue-700 font-black rounded-xl px-4 py-3 text-2xl flex items-center">
                                $ <span id="form-preview-total">0.00</span>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="p-6 bg-slate-50 border-t flex justify-end">
                    <button onclick="closeModal()" class="px-6 py-3 text-slate-500 font-bold hover:text-slate-700 mr-2">Cancelar</button>
                    <button id="btn-save-cot" class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-3 rounded-xl font-bold shadow-lg shadow-blue-200 transition-all">
                        Guardar Cotización
                    </button>
                </div>
            `;

            document.getElementById('btn-save-cot').onclick = async () => {
                const proyecto = document.getElementById('form-proyecto').value;
                const cliente = document.getElementById('form-cliente').value;
                const total = Math.floor(Math.random() * 500) + 100; // Simulación de cálculo

                if(!proyecto) return alert("Ponle nombre al proyecto");

                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'cotizaciones'), {
                    proyecto,
                    cliente,
                    total,
                    estado: 'Pendiente',
                    fecha: new Date().toLocaleDateString('es-ES', { day: '2-digit', month: 'short' }),
                    timestamp: new Date().getTime()
                });

                closeModal();
                navigate('COTIZACIONES');
            };
        };

        window.closeModal = () => {
            const modal = document.getElementById('modal-container');
            const content = document.getElementById('modal-content');
            content.classList.add('scale-95', 'opacity-0');
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 300);
        };

        // Inicializar
        window.onload = init;

    </script>
</body>
</html>
