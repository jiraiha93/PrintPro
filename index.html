                            </div>

                            <div className="bg-slate-900 p-5 rounded-xl border border-amber-500/30 shadow-inner">
                                <h4 className="font-bold text-amber-400 text-base mb-2 flex items-center gap-2"><span className="bg-amber-500/20 px-2 py-0.5 rounded text-xs">Paso 3</span> Cascada de Descuentos (VIP + Volumen)</h4>
                                <p className="mb-2">El descuento por volumen <strong>se aplica a TODAS las piezas</strong> una vez alcanzado el nivel y si la casilla está activa. Si el cliente compra 300 piezas y el nivel es de 100 (10% OFF), las 300 piezas reciben el descuento. Además, si es VIP (ej. 10% OFF), se aplica un descuento "en cascada" secuencial para proteger tus finanzas.</p>
                                <div className="bg-slate-950 p-3 rounded text-xs border border-slate-800 text-slate-300">
                                    <p>Subtotal Bruto = Precio de Venta Prendas + Precio de Venta Técnicas</p>
                                    <p className="mt-1 font-mono text-amber-400">Total con Descuento = Subtotal Bruto × (1 - % Volumen) × (1 - % VIP)</p>
                                    <p className="mt-2 text-[10px] text-slate-500">Ejemplo ilustrativo: L 100/u. Pides 300 pzas. Tier: 100u al 10%. Las 300 pzas tienen 10% (Subtotal = 30,000 × 0.90 = 27,000). Luego, descuento VIP del 10% = (27,000 × 0.90) = L 24,300 Finales.</p>
                                </div>
                            </div>

                            <div className="bg-slate-900 p-5 rounded-xl border border-purple-500/30 shadow-inner">
                                <h4 className="font-bold text-purple-400 text-base mb-2 flex items-center gap-2"><span className="bg-purple-500/20 px-2 py-0.5 rounded text-xs">Paso 4</span> Impuestos (ISV)</h4>
                                <p className="mb-2">El impuesto global (ej. 15%) se calcula <strong>después de aplicar los descuentos</strong> y solo sobre los ítems del catálogo o técnicas que tengan activada la casilla "Suma Impuesto".</p>
                            </div>
                        </div>

                        <div className="flex justify-end mt-8 border-t border-slate-700 pt-4">
                            <button onClick={onClose} className="px-6 py-3 rounded-xl font-bold text-white bg-blue-600 hover:bg-blue-500 transition-colors shadow-lg">Entendido, cerrar guía</button>
                        </div>
                    </div>
                </div>
            )
        }

        function GestionJerarquica({ categorias, setCategorias, catalogo, setCatalogo, tecnicas, setTecnicas, margenGanancia, impuestoGlobal, descuentosVolumen, setConfigGlobal }) {
          const [tecActivaId, setTecActivaId] = useState(tecnicas[0]?.id || null);
          const [categoriaActivaId, setCategoriaActivaId] = useState('todas');
          const [modalConfig, setModalConfig] = useState(null); 
          const [showTarifasModal, setShowTarifasModal] = useState(false);
          const [showFichaTecnica, setShowFichaTecnica] = useState(false);
          const [openSubcats, setOpenSubcats] = useState({});
          const [tabActivo, setTabActivo] = useState('PRODUCTOS');
          const [tarifasUnicasEdit, setTarifasUnicasEdit] = useState(null);
          
          const tecActual = tecnicas.find(t => t.id === tecActivaId);
          const updateTecnicaActual = (updatedTecObj) => setTecnicas(tecnicas.map(t => t.id === tecActivaId ? updatedTecObj : t));

          const toggleSubcat = (id) => setOpenSubcats(prev => ({...prev, [id]: !prev[id]}));

          const scrollRef = useRef(null);
          const scrollRefCat = useRef(null);
          const scrollTabs = (offset) => { if (scrollRef.current) scrollRef.current.scrollBy({ left: offset, behavior: 'smooth' }); };
          const scrollTabsCat = (offset) => { if (scrollRefCat.current) scrollRefCat.current.scrollBy({ left: offset, behavior: 'smooth' }); };

          const agregarCategoria = () => {
              const nombre = prompt('Nombre de la nueva categoría:');
              if (nombre) {
                  setCategorias([...categorias, { id: `CAT_${Date.now()}`, nombre }]);
              }
          };

          const eliminarCategoria = (id) => {
              if (confirm('¿Eliminar esta categoría? Los productos asociados quedarán "Sin categoría".')) {
                  setCategorias(categorias.filter(c => c.id !== id));
                  setCatalogo(catalogo.map(p => p.categoriaId === id ? { ...p, categoriaId: '' } : p));
              }
          };
          
          return (
            <div className="max-w-6xl mx-auto pb-20 fade-in">
              {modalConfig && <CustomModal config={modalConfig} onClose={() => setModalConfig(null)} />}
              {showTarifasModal && <ModalTarifasGlobales margenActual={margenGanancia} impuestoActual={impuestoGlobal} descuentosActuales={descuentosVolumen} onSave={setConfigGlobal} onClose={() => setShowTarifasModal(false)} />}
              {showFichaTecnica && <ModalFichaTecnica onClose={() => setShowFichaTecnica(false)} />}
              
              {/* MODAL DE TARIFAS ÚNICAS */}
              {tarifasUnicasEdit && (
                  <ModalTarifasUnicas 
                      tarifas={tarifasUnicasEdit.tarifas} 
                      onSave={(nuevasTarifas) => {
                          const updatedTec = {
                              ...tecActual,
                              subcategorias: tecActual.subcategorias.map(s => s.id === tarifasUnicasEdit.subcatId ? { ...s, tarifasUnicas: nuevasTarifas } : s)
                          };
                          updateTecnicaActual(updatedTec);
                      }}
                      onClose={() => setTarifasUnicasEdit(null)}
                  />
              )}

              <div className="flex justify-between items-end mb-6">
                <div>
                  <h2 className="text-2xl font-bold text-white mb-1">Administración Principal</h2>
                  <p className="text-sm text-slate-400">Configura tus productos, costos, técnicas y reglas de precios globales.</p>
                </div>
                <div className="flex gap-3">
                  <button onClick={() => setShowFichaTecnica(true)} className="px-4 py-2 bg-slate-800 text-slate-300 font-bold rounded-xl border border-slate-700 hover:bg-slate-700 flex items-center gap-2"><Calculator size={16}/> Ficha Técnica</button>
                  <button onClick={() => setShowTarifasModal(true)} className="px-4 py-2 bg-blue-600 text-white font-bold rounded-xl hover:bg-blue-500 shadow-lg shadow-blue-500/20 flex items-center gap-2"><TrendingUp size={16}/> Tarifas Globales</button>
                </div>
              </div>

              <div className="flex mb-6 bg-slate-800 rounded-xl border border-slate-700 overflow-hidden">
                  <button onClick={() => setTabActivo('PRODUCTOS')} className={`flex-1 py-4 font-bold flex items-center justify-center gap-2 transition-colors ${tabActivo === 'PRODUCTOS' ? 'bg-blue-600 text-white' : 'text-slate-400 hover:bg-slate-700'}`}><Package size={20}/> Catálogo de Productos</button>
                  <button onClick={() => setTabActivo('TECNICAS')} className={`flex-1 py-4 font-bold flex items-center justify-center gap-2 transition-colors ${tabActivo === 'TECNICAS' ? 'bg-blue-600 text-white' : 'text-slate-400 hover:bg-slate-700'}`}><Layers size={20}/> Técnicas de Impresión</button>
              </div>

              {tabActivo === 'PRODUCTOS' && (
                  <div className="bg-slate-800 rounded-2xl p-6 border border-slate-700 fade-in shadow-xl">
                      <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4 border-b border-slate-700 pb-4">
                          <div className="flex-1 w-full relative group">
                              <button onClick={() => scrollTabsCat(-200)} className="absolute left-0 top-1/2 -translate-y-1/2 bg-slate-900/80 text-white p-1 rounded-r-lg z-10 opacity-0 group-hover:opacity-100 transition-opacity hidden md:block"><ChevronLeft size={20}/></button>
                              <div ref={scrollRefCat} className="flex gap-2 overflow-x-auto custom-scrollbar pb-2 items-center px-4">
                                  <button onClick={() => setCategoriaActivaId('todas')} className={`px-4 py-2 rounded-xl whitespace-nowrap font-bold text-sm transition-colors ${categoriaActivaId === 'todas' ? 'bg-blue-600 text-white shadow-md' : 'bg-slate-900 text-slate-400 hover:bg-slate-700 border border-slate-700'}`}>Todos</button>
                                  {categorias.map(c => (
                                      <div key={c.id} className="flex items-center group/btn relative">
                                          <button onClick={() => setCategoriaActivaId(c.id)} className={`px-4 py-2 rounded-xl whitespace-nowrap font-bold text-sm transition-colors pr-10 ${categoriaActivaId === c.id ? 'bg-blue-600 text-white shadow-md' : 'bg-slate-900 text-slate-400 hover:bg-slate-700 border border-slate-700'}`}>{c.nombre}</button>
                                          <button onClick={(e) => { e.stopPropagation(); eliminarCategoria(c.id); }} className="absolute right-2 text-slate-400 hover:text-red-400 opacity-0 group-hover/btn:opacity-100 transition-opacity"><Trash2 size={14}/></button>
                                      </div>
                                  ))}
                                  <button onClick={agregarCategoria} className="px-4 py-2 rounded-xl whitespace-nowrap font-bold text-sm bg-slate-900 text-blue-400 hover:bg-slate-700 border border-dashed border-slate-600 flex items-center gap-1"><Plus size={16}/> Cat</button>
                              </div>
                              <button onClick={() => scrollTabsCat(200)} className="absolute right-0 top-1/2 -translate-y-1/2 bg-slate-900/80 text-white p-1 rounded-l-lg z-10 opacity-0 group-hover:opacity-100 transition-opacity hidden md:block"><ChevronRight size={20}/></button>
                          </div>
                          
                          <button onClick={() => {
                              setModalConfig({
                                  titulo: 'Nuevo Producto Base',
                                  valoresIniciales: { nombre: '', detalles: '', costoBase: 0, cobraImpuesto: true, categoriaId: categoriaActivaId !== 'todas' ? categoriaActivaId : '' },
                                  campos: [
                                      { id: 'nombre', label: 'Nombre del artículo:' },
                                      { id: 'detalles', label: 'Descripción / Detalles:' },
                                      { id: 'categoriaId', label: 'Categoría (Opcional):', type: 'select', options: [{value: '', label: 'Sin categoría'}, ...categorias.map(c=>({value: c.id, label: c.nombre}))] },
                                      { id: 'costoBase', label: 'Costo Base de Compra (L):', type: 'number' },
                                      { id: 'cobraImpuesto', label: 'Suma Impuesto (ISV):', type: 'boolean' }
                                  ],
                                  onSubmit: (datos) => {
                                      const nuevoObj = { id: `PROD_${Date.now()}`, nombre: datos.nombre, detalles: datos.detalles, costoBase: Number(datos.costoBase), categoriaId: datos.categoriaId || '', cobraImpuesto: !!datos.cobraImpuesto, tecnicasRecomendadas: [], ubicacionesAceptadas: [] };
                                      setCatalogo([...catalogo, nuevoObj]);
                                  }
                              })
                          }} className="bg-emerald-600 text-white px-5 py-2.5 rounded-xl font-bold flex items-center gap-2 hover:bg-emerald-500 shadow-lg shrink-0 transition-transform hover:scale-105"><Plus size={18}/> Nuevo Producto</button>
                      </div>
                      
                      <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
                          {catalogo.filter(c => categoriaActivaId === 'todas' || c.categoriaId === categoriaActivaId).map(prod => (
                              <div key={prod.id} className="bg-slate-900 border border-slate-700 rounded-2xl p-4 flex flex-col relative group hover:border-blue-500 transition-colors shadow-sm">
                                  <div className="absolute top-2 right-2 flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity z-10">
                                      <button onClick={() => {
                                          setModalConfig({
                                              titulo: `Editar: ${prod.nombre}`,
                                              valoresIniciales: { ...prod, cobraImpuesto: prod.cobraImpuesto !== false },
                                              campos: [
                                                  { id: 'nombre', label: 'Nombre:' },
                                                  { id: 'detalles', label: 'Descripción:' },
                                                  { id: 'imagenUrl', label: 'URL Imagen:' },
                                                  { id: 'categoriaId', label: 'Categoría:', type: 'select', options: [{value: '', label: 'Sin categoría'}, ...categorias.map(c=>({value: c.id, label: c.nombre}))] },
                                                  { id: 'costoBase', label: 'Costo de Compra (L):', type: 'number' },
                                                  { id: 'cobraImpuesto', label: 'Suma Impuesto (ISV):', type: 'boolean' }
                                              ],
                                              onSubmit: (d) => { setCatalogo(catalogo.map(p => p.id === prod.id ? {...p, ...d, costoBase: Number(d.costoBase), cobraImpuesto: !!d.cobraImpuesto} : p)); }
                                          })
                                      }} className="bg-blue-600 text-white p-1.5 rounded-lg shadow-sm hover:bg-blue-500"><Edit3 size={14}/></button>
                                      <button onClick={() => { if(confirm('¿Eliminar producto?')) setCatalogo(catalogo.filter(p => p.id !== prod.id)) }} className="bg-red-600 text-white p-1.5 rounded-lg shadow-sm hover:bg-red-500"><Trash2 size={14}/></button>
                                  </div>
                                  <div className="w-full h-32 bg-slate-800 rounded-xl mb-4 border border-slate-700 flex items-center justify-center overflow-hidden relative">
                                      {prod.imagenUrl ? <img src={prod.imagenUrl} alt={prod.nombre} className="w-full h-full object-cover"/> : <ImageIcon className="text-slate-600" size={32}/>}
                                      {prod.cobraImpuesto === false && <span className="absolute bottom-2 right-2 bg-amber-500/20 text-amber-400 border border-amber-500/30 text-[10px] font-bold px-1.5 py-0.5 rounded backdrop-blur-sm">EXENTO</span>}
                                  </div>
                                  <div className="flex-1 flex flex-col justify-between">
                                      <div>
                                          <h4 className="font-bold text-white leading-tight mb-1">{prod.nombre}</h4>
                                          {prod.detalles && <p className="text-xs text-slate-400 line-clamp-2 mb-3">{prod.detalles}</p>}
                                      </div>
                                      <div className="mt-2 space-y-2">
                                          <div className="flex justify-between items-center text-sm border-t border-slate-700 pt-2"><span className="text-slate-400 font-semibold">Costo Compra:</span><span className="font-bold text-slate-200">L {prod.costoBase.toFixed(2)}</span></div>
                                          
                                          <div className="mt-2 text-xs bg-slate-800 rounded-lg p-2 border border-slate-700 cursor-pointer hover:border-slate-500 transition-colors" onClick={() => {
                                              setModalConfig({
                                                  titulo: 'Técnicas Compatibles',
                                                  mensaje: 'Selecciona las técnicas y ubicaciones permitidas para este artículo.',
                                                  valoresIniciales: { tecnicasRecomendadas: prod.tecnicasRecomendadas || [], ubicacionesAceptadas: prod.ubicacionesAceptadas || [] },
                                                  campos: [
                                                      { id: 'info', label: 'Solo se usarán en el cotizador.', type: 'info' }
                                                  ],
                                                  onSubmit: (d) => {
                                                      const tc = document.querySelectorAll('input[name="tc_check"]:checked');
                                                      const uc = document.querySelectorAll('input[name="uc_check"]:checked');
                                                      setCatalogo(catalogo.map(p => p.id === prod.id ? {...p, tecnicasRecomendadas: Array.from(tc).map(i=>i.value), ubicacionesAceptadas: Array.from(uc).map(i=>i.value)} : p));
                                                  },
                                                  customBody: (
                                                      <div className="space-y-4 max-h-60 overflow-y-auto custom-scrollbar pr-2">
                                                          {tecnicas.map(t => (
                                                              <div key={t.id} className="bg-slate-900 p-3 rounded-xl border border-slate-700">
                                                                  <label className="flex items-center gap-2 font-bold text-white mb-2"><input type="checkbox" name="tc_check" value={t.id} defaultChecked={(prod.tecnicasRecomendadas||[]).includes(t.id)} className="accent-blue-500 w-4 h-4"/> {t.nombre}</label>
                                                                  <div className="pl-6 grid grid-cols-2 gap-2">
                                                                      {t.subcategorias.map(s => (
                                                                          <label key={s.id} className="flex items-center gap-2 text-xs text-slate-400"><input type="checkbox" name="uc_check" value={s.id} defaultChecked={(prod.ubicacionesAceptadas||[]).includes(s.id)} className="accent-blue-500"/> {s.nombre}</label>
                                                                      ))}
                                                                  </div>
                                                              </div>
                                                          ))}
                                                      </div>
                                                  )
                                              })
                                          }}>
                                              <span className="font-bold text-slate-400 block mb-1">Técnicas & Ubicaciones:</span>
                                              <p className="text-emerald-400 leading-tight">
                                                {prod.tecnicasRecomendadas && prod.tecnicasRecomendadas.length > 0 ? prod.tecnicasRecomendadas.map(id => tecnicas.find(t=>t.id===id)?.nombre).filter(Boolean).join(', ') : 'Click para asignar'}
                                              </p>
                                          </div>
                                      </div>
                                  </div>
                              </div>
                          ))}
                      </div>
                  </div>
              )}

              {tabActivo === 'TECNICAS' && (
                  <div className="fade-in shadow-xl">
                      <div className="flex bg-slate-800 rounded-t-2xl p-2 gap-2 overflow-x-auto relative border-b border-slate-700 group custom-scrollbar">
                          <button onClick={() => scrollTabs(-200)} className="absolute left-0 top-1/2 -translate-y-1/2 bg-slate-900/80 text-white p-1.5 rounded-r-lg z-10 opacity-0 group-hover:opacity-100 transition-opacity hidden md:block"><ChevronLeft size={20}/></button>
                          <div ref={scrollRef} className="flex gap-2 w-full overflow-x-auto no-scrollbar scroll-smooth px-6">
                          {tecnicas.map(t => (
                              <button key={t.id} onClick={() => setTecActivaId(t.id)} className={`px-6 py-3 rounded-xl whitespace-nowrap font-bold transition-colors ${tecActivaId === t.id ? 'bg-blue-600 text-white shadow-md' : 'text-slate-400 hover:bg-slate-700'}`}>
                                  {t.nombre}
                              </button>
                          ))}
                          <button onClick={() => {
                              const nombre = prompt('Nombre de nueva técnica (ej. Serigrafía, Bordado):');
                              if (nombre) {
                                  const nueva = { id: `TEC_${Date.now()}`, nombre, minimo: 1, cobraImpuesto: true, subcategorias: [] };
                                  setTecnicas([...tecnicas, nueva]); setTecActivaId(nueva.id);
                              }
                          }} className="px-5 py-3 rounded-xl whitespace-nowrap font-bold text-blue-400 bg-slate-900 border border-dashed border-slate-600 hover:bg-slate-700 flex items-center gap-2"><Plus size={16}/> Nueva Técnica</button>
                          </div>
                          <button onClick={() => scrollTabs(200)} className="absolute right-0 top-1/2 -translate-y-1/2 bg-slate-900/80 text-white p-1.5 rounded-l-lg z-10 opacity-0 group-hover:opacity-100 transition-opacity hidden md:block"><ChevronRight size={20}/></button>
                      </div>

                      {tecActual && (
                      <div className="bg-slate-800 rounded-b-2xl p-6 border border-t-0 border-slate-700 min-h-[500px]">
                          <div className="flex justify-between items-center mb-6 pb-4 border-b border-slate-700">
                              <div className="flex items-center gap-4">
                                  <h3 className="text-2xl font-bold text-white flex items-center gap-3"><Layers className="text-blue-500"/> {tecActual.nombre}</h3>
                                  <button onClick={() => {
                                      const n = prompt('Nuevo nombre:', tecActual.nombre);
                                      if (n) updateTecnicaActual({...tecActual, nombre: n});
                                  }} className="text-blue-400 hover:text-blue-300 p-2"><Pencil size={18}/></button>
                              </div>
                              <div className="flex gap-2">
                                  <button onClick={() => {
                                      setModalConfig({
                                          titulo: `Configuración: ${tecActual.nombre}`,
                                          valoresIniciales: { minimo: tecActual.minimo || 1, cobraImpuesto: tecActual.cobraImpuesto !== false },
                                          campos: [
                                              { id: 'minimo', label: 'Cantidad Mínima Permitida:', type: 'number' },
                                              { id: 'cobraImpuesto', label: 'Aplicar Impuesto Global a esta técnica:', type: 'boolean' }
                                          ],
                                          onSubmit: (d) => updateTecnicaActual({...tecActual, minimo: Number(d.minimo), cobraImpuesto: !!d.cobraImpuesto})
                                      })
                                  }} className="bg-slate-700 text-white px-4 py-2 rounded-xl font-bold hover:bg-slate-600 flex items-center gap-2"><Settings size={16}/> Configurar Reglas</button>
                                  <button onClick={() => {
                                      if(confirm('¿Eliminar técnica completa?')) {
                                          const nt = tecnicas.filter(t => t.id !== tecActual.id);
                                          setTecnicas(nt); if(nt.length) setTecActivaId(nt[0].id); else setTecActivaId(null);
                                      }
                                  }} className="bg-red-900/50 text-red-400 px-4 py-2 rounded-xl font-bold hover:bg-red-800 hover:text-white transition-colors flex items-center gap-2"><Trash2 size={16}/> Eliminar Técnica</button>
                              </div>
                          </div>

                          <div className="flex justify-between items-center mb-4">
                              <p className="text-slate-400 font-bold uppercase tracking-wider text-sm">Ubicaciones & Variantes de Precios</p>
                              <button onClick={() => {
                                  const n = prompt('Nueva ubicación (Ej: Pecho, Espalda):');
                                  if (n) updateTecnicaActual({...tecActual, subcategorias: [...tecActual.subcategorias, { id: `SUB_${Date.now()}`, nombre: n, opciones: [] }]});
                              }} className="bg-emerald-600 text-white px-4 py-2.5 rounded-xl font-bold flex items-center gap-2 hover:bg-emerald-500 shadow-lg transition-transform hover:scale-105"><Plus size={16}/> Añadir Ubicación</button>
                          </div>

                          <div className="space-y-4">
                              {tecActual.subcategorias.map(subcat => (
                                  <div key={subcat.id} className="bg-slate-900 rounded-2xl border border-slate-700 overflow-hidden shadow-sm">
                                      <div className="flex justify-between items-center bg-slate-700 p-4 shadow-md border-l-4 border-blue-500 cursor-pointer hover:bg-slate-600 transition-colors" onClick={() => toggleSubcat(subcat.id)}>
                                          <div>
                                              <h5 className="font-bold text-white flex items-center gap-2">
                                                  {openSubcats[subcat.id] ? <ChevronUp size={18}/> : <ChevronDown size={18}/>}
                                                  {subcat.nombre}
                                              </h5>
                                              {subcat.tarifasUnicas?.activo && <span className="text-[10px] bg-indigo-500/20 text-indigo-400 px-2 py-0.5 rounded mt-1 inline-block border border-indigo-500/30">Tarifas Únicas Activas</span>}
                                          </div>
                                          <div className="flex gap-2">
                                              {/* BOTÓN TARIFAS ÚNICAS INYECTADO QUIRÚRGICAMENTE */}
                                              <button onClick={(e) => { e.stopPropagation(); setTarifasUnicasEdit({ subcatId: subcat.id, tarifas: subcat.tarifasUnicas || null }); }} className="text-xs bg-indigo-600 text-white px-3 py-1.5 rounded-lg hover:bg-indigo-500 font-bold transition-colors flex items-center gap-1 shadow-sm"><TrendingUp size={14}/> Tarifas Únicas</button>
                                              
                                              <button onClick={(e) => { e.stopPropagation(); const nn = prompt('Nuevo nombre de ubicación:', subcat.nombre); if(nn) updateTecnicaActual({...tecActual, subcategorias: tecActual.subcategorias.map(s => s.id === subcat.id ? {...s, nombre: nn} : s)}); }} className="text-blue-400 p-2 hover:bg-slate-800 rounded transition-colors"><Pencil size={16}/></button>
                                              <button onClick={(e) => { e.stopPropagation(); if(confirm('¿Eliminar ubicación?')) updateTecnicaActual({...tecActual, subcategorias: tecActual.subcategorias.filter(s => s.id !== subcat.id)}); }} className="text-red-400 p-2 hover:bg-slate-800 rounded transition-colors"><Trash2 size={16}/></button>
                                          </div>
                                      </div>
                                      
                                      {openSubcats[subcat.id] && (
                                          <div className="p-4 fade-in">
                                              <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
                                                  {subcat.opciones.map(opc => (
                                                      <div key={opc.id} className="bg-slate-800 p-4 rounded-xl border border-slate-600 relative group">
                                                          <div className="absolute top-2 right-2 flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                                                              <button onClick={() => { const n = prompt('Nuevo nombre variante:', opc.nombre); if(n) updateTecnicaActual({...tecActual, subcategorias: tecActual.subcategorias.map(s => s.id === subcat.id ? {...s, opciones: s.opciones.map(o => o.id === opc.id ? {...o, nombre: n} : o)} : s)}); }} className="bg-blue-600 text-white p-1.5 rounded"><Pencil size={12}/></button>
                                                              <button onClick={() => { if(confirm('¿Eliminar variante?')) updateTecnicaActual({...tecActual, subcategorias: tecActual.subcategorias.map(s => s.id === subcat.id ? {...s, opciones: s.opciones.filter(o => o.id !== opc.id)} : s)}); }} className="bg-red-600 text-white p-1.5 rounded"><Trash2 size={12}/></button>
                                                          </div>
                                                          <h6 className="font-bold text-white mb-4 pr-16">{opc.nombre}</h6>
                                                          
                                                          <div className="space-y-4">
                                                              <div>
                                                                  <div className="flex justify-between items-center mb-2">
                                                                      <span className="text-xs font-bold text-amber-400 uppercase">Costos Fijos (Setups)</span>
                                                                      <button onClick={() => { const n = prompt('Nombre Costo Fijo:'); const v = prompt('Valor (L):'); if(n && !isNaN(v)) updateTecnicaActual({...tecActual, subcategorias: tecActual.subcategorias.map(s => s.id === subcat.id ? {...s, opciones: s.opciones.map(o => o.id === opc.id ? {...o, costosFijos: [...o.costosFijos, {id: Date.now(), nombre: n, valor: Number(v)}]} : o)} : s)}); }} className="text-[10px] bg-slate-700 text-white px-2 py-1 rounded hover:bg-slate-600">+ Fijo</button>
                                                                  </div>
                                                                  {opc.costosFijos.map(cf => (
                                                                      <div key={cf.id} className="flex justify-between items-center bg-slate-900 p-2 rounded text-sm border border-slate-700 mb-1">
                                                                          <span className="text-slate-300">{cf.nombre}</span><div className="flex items-center gap-2"><span className="font-bold text-white">L {cf.valor.toFixed(2)}</span><button onClick={() => updateTecnicaActual({...tecActual, subcategorias: tecActual.subcategorias.map(s => s.id === subcat.id ? {...s, opciones: s.opciones.map(o => o.id === opc.id ? {...o, costosFijos: o.costosFijos.filter(c => c.id !== cf.id)} : o)} : s)})} className="text-red-400 hover:text-red-300"><X size={14}/></button></div>
                                                                      </div>
                                                                  ))}
                                                                  {opc.costosFijos.length === 0 && <p className="text-xs text-slate-500 italic">No hay costos fijos.</p>}
                                                              </div>
                                                              <div>
                                                                  <div className="flex justify-between items-center mb-2">
                                                                      <span className="text-xs font-bold text-emerald-400 uppercase">Costos Unitarios</span>
                                                                      <button onClick={() => { const n = prompt('Nombre Costo Unitario:'); const v = prompt('Valor por unidad (L):'); if(n && !isNaN(v)) updateTecnicaActual({...tecActual, subcategorias: tecActual.subcategorias.map(s => s.id === subcat.id ? {...s, opciones: s.opciones.map(o => o.id === opc.id ? {...o, costosVariables: [...o.costosVariables, {id: Date.now(), nombre: n, valor: Number(v)}]} : o)} : s)}); }} className="text-[10px] bg-slate-700 text-white px-2 py-1 rounded hover:bg-slate-600">+ Unitario</button>
                                                                  </div>
                                                                  {opc.costosVariables.map(cv => (
                                                                      <div key={cv.id} className="flex justify-between items-center bg-slate-900 p-2 rounded text-sm border border-slate-700 mb-1">
                                                                          <span className="text-slate-300">{cv.nombre}</span><div className="flex items-center gap-2"><span className="font-bold text-white">L {cv.valor.toFixed(2)}</span><button onClick={() => updateTecnicaActual({...tecActual, subcategorias: tecActual.subcategorias.map(s => s.id === subcat.id ? {...s, opciones: s.opciones.map(o => o.id === opc.id ? {...o, costosVariables: o.costosVariables.filter(c => c.id !== cv.id)} : o)} : s)})} className="text-red-400 hover:text-red-300"><X size={14}/></button></div>
                                                                      </div>
                                                                  ))}
                                                                  {opc.costosVariables.length === 0 && <p className="text-xs text-slate-500 italic">No hay costos variables.</p>}
                                                              </div>
                                                          </div>
                                                      </div>
                                                  ))}
                                                  <button onClick={() => {
                                                      const n = prompt('Nombre de la variante (Ej: 1 Color, Full Color):');
                                                      if (n) updateTecnicaActual({...tecActual, subcategorias: tecActual.subcategorias.map(s => s.id === subcat.id ? {...s, opciones: [...s.opciones, {id: `OPC_${Date.now()}`, nombre: n, costosFijos: [], costosVariables: []}]} : s)});
                                                  }} className="bg-slate-900 border-2 border-dashed border-slate-700 text-slate-400 hover:text-white hover:border-slate-500 p-4 rounded-xl flex items-center justify-center gap-2 font-bold transition-colors min-h-[150px]"><Plus size={18}/> Añadir Variante</button>
                                              </div>
                                          </div>
                                      )}
                                  </div>
                              ))}
                              {tecActual.subcategorias.length === 0 && <div className="text-center py-8 text-slate-500 bg-slate-900 rounded-xl border border-dashed border-slate-700">No hay ubicaciones configuradas para esta técnica.</div>}
                          </div>
                      </div>
                      )}
                  </div>
              )}
            </div>
          );
        }

        function PanelAdmin({ ordenes, categorias, setCategorias, catalogo, setCatalogo, tecnicas, setTecnicas, margenGanancia, impuestoGlobal, descuentosVolumen, setConfigGlobal, mensajesGlobales, adminSetMensajes, usuarios, onActualizarUsuario, onEliminarUsuario, recursos, onActualizarRecurso, onEliminarRecurso, onActualizarOrden, onEliminarOrden, onLogout, isConnectedToCloud, showToast }) {
            const [vistaAdmin, setVistaAdmin] = useState('DASHBOARD');
            return (
              <div className="min-h-screen bg-slate-900 flex flex-col md:flex-row fade-in">
                 <aside className="w-full md:w-64 bg-slate-950 border-r border-slate-800 flex flex-col shadow-2xl z-20 md:h-screen md:sticky md:top-0">
                    <div className="p-6">
                        <div className="flex items-center gap-3 text-blue-500 mb-8"><Printer size={32} /><span className="text-xl font-black tracking-tight text-white">PrintPro ADM</span></div>
                        <nav className="space-y-2">
                            <MenuBtn icon={LayoutDashboard} label="Dashboard" active={vistaAdmin === 'DASHBOARD'} onClick={() => setVistaAdmin('DASHBOARD')} extraClass={vistaAdmin === 'DASHBOARD' ? "" : "text-slate-400 hover:bg-slate-800 hover:text-slate-200"}/>
                            <MenuBtn icon={Package} label="Catálogo & Tarifas" active={vistaAdmin === 'CATALOGO'} onClick={() => setVistaAdmin('CATALOGO')} extraClass={vistaAdmin === 'CATALOGO' ? "" : "text-slate-400 hover:bg-slate-800 hover:text-slate-200"}/>
                            <MenuBtn icon={Users} label="Clientes VIP" active={vistaAdmin === 'USUARIOS'} onClick={() => setVistaAdmin('USUARIOS')} extraClass={vistaAdmin === 'USUARIOS' ? "" : "text-slate-400 hover:bg-slate-800 hover:text-slate-200"}/>
                            <MenuBtn icon={Megaphone} label="Mensajes & UI" active={vistaAdmin === 'MENSAJES'} onClick={() => setVistaAdmin('MENSAJES')} extraClass={vistaAdmin === 'MENSAJES' ? "" : "text-slate-400 hover:bg-slate-800 hover:text-slate-200"}/>
                            <MenuBtn icon={BookOpen} label="Archivos Portal" active={vistaAdmin === 'RECURSOS'} onClick={() => setVistaAdmin('RECURSOS')} extraClass={vistaAdmin === 'RECURSOS' ? "" : "text-slate-400 hover:bg-slate-800 hover:text-slate-200"}/>
                        </nav>
                    </div>
                    <div className="p-6 mt-auto border-t border-slate-800 space-y-4">
                        <ConnectionIndicator isConnectedToCloud={isConnectedToCloud} darkTheme={true} />
                        <button onClick={onLogout} className="w-full flex items-center justify-center gap-2 text-slate-400 hover:text-red-400 hover:bg-red-500/10 p-3 rounded-xl font-bold transition-colors border border-transparent hover:border-red-500/30"><LogOut size={18} /> Cerrar Sesión</button>
                    </div>
                 </aside>
                 
                 <main className="flex-1 p-8 overflow-y-auto bg-slate-900 custom-scrollbar h-screen">
                    {vistaAdmin === 'DASHBOARD' && (
                        <div className="max-w-6xl mx-auto fade-in">
                            <h2 className="text-3xl font-bold text-white mb-8">Centro de Control Global</h2>
                            <div className="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
                                <div className="bg-slate-800 p-6 rounded-2xl border border-slate-700 shadow-sm"><div className="flex items-center gap-3 text-blue-400 mb-2"><FileText size={20}/><h3 className="font-bold">Total Cotizaciones</h3></div><p className="text-4xl font-black text-white">{ordenes.length}</p></div>
                                <div className="bg-slate-800 p-6 rounded-2xl border border-slate-700 shadow-sm"><div className="flex items-center gap-3 text-emerald-400 mb-2"><Users size={20}/><h3 className="font-bold">Clientes Vinculados</h3></div><p className="text-4xl font-black text-white">{usuarios.filter(u=>u.rol==='CLIENTE').length}</p></div>
                                <div className="bg-slate-800 p-6 rounded-2xl border border-slate-700 shadow-sm"><div className="flex items-center gap-3 text-amber-400 mb-2"><Package size={20}/><h3 className="font-bold">Artículos Catálogo</h3></div><p className="text-4xl font-black text-white">{catalogo.length}</p></div>
                                <div className="bg-slate-800 p-6 rounded-2xl border border-slate-700 shadow-sm"><div className="flex items-center gap-3 text-purple-400 mb-2"><Layers size={20}/><h3 className="font-bold">Técnicas Activas</h3></div><p className="text-4xl font-black text-white">{tecnicas.length}</p></div>
                            </div>
                            <HistorialOrdenes ordenes={ordenes} onActualizarOrden={onActualizarOrden} onEliminarOrden={onEliminarOrden} isClient={false} mensajesGlobales={mensajesGlobales} showToast={showToast} />
                        </div>
                    )}
                    {vistaAdmin === 'CATALOGO' && <GestionJerarquica categorias={categorias} setCategorias={setCategorias} catalogo={catalogo} setCatalogo={setCatalogo} tecnicas={tecnicas} setTecnicas={setTecnicas} margenGanancia={margenGanancia} impuestoGlobal={impuestoGlobal} descuentosVolumen={descuentosVolumen} setConfigGlobal={setConfigGlobal} />}
                    {vistaAdmin === 'USUARIOS' && <GestionUsuarios usuarios={usuarios} onActualizarUsuario={onActualizarUsuario} onEliminarUsuario={onEliminarUsuario} />}
                    {vistaAdmin === 'MENSAJES' && <GestionMensajes mensajesGlobales={mensajesGlobales} adminSetMensajes={adminSetMensajes} />}
                    {vistaAdmin === 'RECURSOS' && <GestionRecursos recursos={recursos} onActualizarRecurso={onActualizarRecurso} onEliminarRecurso={onEliminarRecurso} />}
                 </main>
              </div>
            )
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
