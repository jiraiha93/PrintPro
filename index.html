            );
        }

        function CotizadorWizard({ cliente, catalogo, categorias, tecnicas, margenGanancia, impuestoGlobal, descuentosVolumen, onGuardar }) {
          const [paso, setPaso] = useState(1);
          const [proveeCliente, setProveeCliente] = useState(false); 
          const [itemSelect, setItemSelect] = useState(null);
          const [aplicaciones, setAplicaciones] = useState([]);
          const [cantidad, setCantidad] = useState(50);
          const [comentario, setComentario] = useState(''); 
          const [errorValidacion, setErrorValidacion] = useState('');
          const [busqueda, setBusqueda] = useState(''); const [categoriaFiltro, setCategoriaFiltro] = useState(''); const [itemsPorPagina, setItemsPorPagina] = useState(10); const [paginaActual, setPaginaActual] = useState(1);

          useEffect(() => { setPaginaActual(1); }, [busqueda, categoriaFiltro, itemsPorPagina]);

          const catalogoFiltrado = useMemo(() => { return catalogo.filter(p => (p.nombre.toLowerCase().includes(busqueda.toLowerCase()) || (p.detalles && p.detalles.toLowerCase().includes(busqueda.toLowerCase()))) && (categoriaFiltro === '' || p.categoriaId === categoriaFiltro)); }, [catalogo, busqueda, categoriaFiltro]);
          const totalPaginas = Math.ceil(catalogoFiltrado.length / itemsPorPagina) || 1;
          const catalogoPaginado = useMemo(() => { return catalogoFiltrado.slice((paginaActual - 1) * itemsPorPagina, paginaActual * itemsPorPagina); }, [catalogoFiltrado, paginaActual, itemsPorPagina]);
          const productoSeleccionado = catalogo.find(c => c.id === itemSelect);
          
          const tecnicasPermitidas = useMemo(() => {
              if (!productoSeleccionado) return [];
              // Filtrar basándonos en si la técnica tiene al menos una subcategoría permitida para este producto, o compatibilidad legacy
              return tecnicas.filter(t => 
                  (productoSeleccionado.ubicacionesPermitidas && t.subcategorias.some(sub => productoSeleccionado.ubicacionesPermitidas.includes(sub.id))) ||
                  (productoSeleccionado.tecnicasRecomendadas && productoSeleccionado.tecnicasRecomendadas.includes(t.id))
              );
          }, [productoSeleccionado, tecnicas]);

          useEffect(() => { const permitidosIds = tecnicasPermitidas.map(t => t.id); setAplicaciones(prev => prev.filter(app => !app.tecnicaId || permitidosIds.includes(app.tecnicaId))); }, [tecnicasPermitidas]);

          const agregarAplicacion = () => setAplicaciones([...aplicaciones, { id: Date.now(), tecnicaId: '', subcatId: '', opcionId: '' }]);
          const actualizarAplicacion = (id, campo, valor) => { setAplicaciones(aplicaciones.map(app => { if (app.id === id) { const updated = { ...app, [campo]: valor }; if (campo === 'tecnicaId') { updated.subcatId = ''; updated.opcionId = ''; } if (campo === 'subcatId') { updated.opcionId = ''; } return updated; } return app; })); };
          const eliminarAplicacion = (id) => setAplicaciones(aplicaciones.filter(a => a.id !== id));

          const cotizacion = useMemo(() => {
            if (!productoSeleccionado) return null;
            let minRequerido = 1;
            aplicaciones.forEach(app => { if(!app.tecnicaId || !app.subcatId || !app.opcionId) return; const tec = tecnicas.find(t => t.id === app.tecnicaId); if(tec && tec.minimo > minRequerido) minRequerido = tec.minimo; });

            const cantNum = Number(cantidad) || 0;
            const cantEfectiva = (cliente.modoTest || cantNum >= minRequerido) ? cantNum : minRequerido;

            // 1. CÁLCULO DEL PRODUCTO
            const costoBaseProd = proveeCliente ? 0 : productoSeleccionado.costoBase;
            const prodMargen = productoSeleccionado.usarTarifasPropias ? (productoSeleccionado.margenPropio || 0) : margenGanancia;
            const prodDescArr = productoSeleccionado.usarTarifasPropias ? (productoSeleccionado.descuentosPropios || []) : descuentosVolumen;
            let prodDescPct = 0;
            const prodTiers = [...prodDescArr].sort((a,b) => b.min - a.min);
            for (let t of prodTiers) { if (t.activo !== false && cantEfectiva >= t.min) { prodDescPct = t.pct / 100; break; } }

            let subtotalProdBruto = (costoBaseProd * cantEfectiva) * (1 + (prodMargen / 100));
            let subtotalProdDesc = subtotalProdBruto * (1 - prodDescPct);

            let impuestoProdBruto = 0; let impuestoProdDesc = 0;
            if (productoSeleccionado.cobraImpuesto !== false) {
                impuestoProdBruto = subtotalProdBruto * (impuestoGlobal / 100);
                impuestoProdDesc = subtotalProdDesc * (impuestoGlobal / 100);
            }

            // 2. CÁLCULO DE TÉCNICAS (Individual por aplicación)
            let subtotalTecBruto = 0; let subtotalTecDesc = 0; let impuestoTecBruto = 0; let impuestoTecDesc = 0;
            aplicaciones.forEach(app => {
              if(!app.tecnicaId || !app.subcatId || !app.opcionId) return;
              const tec = tecnicas.find(t => t.id === app.tecnicaId); if(!tec) return;
              const subcat = tec.subcategorias.find(s => s.id === app.subcatId); if(!subcat) return;
              const opcion = subcat?.opciones.find(o => o.id === app.opcionId); if(!opcion) return;

              const fijoApp = opcion.costosFijos.reduce((sum, c) => sum + Number(c.valor), 0);
              const varApp = opcion.costosVariables.reduce((sum, c) => sum + Number(c.valor), 0);

              const locMargen = subcat.usarTarifasPropias ? (subcat.margenPropio || 0) : margenGanancia;
              const locDescArr = subcat.usarTarifasPropias ? (subcat.descuentosPropios || []) : descuentosVolumen;
              let locDescPct = 0;
              const locTiers = [...locDescArr].sort((a,b) => b.min - a.min);
              for (let t of locTiers) { if (t.activo !== false && cantEfectiva >= t.min) { locDescPct = t.pct / 100; break; } }

              let subtotalAppBruto = (fijoApp + (varApp * cantEfectiva)) * (1 + (locMargen / 100));
              let subtotalAppDesc = subtotalAppBruto * (1 - locDescPct);

              subtotalTecBruto += subtotalAppBruto; subtotalTecDesc += subtotalAppDesc;
              if (tec.cobraImpuesto !== false) {
                  impuestoTecBruto += subtotalAppBruto * (impuestoGlobal / 100);
                  impuestoTecDesc += subtotalAppDesc * (impuestoGlobal / 100);
              }
            });

            // 3. CONSOLIDACIÓN Y CÁLCULO DE AHORROS
            let subtotalGlobalBruto = subtotalProdBruto + subtotalTecBruto;
            let impuestoGlobalBruto = impuestoProdBruto + impuestoTecBruto;
            let totalBrutoSinDescuentos = subtotalGlobalBruto + impuestoGlobalBruto; // Lo que costaría sin ser VIP y pidiendo 1 unidad

            let subtotalGlobalConDescuentosVol = subtotalProdDesc + subtotalTecDesc;
            let impuestoGlobalConDescuentosVol = impuestoProdDesc + impuestoTecDesc;

            // 4. APLICACIÓN DE VIP Y REDONDEO PERFECTO
            let multVIP = (1 - (cliente.descuentoGlobal / 100));
            let subtotalFinal = subtotalGlobalConDescuentosVol * multVIP;
            let impuestoFinal = impuestoGlobalConDescuentosVol * multVIP;

            let subtotalFinalRedondeado = Math.round(subtotalFinal * 100) / 100;
            let impuestoFinalRedondeado = Math.round(impuestoFinal * 100) / 100;
            
            let totalPrevio = subtotalFinalRedondeado + impuestoFinalRedondeado;
            let unitarioRedondeado = cantEfectiva > 0 ? Math.round((totalPrevio / cantEfectiva) * 100) / 100 : 0;
            let totalFinalRedondeado = cantEfectiva > 0 ? Math.round((unitarioRedondeado * cantEfectiva) * 100) / 100 : totalPrevio;

            let ahorro = totalBrutoSinDescuentos - totalFinalRedondeado;
            if (ahorro < 0) ahorro = 0;

            return { subtotalBruto: Math.round(subtotalGlobalBruto * 100) / 100, subtotalDescuento: subtotalFinalRedondeado, impuestos: impuestoFinalRedondeado, total: totalFinalRedondeado, unitario: unitarioRedondeado, minRequerido, valido: aplicaciones.every(a => a.tecnicaId && a.subcatId && a.opcionId) || aplicaciones.length === 0, cantEfectiva, ahorro: Math.round(ahorro * 100) / 100 };
          }, [productoSeleccionado, aplicaciones, cantidad, proveeCliente, margenGanancia, impuestoGlobal, cliente.descuentoGlobal, cliente.modoTest, tecnicas, descuentosVolumen]);

          useEffect(() => { if (!cliente.modoTest && cotizacion && Number(cantidad) < cotizacion.minRequerido) { setErrorValidacion(`Esta personalización exige un mínimo de ${cotizacion.minRequerido} pzas.`); } else { setErrorValidacion(''); } }, [cantidad, cotizacion, cliente.modoTest]);

          const handleGuardar = () => {
            if(!cotizacion || !cotizacion.valido || errorValidacion) return;
            const tecnicasDetalle = aplicaciones.map(app => { const t = tecnicas.find(x => x.id === app.tecnicaId); const s = t?.subcategorias.find(y => y.id === app.subcatId); const o = s?.opciones.find(z => z.id === app.opcionId); return { tecnica: t?.nombre || 'N/A', ubicacion: s?.nombre || 'N/A', variante: o?.nombre || 'N/A' }; });
            onGuardar({ id: `ORD-${Math.floor(Math.random() * 10000)}`, clienteId: cliente.id, clienteNombre: cliente.nombre, producto: productoSeleccionado.nombre, proveeCliente, detalles: tecnicasDetalle.map(td => `${td.tecnica} (${td.ubicacion} - ${td.variante})`).join(' + ') || 'Sin Personalizar', tecnicasEstructuradas: tecnicasDetalle, comentario: comentario, cantidad, fecha: new Date().toLocaleDateString(), precioEstimado: !proveeCliente, subtotal: cotizacion.subtotalDescuento, impuestos: cotizacion.impuestos, total: cotizacion.total, unitario: cotizacion.unitario, ahorro: cotizacion.ahorro, estado: 'Cotización enviada', });
          };

          return (
            <div className="w-full max-w-[1600px] mx-auto px-6 pb-12">
              <h2 className="text-3xl font-bold text-slate-800 mb-8">Nueva Cotización</h2>
              <div className="flex gap-4 mb-8">{[1, 2, 3].map(i => <div key={i} className={`flex-1 h-2 rounded-full transition-all duration-300 ${paso >= i ? 'bg-blue-600' : 'bg-slate-200'}`} />)}</div>
              
              <div className="bg-white rounded-3xl shadow-sm border border-slate-200 p-8">
                {paso === 1 && (
                  <div className="fade-in">
                    <h3 className="text-xl font-bold mb-4">1. Selección de Artículo</h3>
                    <div className="bg-blue-50 p-6 rounded-2xl mb-8 flex flex-col md:flex-row gap-4"><button onClick={() => setProveeCliente(true)} className={`flex-1 p-4 rounded-xl border-2 font-bold transition-colors ${proveeCliente ? 'bg-blue-600 text-white border-blue-600' : 'bg-white text-slate-600 hover:border-blue-300'}`}>Traigo mis artículos</button><button onClick={() => setProveeCliente(false)} className={`flex-1 p-4 rounded-xl border-2 font-bold transition-colors ${!proveeCliente ? 'bg-blue-600 text-white border-blue-600' : 'bg-white text-slate-600 hover:border-blue-300'}`}>Incluir artículos del catálogo</button></div>
                    <div className="flex flex-col md:flex-row justify-between items-center mb-6 gap-4 bg-slate-50 p-4 rounded-xl border border-slate-200"><div className="relative w-full md:w-auto flex-1 max-w-sm"><Search className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" size={18} /><input type="text" placeholder="Buscar por nombre o descripción..." value={busqueda} onChange={e=>setBusqueda(e.target.value)} className="w-full pl-10 pr-4 py-2 rounded-lg border border-slate-300 outline-none focus:border-blue-500 bg-white" /></div><div className="flex flex-col sm:flex-row items-center gap-3 w-full md:w-auto"><select value={categoriaFiltro} onChange={e=>setCategoriaFiltro(e.target.value)} className="w-full sm:w-auto p-2 border border-slate-300 rounded-lg outline-none bg-white text-sm font-bold text-slate-700"><option value="">Todas las categorías</option>{categorias.map(c => <option key={c.id} value={c.id}>{c.nombre}</option>)}</select></div></div>
                    
                    <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4">
                      {catalogoPaginado.map(prod => (
                        <button key={prod.id} onClick={() => setItemSelect(prod.id)} className={`flex flex-col items-center justify-between p-4 rounded-2xl border-2 text-center transition-all h-full ${itemSelect === prod.id ? 'border-blue-600 bg-blue-50 shadow-md transform scale-105' : 'border-slate-100 hover:border-blue-200 hover:bg-slate-50'}`}>
                          <div className="w-20 h-20 bg-slate-100 rounded-xl mb-3 flex items-center justify-center overflow-hidden border border-slate-200 relative">{prod.imagenUrl ? <img src={prod.imagenUrl} alt={prod.nombre} className="w-full h-full object-cover" /> : <ImageIcon className="text-slate-400" size={32} />}{prod.cobraImpuesto === false && <span className="absolute bottom-1 right-1 bg-amber-400 text-[9px] font-bold px-1 rounded shadow-sm text-amber-900">EX</span>}</div>
                          <div className="flex-1 flex flex-col justify-between w-full"><p className="font-bold text-slate-700 text-sm mb-1">{prod.nombre}</p>{prod.detalles && <p className="text-[10px] text-slate-500 line-clamp-2 mb-2 leading-tight">{prod.detalles}</p>}</div>
                        </button>
                      ))}
                    </div>
                    {totalPaginas > 1 && (<div className="flex items-center justify-center gap-4 mt-8"><button disabled={paginaActual === 1} onClick={() => setPaginaActual(p => p - 1)} className="p-2 bg-slate-100 rounded-lg hover:bg-slate-200 disabled:opacity-50 transition-colors"><ChevronLeft size={20}/></button><span className="text-sm font-bold text-slate-600">Página {paginaActual} de {totalPaginas}</span><button disabled={paginaActual === totalPaginas} onClick={() => setPaginaActual(p => p + 1)} className="p-2 bg-slate-100 rounded-lg hover:bg-slate-200 disabled:opacity-50 transition-colors"><ChevronRight size={20}/></button></div>)}
                    <div className="mt-8 flex justify-end border-t border-slate-100 pt-6"><button disabled={!itemSelect} onClick={() => setPaso(2)} className="bg-blue-600 text-white px-8 py-3 rounded-xl font-bold disabled:opacity-50 hover:bg-blue-700 transition-colors shadow-lg">Siguiente Paso</button></div>
                  </div>
                )}

                {paso === 2 && (
                  <div className="fade-in">
                    <h3 className="text-xl font-bold mb-4">2. Aplicaciones de Personalización</h3>
                    <div className="flex justify-between items-center mb-6"><p className="text-sm text-slate-500">Añade técnicas pre-filtradas para este artículo.</p>{tecnicasPermitidas.length > 0 && <span className="bg-emerald-50 text-emerald-700 border border-emerald-200 text-xs px-3 py-1.5 rounded-lg font-semibold flex items-center gap-1">💡 Mostrando compatibles</span>}</div>
                    {tecnicasPermitidas.length === 0 && <div className="p-4 bg-amber-50 text-amber-700 border border-amber-200 rounded-xl mb-4 text-sm">Este producto no tiene ubicaciones configuradas.</div>}
                    <div className="space-y-4 mb-6">
                      {aplicaciones.map((app) => {
                        const tecObj = tecnicas.find(t => t.id === app.tecnicaId); const subObj = tecObj?.subcategorias.find(s => s.id === app.subcatId);
                        const subcategoriasPermitidas = tecObj?.subcategorias.filter(s => !productoSeleccionado.ubicacionesPermitidas || productoSeleccionado.ubicacionesPermitidas.length === 0 || productoSeleccionado.ubicacionesPermitidas.includes(s.id)) || [];
                        return (
                          <div key={app.id} className="p-4 border border-slate-200 rounded-2xl bg-slate-50 relative flex flex-col md:flex-row gap-4 items-center">
                            <button onClick={() => eliminarAplicacion(app.id)} className="absolute -top-2 -right-2 bg-red-100 text-red-600 p-1.5 rounded-full hover:bg-red-200 shadow-sm transition-colors"><X size={16}/></button>
                            <div className="flex-1 w-full"><label className="text-xs font-bold text-slate-500 mb-1 block">Técnica</label><select value={app.tecnicaId} onChange={e => actualizarAplicacion(app.id, 'tecnicaId', e.target.value)} className="w-full p-2.5 rounded-lg border outline-none"><option value="">-- Seleccionar --</option>{tecnicasPermitidas.map(t => <option key={t.id} value={t.id}>{t.nombre}</option>)}</select></div>
                            <div className="flex-1 w-full"><label className="text-xs font-bold text-slate-500 mb-1 block">Ubicación</label><select disabled={!tecObj} value={app.subcatId} onChange={e => actualizarAplicacion(app.id, 'subcatId', e.target.value)} className="w-full p-2.5 rounded-lg border outline-none"><option value="">-- Seleccionar --</option>{subcategoriasPermitidas.map(s => <option key={s.id} value={s.id}>{s.nombre}</option>)}</select></div>
                            <div className="flex-1 w-full"><label className="text-xs font-bold text-slate-500 mb-1 block">Variante</label><select disabled={!subObj} value={app.opcionId} onChange={e => actualizarAplicacion(app.id, 'opcionId', e.target.value)} className="w-full p-2.5 rounded-lg border outline-none"><option value="">-- Seleccionar --</option>{subObj?.opciones.map(o => <option key={o.id} value={o.id}>{o.nombre}</option>)}</select></div>
                          </div>
                        );
                      })}
                    </div>
                    {tecnicasPermitidas.length > 0 && <button onClick={agregarAplicacion} className="w-full border-2 border-dashed border-blue-300 text-blue-600 font-bold p-4 rounded-2xl hover:bg-blue-50 flex justify-center items-center gap-2"><Plus size={20}/> Añadir Aplicación</button>}
                    <div className="mt-8 flex justify-between border-t border-slate-100 pt-6"><button onClick={() => setPaso(1)} className="text-slate-500 font-bold px-6 py-2 hover:bg-slate-100 rounded-xl">Atrás</button><button disabled={aplicaciones.some(a => !a.tecnicaId || !a.subcatId || !a.opcionId)} onClick={() => setPaso(3)} className="bg-blue-600 text-white px-8 py-3 rounded-xl font-bold disabled:opacity-50">Calcular Total</button></div>
                  </div>
                )}
                {paso === 3 && cotizacion && (
                  <div className="fade-in">
                    <h3 className="text-xl font-bold mb-6">3. Volumen y Total</h3>
                    <div className="flex flex-col md:flex-row gap-8">
                      <div className="flex-1 space-y-6">
                        <div><label className="block text-sm font-bold text-slate-600 mb-2">Cantidad de Unidades</label><input type="number" min={cliente.modoTest ? 1 : (cotizacion?.minRequerido || 1)} value={cantidad} onChange={(e) => setCantidad(e.target.value === '' ? '' : Number(e.target.value))} onBlur={(e) => { const val = Number(e.target.value); if (!cliente.modoTest && val < (cotizacion?.minRequerido || 1)) setCantidad(cotizacion?.minRequerido || 1); }} className="w-full p-4 rounded-xl border-2 border-blue-200 text-2xl font-bold focus:border-blue-600 outline-none transition-colors" />{errorValidacion && <p className="text-amber-600 text-sm font-bold mt-2 flex items-center gap-1 bg-amber-50 p-2.5 rounded-lg border border-amber-200"><AlertCircle size={16}/> {errorValidacion}</p>}</div>
                        <div className="bg-slate-50 p-4 rounded-xl border border-slate-200"><label className="block text-sm font-bold text-slate-600 mb-2 flex items-center gap-2"><MessageSquare size={16}/> Notas para el Taller (Opcional)</label><textarea maxLength={250} value={comentario} onChange={e=>setComentario(e.target.value)} className="w-full p-3 rounded-lg border border-slate-300 focus:border-blue-500 outline-none resize-none text-sm bg-white" rows="3"></textarea></div>
                        <div className="bg-emerald-50 p-4 rounded-xl border border-emerald-100"><p className="text-sm text-emerald-800 font-bold flex items-center gap-2"><CheckCircle size={16}/> Descuentos Dinámicos Activos</p><p className="text-xs text-emerald-600 mt-1">El sistema ha aplicado las mejores tarifas (volumen individual/global y VIP) a tu orden matemáticamente.</p></div>
                      </div>

                      <div className="flex-1 bg-slate-900 text-white p-6 rounded-3xl flex flex-col justify-between shadow-lg relative overflow-hidden">
                        <div>
                          <h4 className="text-lg font-bold mb-4 border-b border-slate-700 pb-2">Resumen Financiero</h4>
                          {cotizacion.cantEfectiva > Number(cantidad) && ( <p className="text-[10px] text-amber-400 font-bold bg-amber-500/10 px-2 py-1 rounded mb-3 border border-amber-500/20 w-fit">Proyectando base al mínimo ({cotizacion.cantEfectiva} u.)</p> )}
                          <div className="space-y-2 text-sm text-slate-300">
                            <div className="flex justify-between"><span>Subtotal Prod/Servicios:</span> <span>L {cotizacion.subtotalBruto.toFixed(2)}</span></div>
                            {cotizacion.subtotalDescuento !== cotizacion.subtotalBruto && <div className="flex justify-between text-emerald-400 font-medium"><span>Con Descuentos aplicados:</span> <span>L {cotizacion.subtotalDescuento.toFixed(2)}</span></div>}
                            <div className="flex justify-between"><span>Impuestos:</span> <span>L {cotizacion.impuestos.toFixed(2)}</span></div>
                            {cotizacion.ahorro > 0 && <div className="flex justify-between text-emerald-400 font-bold mt-2 pt-2 border-t border-slate-700"><span>Tu Ahorro Total:</span> <span>- L {cotizacion.ahorro.toFixed(2)}</span></div>}
                          </div>
                        </div>
                        <div className="border-t border-slate-700 mt-6 pt-4"><div className="flex justify-between items-end"><span className="font-bold text-lg text-slate-400">Total Final:</span><div className="text-right"><span className="text-3xl font-black text-blue-400">L {cotizacion.total.toFixed(2)}</span><p className="text-xs text-slate-400 mt-1">L {cotizacion.unitario.toFixed(2)} c/u</p></div></div></div>
                        <button onClick={handleGuardar} disabled={!!errorValidacion} className="w-full bg-blue-600 text-white py-4 rounded-xl font-bold mt-6 hover:bg-blue-500 disabled:opacity-50 transition-colors shadow-lg">Generar Cotización</button>
                      </div>
                    </div>
                    <div className="mt-8 border-t border-slate-100 pt-6"><button onClick={() => setPaso(2)} className="text-slate-500 font-bold px-6 py-2 hover:bg-slate-100 rounded-xl transition-colors">Atrás</button></div>
                  </div>
                )}
              </div>
            </div>
          );
        }

        function HistorialOrdenes({ ordenes, onActualizarOrden, onEliminarOrden, isClient = false, cliente = null, mensajesGlobales, showToast }) {
          const [ordenSeleccionada, setOrdenSeleccionada] = useState(null);
          if (ordenes.length === 0) return <div className="text-center py-20 fade-in"><p className="text-slate-400">No hay cotizaciones registradas.</p></div>;
          
          const handleShare = (orden) => { let template = mensajesGlobales?.whatsappTemplate || "Hola, te envío los detalles de la orden {ID} por L {TOTAL}"; let msj = template.replace(/{ID}/g, orden.id).replace(/{TOTAL}/g, orden.total.toFixed(2)); let telefonoEmpresa = mensajesGlobales?.whatsappNumero ? mensajesGlobales.whatsappNumero.replace(/[^0-9]/g, '') : ''; window.open(telefonoEmpresa ? `https://wa.me/${telefonoEmpresa}?text=${encodeURIComponent(msj)}` : `https://wa.me/?text=${encodeURIComponent(msj)}`, '_blank'); if(showToast) showToast('Abriendo WhatsApp...'); };

          return (
            <div className="max-w-5xl mx-auto space-y-4 fade-in relative">
              {ordenSeleccionada && ( <ModalDetalleOrden orden={ordenSeleccionada} isClient={isClient} clienteInfo={cliente} onClose={() => setOrdenSeleccionada(null)} onActualizarOrden={(actualizada) => { onActualizarOrden(actualizada); setOrdenSeleccionada(actualizada); }} onCancelar={() => { onActualizarOrden({...ordenSeleccionada, estado: 'Cancelada'}); setOrdenSeleccionada(null); }} onEliminarAdmin={() => { onEliminarOrden(ordenSeleccionada.id); setOrdenSeleccionada(null); }} /> )}
              <h2 className="text-2xl font-bold text-slate-800 mb-6">Gestión de Cotizaciones</h2>
              {ordenes.map(orden => {
                const esCancelada = orden.estado === 'Cancelada';
                return (
                <div key={orden.id} className={`bg-white rounded-2xl shadow-sm border p-6 flex justify-between items-center gap-4 hover:shadow-md transition-shadow ${esCancelada ? 'border-red-200 bg-red-50/30 opacity-75' : 'border-slate-200'}`}>
                  <div className="flex-1 grid grid-cols-2 md:grid-cols-5 gap-4 items-center"><div><p className="text-xs text-slate-400">ID</p><p className="font-bold text-slate-700">{orden.id}</p></div><div><p className="text-xs text-slate-400">Detalle</p><p className="font-bold text-slate-700 truncate">{orden.producto} x{orden.cantidad}</p></div><div><p className="text-xs text-slate-400">Total</p><p className={`font-bold ${esCancelada ? 'text-red-500 line-through' : 'text-emerald-600'}`}>L {orden.total.toFixed(2)}</p></div><div><p className="text-xs text-slate-400">Estado</p><EstadoBadge estado={orden.estado}/></div><div><button onClick={() => setOrdenSeleccionada(orden)} className="flex items-center gap-1 text-sm font-bold text-blue-600 hover:text-blue-800 bg-blue-50 px-3 py-1.5 rounded-lg"><Eye size={16}/> Detalles</button></div></div>
                  <div className="flex items-center gap-2 shrink-0">{!esCancelada && <button className="bg-green-500 text-white p-2.5 rounded-xl hover:bg-green-600 transition-colors shadow-sm" onClick={() => handleShare(orden)}><Share2 size={18}/></button>}</div>
                </div>
              )})}
            </div>
          );
        }

        function ModalDetalleOrden({ orden, isClient, clienteInfo, onClose, onActualizarOrden, onCancelar, onEliminarAdmin }) {
            const esCancelada = orden.estado === 'Cancelada'; const [modalConfirmacion, setModalConfirmacion] = useState(null);
            const precioUnitario = orden.cantidad > 0 ? (orden.total / orden.cantidad) : 0;
            return (
                <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4 fade-in">
                    {modalConfirmacion && ( <CustomModal config={{ titulo: modalConfirmacion.titulo, esConfirmacion: true, mensaje: modalConfirmacion.mensaje, submitLabel: modalConfirmacion.submitLabel, campos: [], onSubmit: modalConfirmacion.onConfirm }} onClose={() => setModalConfirmacion(null)} /> )}
                    <div className="bg-white rounded-2xl shadow-2xl w-full max-w-2xl overflow-hidden border border-slate-200 flex flex-col max-h-[90vh] print-area">
                        <div className="hidden print:block p-6 border-b border-slate-200 mb-4 text-center"><h1 className="text-3xl font-bold text-blue-600 mb-2">PrintPro</h1><p className="text-xs font-bold text-blue-400 mb-2">Powered By IMPAK Print Lab</p><p className="text-slate-500 text-sm">Cotización Formal de Servicios</p></div>
                        <div className="bg-slate-50 print-bg-slate-50 p-6 border-b border-slate-200 flex justify-between items-start"><div><h3 className="text-xl font-bold text-slate-800 flex items-center gap-2"><FileText size={20} className="text-blue-600"/> Cotización #{orden.id}</h3><p className="text-sm text-slate-500 mt-1">Fecha: {orden.fecha} • Cliente: {orden.clienteNombre}</p></div><button onClick={onClose} className="p-2 bg-slate-200 hover:bg-slate-300 rounded-full text-slate-600 transition-colors no-print"><X size={16}/></button></div>
                        <div className="p-6 overflow-y-auto custom-scrollbar flex-1 space-y-6">
                            {esCancelada && <div className="bg-red-50 border border-red-200 text-red-700 p-4 rounded-xl flex items-center gap-3 font-bold text-sm"><AlertCircle size={20}/> Esta cotización fue cancelada.</div>}
                            {!isClient && !esCancelada && (<div className="bg-slate-50 p-4 rounded-xl border border-blue-200 no-print"><label className="text-xs font-bold text-blue-700 mb-2 block uppercase tracking-wide">Actualizar Estado de Producción:</label><select value={orden.estado} onChange={(e) => onActualizarOrden({...orden, estado: e.target.value})} className="w-full p-2.5 rounded-lg border border-blue-300 outline-none text-sm font-semibold text-slate-700 bg-white">{ESTADOS_DISPONIBLES.map(est => <option key={est} value={est}>{est}</option>)}</select></div>)}
                            <div className="grid grid-cols-2 gap-4"><div className="bg-slate-50 p-4 rounded-xl border border-slate-100"><p className="text-xs text-slate-400 font-bold uppercase mb-1">Producto Base</p><p className="font-bold text-slate-700">{orden.producto}</p><p className="text-sm text-slate-500">{orden.proveeCliente ? 'Cliente provee' : 'Incluido del catálogo'}</p></div><div className="bg-slate-50 p-4 rounded-xl border border-slate-100"><p className="text-xs text-slate-400 font-bold uppercase mb-1">Volumen</p><p className="font-bold text-slate-700">{orden.cantidad} unidades</p></div></div>
                            <div><h4 className="text-sm font-bold text-slate-700 border-b border-slate-200 pb-2 mb-3 flex items-center gap-2"><Layers size={16}/> Técnicas Solicitadas</h4>{orden.tecnicasEstructuradas && orden.tecnicasEstructuradas.length > 0 ? (<ul className="space-y-2">{orden.tecnicasEstructuradas.map((tec, i) => (<li key={i} className="bg-blue-50 text-blue-800 text-sm px-3 py-2 rounded-lg border border-blue-100"><span className="font-bold">{tec.tecnica}</span> • {tec.ubicacion} • {tec.variante}</li>))}</ul>) : <p className="text-sm text-slate-500 bg-slate-50 p-3 rounded-lg">{orden.detalles || 'Sin personalizar'}</p>}</div>
                            <div className="border-t border-slate-200 pt-4 mt-6">
                                <div className="flex justify-end">
                                    <div className="w-full md:w-1/2 space-y-2 text-sm text-slate-600">
                                        <div className="flex justify-between"><span>Subtotal:</span> <span>L {orden.subtotal ? orden.subtotal.toFixed(2) : '0.00'}</span></div>
                                        <div className="flex justify-between"><span>Impuestos:</span> <span>L {orden.impuestos ? orden.impuestos.toFixed(2) : '0.00'}</span></div>
                                        {orden.ahorro > 0 && <div className="flex justify-between text-emerald-600 font-bold border-t border-slate-200 pt-2 mt-2"><span>Ahorro del Cliente:</span><span>- L {orden.ahorro.toFixed(2)}</span></div>}
                                        <div className="flex justify-between items-end font-bold text-lg text-slate-800 border-t border-slate-200 pt-2 mt-2"><span>TOTAL:</span><div className="text-right"><span className="print-text-emerald block">L {orden.total.toFixed(2)}</span><span className="text-xs text-slate-500 font-normal mt-0.5 block">L {precioUnitario.toFixed(2)} c/u</span></div></div>
                                    </div>
                                </div>
                            </div>
                            {orden.comentario && <div className="bg-amber-50 border-l-4 border-amber-400 p-4 rounded-r-xl shadow-sm"><h4 className="text-sm font-black text-amber-800 mb-2 flex items-center gap-2 uppercase tracking-wide"><MessageSquare size={16}/> Notas para el Taller</h4><p className="text-sm text-amber-900 whitespace-pre-wrap leading-relaxed">{orden.comentario}</p></div>}
                        </div>
                        <div className="bg-slate-50 p-6 border-t border-slate-200 flex flex-wrap justify-end gap-3 shrink-0 no-print">
                            <button onClick={() => window.print()} className="px-5 py-2.5 rounded-xl font-bold bg-slate-800 text-white hover:bg-slate-700 flex items-center gap-2"><Printer size={18}/> Imprimir</button>
                            <button onClick={onClose} className="px-5 py-2.5 rounded-xl font-bold text-slate-600 hover:bg-slate-200">Cerrar</button>
                            {isClient && !esCancelada && <button onClick={() => setModalConfirmacion({ titulo: 'Cancelar Orden', mensaje: '¿Seguro que deseas cancelar tu orden de forma permanente?', submitLabel: 'Sí, Cancelar', onConfirm: onCancelar })} className="px-5 py-2.5 rounded-xl font-bold bg-red-100 text-red-600 hover:bg-red-200 flex items-center gap-2"><Trash2 size={18}/> Cancelar Orden</button>}
                            {!isClient && <button onClick={() => setModalConfirmacion({ titulo: 'Eliminar Orden', mensaje: 'Se eliminará permanentemente. ¿Continuar?', submitLabel: 'Eliminar', onConfirm: onEliminarAdmin })} className="px-5 py-2.5 rounded-xl font-bold bg-red-600 text-white hover:bg-red-700 flex items-center gap-2"><Trash2 size={18}/> Eliminar de BD</button>}
                        </div>
                    </div>
                </div>
            )
        }

        function GestionCatalogo({ catalogo, categorias, tecnicas, setCatalogo }) {
            const [modalProducto, setModalProducto] = useState(null);

            const handleCrear = () => {
                setModalProducto({
                    id: `PROD_${Date.now()}`, nombre: '', detalles: '', costoBase: 0, imagenUrl: '', categoriaId: '', 
                    cobraImpuesto: true, usarTarifasPropias: false, margenPropio: 40, descuentosPropios: [], 
                    tecnicasRecomendadas: [], ubicacionesPermitidas: []
                });
            };

            const guardarProducto = (prod) => {
                const index = catalogo.findIndex(c => c.id === prod.id);
                if (index > -1) { const newCat = [...catalogo]; newCat[index] = prod; setCatalogo(newCat); } 
                else setCatalogo([...catalogo, prod]);
                setModalProducto(null);
            };

            return (
                <div className="max-w-6xl mx-auto space-y-4 fade-in">
                    {modalProducto && <ModalEditarProducto producto={modalProducto} categorias={categorias} tecnicas={tecnicas} onSave={guardarProducto} onClose={() => setModalProducto(null)} />}
                    <div className="flex justify-between items-end mb-6">
                        <div><h2 className="text-2xl font-bold text-white mb-1">Catálogo de Productos</h2><p className="text-sm text-slate-400">Gestiona prendas y artículos base, configura sus ubicaciones y tarifas específicas.</p></div>
                        <button onClick={handleCrear} className="bg-blue-600 hover:bg-blue-500 text-white px-5 py-2.5 rounded-xl font-bold flex items-center gap-2 shadow-lg"><Plus size={20}/> Nuevo Producto</button>
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                        {catalogo.map(p => (
                            <div key={p.id} className="bg-slate-800 p-5 rounded-2xl border border-slate-700 flex flex-col relative">
                                {p.usarTarifasPropias && <span className="absolute top-3 right-3 bg-blue-500/20 text-blue-400 text-[10px] px-2 py-1 rounded font-bold border border-blue-500/30">TARIFAS PROPIAS</span>}
                                <h3 className="font-bold text-white text-lg mb-1 pr-24 truncate">{p.nombre}</h3>
                                <p className="text-slate-400 text-sm mb-4">Costo Base: L {p.costoBase}</p>
                                <div className="mt-auto flex justify-end gap-2 border-t border-slate-700 pt-4"><button onClick={() => setModalProducto(p)} className="bg-slate-700 hover:bg-slate-600 text-white px-4 py-2 rounded-lg font-bold flex items-center gap-2 text-sm"><Edit3 size={16}/> Configurar / Editar</button></div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        function ModalEditarProducto({ producto, categorias, tecnicas, onSave, onClose }) {
            const [form, setForm] = useState(producto);

            const toggleUbicacion = (tecId, subId, isChecked) => {
                let ubi = [...(form.ubicacionesPermitidas || [])];
                if (isChecked && !ubi.includes(subId)) ubi.push(subId);
                else if (!isChecked) ubi = ubi.filter(id => id !== subId);
                
                let tecReq = [...(form.tecnicasRecomendadas || [])];
                const hasUbiFromThisTec = ubi.some(uId => { const t = tecnicas.find(tx => tx.id === tecId); return t && t.subcategorias.some(s => s.id === uId); });
                if (hasUbiFromThisTec && !tecReq.includes(tecId)) tecReq.push(tecId);
                else if (!hasUbiFromThisTec) tecReq = tecReq.filter(id => id !== tecId);

                setForm({...form, ubicacionesPermitidas: ubi, tecnicasRecomendadas: tecReq});
            };

            return (
                <div className="fixed inset-0 bg-slate-900/80 flex items-center justify-center z-50 fade-in p-4">
                    <div className="bg-slate-800 rounded-2xl border border-slate-600 w-full max-w-2xl shadow-2xl flex flex-col max-h-[90vh]">
                        <div className="p-6 border-b border-slate-700 shrink-0 flex justify-between items-center"><h3 className="text-xl font-bold text-white">Editar Producto</h3><button onClick={onClose} className="text-slate-400 hover:text-white"><X size={20}/></button></div>
                        <div className="p-6 overflow-y-auto custom-scrollbar flex-1 space-y-6">
                            <div className="grid grid-cols-2 gap-4">
                                <div><label className="block text-sm font-bold text-slate-400 mb-1">Nombre</label><input type="text" value={form.nombre} onChange={e=>setForm({...form, nombre: e.target.value})} className="w-full p-2.5 rounded-lg bg-slate-900 border border-slate-700 text-white outline-none" /></div>
                                <div><label className="block text-sm font-bold text-slate-400 mb-1">Costo Base</label><input type="number" value={form.costoBase} onChange={e=>setForm({...form, costoBase: Number(e.target.value)})} className="w-full p-2.5 rounded-lg bg-slate-900 border border-slate-700 text-white outline-none" /></div>
                            </div>
                            
                            <div className="bg-slate-900 p-4 rounded-xl border border-slate-700">
                                <h4 className="text-sm font-bold text-emerald-400 mb-3 border-b border-slate-800 pb-2">Ubicaciones de Impresión Permitidas</h4>
                                <p className="text-xs text-slate-500 mb-4">Selecciona quirúrgicamente dónde se puede estampar este producto.</p>
                                {tecnicas.map(tec => (
                                    <div key={tec.id} className="mb-4">
                                        <p className="font-bold text-slate-300 text-sm">{tec.nombre}</p>
                                        <div className="grid grid-cols-2 gap-2 mt-2 pl-2">
                                            {tec.subcategorias.map(sub => (
                                                <label key={sub.id} className="flex items-center gap-2 text-xs text-slate-400 cursor-pointer hover:text-slate-200">
                                                    <input type="checkbox" className="accent-emerald-500" checked={(form.ubicacionesPermitidas || []).includes(sub.id)} onChange={e => toggleUbicacion(tec.id, sub.id, e.target.checked)} />
                                                    {sub.nombre}
                                                </label>
                                            ))}
                                        </div>
                                    </div>
                                ))}
                            </div>

                            <EditorTarifasPropias usarTarifas={form.usarTarifasPropias} setUsarTarifas={(v)=>setForm({...form, usarTarifasPropias: v})} margen={form.margenPropio} setMargen={(v)=>setForm({...form, margenPropio: v})} descuentos={form.descuentosPropios || []} setDescuentos={(v)=>setForm({...form, descuentosPropios: v})} />
                        </div>
                        <div className="p-6 border-t border-slate-700 bg-slate-900 rounded-b-2xl flex justify-end gap-3 shrink-0"><button onClick={onClose} className="px-5 py-2.5 rounded-xl text-slate-300 font-bold hover:bg-slate-700">Cancelar</button><button onClick={()=>onSave(form)} className="px-5 py-2.5 rounded-xl font-bold text-white bg-blue-600 hover:bg-blue-500">Guardar Producto</button></div>
                    </div>
                </div>
            );
        }

        function GestionTecnicas({ tecnicas, setTecnicas }) {
            const [tecnicaEdit, setTecnicaEdit] = useState(null);
            const [subEdit, setSubEdit] = useState(null);

            const guardarSubcategoria = (subEditada) => {
                const newTecs = tecnicas.map(t => {
                    if (t.id === tecnicaEdit.id) {
                        const newSubs = t.subcategorias.map(s => s.id === subEditada.id ? subEditada : s);
                        return {...t, subcategorias: newSubs};
                    } return t;
                });
                setTecnicas(newTecs); setSubEdit(null);
            };

            if (subEdit) return <ModalEditarUbicacion sub={subEdit} onSave={guardarSubcategoria} onClose={() => setSubEdit(null)} />;

            return (
                <div className="max-w-6xl mx-auto space-y-4 fade-in">
                    <div><h2 className="text-2xl font-bold text-white mb-1">Técnicas y Ubicaciones</h2><p className="text-sm text-slate-400">Administra las ubicaciones de estampado y asigna tarifas independientes si lo deseas.</p></div>
                    <div className="space-y-6 mt-6">
                        {tecnicas.map(tec => (
                            <div key={tec.id} className="bg-slate-800 rounded-2xl border border-slate-700 overflow-hidden">
                                <div className="p-4 bg-slate-900 border-b border-slate-700 flex justify-between items-center"><h3 className="font-bold text-white text-lg">{tec.nombre}</h3><span className="text-xs bg-slate-800 text-slate-400 px-2 py-1 rounded">Min: {tec.minimo}</span></div>
                                <div className="p-4 grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4">
                                    {tec.subcategorias.map(sub => (
                                        <div key={sub.id} className="bg-slate-900 p-4 rounded-xl border border-slate-700 hover:border-slate-500 transition-colors cursor-pointer relative" onClick={() => { setTecnicaEdit(tec); setSubEdit(sub); }}>
                                            {sub.usarTarifasPropias && <span className="absolute top-2 right-2 bg-blue-500/20 text-blue-400 text-[10px] px-1.5 py-0.5 rounded font-bold border border-blue-500/30">PROPIA</span>}
                                            <p className="font-bold text-slate-300">{sub.nombre}</p>
                                            <p className="text-xs text-slate-500 mt-1">{sub.opciones.length} Variantes de color/costo</p>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        function ModalEditarUbicacion({ sub, onSave, onClose }) {
            const [form, setForm] = useState(sub);
            return (
                <div className="fixed inset-0 bg-slate-900/80 flex items-center justify-center z-50 fade-in p-4">
                    <div className="bg-slate-800 rounded-2xl border border-slate-600 w-full max-w-lg shadow-2xl flex flex-col max-h-[90vh]">
                        <div className="p-6 border-b border-slate-700 shrink-0 flex justify-between items-center"><h3 className="text-xl font-bold text-white">Editar Ubicación: {sub.nombre}</h3><button onClick={onClose} className="text-slate-400 hover:text-white"><X size={20}/></button></div>
                        <div className="p-6 overflow-y-auto custom-scrollbar flex-1 space-y-6">
                            <div><label className="block text-sm font-bold text-slate-400 mb-1">Nombre Ubicación</label><input type="text" value={form.nombre} onChange={e=>setForm({...form, nombre: e.target.value})} className="w-full p-2.5 rounded-lg bg-slate-900 border border-slate-700 text-white outline-none" /></div>
                            <EditorTarifasPropias usarTarifas={form.usarTarifasPropias} setUsarTarifas={(v)=>setForm({...form, usarTarifasPropias: v})} margen={form.margenPropio} setMargen={(v)=>setForm({...form, margenPropio: v})} descuentos={form.descuentosPropios || []} setDescuentos={(v)=>setForm({...form, descuentosPropios: v})} />
                            <div className="bg-amber-500/10 border border-amber-500/20 p-3 rounded-lg"><p className="text-xs text-amber-400 font-bold">Nota:</p><p className="text-[10px] text-amber-200 mt-1">Los costos fijos y variables de las variantes siguen operando normalmente. Las tarifas individuales aquí configuradas solo alteran el porcentaje de margen y los descuentos aplicables a esta ubicación.</p></div>
                        </div>
                        <div className="p-6 border-t border-slate-700 bg-slate-900 rounded-b-2xl flex justify-end gap-3 shrink-0"><button onClick={onClose} className="px-5 py-2.5 rounded-xl text-slate-300 font-bold hover:bg-slate-700">Cancelar</button><button onClick={()=>onSave(form)} className="px-5 py-2.5 rounded-xl font-bold text-white bg-blue-600 hover:bg-blue-500">Guardar Cambios</button></div>
                    </div>
                </div>
            );
        }

        function GestionUsuarios({ usuarios, onActualizarUsuario, onEliminarUsuario }) {
            const [modalUsuario, setModalUsuario] = useState(null); const [modalConfirmacion, setModalConfirmacion] = useState(null);
            const handleCrearPerfil = () => { setModalUsuario({ titulo: `Vincular Nuevo Cliente`, mensaje: `Firebase Auth ID requerido.`, valoresIniciales: { id: '', nombre: '', telefono: '', descuentoGlobal: 0, modoTest: false }, campos: [ { id: 'id', label: 'Firebase User UID:', type: 'text' }, { id: 'nombre', label: 'Empresa / Contacto:', type: 'text' }, { id: 'telefono', label: 'Teléfono:', type: 'text' }, { id: 'descuentoGlobal', label: 'Desc. VIP (%):', type: 'number' }, { id: 'modoTest', label: 'Modo Test:', type: 'boolean' } ], onSubmit: (datos) => { onActualizarUsuario({ id: datos.id.trim(), rol: 'CLIENTE', nombre: datos.nombre, telefono: datos.telefono, descuentoGlobal: Number(datos.descuentoGlobal), modoTest: !!datos.modoTest }); } }); };
            const handleEditar = (user) => { setModalUsuario({ titulo: `Editar Perfil`, valoresIniciales: { nombre: user.nombre, telefono: user.telefono || '', descuentoGlobal: user.descuentoGlobal || 0, modoTest: !!user.modoTest }, campos: [ { id: 'nombre', label: 'Empresa / Contacto:', type: 'text' }, { id: 'telefono', label: 'Teléfono:', type: 'text' }, { id: 'descuentoGlobal', label: 'Desc. VIP (%):', type: 'number' }, { id: 'modoTest', label: 'Modo Test:', type: 'boolean' } ], onSubmit: (datos) => { onActualizarUsuario({ ...user, nombre: datos.nombre, telefono: datos.telefono, descuentoGlobal: Number(datos.descuentoGlobal), modoTest: !!datos.modoTest }); } }); };
            return (
                <div className="max-w-6xl mx-auto space-y-4 fade-in">
                    {modalUsuario && <CustomModal config={modalUsuario} onClose={() => setModalUsuario(null)} />}
                    {modalConfirmacion && <CustomModal config={{ titulo: modalConfirmacion.titulo, esConfirmacion: true, mensaje: modalConfirmacion.mensaje, submitLabel: modalConfirmacion.submitLabel, campos: [], onSubmit: modalConfirmacion.onConfirm }} onClose={() => setModalConfirmacion(null)} />}
                    <div className="flex justify-between items-end mb-6"><div><h2 className="text-2xl font-bold text-white mb-1">Perfiles de Clientes</h2></div><button onClick={handleCrearPerfil} className="bg-blue-600 text-white px-5 py-2.5 rounded-xl font-bold flex items-center gap-2"><Plus size={20}/> Vincular Cliente</button></div>
                    <div className="bg-slate-800 rounded-2xl p-6 border border-slate-700 overflow-x-auto"><table className="w-full text-left text-sm min-w-full"><thead><tr className="border-b border-slate-700 text-slate-400"><th className="pb-3">Cliente</th><th className="pb-3">Firebase UID</th><th className="pb-3">Rol & VIP</th><th className="pb-3 text-right">Acciones</th></tr></thead><tbody className="divide-y divide-slate-700/50">{usuarios.map(u => ( <tr key={u.id} className="hover:bg-slate-700/30"> <td className="py-4"><p className="text-white font-bold">{u.nombre}</p></td> <td className="py-4"><div className="bg-slate-900 inline-block p-2 rounded-lg text-xs font-mono text-slate-400">{u.id}</div></td> <td className="py-4">{u.rol === 'ADMIN' ? <span className="text-purple-400">ADMIN</span> : <div><span className="text-blue-400">CLIENTE</span> {u.descuentoGlobal > 0 && <span className="ml-2 text-emerald-400">-{u.descuentoGlobal}%</span>}</div>}</td> <td className="py-4 text-right"><button onClick={() => handleEditar(u)} className="text-blue-400 hover:text-blue-300 p-2"><Edit3 size={16}/></button> <button onClick={() => setModalConfirmacion({ titulo: 'Eliminar', mensaje: `¿Eliminar a ${u.nombre}?`, onConfirm: () => onEliminarUsuario(u.id) })} className="text-red-400 hover:text-red-300 p-2"><Trash2 size={16}/></button></td> </tr> ))}</tbody></table></div>
                </div>
            );
        }

        function GestionMensajes({ mensajesGlobales, adminSetMensajes }) {
            const [form, setForm] = useState(mensajesGlobales);
            return (
                <div className="max-w-4xl mx-auto space-y-4 fade-in">
                    <h2 className="text-2xl font-bold text-white mb-2">Avisos y Plantillas</h2>
                    <form onSubmit={(e) => { e.preventDefault(); adminSetMensajes(form); }} className="bg-slate-800 rounded-2xl p-6 border border-slate-700 space-y-6">
                        <div className="bg-slate-900 p-5 rounded-xl border border-slate-700"><h3 className="text-lg font-bold text-blue-400 flex items-center gap-2 mb-4"><Megaphone size={20}/> Mensajes en Panel</h3><div><label className="block text-sm font-bold text-slate-400 mb-2">Bienvenida</label><input type="text" value={form.bienvenida || ''} onChange={(e) => setForm({...form, bienvenida: e.target.value})} className="w-full p-3 rounded-xl bg-slate-800 border-slate-600 text-white outline-none focus:border-blue-500 mb-4" /><label className="block text-sm font-bold text-slate-400 mb-2">Aviso Promocional</label><textarea value={form.promo || ''} onChange={(e) => setForm({...form, promo: e.target.value})} className="w-full p-3 rounded-xl bg-slate-800 border-slate-600 text-white outline-none focus:border-blue-500 resize-none h-24"></textarea></div></div>
                        <div className="bg-slate-900 p-5 rounded-xl border border-slate-700"><h3 className="text-lg font-bold text-emerald-400 flex items-center gap-2 mb-4"><Share2 size={20}/> WhatsApp</h3><div><label className="block text-sm font-bold text-slate-400 mb-2">Número Empresa</label><input type="text" value={form.whatsappNumero || ''} onChange={(e) => setForm({...form, whatsappNumero: e.target.value.replace(/[^0-9]/g, '')})} className="w-full p-3 rounded-xl bg-slate-800 border-slate-600 text-white mb-4 outline-none focus:border-emerald-500" /><label className="block text-sm font-bold text-slate-400 mb-2">Plantilla Compartir</label><textarea value={form.whatsappTemplate || ''} onChange={(e) => setForm({...form, whatsappTemplate: e.target.value})} className="w-full p-3 rounded-xl bg-slate-800 border-slate-600 text-white outline-none focus:border-emerald-500 resize-none h-24"></textarea></div></div>
                        <div className="flex justify-end pt-4"><button type="submit" className="bg-blue-600 text-white px-8 py-3 rounded-xl font-bold hover:bg-blue-500">Guardar</button></div>
                    </form>
                </div>
            )
        }

        function GestionRecursos({ recursos, onActualizarRecurso, onEliminarRecurso }) {
            const [modalConfig, setModalConfig] = useState(null);
            const handleCrear = () => { setModalConfig({ titulo: "Subir Archivo", campos: [ { id: 'titulo', label: 'Título:', type: 'text' }, { id: 'descripcion', label: 'Descripción:', type: 'text' }, { id: 'archivo', label: 'Archivo:', type: 'file' } ], onSubmit: (datos) => { if (datos.titulo && datos.archivo) { onActualizarRecurso({ id: `REC_${Date.now()}`, titulo: datos.titulo, descripcion: datos.descripcion || '', archivoBase64: datos.archivo }); } } }); };
            return (
                <div className="max-w-6xl mx-auto space-y-4 fade-in">
                    {modalConfig && <CustomModal config={modalConfig} onClose={() => setModalConfig(null)} />}
                    <div className="flex justify-between items-end mb-6"><div><h2 className="text-2xl font-bold text-white mb-1">Archivos Compartidos</h2></div><button onClick={handleCrear} className="bg-blue-600 text-white px-5 py-2.5 rounded-xl font-bold flex items-center gap-2"><Upload size={20}/> Subir</button></div>
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">{recursos.map(r => ( <div key={r.id} className="bg-slate-800 rounded-2xl p-5 border border-slate-700 flex flex-col"><div className="flex justify-between items-start mb-3"><div className="bg-slate-900 p-3 rounded-xl text-blue-400"><BookOpen size={24}/></div><button onClick={() => onEliminarRecurso(r.id)} className="text-red-400 hover:text-red-300 p-2 bg-slate-900 rounded-lg"><Trash2 size={16}/></button></div><h3 className="text-white font-bold text-lg mb-1">{r.titulo}</h3><p className="text-slate-400 text-sm mb-4 flex-1 line-clamp-2">{r.descripcion}</p><a href={r.archivoBase64} download={r.titulo} className="w-full block text-center bg-slate-700 text-white font-bold py-2.5 rounded-xl hover:bg-slate-600 text-sm">Descargar</a></div> ))}</div>
                </div>
            );
        }

        function PanelAdmin(props) {
            const [vistaActiva, setVistaActiva] = useState('ORDENES');
            const [modalTarifasGlobales, setModalTarifasGlobales] = useState(false);

            return (
                <div className="min-h-screen flex bg-slate-900 text-slate-300">
                    {modalTarifasGlobales && <ModalTarifasGlobales margenActual={props.margenGanancia} impuestoActual={props.impuestoGlobal} descuentosActuales={props.descuentosVolumen} onSave={props.setConfigGlobal} onClose={() => setModalTarifasGlobales(false)} />}
                    <aside className="w-64 bg-slate-950 border-r border-slate-800 flex flex-col h-screen sticky top-0 shrink-0">
                        <div className="p-6">
                            <h1 className="text-xl font-black text-white flex items-center gap-2 mb-2"><Printer className="text-blue-500" /> PrintPro Admin</h1>
                            <ConnectionIndicator isConnectedToCloud={props.isConnectedToCloud} darkTheme={true} />
                        </div>
                        <nav className="flex-1 p-4 space-y-1 overflow-y-auto custom-scrollbar">
                            <MenuBtn icon={FileText} label="Órdenes" active={vistaActiva === 'ORDENES'} onClick={() => setVistaActiva('ORDENES')} />
                            <MenuBtn icon={ShoppingBag} label="Catálogo (Ropa)" active={vistaActiva === 'CATALOGO'} onClick={() => setVistaActiva('CATALOGO')} />
                            <MenuBtn icon={Layers} label="Técnicas (Ubic.)" active={vistaActiva === 'TECNICAS'} onClick={() => setVistaActiva('TECNICAS')} />
                            <MenuBtn icon={Users} label="Clientes VIP" active={vistaActiva === 'USUARIOS'} onClick={() => setVistaActiva('USUARIOS')} />
                            <MenuBtn icon={MessageSquare} label="Avisos & WApp" active={vistaActiva === 'MENSAJES'} onClick={() => setVistaActiva('MENSAJES')} />
                            <MenuBtn icon={Upload} label="Recursos PDF" active={vistaActiva === 'RECURSOS'} onClick={() => setVistaActiva('RECURSOS')} />
                        </nav>
                        <div className="p-4 border-t border-slate-800">
                            <button onClick={() => setModalTarifasGlobales(true)} className="w-full flex items-center gap-2 bg-blue-600 text-white p-3 rounded-xl font-bold hover:bg-blue-500 justify-center mb-2"><Settings size={18}/> Tarifas Globales</button>
                            <button onClick={props.onLogout} className="w-full text-center text-sm font-bold text-slate-500 hover:text-red-400 py-2">Cerrar Sesión</button>
                        </div>
                    </aside>
                    <main className="flex-1 p-8 overflow-y-auto">
                        {vistaActiva === 'ORDENES' && <HistorialOrdenes ordenes={props.ordenes} onActualizarOrden={props.onActualizarOrden} onEliminarOrden={props.onEliminarOrden} showToast={props.showToast} />}
                        {vistaActiva === 'CATALOGO' && <GestionCatalogo catalogo={props.catalogo} setCatalogo={props.setCatalogo} categorias={props.categorias} tecnicas={props.tecnicas} />}
                        {vistaActiva === 'TECNICAS' && <GestionTecnicas tecnicas={props.tecnicas} setTecnicas={props.setTecnicas} />}
                        {vistaActiva === 'USUARIOS' && <GestionUsuarios usuarios={props.usuarios} onActualizarUsuario={props.onActualizarUsuario} onEliminarUsuario={props.onEliminarUsuario} />}
                        {vistaActiva === 'MENSAJES' && <GestionMensajes mensajesGlobales={props.mensajesGlobales} adminSetMensajes={props.adminSetMensajes} />}
                        {vistaActiva === 'RECURSOS' && <GestionRecursos recursos={props.recursos} onActualizarRecurso={props.onActualizarRecurso} onEliminarRecurso={props.onEliminarRecurso} />}
                    </main>
                </div>
            );
        }

        const rootElement = document.getElementById('root');
        const root = ReactDOM.createRoot(rootElement);
        root.render(<App />);

    </script>
</body>
</html>
