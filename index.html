          const handleSubmit = (e) => { e.preventDefault(); config.onSubmit(form); onClose(); };

          const handleFileChange = (e, fieldId) => {
              const file = e.target.files[0];
              if (file) {
                  if(file.size > 1048576) { alert("Para un rendimiento óptimo, sube una imagen menor a 1MB."); return; }
                  const reader = new FileReader();
                  reader.onloadend = () => setForm({...form, [fieldId]: reader.result});
                  reader.readAsDataURL(file);
              }
          };

          const handleCheckboxGroup = (fieldId, value, checked) => {
              const currentArr = form[fieldId] || [];
              if (checked) setForm({...form, [fieldId]: [...currentArr, value]});
              else setForm({...form, [fieldId]: currentArr.filter(v => v !== value)});
          };

          return (
            <div className="fixed inset-0 bg-slate-900/80 flex items-center justify-center z-50 fade-in backdrop-blur-sm p-4">
              <div className="bg-slate-800 p-8 rounded-2xl border border-slate-600 w-full max-w-md shadow-2xl relative max-h-[90vh] overflow-y-auto custom-scrollbar">
                <h3 className="text-xl font-bold text-white mb-6 flex items-center gap-2 border-b border-slate-700 pb-4">{config.esConfirmacion ? <AlertCircle className="text-amber-500"/> : <Settings className="text-blue-500"/>}{config.titulo}</h3>
                <form onSubmit={handleSubmit} className="space-y-5">
                  {config.esConfirmacion ? <p className="text-slate-300 text-sm leading-relaxed">{config.mensaje}</p> : (
                    config.campos.map(c => (
                      <div key={c.id}>
                        <label className="block text-sm font-bold text-slate-400 mb-2">{c.label}</label>
                        {c.type === 'file' ? (
                            <div className="relative group"><input type="file" accept="image/*" className="hidden" id={`file-${c.id}`} onChange={(e) => handleFileChange(e, c.id)} /><label htmlFor={`file-${c.id}`} className="cursor-pointer w-full p-3 rounded-xl bg-slate-900 border border-slate-600 border-dashed text-slate-400 hover:text-white hover:border-blue-500 transition-colors flex items-center justify-center gap-2"><Upload size={18}/> {form[c.id] ? 'Imagen Cargada' : 'Seleccionar (Max 1MB)'}</label>{form[c.id] && <div className="mt-3 flex justify-center"><img src={form[c.id]} className="h-20 w-20 object-cover rounded-lg border border-slate-600 shadow-sm" /></div>}</div>
                        ) : c.type === 'checkboxGroup' ? (
                            <div className="bg-slate-900 rounded-xl border border-slate-600 p-3 space-y-2 max-h-40 overflow-y-auto custom-scrollbar">
                                {c.options.length === 0 && <p className="text-xs text-slate-500 italic">No hay técnicas en el sistema.</p>}
                                {c.options.map(opt => {
                                    const isChecked = (form[c.id] || []).includes(opt.value);
                                    return <label key={opt.value} className="flex items-center gap-3 cursor-pointer hover:bg-slate-800 p-1.5 rounded-lg transition-colors"><input type="checkbox" checked={isChecked} onChange={(e) => handleCheckboxGroup(c.id, opt.value, e.target.checked)} className="accent-blue-500 w-4 h-4" /><span className="text-sm text-slate-300">{opt.label}</span></label>;
                                })}
                            </div>
                        ) : (
                            <input required={c.id !== 'imagenUrl' && c.id !== 'tecnicasRecomendadas'} type={c.type} placeholder={c.placeholder || ''} step={c.type === 'number' ? '0.01' : undefined} value={form[c.id] !== undefined ? form[c.id] : ''} className="w-full p-3 rounded-xl bg-slate-900 border border-slate-600 text-white outline-none focus:border-blue-500 transition-colors" onChange={e => setForm({...form, [c.id]: e.target.value})} />
                        )}
                      </div>
                    ))
                  )}
                  <div className="flex justify-end gap-3 mt-8 pt-4 border-t border-slate-700">
                    <button type="button" onClick={onClose} className="px-5 py-2.5 rounded-xl text-slate-300 font-bold hover:bg-slate-700 transition-colors">Cancelar</button>
                    <button type="submit" className={`px-5 py-2.5 rounded-xl font-bold transition-colors text-white ${config.esConfirmacion ? 'bg-red-600 hover:bg-red-500 shadow-red-500/20' : 'bg-blue-600 hover:bg-blue-500 shadow-blue-500/20'} shadow-lg`}>{config.esConfirmacion ? 'Sí, Eliminar' : 'Guardar Cambios'}</button>
                  </div>
                </form>
              </div>
            </div>
          );
        }

        // HELPERS
        function MenuBtn({ icon: Icon, label, active, onClick, dark = false }) {
          const baseClasses = "w-full flex items-center gap-3 px-4 py-3 rounded-xl font-bold transition-all duration-200";
          const activeClasses = dark ? "bg-emerald-500/10 text-emerald-400 border border-emerald-500/20" : "bg-blue-600 text-white shadow-md transform scale-[1.02]";
          const inactiveClasses = dark ? "text-slate-400 hover:bg-slate-800 hover:text-slate-200" : "text-slate-600 hover:bg-slate-100 hover:text-blue-600";
          return <button onClick={onClick} className={`${baseClasses} ${active ? activeClasses : inactiveClasses}`}><Icon size={20} /><span>{label}</span></button>;
        }
        
        function EstadoBadge({ estado }) {
          let colors = '';
          if (estado === 'Pendiente') colors = 'bg-amber-100 text-amber-700 border-amber-200';
          else if (estado === 'Cancelada por Cliente') colors = 'bg-red-100 text-red-700 border-red-200';
          else colors = 'bg-slate-100 text-slate-700 border-slate-200';
          return <span className={`inline-flex items-center px-2.5 py-1 rounded-md text-[10px] uppercase font-bold border ${colors}`}>{estado}</span>;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
