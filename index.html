<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrintPro - Cotizador VIP</title>
    
    <!-- Carga de Tailwind CSS sin necesidad de Node.js -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Babel Standalone: Permite compilar código React/JSX directamente en el navegador -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        .custom-scrollbar::-webkit-scrollbar { height: 6px; width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #334155; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background-color: #475569; }
        /* Transiciones suaves para los modales */
        .fade-in { animation: fadeIn 0.2s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useMemo, useEffect } from 'https://esm.sh/react@18.2.0';
        import ReactDOM from 'https://esm.sh/react-dom@18.2.0/client';
        
        // Importación de íconos
        import { 
          LayoutDashboard, ShoppingBag, FileText, Settings, Users, Plus, CheckCircle, 
          Clock, Printer, LogOut, AlertCircle, Share2, Package, Edit3, Trash2, Save, X, 
          Pencil, Layers, Image as ImageIcon, Upload
        } from 'https://esm.sh/lucide-react@0.292.0';
        
        // --- FIREBASE IMPORTS ---
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
        import { getFirestore, collection, doc, setDoc, onSnapshot, query, deleteDoc } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

        // --- CONFIGURACIÓN GLOBAL FIREBASE ---
        const firebaseConfigObj = typeof __firebase_config !== 'undefined' && __firebase_config ? JSON.parse(__firebase_config) : null;
        let app, auth, db, appId = 'default-app-id';

        if (firebaseConfigObj) {
            app = initializeApp(firebaseConfigObj);
            auth = getAuth(app);
            db = getFirestore(app);
            appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
        }

        // --- DATOS SIMULADOS INICIALES ---
        const USUARIOS_BASE = [
          { id: 'ADMIN_1', rol: 'ADMIN', username: 'admin', password: '123', nombre: 'Administrador Principal' },
          { id: 'VIP001', rol: 'CLIENTE', username: 'omega', password: '123', nombre: 'Corporativo Omega', contacto: 'Lic. Ana Reyes', telefono: '9999-0001', descuentoGlobal: 10 },
        ];
        const CATALOGO_BASE = [
          { id: 'p1', nombre: 'Camiseta Algodón Premium', tipo: 'Textil', costoBase: 80, imagenUrl: '', tecnicasRecomendadas: ['T_SERIGRAFIA'], cobraImpuesto: true },
          { id: 'p2', nombre: 'Taza Blanca 11oz', tipo: 'Promocional', costoBase: 25, imagenUrl: '', tecnicasRecomendadas: [], cobraImpuesto: true },
        ];
        const TECNICAS_BASE = [
          {
            id: 'T_SERIGRAFIA', nombre: 'Serigrafía', cobraImpuesto: true, minimo: 12,
            subcategorias: [
              { id: 'SUB_PECHO', nombre: 'Pecho', opciones: [ { id: 'OP_1C', nombre: '1 Color', costosFijos: [{ id: 'cf1', nombre: 'Revelado', valor: 250 }], costosVariables: [{ id: 'cv1', nombre: 'Impresión', valor: 15 }] } ] }
            ]
          }
        ];

        function App() {
          const [userDb, setUserDb] = useState(null); 
          const [usuarios, setUsuarios] = useState(USUARIOS_BASE);
          const [usuarioActual, setUsuarioActual] = useState(null); 
          const [ordenes, setOrdenes] = useState([]);
          const [catalogo, setCatalogo] = useState(CATALOGO_BASE);
          const [tecnicas, setTecnicas] = useState(TECNICAS_BASE); 
          const [margenGanancia, setMargenGanancia] = useState(40); 
          const [impuestoGlobal, setImpuestoGlobal] = useState(15); // NUEVO: Estado global de impuestos
          const [loadingData, setLoadingData] = useState(true);

          // 1. INICIALIZAR AUTENTICACIÓN FIREBASE
          useEffect(() => {
            if (!auth) { setLoadingData(false); return; } 
            const initAuth = async () => {
              try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                  await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                  await signInAnonymously(auth);
                }
              } catch (e) { console.error("Error Auth Firebase", e); setLoadingData(false); }
            };
            initAuth();
            const unsub = onAuthStateChanged(auth, setUserDb);
            return () => unsub();
          }, []);

          // 2. SINCRONIZACIÓN EN TIEMPO REAL CON FIRESTORE
          useEffect(() => {
            if (!db || !userDb) { setLoadingData(false); return; }

            const unsubCat = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'catalogo'), 
              (snap) => { if (!snap.empty) setCatalogo(snap.docs.map(d => d.data())); else dbGuardarLista('catalogo', CATALOGO_BASE); }, console.error);
            
            const unsubTec = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'tecnicas'), 
              (snap) => { if (!snap.empty) setTecnicas(snap.docs.map(d => d.data())); else dbGuardarLista('tecnicas', TECNICAS_BASE); }, console.error);
            
            const unsubUsu = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'usuarios'), 
              (snap) => { if (!snap.empty) setUsuarios(snap.docs.map(d => d.data())); else dbGuardarLista('usuarios', USUARIOS_BASE); }, console.error);
            
            const unsubOrd = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'ordenes'), 
              (snap) => { if (!snap.empty) setOrdenes(snap.docs.map(d => d.data())); }, console.error);
            
            const unsubConf = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'config'), 
              (snap) => { 
                const configDoc = snap.docs.find(d => d.id === 'general');
                if (configDoc) {
                    setMargenGanancia(configDoc.data().margenGanancia || 40); 
                    setImpuestoGlobal(configDoc.data().impuestoGlobal !== undefined ? configDoc.data().impuestoGlobal : 15);
                }
              }, console.error);

            setLoadingData(false);
            return () => { unsubCat(); unsubTec(); unsubUsu(); unsubOrd(); unsubConf(); };
          }, [userDb]);

          // --- HELPERS DE BASE DE DATOS ---
          const dbGuardar = async (coleccion, id, data) => {
            if (db) await setDoc(doc(db, 'artifacts', appId, 'public', 'data', coleccion, id), data);
          };
          const dbEliminar = async (coleccion, id) => {
            if (db) await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', coleccion, id));
          };
          const dbGuardarLista = async (coleccion, lista) => {
            if(db) lista.forEach(item => dbGuardar(coleccion, item.id, item));
          }

          // --- FUNCIONES INTERFAZ APP ---
          const registrarUsuario = (nuevoUser) => {
            const id = `CLI_${Date.now()}`;
            const userObj = { ...nuevoUser, id, rol: 'CLIENTE', descuentoGlobal: 0 };
            if(db) dbGuardar('usuarios', id, userObj);
            else setUsuarios([...usuarios, userObj]); 
          };

          const handleCrearOrden = (nuevaOrden) => {
            if(db) dbGuardar('ordenes', nuevaOrden.id, nuevaOrden);
            else setOrdenes([nuevaOrden, ...ordenes]);
          };

          // --- ACCIONES ADMIN SINCRONIZADAS ---
          const adminSetCatalogo = (nuevoCatalogo) => {
            const idsActuales = nuevoCatalogo.map(c => c.id);
            catalogo.forEach(c => { if(!idsActuales.includes(c.id) && db) dbEliminar('catalogo', c.id); });
            nuevoCatalogo.forEach(c => { if(db) dbGuardar('catalogo', c.id, c); });
            if(!db) setCatalogo(nuevoCatalogo);
          };

          const adminSetTecnicas = (nuevasTecnicas) => {
            const idsActuales = nuevasTecnicas.map(c => c.id);
            tecnicas.forEach(t => { if(!idsActuales.includes(t.id) && db) dbEliminar('tecnicas', t.id); });
            nuevasTecnicas.forEach(t => { if(db) dbGuardar('tecnicas', t.id, t); });
            if(!db) setTecnicas(nuevasTecnicas);
          };

          // MODIFICADO: Guarda margen y el impuesto global simultáneamente
          const adminSetConfiguracionGlobal = (nuevoMargen, nuevoImpuesto) => {
            if(db) dbGuardar('config', 'general', { margenGanancia: nuevoMargen, impuestoGlobal: nuevoImpuesto });
            else { setMargenGanancia(nuevoMargen); setImpuestoGlobal(nuevoImpuesto); }
          }

          if (loadingData) return <div className="min-h-screen bg-slate-900 flex items-center justify-center text-white font-bold">Conectando a la Base de Datos...</div>;

          if (!usuarioActual) {
            return <PantallaLogin usuarios={usuarios} onLogin={setUsuarioActual} onRegister={registrarUsuario} />;
          }

          if (usuarioActual.rol === 'ADMIN') {
            return (
              <PanelAdmin 
                ordenes={ordenes} 
                catalogo={catalogo} setCatalogo={adminSetCatalogo}
                tecnicas={tecnicas} setTecnicas={adminSetTecnicas}
                margenGanancia={margenGanancia} impuestoGlobal={impuestoGlobal} 
                setConfigGlobal={adminSetConfiguracionGlobal}
                usuarios={usuarios}
                onLogout={() => setUsuarioActual(null)} 
              />
            );
          }

          return (
            <PortalClienteVIP 
              cliente={usuarioActual} catalogo={catalogo} tecnicas={tecnicas} 
              margenGanancia={margenGanancia} impuestoGlobal={impuestoGlobal}
              ordenes={ordenes.filter(o => o.clienteId === usuarioActual.id)}
              onCrearOrden={handleCrearOrden}
              onLogout={() => setUsuarioActual(null)} 
            />
          );
        }

        // ==========================================
        // COMPONENTES PRINCIPALES (Pantallas)
        // ==========================================

        function PantallaLogin({ usuarios, onLogin, onRegister }) {
          const [modo, setModo] = useState('LOGIN'); 
          const [username, setUsername] = useState('');
          const [password, setPassword] = useState('');
          const [nombre, setNombre] = useState('');
          const [telefono, setTelefono] = useState('');
          const [error, setError] = useState('');

          const handleAuth = (e) => {
            e.preventDefault();
            if (modo === 'LOGIN') {
              const user = usuarios.find(u => u.username === username && u.password === password);
              if (user) onLogin(user);
              else setError('Usuario o contraseña incorrectos.');
            } else {
              if (usuarios.some(u => u.username === username)) return setError('El usuario ya existe.');
              onRegister({ username, password, nombre, telefono });
              setModo('LOGIN'); setError('Registro exitoso. Inicia sesión.'); setPassword('');
            }
          };

          return (
            <div className="min-h-screen bg-slate-900 flex items-center justify-center p-4">
              <div className="bg-white rounded-3xl shadow-2xl overflow-hidden w-full max-w-4xl flex fade-in">
                <div className="w-1/2 bg-blue-600 p-12 text-white flex-col justify-center hidden md:flex relative">
                  <Printer size={64} className="mb-6 z-10" />
                  <h1 className="text-4xl font-bold mb-4 z-10">PrintPro</h1>
                  <p className="text-blue-100 text-lg z-10">Plataforma VIP de cotizaciones en la Nube.</p>
                </div>
                <div className="w-full md:w-1/2 p-12">
                  <h2 className="text-2xl font-bold text-slate-800 mb-2">{modo === 'LOGIN' ? 'Acceso al Sistema' : 'Crear Cuenta'}</h2>
                  {error && <div className={`mb-4 p-3 rounded-xl text-sm font-semibold ${error.includes('exitoso') ? 'bg-emerald-100 text-emerald-700' : 'bg-red-100 text-red-700'}`}>{error}</div>}
                  <form onSubmit={handleAuth} className="space-y-4">
                    {modo === 'REGISTRO' && (
                      <>
                        <input required placeholder="Nombre de Empresa" value={nombre} onChange={e=>setNombre(e.target.value)} className="w-full p-3 rounded-xl border border-slate-200 outline-none focus:border-blue-500 transition-colors" />
                        <input required placeholder="Teléfono" value={telefono} onChange={e=>setTelefono(e.target.value)} className="w-full p-3 rounded-xl border border-slate-200 outline-none focus:border-blue-500 transition-colors" />
                      </>
                    )}
                    <input required placeholder="Usuario" value={username} onChange={e=>setUsername(e.target.value)} className="w-full p-3 rounded-xl border border-slate-200 outline-none focus:border-blue-500 transition-colors" />
                    <input required type="password" placeholder="Contraseña" value={password} onChange={e=>setPassword(e.target.value)} className="w-full p-3 rounded-xl border border-slate-200 outline-none focus:border-blue-500 transition-colors" />
                    <button type="submit" className="w-full bg-slate-900 text-white font-bold p-4 rounded-xl hover:bg-slate-800 mt-4 transition-colors">{modo === 'LOGIN' ? 'Ingresar' : 'Registrarme'}</button>
                  </form>
                  <button onClick={() => { setModo(modo === 'LOGIN' ? 'REGISTRO' : 'LOGIN'); setError(''); }} className="text-blue-600 w-full mt-6 text-sm font-semibold hover:underline">
                    {modo === 'LOGIN' ? '¿No tienes cuenta? Regístrate' : 'Volver al Login'}
                  </button>
                </div>
              </div>
            </div>
          );
        }

        function PortalClienteVIP({ cliente, catalogo, tecnicas, margenGanancia, impuestoGlobal, ordenes, onCrearOrden, onLogout }) {
          const [vista, setVista] = useState('NUEVA_COTIZACION'); 
          return (
            <div className="min-h-screen bg-slate-50 flex flex-col md:flex-row fade-in">
              <aside className="w-full md:w-64 bg-white border-r border-slate-200 p-6 flex flex-col print:hidden shadow-sm z-10">
                <div className="flex items-center gap-3 text-blue-600 mb-8"><Printer size={32} /><span className="text-xl font-bold">PrintPro</span></div>
                <div className="mb-8 p-4 bg-blue-50 rounded-2xl border border-blue-100">
                  <p className="font-bold text-slate-800 truncate">{cliente.nombre}</p>
                  {cliente.descuentoGlobal > 0 && <span className="mt-2 text-xs font-semibold text-emerald-600 bg-emerald-100 px-2 py-1 rounded-md inline-block">{cliente.descuentoGlobal}% OFF VIP</span>}
                </div>
                <nav className="flex-1 space-y-2">
                  <MenuBtn icon={Plus} label="Nueva Cotización" active={vista === 'NUEVA_COTIZACION'} onClick={() => setVista('NUEVA_COTIZACION')} />
                  <MenuBtn icon={FileText} label="Mis Órdenes" active={vista === 'HISTORIAL'} onClick={() => setVista('HISTORIAL')} />
                </nav>
                <button onClick={onLogout} className="flex items-center gap-2 text-slate-500 hover:text-red-500 mt-auto p-2 font-medium transition-colors"><LogOut size={20} /> Salir</button>
              </aside>
              <main className="flex-1 p-8 overflow-y-auto bg-slate-50">
                {vista === 'NUEVA_COTIZACION' ? (
                  <CotizadorWizard 
                    cliente={cliente} catalogo={catalogo} tecnicas={tecnicas} 
                    margenGanancia={margenGanancia} impuestoGlobal={impuestoGlobal} 
                    onGuardar={(o) => { onCrearOrden(o); setVista('HISTORIAL'); }} 
                  />
                ) : (
                  <HistorialOrdenes ordenes={ordenes} />
                )}
              </main>
            </div>
          );
        }

        function CotizadorWizard({ cliente, catalogo, tecnicas, margenGanancia, impuestoGlobal, onGuardar }) {
          const [paso, setPaso] = useState(1);
          const [proveeCliente, setProveeCliente] = useState(false); 
          const [itemSelect, setItemSelect] = useState(null);
          const [aplicaciones, setAplicaciones] = useState([]);
          const [cantidad, setCantidad] = useState(50);
          const [errorValidacion, setErrorValidacion] = useState('');

          const productoSeleccionado = catalogo.find(c => c.id === itemSelect);

          // LÓGICA DE FILTRADO DE TÉCNICAS (Requisito 2)
          const tecnicasPermitidas = useMemo(() => {
              if (!productoSeleccionado) return [];
              
              // Retrocompatibilidad: Si existe tecnicasRecomendadas (array) y tiene elementos, filtramos.
              if (Array.isArray(productoSeleccionado.tecnicasRecomendadas) && productoSeleccionado.tecnicasRecomendadas.length > 0) {
                  return tecnicas.filter(t => productoSeleccionado.tecnicasRecomendadas.includes(t.id));
              }
              // Si no hay técnicas recomendadas específicas o usa el formato viejo, mostramos todas (fallback de seguridad)
              return tecnicas;
          }, [productoSeleccionado, tecnicas]);

          // Cuando el producto cambia o si `tecnicasPermitidas` cambia, limpiar aplicaciones inválidas
          useEffect(() => {
             const permitidosIds = tecnicasPermitidas.map(t => t.id);
             setAplicaciones(prev => prev.filter(app => !app.tecnicaId || permitidosIds.includes(app.tecnicaId)));
          }, [tecnicasPermitidas]);

          const agregarAplicacion = () => setAplicaciones([...aplicaciones, { id: Date.now(), tecnicaId: '', subcatId: '', opcionId: '' }]);
          const actualizarAplicacion = (id, campo, valor) => {
            setAplicaciones(aplicaciones.map(app => {
              if (app.id === id) {
                const updated = { ...app, [campo]: valor };
                if (campo === 'tecnicaId') { updated.subcatId = ''; updated.opcionId = ''; }
                if (campo === 'subcatId') { updated.opcionId = ''; }
                return updated;
              }
              return app;
            }));
          };
          const eliminarAplicacion = (id) => setAplicaciones(aplicaciones.filter(a => a.id !== id));

          const cotizacion = useMemo(() => {
            if (!productoSeleccionado) return null;
            let minRequerido = 1;

            const costoBaseProd = proveeCliente ? 0 : productoSeleccionado.costoBase;
            const costoProdTotal = costoBaseProd * cantidad;
            let subtotalProducto = costoProdTotal * (1 + (margenGanancia / 100));
            let impuestoProducto = 0;
            
            // Requisito 3: Se usa el impuestoGlobal
            if (productoSeleccionado.cobraImpuesto) {
              impuestoProducto = subtotalProducto * (impuestoGlobal / 100);
            }

            let subtotalTecnicas = 0;
            let impuestoTecnicas = 0;

            aplicaciones.forEach(app => {
              if(!app.tecnicaId || !app.subcatId || !app.opcionId) return;
              const tec = tecnicas.find(t => t.id === app.tecnicaId);
              if(!tec) return;
              if (tec.minimo > minRequerido) minRequerido = tec.minimo;

              const subcat = tec.subcategorias.find(s => s.id === app.subcatId);
              const opcion = subcat?.opciones.find(o => o.id === app.opcionId);
              if(!opcion) return;

              const fijoApp = opcion.costosFijos.reduce((sum, c) => sum + Number(c.valor), 0);
              const varApp = opcion.costosVariables.reduce((sum, c) => sum + Number(c.valor), 0);

              const costoProduccionApp = fijoApp + (varApp * cantidad);
              const subtotalVentaApp = costoProduccionApp * (1 + (margenGanancia / 100));
              subtotalTecnicas += subtotalVentaApp;

              // Requisito 3: Se usa el impuestoGlobal
              if (tec.cobraImpuesto) {
                impuestoTecnicas += subtotalVentaApp * (impuestoGlobal / 100);
              }
            });

            let subtotalGlobal = subtotalProducto + subtotalTecnicas;
            let descuentoVol = cantidad >= 500 ? 0.15 : (cantidad >= 100 ? 0.08 : (cantidad >= 50 ? 0.04 : 0));
            let multDescuento = (1 - descuentoVol) * (1 - (cliente.descuentoGlobal / 100));
            
            let subtotalConDescuento = subtotalGlobal * multDescuento;
            let impuestoTotalFinal = (impuestoProducto + impuestoTecnicas) * multDescuento;
            let totalFinal = subtotalConDescuento + impuestoTotalFinal;

            return {
              subtotalBruto: subtotalGlobal,
              subtotalDescuento: subtotalConDescuento,
              impuestos: impuestoTotalFinal,
              total: totalFinal,
              unitario: totalFinal / cantidad,
              minRequerido,
              valido: aplicaciones.every(a => a.tecnicaId && a.subcatId && a.opcionId) || aplicaciones.length === 0
            };
          }, [productoSeleccionado, aplicaciones, cantidad, proveeCliente, margenGanancia, impuestoGlobal, cliente.descuentoGlobal, tecnicas]);

          useEffect(() => {
            if (cotizacion && cantidad < cotizacion.minRequerido) {
              setErrorValidacion(`La técnica seleccionada requiere un mínimo de ${cotizacion.minRequerido} pzas.`);
            } else {
              setErrorValidacion('');
            }
          }, [cantidad, cotizacion]);

          const handleGuardar = () => {
            if(!cotizacion || !cotizacion.valido || errorValidacion) return;
            const detalleApps = aplicaciones.map(app => {
              const t = tecnicas.find(x => x.id === app.tecnicaId)?.nombre;
              const s = tecnicas.find(x => x.id === app.tecnicaId)?.subcategorias.find(y => y.id === app.subcatId)?.nombre;
              const o = tecnicas.find(x => x.id === app.tecnicaId)?.subcategorias.find(y => y.id === app.subcatId)?.opciones.find(z => z.id === app.opcionId)?.nombre;
              return `${t} (${s} - ${o})`;
            }).join(' + ') || 'Sin Personalizar';

            onGuardar({
              id: `ORD-${Math.floor(Math.random() * 10000)}`,
              clienteId: cliente.id,
              clienteNombre: cliente.nombre,
              producto: productoSeleccionado.nombre,
              proveeCliente,
              detalles: detalleApps,
              cantidad,
              fecha: new Date().toLocaleDateString(),
              precioEstimado: !proveeCliente, 
              subtotal: cotizacion.subtotalDescuento,
              impuestos: cotizacion.impuestos,
              total: cotizacion.total,
              estado: 'Pendiente', 
            });
          };

          return (
            <div className="max-w-4xl mx-auto pb-12">
              <h2 className="text-3xl font-bold text-slate-800 mb-8">Nueva Cotización</h2>
              <div className="flex gap-4 mb-8">
                {[1, 2, 3].map(i => <div key={i} className={`flex-1 h-2 rounded-full transition-all duration-300 ${paso >= i ? 'bg-blue-600' : 'bg-slate-200'}`} />)}
              </div>
              <div className="bg-white rounded-3xl shadow-sm border border-slate-200 p-8">
                {paso === 1 && (
                  <div className="fade-in">
                    <h3 className="text-xl font-bold mb-4">1. Selección de Artículo</h3>
                    <div className="bg-blue-50 p-6 rounded-2xl mb-8 flex flex-col md:flex-row gap-4">
                      <button onClick={() => setProveeCliente(true)} className={`flex-1 p-4 rounded-xl border-2 font-bold transition-colors ${proveeCliente ? 'bg-blue-600 text-white border-blue-600' : 'bg-white text-slate-600 hover:border-blue-300'}`}>Traigo mis artículos</button>
                      <button onClick={() => setProveeCliente(false)} className={`flex-1 p-4 rounded-xl border-2 font-bold transition-colors ${!proveeCliente ? 'bg-blue-600 text-white border-blue-600' : 'bg-white text-slate-600 hover:border-blue-300'}`}>Incluir artículos del catálogo</button>
                    </div>
                    <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
                      {catalogo.map(prod => {
                        // Lógica retrocompatible para mostrar el texto de técnica
                        const nombresTecnicas = Array.isArray(prod.tecnicasRecomendadas) && prod.tecnicasRecomendadas.length > 0
                             ? prod.tecnicasRecomendadas.map(id => tecnicas.find(t=>t.id===id)?.nombre).filter(Boolean).join(', ')
                             : prod.tecnicaRecomendada; // String antiguo si existe

                        return (
                        <button key={prod.id} onClick={() => setItemSelect(prod.id)} className={`flex flex-col items-center justify-between p-4 rounded-2xl border-2 text-center transition-all h-full ${itemSelect === prod.id ? 'border-blue-600 bg-blue-50 shadow-md transform scale-105' : 'border-slate-100 hover:border-blue-200 hover:bg-slate-50'}`}>
                          <div className="w-20 h-20 bg-slate-100 rounded-xl mb-3 flex items-center justify-center overflow-hidden border border-slate-200">
                             {prod.imagenUrl ? (
                               <img src={prod.imagenUrl} alt={prod.nombre} className="w-full h-full object-cover" />
                             ) : (
                               <ImageIcon className="text-slate-400" size={32} />
                             )}
                          </div>
                          <div className="flex-1 flex flex-col justify-between w-full">
                             <p className="font-bold text-slate-700 text-sm mb-2">{prod.nombre}</p>
                             {nombresTecnicas && (
                               <span className="text-[10px] bg-emerald-100 text-emerald-700 px-2 py-1 rounded-md mt-auto">Acepta: {nombresTecnicas}</span>
                             )}
                          </div>
                        </button>
                      )})}
                    </div>
                    <div className="mt-8 flex justify-end">
                      <button disabled={!itemSelect} onClick={() => setPaso(2)} className="bg-blue-600 text-white px-8 py-3 rounded-xl font-bold disabled:opacity-50 hover:bg-blue-700 transition-colors">Siguiente</button>
                    </div>
                  </div>
                )}
                {paso === 2 && (
                  <div className="fade-in">
                    <h3 className="text-xl font-bold mb-4">2. Aplicaciones de Personalización</h3>
                    <div className="flex justify-between items-center mb-6">
                        <p className="text-sm text-slate-500">Añade una o más técnicas para personalizar tu artículo.</p>
                        {tecnicasPermitidas.length > 0 && (
                            <span className="bg-emerald-50 text-emerald-700 border border-emerald-200 text-xs px-3 py-1.5 rounded-lg font-semibold flex items-center gap-1">
                               💡 Mostrando técnicas compatibles
                            </span>
                        )}
                    </div>
                    
                    {tecnicasPermitidas.length === 0 && (
                        <div className="p-4 bg-amber-50 text-amber-700 border border-amber-200 rounded-xl mb-4 text-sm">
                            Este producto no tiene técnicas compatibles configuradas en el catálogo. No se puede personalizar.
                        </div>
                    )}

                    <div className="space-y-4 mb-6">
                      {aplicaciones.map((app, index) => {
                        const tecObj = tecnicas.find(t => t.id === app.tecnicaId);
                        const subObj = tecObj?.subcategorias.find(s => s.id === app.subcatId);
                        return (
                          <div key={app.id} className="p-4 border border-slate-200 rounded-2xl bg-slate-50 relative flex flex-col md:flex-row gap-4 items-center">
                            <button onClick={() => eliminarAplicacion(app.id)} className="absolute -top-2 -right-2 bg-red-100 text-red-600 p-1.5 rounded-full hover:bg-red-200 shadow-sm transition-colors"><X size={16}/></button>
                            <div className="flex-1 w-full">
                              <label className="text-xs font-bold text-slate-500 mb-1 block">Técnica (Solo Recomendadas)</label>
                              <select value={app.tecnicaId} onChange={e => actualizarAplicacion(app.id, 'tecnicaId', e.target.value)} className="w-full p-2.5 rounded-lg border border-slate-300 outline-none focus:border-blue-500 bg-white">
                                <option value="">-- Seleccionar --</option>
                                {/* Requisito 2: Mapeamos solo tecnicasPermitidas */}
                                {tecnicasPermitidas.map(t => <option key={t.id} value={t.id}>{t.nombre}</option>)}
                              </select>
                            </div>
                            <div className="flex-1 w-full">
                              <label className="text-xs font-bold text-slate-500 mb-1 block">Ubicación / Área</label>
                              <select disabled={!tecObj} value={app.subcatId} onChange={e => actualizarAplicacion(app.id, 'subcatId', e.target.value)} className="w-full p-2.5 rounded-lg border border-slate-300 outline-none focus:border-blue-500 bg-white disabled:bg-slate-100 disabled:text-slate-400">
                                <option value="">-- Seleccionar --</option>
                                {tecObj?.subcategorias.map(s => <option key={s.id} value={s.id}>{s.nombre}</option>)}
                              </select>
                            </div>
                            <div className="flex-1 w-full">
                              <label className="text-xs font-bold text-slate-500 mb-1 block">Variante</label>
                              <select disabled={!subObj} value={app.opcionId} onChange={e => actualizarAplicacion(app.id, 'opcionId', e.target.value)} className="w-full p-2.5 rounded-lg border border-slate-300 outline-none focus:border-blue-500 bg-white disabled:bg-slate-100 disabled:text-slate-400">
                                <option value="">-- Seleccionar --</option>
                                {subObj?.opciones.map(o => <option key={o.id} value={o.id}>{o.nombre}</option>)}
                              </select>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                    {tecnicasPermitidas.length > 0 && (
                        <button onClick={agregarAplicacion} className="w-full border-2 border-dashed border-blue-300 text-blue-600 font-bold p-4 rounded-2xl hover:bg-blue-50 flex justify-center items-center gap-2 transition-colors">
                        <Plus size={20}/> Añadir Aplicación
                        </button>
                    )}
                    <div className="mt-8 flex justify-between">
                      <button onClick={() => setPaso(1)} className="text-slate-500 font-bold px-6 py-2 hover:bg-slate-100 rounded-xl transition-colors">Atrás</button>
                      <button disabled={aplicaciones.some(a => !a.tecnicaId || !a.subcatId || !a.opcionId)} onClick={() => setPaso(3)} className="bg-blue-600 text-white px-8 py-3 rounded-xl font-bold disabled:opacity-50 hover:bg-blue-700 transition-colors">Calcular Total</button>
                    </div>
                  </div>
                )}
                {paso === 3 && cotizacion && (
                  <div className="fade-in">
                    <h3 className="text-xl font-bold mb-6">3. Volumen y Total</h3>
                    <div className="flex flex-col md:flex-row gap-8">
                      <div className="flex-1 space-y-6">
                        <div>
                          <label className="block text-sm font-bold text-slate-600 mb-2">Cantidad de Unidades</label>
                          <input type="number" min="1" value={cantidad} onChange={(e) => setCantidad(Number(e.target.value))} className="w-full p-4 rounded-xl border-2 border-blue-200 text-2xl font-bold focus:border-blue-600 outline-none transition-colors" />
                          {errorValidacion && <p className="text-red-500 text-sm mt-2 flex items-center gap-1"><AlertCircle size={14}/> {errorValidacion}</p>}
                        </div>
                        <div className="bg-emerald-50 p-4 rounded-xl border border-emerald-100">
                          <p className="text-sm text-emerald-800 font-bold">Descuentos Dinámicos Activos:</p>
                          <ul className="text-xs text-emerald-600 list-disc pl-4 mt-1">
                            {cliente.descuentoGlobal > 0 && <li>Cliente VIP: -{cliente.descuentoGlobal}%</li>}
                            {cantidad >= 50 && <li>Volumen: -{cantidad >= 500 ? 15 : (cantidad >= 100 ? 8 : 4)}%</li>}
                            {cliente.descuentoGlobal === 0 && cantidad < 50 && <li className="list-none text-slate-500 italic">No hay descuentos aplicables. Cotiza +50 unidades para aplicar a tarifa preferencial.</li>}
                          </ul>
                        </div>
                      </div>
                      <div className="flex-1 bg-slate-900 text-white p-6 rounded-3xl flex flex-col justify-between shadow-lg">
                        <div>
                          <h4 className="text-lg font-bold mb-4 border-b border-slate-700 pb-2">Resumen Financiero</h4>
                          <div className="space-y-2 text-sm text-slate-300">
                            <div className="flex justify-between"><span>Subtotal Prod/Servicios:</span> <span>L {cotizacion.subtotalBruto.toFixed(2)}</span></div>
                            {cotizacion.subtotalDescuento !== cotizacion.subtotalBruto && (
                              <div className="flex justify-between text-emerald-400 font-medium"><span>Con Descuentos:</span> <span>L {cotizacion.subtotalDescuento.toFixed(2)}</span></div>
                            )}
                            <div className="flex justify-between"><span>Impuestos ({impuestoGlobal}%):</span> <span>L {cotizacion.impuestos.toFixed(2)}</span></div>
                          </div>
                        </div>
                        <div className="border-t border-slate-700 mt-6 pt-4">
                          <div className="flex justify-between items-end">
                            <span className="font-bold text-lg text-slate-400">Total Final:</span>
                            <div className="text-right">
                              <span className="text-3xl font-black text-blue-400">L {cotizacion.total.toFixed(2)}</span>
                              <p className="text-xs text-slate-400 mt-1">L {cotizacion.unitario.toFixed(2)} c/u</p>
                            </div>
                          </div>
                        </div>
                        <button onClick={handleGuardar} disabled={!!errorValidacion} className="w-full bg-blue-600 text-white py-4 rounded-xl font-bold mt-6 hover:bg-blue-500 disabled:opacity-50 transition-colors">Generar Cotización</button>
                      </div>
                    </div>
                    <div className="mt-8"><button onClick={() => setPaso(2)} className="text-slate-500 font-bold px-6 py-2 hover:bg-slate-100 rounded-xl transition-colors">Atrás</button></div>
                  </div>
                )}
              </div>
            </div>
          );
        }

        function HistorialOrdenes({ ordenes }) {
          if (ordenes.length === 0) return <div className="text-center py-20 fade-in"><p className="text-slate-400">No hay cotizaciones.</p></div>;
          return (
            <div className="max-w-5xl mx-auto space-y-4 fade-in">
              <h2 className="text-2xl font-bold text-slate-800 mb-6">Mis Cotizaciones</h2>
              {ordenes.map(orden => (
                <div key={orden.id} className="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 flex justify-between items-center gap-4 hover:shadow-md transition-shadow">
                  <div className="flex-1 grid grid-cols-2 md:grid-cols-4 gap-4">
                    <div><p className="text-xs text-slate-400">ID</p><p className="font-bold text-slate-700">{orden.id}</p></div>
                    <div><p className="text-xs text-slate-400">Detalle</p><p className="font-bold text-slate-700 truncate" title={orden.detalles}>{orden.producto} x{orden.cantidad}</p></div>
                    <div><p className="text-xs text-slate-400">Total</p><p className="font-bold text-emerald-600">L {orden.total.toFixed(2)}</p></div>
                    <div><p className="text-xs text-slate-400">Estado</p><EstadoBadge estado={orden.estado}/></div>
                  </div>
                  <button className="bg-green-500 text-white p-2.5 rounded-xl hover:bg-green-600 transition-colors shadow-sm" title="Contactar por WhatsApp" onClick={() => window.open('https://wa.me/50499990000', '_blank')}><Share2 size={18}/></button>
                </div>
              ))}
            </div>
          );
        }

        function PanelAdmin({ ordenes, catalogo, setCatalogo, tecnicas, setTecnicas, margenGanancia, impuestoGlobal, setConfigGlobal, usuarios, onLogout }) {
          const [vista, setVista] = useState('CATALOGO'); 
          return (
            <div className="min-h-screen bg-slate-900 text-slate-200 flex flex-col md:flex-row fade-in">
              <aside className="w-full md:w-64 bg-slate-950 p-6 flex flex-col border-r border-slate-800 z-10">
                <div className="flex items-center gap-3 text-emerald-500 mb-10"><Settings size={32} /><span className="text-xl font-bold text-white">ERP Admin</span></div>
                <nav className="flex-1 space-y-2">
                  <MenuBtn icon={LayoutDashboard} label="Dashboard" active={vista === 'DASHBOARD'} onClick={() => setVista('DASHBOARD')} dark />
                  <MenuBtn icon={ShoppingBag} label="Órdenes General" active={vista === 'ORDENES'} onClick={() => setVista('ORDENES')} dark />
                  <MenuBtn icon={Package} label="Catálogo & Lógica" active={vista === 'CATALOGO'} onClick={() => setVista('CATALOGO')} dark />
                </nav>
                <button onClick={onLogout} className="flex items-center gap-2 text-slate-500 hover:text-white mt-auto p-2 transition-colors"><LogOut size={20} /> Salir</button>
              </aside>
              <main className="flex-1 p-8 overflow-y-auto bg-slate-900 relative">
                {vista === 'DASHBOARD' && (
                   <div className="text-center text-slate-500 mt-20 fade-in">
                     Hay <span className="font-bold text-emerald-400">{usuarios.length}</span> usuarios y <span className="font-bold text-blue-400">{ordenes.length}</span> órdenes en el sistema.
                   </div>
                )}
                
                {vista === 'ORDENES' && (
                  <div className="max-w-5xl mx-auto space-y-4 fade-in">
                    <h2 className="text-2xl font-bold text-white mb-6">Todas las Cotizaciones</h2>
                    {ordenes.map(orden => (
                      <div key={orden.id} className="bg-slate-800 rounded-xl border border-slate-700 p-4 flex justify-between items-center gap-4 hover:border-slate-600 transition-colors">
                        <div className="flex-1 grid grid-cols-5 gap-4 text-sm text-slate-300">
                          <div><p className="text-xs text-slate-500">ID</p><p className="font-bold text-white">{orden.id}</p></div>
                          <div><p className="text-xs text-slate-500">Cliente</p><p className="truncate" title={orden.clienteNombre}>{orden.clienteNombre}</p></div>
                          <div><p className="text-xs text-slate-500">Detalle</p><p className="truncate" title={`${orden.producto} x${orden.cantidad}`}>{orden.producto} x{orden.cantidad}</p></div>
                          <div><p className="text-xs text-slate-500">Total</p><p className="font-bold text-emerald-400">L {orden.total.toFixed(2)}</p></div>
                          <div><p className="text-xs text-slate-500">Estado</p><EstadoBadge estado={orden.estado}/></div>
                        </div>
                      </div>
                    ))}
                    {ordenes.length === 0 && <p className="text-slate-500 text-center py-10">No hay órdenes registradas.</p>}
                  </div>
                )}
                
                {vista === 'CATALOGO' && (
                  <GestionJerarquica 
                    catalogo={catalogo} setCatalogo={setCatalogo} 
                    tecnicas={tecnicas} setTecnicas={setTecnicas} 
                    margenGanancia={margenGanancia} impuestoGlobal={impuestoGlobal} 
                    setConfigGlobal={setConfigGlobal} 
                  />
                )}
              </main>
            </div>
          );
        }

        function GestionJerarquica({ catalogo, setCatalogo, tecnicas, setTecnicas, margenGanancia, impuestoGlobal, setConfigGlobal }) {
          const [tecActivaId, setTecActivaId] = useState(tecnicas[0]?.id || null);
          const [modalConfig, setModalConfig] = useState(null); 

          const tecActual = tecnicas.find(t => t.id === tecActivaId);

          const updateTecnicaActual = (updatedTecObj) => {
            setTecnicas(tecnicas.map(t => t.id === tecActivaId ? updatedTecObj : t));
          };

          // --- GESTIÓN DE PRODUCTOS ---
          const handleCrearProducto = () => {
            setModalConfig({
              titulo: "Nuevo Producto Base",
              valoresIniciales: { costoBase: 0, tecnicasRecomendadas: [] },
              campos: [
                { id: 'nombre', label: 'Nombre del Producto:', type: 'text' },
                { id: 'costoBase', label: 'Costo Base (L):', type: 'number' },
                // Requisito 2: Cambiado de texto a multiselect
                { id: 'tecnicasRecomendadas', label: 'Técnicas Recomendadas / Aceptadas:', type: 'checkboxGroup', options: tecnicas.map(t => ({ value: t.id, label: t.nombre })) },
                { id: 'imagenUrl', label: 'Imagen de Muestra:', type: 'file' }
              ],
              onSubmit: (datos) => {
                if (!datos.nombre || isNaN(parseFloat(datos.costoBase))) return;
                const nuevo = {
                  id: `PROD_${Date.now()}`, nombre: datos.nombre, tipo: 'General',
                  costoBase: parseFloat(datos.costoBase), 
                  imagenUrl: datos.imagenUrl || '', 
                  tecnicasRecomendadas: datos.tecnicasRecomendadas || [], // Guardado como array
                  cobraImpuesto: true
                };
                setCatalogo([...catalogo, nuevo]);
              }
            });
          };

          const handleEditarProducto = (prod) => {
            // Retrocompatibilidad: Si el producto viejo tiene string, inicializamos con array vacio en la edición para no romper el modal
            let inicialTecnicas = [];
            if (Array.isArray(prod.tecnicasRecomendadas)) {
                inicialTecnicas = prod.tecnicasRecomendadas;
            }

            setModalConfig({
              titulo: "Editar Producto",
              valoresIniciales: { 
                 nombre: prod.nombre, 
                 costoBase: prod.costoBase, 
                 tecnicasRecomendadas: inicialTecnicas, 
                 imagenUrl: prod.imagenUrl 
              },
              campos: [
                { id: 'nombre', label: 'Nombre del Producto:', type: 'text' },
                { id: 'costoBase', label: 'Costo Base (L):', type: 'number' },
                // Requisito 2: Multiselect
                { id: 'tecnicasRecomendadas', label: 'Técnicas Recomendadas / Aceptadas:', type: 'checkboxGroup', options: tecnicas.map(t => ({ value: t.id, label: t.nombre })) },
                { id: 'imagenUrl', label: 'Cambiar Imagen (opcional):', type: 'file' }
              ],
              onSubmit: (datos) => {
                const editado = {
                    ...prod,
                    nombre: datos.nombre || prod.nombre,
                    costoBase: datos.costoBase !== undefined ? parseFloat(datos.costoBase) : prod.costoBase,
                    tecnicasRecomendadas: datos.tecnicasRecomendadas !== undefined ? datos.tecnicasRecomendadas : inicialTecnicas,
                    imagenUrl: datos.imagenUrl || prod.imagenUrl // Si no sube nada nuevo, mantiene la actual
                };
                // Eliminamos la propiedad vieja (string) para limpiar la base de datos gradualmente
                if (editado.tecnicaRecomendada) delete editado.tecnicaRecomendada;
                
                setCatalogo(catalogo.map(p => p.id === prod.id ? editado : p));
              }
            });
          };

          const handleEliminarProducto = (id, nombre) => {
            setModalConfig({
              titulo: "Eliminar Producto", esConfirmacion: true,
              mensaje: `¿Estás seguro que deseas eliminar el producto "${nombre}" del catálogo? Esta acción no se puede deshacer.`,
              campos: [], onSubmit: () => setCatalogo(catalogo.filter(p => p.id !== id))
            });
          };

          // --- GESTIÓN DE TÉCNICAS Y ÁRBOL ---
          const handleEliminarTecnica = () => {
            if(!tecActual) return;
            setModalConfig({
              titulo: "Eliminar Técnica", esConfirmacion: true,
              mensaje: `¿Estás seguro que deseas eliminar TODA la técnica "${tecActual.nombre}" y sus variantes?`,
              campos: [], onSubmit: () => {
                const nuevas = tecnicas.filter(t => t.id !== tecActual.id);
                setTecnicas(nuevas);
                setTecActivaId(nuevas[0]?.id || null);
              }
            });
          };

          const handleCrearTecnica = () => {
            setModalConfig({
              titulo: "Nueva Técnica", campos: [{ id: 'nombre', label: 'Nombre de la nueva Técnica:', type: 'text' }],
              onSubmit: (datos) => {
                if (!datos.nombre) return;
                // Cobra impuesto por defecto al crearse
                const nueva = { id: `TEC_${Date.now()}`, nombre: datos.nombre, cobraImpuesto: true, minimo: 1, subcategorias: [] };
                setTecnicas([...tecnicas, nueva]);
                setTecActivaId(nueva.id);
              }
            });
          };

          const agregarSubcat = () => {
            setModalConfig({
              titulo: "Nueva Ubicación / Subcategoría", campos: [{ id: 'nombre', label: 'Nombre de Ubicación:', type: 'text' }],
              onSubmit: (datos) => {
                if (!datos.nombre) return;
                const nuevaSub = { id: `SUB_${Date.now()}`, nombre: datos.nombre, opciones: [] };
                updateTecnicaActual({ ...tecActual, subcategorias: [...tecActual.subcategorias, nuevaSub] });
              }
            });
          };

          const eliminarSubcat = (subId, nombre) => {
            setModalConfig({
                titulo: "Eliminar Ubicación", esConfirmacion: true,
                mensaje: `¿Deseas eliminar la ubicación "${nombre}" y todas sus variantes?`,
                campos: [], onSubmit: () => {
                    const subsActualizadas = tecActual.subcategorias.filter(s => s.id !== subId);
                    updateTecnicaActual({ ...tecActual, subcategorias: subsActualizadas });
                }
            });
          };

          const agregarOpcion = (subcatId) => {
            setModalConfig({
              titulo: "Nueva Variante", campos: [{ id: 'nombre', label: 'Nombre de Variante:', type: 'text' }],
              onSubmit: (datos) => {
                if (!datos.nombre) return;
                const nuevaOp = { id: `OP_${Date.now()}`, nombre: datos.nombre, costosFijos: [], costosVariables: [] };
                const subsActualizadas = tecActual.subcategorias.map(s => {
                  if (s.id === subcatId) return { ...s, opciones: [...s.opciones, nuevaOp] };
                  return s;
                });
                updateTecnicaActual({ ...tecActual, subcategorias: subsActualizadas });
              }
            });
          };

          const eliminarOpcion = (subId, opId, nombre) => {
              setModalConfig({
                titulo: "Eliminar Variante", esConfirmacion: true,
                mensaje: `¿Deseas eliminar la variante "${nombre}" y sus costos asociados?`,
                campos: [], onSubmit: () => {
                    const subsActualizadas = tecActual.subcategorias.map(s => {
                        if (s.id === subId) {
                            return { ...s, opciones: s.opciones.filter(o => o.id !== opId) };
                        }
                        return s;
                    });
                    updateTecnicaActual({ ...tecActual, subcategorias: subsActualizadas });
                }
            });
          }

          const agregarCosto = (subcatId, opcionId, tipo) => {
            setModalConfig({
              titulo: `Añadir Costo ${tipo}`,
              campos: [{ id: 'nombre', label: `Nombre:`, type: 'text' }, { id: 'valor', label: `Valor (L):`, type: 'number' }],
              onSubmit: (datos) => {
                const valorNum = parseFloat(datos.valor);
                if (!datos.nombre || isNaN(valorNum)) return;
                const subsActualizadas = tecActual.subcategorias.map(s => {
                  if (s.id === subcatId) {
                    const opsActualizadas = s.opciones.map(o => {
                      if (o.id === opcionId) {
                        const key = tipo === 'Fijo' ? 'costosFijos' : 'costosVariables';
                        return { ...o, [key]: [...o[key], { id: `COST_${Date.now()}`, nombre: datos.nombre, valor: valorNum }] };
                      }
                      return o;
                    });
                    return { ...s, opciones: opsActualizadas };
                  }
                  return s;
                });
                updateTecnicaActual({ ...tecActual, subcategorias: subsActualizadas });
              }
            });
          };

          const eliminarCosto = (subcatId, opcionId, costoId, tipo) => {
            const subsActualizadas = tecActual.subcategorias.map(s => {
              if(s.id === subcatId) {
                const opsActualizadas = s.opciones.map(o => {
                  if(o.id === opcionId) {
                    const key = tipo === 'Fijo' ? 'costosFijos' : 'costosVariables';
                    return { ...o, [key]: o[key].filter(c => c.id !== costoId) };
                  }
                  return o;
                });
                return { ...s, opciones: opsActualizadas };
              }
              return s;
            });
            updateTecnicaActual({ ...tecActual, subcategorias: subsActualizadas });
          };

          return (
            <div className="max-w-6xl space-y-8 relative fade-in">
              {modalConfig && <CustomModal config={modalConfig} onClose={() => setModalConfig(null)} />}

              <div className="flex flex-col md:flex-row justify-between items-start md:items-end mb-6 gap-4">
                <div>
                  <h1 className="text-3xl font-bold text-white mb-2">Configuración Lógica y Precios</h1>
                  <p className="text-slate-400 text-sm">Todo cambio realizado aquí se sincroniza instantáneamente con la base de datos de Firestore.</p>
                </div>
                {/* Requisito 3: Impuesto global a la par de Margen */}
                <div className="bg-slate-800 p-3 rounded-xl border border-slate-700 flex flex-wrap items-center gap-4 shadow-sm">
                  <div className="flex items-center gap-2">
                      <label className="text-sm font-bold text-emerald-400">Margen %</label>
                      <input type="number" value={margenGanancia} onChange={e=>setConfigGlobal(Number(e.target.value), impuestoGlobal)} className="w-20 p-2 rounded bg-slate-900 border border-slate-600 text-white font-bold outline-none focus:border-blue-500 transition-colors" />
                  </div>
                  <div className="hidden md:block w-px h-6 bg-slate-700"></div>
                  <div className="flex items-center gap-2">
                      <label className="text-sm font-bold text-amber-400">Impuesto %</label>
                      <input type="number" value={impuestoGlobal} onChange={e=>setConfigGlobal(margenGanancia, Number(e.target.value))} className="w-20 p-2 rounded bg-slate-900 border border-slate-600 text-white font-bold outline-none focus:border-amber-500 transition-colors" />
                  </div>
                </div>
              </div>

              <div className="grid grid-cols-1 xl:grid-cols-2 gap-8">
                {/* CATÁLOGO PRODUCTOS */}
                <div className="bg-slate-800 rounded-3xl border border-slate-700 p-6 flex flex-col shadow-lg h-[75vh]">
                  <h2 className="text-xl font-bold text-white mb-4 flex items-center gap-2"><Package size={20}/> Catálogo de Artículos</h2>
                  <div className="overflow-x-auto flex-1 custom-scrollbar">
                    <table className="w-full text-left text-sm min-w-full">
                      <thead>
                        <tr className="border-b border-slate-700 text-slate-400">
                          <th className="pb-3 font-semibold">Producto</th>
                          <th className="pb-3 font-semibold text-center">Costo (L)</th>
                          <th className="pb-3 font-semibold text-center" title="Aplica Impuesto">ISV</th>
                          <th className="pb-3 font-semibold text-center">Acciones</th>
                        </tr>
                      </thead>
                      <tbody className="divide-y divide-slate-700/50">
                        {catalogo.map(prod => {
                          const strNombres = Array.isArray(prod.tecnicasRecomendadas) && prod.tecnicasRecomendadas.length > 0 
                             ? prod.tecnicasRecomendadas.map(id => tecnicas.find(t=>t.id===id)?.nombre).filter(Boolean).join(', ')
                             : prod.tecnicaRecomendada;

                          return (
                          <tr key={prod.id} className="hover:bg-slate-700/30 transition-colors">
                            <td className="py-3">
                              <div className="flex items-center gap-3">
                                 <div className="w-10 h-10 rounded-lg bg-slate-900 border border-slate-600 flex items-center justify-center overflow-hidden shrink-0">
                                     {prod.imagenUrl ? <img src={prod.imagenUrl} className="w-full h-full object-cover" /> : <ImageIcon size={18} className="text-slate-500"/>}
                                 </div>
                                 <div>
                                    <p className="text-white font-medium">{prod.nombre}</p>
                                    {strNombres && <p className="text-[10px] text-emerald-400 mt-0.5 truncate max-w-[150px]" title={strNombres}>{strNombres}</p>}
                                 </div>
                              </div>
                            </td>
                            <td className="py-3 text-emerald-400 font-medium text-center">L {prod.costoBase}</td>
                            <td className="py-3 text-center">
                              <input type="checkbox" checked={prod.cobraImpuesto} 
                                onChange={e => setCatalogo(catalogo.map(p => p.id===prod.id ? {...p, cobraImpuesto: e.target.checked} : p))}
                                className="accent-blue-500 w-4 h-4 cursor-pointer"
                              />
                            </td>
                            <td className="py-3">
                              <div className="flex items-center justify-center gap-2">
                                <button onClick={() => handleEditarProducto(prod)} className="text-blue-400 hover:text-blue-300 p-1.5 rounded bg-slate-800 hover:bg-slate-700 transition" title="Editar Producto">
                                  <Edit3 size={16}/>
                                </button>
                                <button onClick={() => handleEliminarProducto(prod.id, prod.nombre)} className="text-red-400 hover:text-red-300 p-1.5 rounded bg-slate-800 hover:bg-slate-700 transition" title="Eliminar Producto">
                                  <Trash2 size={16}/>
                                </button>
                              </div>
                            </td>
                          </tr>
                        )})}
                      </tbody>
                    </table>
                  </div>
                  <button onClick={handleCrearProducto} className="w-full mt-4 bg-slate-700 text-slate-300 p-3 rounded-xl font-bold text-sm hover:bg-slate-600 flex justify-center items-center gap-2 transition-colors"><Plus size={18}/> Agregar Producto</button>
                </div>

                {/* ÁRBOL DE TÉCNICAS */}
                <div className="bg-slate-800 rounded-3xl border border-slate-700 flex flex-col shadow-lg h-[75vh]">
                  <div className="p-4 border-b border-slate-700 flex gap-2 overflow-x-auto custom-scrollbar shrink-0">
                    {tecnicas.map(t => (
                      <button key={t.id} onClick={()=>setTecActivaId(t.id)} className={`px-4 py-2 rounded-lg font-bold text-sm whitespace-nowrap transition-colors shadow-sm ${tecActivaId === t.id ? 'bg-blue-600 text-white' : 'bg-slate-900 text-slate-400 hover:bg-slate-700'}`}>
                        {t.nombre}
                      </button>
                    ))}
                    <button onClick={handleCrearTecnica} className="px-3 py-2 rounded-lg bg-emerald-600/20 text-emerald-400 hover:bg-emerald-600/40 transition-colors"><Plus size={16}/></button>
                  </div>

                  {tecActual ? (
                    <div className="p-6 flex-1 overflow-y-auto custom-scrollbar">
                      <div className="flex flex-wrap gap-4 items-center bg-slate-900 p-4 rounded-xl border border-slate-700 mb-6 relative shadow-inner">
                        <div>
                          <label className="text-xs text-slate-500 block mb-1 font-semibold">Mínimo Producción</label>
                          <input type="number" value={tecActual.minimo} onChange={e=>updateTecnicaActual({...tecActual, minimo: Number(e.target.value)})} className="w-20 p-1.5 rounded bg-slate-800 border border-slate-600 text-white text-center outline-none focus:border-blue-500 transition-colors" />
                        </div>
                        {/* Requisito 3: Se remueve el input del % y solo queda el checkbox */}
                        <div className="flex items-center gap-2 border-l border-slate-700 pl-4 h-full">
                          <input type="checkbox" id="taxTec" checked={tecActual.cobraImpuesto} onChange={e=>updateTecnicaActual({...tecActual, cobraImpuesto: e.target.checked})} className="accent-blue-500 w-5 h-5 cursor-pointer rounded" />
                          <label htmlFor="taxTec" className="text-sm font-semibold text-slate-300 cursor-pointer">Aplica Impuesto a esta técnica</label>
                        </div>
                        
                        <button onClick={handleEliminarTecnica} className="ml-auto text-red-400 hover:bg-red-400/10 p-2 rounded-lg flex items-center gap-1 text-sm border border-transparent hover:border-red-400/30 transition-colors">
                          <Trash2 size={16}/> Técnica
                        </button>
                      </div>

                      <div className="space-y-6">
                        {tecActual.subcategorias.map(sub => (
                          <div key={sub.id} className="border border-slate-700 rounded-xl overflow-hidden shadow-sm">
                            <div className="bg-slate-900 px-4 py-3 border-b border-slate-700 flex justify-between items-center">
                              <div className="flex items-center gap-3">
                                <span className="font-bold text-slate-200 flex items-center"><Layers size={14} className="mr-2 text-blue-400"/> {sub.nombre}</span>
                                <button onClick={()=>eliminarSubcat(sub.id, sub.nombre)} className="text-red-400 hover:text-red-300 transition-colors" title="Eliminar Ubicación"><Trash2 size={14}/></button>
                              </div>
                              <button onClick={()=>agregarOpcion(sub.id)} className="text-xs font-bold text-blue-400 hover:text-blue-300 px-3 py-1.5 bg-blue-500/10 hover:bg-blue-500/20 rounded-md transition-colors">+ Variante</button>
                            </div>

                            <div className="p-4 bg-slate-800/50 space-y-4">
                              {sub.opciones.length === 0 && <p className="text-xs text-slate-500 italic">No hay variantes agregadas en esta ubicación.</p>}
                              {sub.opciones.map(op => (
                                <div key={op.id} className="bg-slate-950 p-4 rounded-xl border border-slate-800 shadow-inner">
                                  <div className="flex justify-between items-center mb-3">
                                      <p className="font-bold text-white text-sm flex items-center gap-2"><Edit3 size={14} className="text-slate-500"/>{op.nombre}</p>
                                      <button onClick={()=>eliminarOpcion(sub.id, op.id, op.nombre)} className="text-red-400 hover:bg-red-400/10 p-1.5 rounded-lg transition-colors" title="Eliminar Variante"><Trash2 size={14}/></button>
                                  </div>
                                  
                                  <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                    <div className="bg-slate-900 p-3 rounded-lg border border-slate-700/50">
                                      <div className="flex justify-between items-center border-b border-slate-700 pb-2 mb-3">
                                        <span className="text-xs font-bold text-slate-400">Costos Fijos (Setups)</span>
                                        <button onClick={()=>agregarCosto(sub.id, op.id, 'Fijo')} className="text-emerald-400 hover:bg-emerald-400/20 p-1 rounded transition-colors" title="Añadir Costo Fijo"><Plus size={14}/></button>
                                      </div>
                                      <ul className="space-y-2">
                                        {op.costosFijos.length === 0 && <li className="text-[10px] text-slate-600 italic">Sin costos fijos</li>}
                                        {op.costosFijos.map(c => (
                                          <li key={c.id} className="text-xs flex justify-between items-center text-slate-300 bg-slate-800 px-2.5 py-1.5 rounded-md border border-slate-700">
                                            <span>{c.nombre}</span> 
                                            <span className="text-emerald-400 font-bold flex items-center gap-2">L {c.valor} 
                                               <button onClick={()=>eliminarCosto(sub.id, op.id, c.id, 'Fijo')} className="text-slate-500 hover:text-red-400 bg-slate-900 rounded p-0.5 transition-colors"><X size={12}/></button>
                                            </span>
                                          </li>
                                        ))}
                                      </ul>
                                    </div>

                                    <div className="bg-slate-900 p-3 rounded-lg border border-slate-700/50">
                                      <div className="flex justify-between items-center border-b border-slate-700 pb-2 mb-3">
                                        <span className="text-xs font-bold text-slate-400">Costos Variables (x Und)</span>
                                        <button onClick={()=>agregarCosto(sub.id, op.id, 'Variable')} className="text-emerald-400 hover:bg-emerald-400/20 p-1 rounded transition-colors" title="Añadir Costo Variable"><Plus size={14}/></button>
                                      </div>
                                      <ul className="space-y-2">
                                        {op.costosVariables.length === 0 && <li className="text-[10px] text-slate-600 italic">Sin costos variables</li>}
                                        {op.costosVariables.map(c => (
                                          <li key={c.id} className="text-xs flex justify-between items-center text-slate-300 bg-slate-800 px-2.5 py-1.5 rounded-md border border-slate-700">
                                            <span>{c.nombre}</span> 
                                            <span className="text-emerald-400 font-bold flex items-center gap-2">L {c.valor} 
                                               <button onClick={()=>eliminarCosto(sub.id, op.id, c.id, 'Variable')} className="text-slate-500 hover:text-red-400 bg-slate-900 rounded p-0.5 transition-colors"><X size={12}/></button>
                                            </span>
                                          </li>
                                        ))}
                                      </ul>
                                    </div>
                                  </div>
                                </div>
                              ))}
                            </div>
                          </div>
                        ))}
                        <button onClick={agregarSubcat} className="w-full border border-dashed border-slate-600 text-slate-400 font-bold py-4 rounded-xl hover:bg-slate-800 transition-colors hover:text-white flex items-center justify-center gap-2">
                           <Plus size={18}/> Añadir Nueva Ubicación / Subcategoría
                        </button>
                      </div>
                    </div>
                  ) : (
                    <div className="flex-1 flex flex-col items-center justify-center text-slate-500 italic text-sm p-6 text-center">
                        <Layers size={48} className="mb-4 text-slate-700 opacity-50"/>
                        <p>Selecciona una técnica en la barra superior o crea una nueva para comenzar a configurar su lógica de precios.</p>
                    </div>
                  )}
                </div>
              </div>
            </div>
          );
        }

        // --- COMPONENTE MODAL REFACTORIZADO ---
        function CustomModal({ config, onClose }) {
          const [form, setForm] = useState(config.valoresIniciales || {});

          const handleSubmit = (e) => {
            e.preventDefault();
            config.onSubmit(form);
            onClose();
          };

          const handleFileChange = (e, fieldId) => {
              const file = e.target.files[0];
              if (file) {
                  if(file.size > 1048576) {
                      alert("Para un rendimiento óptimo, sube una imagen menor a 1MB.");
                      return;
                  }
                  const reader = new FileReader();
                  reader.onloadend = () => setForm({...form, [fieldId]: reader.result});
                  reader.readAsDataURL(file);
              }
          };

          // Requisito 2: Handler para el grupo de checkboxes
          const handleCheckboxGroup = (fieldId, value, checked) => {
              const currentArr = form[fieldId] || [];
              if (checked) {
                  setForm({...form, [fieldId]: [...currentArr, value]});
              } else {
                  setForm({...form, [fieldId]: currentArr.filter(v => v !== value)});
              }
          };

          return (
            <div className="fixed inset-0 bg-slate-900/80 flex items-center justify-center z-50 fade-in backdrop-blur-sm p-4">
              <div className="bg-slate-800 p-8 rounded-2xl border border-slate-600 w-full max-w-md shadow-2xl relative max-h-[90vh] overflow-y-auto custom-scrollbar">
                
                <h3 className="text-xl font-bold text-white mb-6 flex items-center gap-2 border-b border-slate-700 pb-4">
                  {config.esConfirmacion ? <AlertCircle className="text-amber-500"/> : <Settings className="text-blue-500"/>}
                  {config.titulo}
                </h3>
                
                <form onSubmit={handleSubmit} className="space-y-5">
                  {config.esConfirmacion ? (
                    <p className="text-slate-300 text-sm leading-relaxed">{config.mensaje}</p>
                  ) : (
                    config.campos.map(c => (
                      <div key={c.id}>
                        <label className="block text-sm font-bold text-slate-400 mb-2">{c.label}</label>
                        
                        {c.type === 'file' ? (
                            <div className="relative group">
                                <input type="file" accept="image/*" className="hidden" id={`file-${c.id}`} onChange={(e) => handleFileChange(e, c.id)} />
                                <label htmlFor={`file-${c.id}`} className="cursor-pointer w-full p-3 rounded-xl bg-slate-900 border border-slate-600 border-dashed text-slate-400 hover:text-white hover:border-blue-500 transition-colors flex items-center justify-center gap-2">
                                    <Upload size={18}/> {form[c.id] ? 'Imagen Cargada (Clic para cambiar)' : 'Seleccionar Archivo (Max 1MB)'}
                                </label>
                                {form[c.id] && <div className="mt-3 flex justify-center"><img src={form[c.id]} alt="Preview" className="h-20 w-20 object-cover rounded-lg border border-slate-600 shadow-sm" /></div>}
                            </div>
                        ) : c.type === 'checkboxGroup' ? (
                            // Requisito 2: UI de Checkboxes
                            <div className="bg-slate-900 rounded-xl border border-slate-600 p-3 space-y-2 max-h-40 overflow-y-auto custom-scrollbar">
                                {c.options.length === 0 && <p className="text-xs text-slate-500 italic">No hay técnicas creadas en el sistema.</p>}
                                {c.options.map(opt => {
                                    const isChecked = (form[c.id] || []).includes(opt.value);
                                    return (
                                    <label key={opt.value} className="flex items-center gap-3 cursor-pointer hover:bg-slate-800 p-1.5 rounded-lg transition-colors">
                                        <input type="checkbox" checked={isChecked} onChange={(e) => handleCheckboxGroup(c.id, opt.value, e.target.checked)} className="accent-blue-500 w-4 h-4" />
                                        <span className="text-sm text-slate-300">{opt.label}</span>
                                    </label>
                                )})}
                            </div>
                        ) : (
                            <input
                              required={c.id !== 'tecnicaRecomendada' && c.id !== 'imagenUrl' && c.id !== 'tecnicasRecomendadas'}
                              type={c.type}
                              placeholder={c.placeholder || ''}
                              step={c.type === 'number' ? '0.01' : undefined}
                              value={form[c.id] !== undefined ? form[c.id] : ''}
                              className="w-full p-3 rounded-xl bg-slate-900 border border-slate-600 text-white outline-none focus:border-blue-500 transition-colors"
                              onChange={e => setForm({...form, [c.id]: e.target.value})}
                            />
                        )}
                      </div>
                    ))
                  )}

                  <div className="flex justify-end gap-3 mt-8 pt-4 border-t border-slate-700">
                    <button type="button" onClick={onClose} className="px-5 py-2.5 rounded-xl text-slate-300 font-bold hover:bg-slate-700 transition-colors">Cancelar</button>
                    <button type="submit" className={`px-5 py-2.5 rounded-xl font-bold transition-colors text-white ${config.esConfirmacion ? 'bg-red-600 hover:bg-red-500 shadow-red-500/20' : 'bg-blue-600 hover:bg-blue-500 shadow-blue-500/20'} shadow-lg`}>
                      {config.esConfirmacion ? 'Sí, Eliminar' : 'Guardar Cambios'}
                    </button>
                  </div>
                </form>
              </div>
            </div>
          );
        }

        // HELPERS
        function MenuBtn({ icon: Icon, label, active, onClick, dark = false }) {
          const baseClasses = "w-full flex items-center gap-3 px-4 py-3 rounded-xl font-bold transition-all duration-200";
          const activeClasses = dark ? "bg-emerald-500/10 text-emerald-400 border border-emerald-500/20" : "bg-blue-600 text-white shadow-md transform scale-[1.02]";
          const inactiveClasses = dark ? "text-slate-400 hover:bg-slate-800 hover:text-slate-200" : "text-slate-600 hover:bg-slate-100 hover:text-blue-600";
          return <button onClick={onClick} className={`${baseClasses} ${active ? activeClasses : inactiveClasses}`}><Icon size={20} /><span>{label}</span></button>;
        }
        function EstadoBadge({ estado }) {
          const colors = estado === 'Pendiente' ? 'bg-amber-100 text-amber-700 border-amber-200' : 'bg-slate-100 text-slate-700 border-slate-200';
          return <span className={`inline-flex items-center px-2.5 py-1 rounded-md text-xs font-bold border ${colors}`}>{estado}</span>;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
