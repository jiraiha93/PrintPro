                        <div className="bg-slate-900 p-5 rounded-xl border border-slate-700">

                            <div className="space-y-4">
                                <div><label className="block text-sm font-bold text-slate-400 mb-2">Número de WhatsApp de la Empresa (Opcional)</label><input type="text" value={form.whatsappNumero || ''} onChange={(e) => setForm({...form, whatsappNumero: e.target.value.replace(/[^0-9]/g, '')})} className="w-full p-3 rounded-xl bg-slate-800 border border-slate-600 text-white outline-none focus:border-emerald-500" /></div>
                                <div><label className="block text-sm font-bold text-slate-400 mb-2">Plantilla al Compartir Cotización</label><textarea value={form.whatsappTemplate || ''} onChange={(e) => setForm({...form, whatsappTemplate: e.target.value})} className="w-full p-3 rounded-xl bg-slate-800 border border-slate-600 text-white outline-none focus:border-emerald-500 resize-none h-24"></textarea></div>
                            </div>
                        </div>
                        <div className="flex justify-end pt-4"><button type="submit" className="bg-blue-600 text-white px-8 py-3 rounded-xl font-bold hover:bg-blue-500">Guardar Configuración</button></div>

        function GestionRecursos({ recursos, onActualizarRecurso, onEliminarRecurso }) {
            const [modalConfig, setModalConfig] = useState(null);
            
            const handleCrear = () => {
                setModalConfig({
                    titulo: "Subir Nuevo Archivo/Guía",
                    campos: [
                        { id: 'titulo', label: 'Título del documento:', type: 'text' },
                        { id: 'descripcion', label: 'Descripción breve:', type: 'text' },
                        { id: 'archivo', label: 'Archivo (PDF, PNG, JPG):', type: 'file' }
                    ],
                    onSubmit: (datos) => {
                        if (datos.titulo && datos.archivo) {
                            onActualizarRecurso({ id: `REC_${Date.now()}`, titulo: datos.titulo, descripcion: datos.descripcion || '', archivoBase64: datos.archivo });
                        }
                    }
                });
            };

            return (
                <div className="max-w-6xl mx-auto space-y-4 fade-in">
                    {modalConfig && <CustomModal config={modalConfig} onClose={() => setModalConfig(null)} />}
                    
                    <div className="flex justify-between items-end mb-6">
                        <div>
                            <h2 className="text-2xl font-bold text-white mb-1">Gestión de Archivos Compartidos</h2>
                            <p className="text-sm text-slate-400">Sube PDFs o imágenes (guías de tallas, manuales) para que tus clientes las descarguen.</p>
                        </div>
                        <button onClick={handleCrear} className="bg-blue-600 hover:bg-blue-500 text-white px-5 py-2.5 rounded-xl font-bold flex items-center gap-2 shadow-lg transition-transform hover:scale-105">
                            <Upload size={20}/> Subir Archivo
                        </button>
                    </div>
                    
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                        {recursos.map(r => (
                            <div key={r.id} className="bg-slate-800 rounded-2xl p-5 border border-slate-700 flex flex-col hover:border-slate-600 transition-colors shadow-sm">
                                <div className="flex justify-between items-start mb-3">
                                    <div className="bg-slate-900 p-3 rounded-xl text-blue-400"><BookOpen size={24}/></div>
                                    <button onClick={() => onEliminarRecurso(r.id)} className="text-red-400 hover:text-red-300 p-2 bg-slate-900 rounded-lg transition-colors" title="Eliminar"><Trash2 size={16}/></button>
                                </div>
                                <h3 className="text-white font-bold text-lg mb-1">{r.titulo}</h3>
                                <p className="text-slate-400 text-sm mb-4 flex-1 line-clamp-2">{r.descripcion}</p>
                                <a href={r.archivoBase64} download={r.titulo} className="w-full block text-center bg-slate-700 text-white font-bold py-2.5 rounded-xl hover:bg-slate-600 transition-colors text-sm">Previsualizar / Descargar</a>
                            </div>
                        ))}
                        {recursos.length === 0 && <div className="col-span-full py-10 text-center text-slate-500 font-medium bg-slate-800/50 rounded-2xl border border-dashed border-slate-700">No hay recursos subidos actualmente.</div>}
                    </div>
                </div>
            );
        }

        // ==========================================
        // GESTIÓN JERÁRQUICA (CATÁLOGO Y TÉCNICAS) Y TARIFAS
        // ==========================================
        function ModalTarifasGlobales({ margenActual, impuestoActual, descuentosActuales, onSave, onClose }) {
            const [margen, setMargen] = useState(margenActual !== undefined ? margenActual : 0); 
            const [impuesto, setImpuesto] = useState(impuestoActual !== undefined ? impuestoActual : 0); 
            const [descuentos, setDescuentos] = useState(descuentosActuales || []);

            const addTier = () => setDescuentos([...descuentos, { id: `desc_${Date.now()}`, min: 100, pct: 5, activo: true }]);
            const updateTier = (id, field, value) => setDescuentos(descuentos.map(d => d.id === id ? { ...d, [field]: field === 'activo' ? value : (value === '' ? '' : Number(value)) } : d));
            const removeTier = (id) => setDescuentos(descuentos.filter(d => d.id !== id));
            return ( 
                <div className="fixed inset-0 bg-slate-900/80 flex items-center justify-center z-50 fade-in p-4">
                    <div className="bg-slate-800 p-8 rounded-2xl border border-slate-600 w-full max-w-lg shadow-2xl">
                        <h3 className="text-xl font-bold text-white mb-6">Tarifas Globales</h3>
                        <div className="flex gap-4 mb-6">
                            <div className="flex-1 bg-slate-900 p-4 rounded-xl border border-slate-700"><label className="text-sm font-bold text-emerald-400 block mb-2">Margen General (%)</label><input type="number" value={margen} onChange={e=>setMargen(e.target.value === '' ? '' : Number(e.target.value))} className="w-full p-3 rounded bg-slate-800 text-white font-bold outline-none border border-slate-600 focus:border-emerald-500" /></div>
                            <div className="flex-1 bg-slate-900 p-4 rounded-xl border border-slate-700"><label className="text-sm font-bold text-amber-400 block mb-2">Impuesto Global (%)</label><input type="number" value={impuesto} onChange={e=>setImpuesto(e.target.value === '' ? '' : Number(e.target.value))} className="w-full p-3 rounded bg-slate-800 text-white font-bold outline-none border border-slate-600 focus:border-amber-500" /></div>
                        </div>
                        <div className="bg-slate-900 p-4 rounded-xl border border-slate-700 mb-6">
                            <div className="flex justify-between items-center mb-4">
                                <label className="text-sm font-bold text-blue-400">Niveles de Descuento por Volumen</label>
                                <button onClick={addTier} className="text-xs bg-blue-600 text-white px-3 py-1.5 rounded hover:bg-blue-500 transition-colors">+ Añadir Nivel</button>
                            </div>
                            <div className="space-y-3">
                                {descuentos.map(d => (
                                    <div key={d.id} className="flex gap-2 items-center bg-slate-800 p-2 rounded-lg border border-slate-600">
                                        <div className="px-2 flex items-center">
                                            <input type="checkbox" checked={d.activo !== false} onChange={e=>updateTier(d.id, 'activo', e.target.checked)} className="accent-blue-500 w-4 h-4 cursor-pointer" title="Mostrar y aplicar en vista cliente" />
                                        </div>
                                        <div className="flex-1"><label className="text-[10px] text-slate-400 uppercase font-bold px-1">Min. Pzas</label><input type="number" value={d.min} onChange={e=>updateTier(d.id, 'min', e.target.value)} className="w-full bg-slate-900 p-1.5 rounded text-white text-sm outline-none" /></div>
                                        <div className="flex-1"><label className="text-[10px] text-slate-400 uppercase font-bold px-1">Desc. (%)</label><input type="number" value={d.pct} onChange={e=>updateTier(d.id, 'pct', e.target.value)} className="w-full bg-slate-900 p-1.5 rounded text-white text-sm outline-none" /></div>
                                        <button onClick={()=>removeTier(d.id)} className="mt-4 text-red-400 p-2 hover:bg-red-500/10 rounded"><Trash2 size={16}/></button>
                                    </div>
                                ))}
                            </div>
                        </div>
                        <div className="flex justify-end gap-3 mt-4">
                            <button onClick={onClose} className="px-5 py-2.5 rounded-xl text-slate-300 font-bold hover:bg-slate-700">Cancelar</button>
                            <button onClick={() => { onSave(margen, impuesto, descuentos); onClose(); }} className="px-5 py-2.5 rounded-xl font-bold text-white bg-blue-600 hover:bg-blue-500">Guardar Tarifas</button>
                        </div>
                    </div>
                </div> 
            )
        }

        function ModalFichaTecnica({ onClose }) {
            return (
                <div className="fixed inset-0 bg-slate-900/80 flex items-center justify-center z-50 fade-in p-4">
                    <div className="bg-slate-800 p-8 rounded-2xl border border-slate-600 w-full max-w-3xl shadow-2xl text-slate-300 max-h-[90vh] overflow-y-auto custom-scrollbar">
                        <div className="flex justify-between items-start mb-6">
                            <div>
                                <h3 className="text-2xl font-bold text-white flex items-center gap-2"><Calculator size={24} className="text-blue-400"/> Guía Detallada de Fórmulas</h3>
                                <p className="text-slate-400 text-sm mt-1">Así es como el cotizador calcula matemáticamente los precios.</p>
                            </div>
                        </div>
                        
                        <div className="space-y-6 text-sm">
                            <div className="bg-slate-900 p-5 rounded-xl border border-blue-500/30 shadow-inner">
                                <h4 className="font-bold text-blue-400 text-base mb-2 flex items-center gap-2"><span className="bg-blue-500/20 px-2 py-0.5 rounded text-xs">Paso 1</span> Precio de Venta del Producto</h4>
                                <p className="mb-2">El sistema toma el <strong>Costo Base</strong> de tu catálogo y lo multiplica por la cantidad. Luego, a ese subtotal de costo, le añade el <strong>Margen General (%)</strong> que definiste para darte el precio de venta final de las prendas.</p>
                                <div className="bg-slate-950 p-3 rounded font-mono text-emerald-400 text-xs border border-slate-800">
                                    <p>Costo Total = Costo Base × Cantidad</p>
                                    <p>Precio de Venta Prendas = Costo Total × (1 + [Margen / 100])</p>
                                </div>
                                <p className="mt-2 text-xs text-slate-500 italic">* Nota: Si marcas "Traigo mis artículos", el costo base de la prenda pasa a ser 0.</p>
                            </div>

                            <div className="bg-slate-900 p-5 rounded-xl border border-emerald-500/30 shadow-inner">
                                <h4 className="font-bold text-emerald-400 text-base mb-2 flex items-center gap-2"><span className="bg-emerald-500/20 px-2 py-0.5 rounded text-xs">Paso 2</span> Precio de Personalización (Técnicas)</h4>
                                <p className="mb-2">Cada técnica tiene Costos Fijos (Setups que se cobran 1 sola vez sin importar cuántas camisas sean, como revelados o matrices) y Costos Variables (que se multiplican por unidad, como tinta). <strong>A la suma de estos costos también se le aplica tu Margen General.</strong></p>
                                <div className="bg-slate-950 p-3 rounded font-mono text-emerald-400 text-xs border border-slate-800 space-y-1">
                                    <p>Costo Fijo Total = Suma de todos los Setups</p>
                                    <p>Costo Variable Total = Suma de variables × Cantidad</p>
                                    <p>Precio de Venta Técnica = (Costo Fijo Total + Costo Variable Total) × (1 + [Margen / 100])</p>
                                </div>
                            </div>

                            <div className="bg-slate-900 p-5 rounded-xl border border-amber-500/30 shadow-inner">
                                <h4 className="font-bold text-amber-400 text-base mb-2 flex items-center gap-2"><span className="bg-amber-500/20 px-2 py-0.5 rounded text-xs">Paso 3</span> Cascada de Descuentos (VIP + Volumen)</h4>
                                <p className="mb-2">El descuento por volumen <strong>se aplica a TODAS las piezas</strong> una vez alcanzado el nivel y si la casilla está activa. Si el cliente compra 300 piezas y el nivel es de 100 (10% OFF), las 300 piezas reciben el descuento. Además, si es VIP (ej. 10% OFF), se aplica un descuento "en cascada" secuencial para proteger tus finanzas.</p>
                                <div className="bg-slate-950 p-3 rounded text-xs border border-slate-800 text-slate-300">
                                    <p>Subtotal Bruto = Precio de Venta Prendas + Precio de Venta Técnicas</p>
                                    <p className="mt-1 font-mono text-amber-400">Total con Descuento = Subtotal Bruto × (1 - % Volumen) × (1 - % VIP)</p>
                                    <p className="mt-2 text-[10px] text-slate-500">Ejemplo ilustrativo: L 100/u. Pides 300 pzas. Tier: 100u al 10%. Las 300 pzas tienen 10% (Subtotal = 30,000 × 0.90 = 27,000). Luego, descuento VIP del 10% = (27,000 × 0.90) = L 24,300 Finales.</p>
                                </div>
                            </div>

                            <div className="bg-slate-900 p-5 rounded-xl border border-purple-500/30 shadow-inner">
                                <h4 className="font-bold text-purple-400 text-base mb-2 flex items-center gap-2"><span className="bg-purple-500/20 px-2 py-0.5 rounded text-xs">Paso 4</span> Impuestos (ISV)</h4>
                                <p className="mb-2">El impuesto global (ej. 15%) se calcula <strong>después de aplicar los descuentos</strong> y solo sobre los ítems del catálogo o técnicas que tengan activada la casilla "Suma Impuesto".</p>
                            </div>
                        </div>

                        <div className="flex justify-end mt-8 border-t border-slate-700 pt-4">
                            <button onClick={onClose} className="px-6 py-3 rounded-xl font-bold text-white bg-blue-600 hover:bg-blue-500 transition-colors shadow-lg">Entendido, cerrar guía</button>
                        </div>
                    </div>
                </div>
            )
        }

        function GestionJerarquica({ categorias, setCategorias, catalogo, setCatalogo, tecnicas, setTecnicas, margenGanancia, impuestoGlobal, descuentosVolumen, setConfigGlobal }) {
          const [tecActivaId, setTecActivaId] = useState(tecnicas[0]?.id || null);
          const [categoriaActivaId, setCategoriaActivaId] = useState('todas');
          const [modalConfig, setModalConfig] = useState(null); 
          const [showTarifasModal, setShowTarifasModal] = useState(false);
          const [showFichaTecnica, setShowFichaTecnica] = useState(false);
          
          const tecActual = tecnicas.find(t => t.id === tecActivaId);
          const updateTecnicaActual = (updatedTecObj) => setTecnicas(tecnicas.map(t => t.id === tecActivaId ? updatedTecObj : t));

          const scrollRef = useRef(null);
          const scrollRefCat = useRef(null);
          const scrollTabs = (offset) => { if (scrollRef.current) scrollRef.current.scrollBy({ left: offset, behavior: 'smooth' }); };
          const scrollTabsCat = (offset) => { if (scrollRefCat.current) scrollRefCat.current.scrollBy({ left: offset, behavior: 'smooth' }); };

          const [busquedaAdmin, setBusquedaAdmin] = useState('');
          const [itemsPorPaginaAdmin, setItemsPorPaginaAdmin] = useState(10);
          const [paginaActualAdmin, setPaginaActualAdmin] = useState(1);

          useEffect(() => { setPaginaActualAdmin(1); }, [busquedaAdmin, itemsPorPaginaAdmin, categoriaActivaId]);

          // Filtrado doble (búsqueda y categoría)
          const catalogoFiltradoAdmin = useMemo(() => {
             return catalogo.filter(p => {
                 const matchBusqueda = p.nombre.toLowerCase().includes(busquedaAdmin.toLowerCase());
                 const matchCat = categoriaActivaId === 'todas' || p.categoriaId === categoriaActivaId;
                 return matchBusqueda && matchCat;
             });
          }, [catalogo, busquedaAdmin, categoriaActivaId]);
          
          const totalPaginasAdmin = Math.ceil(catalogoFiltradoAdmin.length / itemsPorPaginaAdmin) || 1;
          const catalogoPaginadoAdmin = useMemo(() => catalogoFiltradoAdmin.slice((paginaActualAdmin - 1) * itemsPorPaginaAdmin, paginaActualAdmin * itemsPorPaginaAdmin), [catalogoFiltradoAdmin, paginaActualAdmin, itemsPorPaginaAdmin]);

          // ======================= HANDLERS DE CATEGORÍAS =======================
          const handleCrearCategoria = () => {
             setModalConfig({
                 titulo: "Nueva Categoría",
                 campos: [{ id: 'nombre', label: 'Nombre de la Categoría:', type: 'text' }],
                 onSubmit: (datos) => {
                     if (datos.nombre) {
                         const nueva = { id: `CAT_${Date.now()}`, nombre: datos.nombre };
                         setCategorias([...categorias, nueva]);
                         setCategoriaActivaId(nueva.id);
                     }
                 }
             });
          };

          const handleEditarCategoria = () => {
             const cat = categorias.find(c => c.id === categoriaActivaId);
             if (!cat) return;
             setModalConfig({
                 titulo: "Editar Categoría",
                 valoresIniciales: { nombre: cat.nombre },
                 campos: [{ id: 'nombre', label: 'Nombre de la Categoría:', type: 'text' }],
                 onSubmit: (datos) => {
                     if (datos.nombre) setCategorias(categorias.map(c => c.id === categoriaActivaId ? { ...c, nombre: datos.nombre } : c));
                 }
             });
          };

          const handleEliminarCategoria = () => {
             const cat = categorias.find(c => c.id === categoriaActivaId);
             if (!cat) return;
             const prodEnCat = catalogo.filter(p => p.categoriaId === cat.id);
             if (prodEnCat.length > 0) {
                 setModalConfig({
                     titulo: "Acción Protegida",
                     esConfirmacion: true,
                     mensaje: `No puedes eliminar la categoría "${cat.nombre}" porque contiene ${prodEnCat.length} productos asignados. Por favor, cambia la categoría de esos productos o elimínalos antes de continuar.`,
                     submitLabel: "Entendido",
                     campos: [],
                     onSubmit: () => {}
                 });
                 return;
             }
             setModalConfig({
                 titulo: "Eliminar Categoría",
                 esConfirmacion: true,
                 mensaje: `¿Seguro que deseas eliminar la categoría "${cat.nombre}" permanentemente?`,
                 campos: [],
                 onSubmit: () => {
                     setCategorias(categorias.filter(c => c.id !== categoriaActivaId));
                     setCategoriaActivaId('todas');
                 }
             });
          };

          // ======================= HANDLERS DE PRODUCTOS =======================
          const handleCrearProducto = () => {
            setModalConfig({
              titulo: "Nuevo Producto Base", 
              valoresIniciales: { costoBase: 0, detalles: '', tecnicasRecomendadas: [], cobraImpuesto: true, categoriaId: categoriaActivaId !== 'todas' ? categoriaActivaId : '' },
              campos: [ 
                  { id: 'nombre', label: 'Nombre:', type: 'text' }, 
                  { id: 'categoriaId', label: 'Categoría:', type: 'select', options: categorias.map(c => ({ value: c.id, label: c.nombre })) },
                  { id: 'costoBase', label: 'Costo Base (L):', type: 'number' }, 
                  { id: 'detalles', label: 'Detalles:', type: 'textarea', maxLength: 250 }, 
                  { id: 'tecnicasRecomendadas', label: 'Aceptadas:', type: 'checkboxGroup', options: tecnicas.map(t => ({ value: t.id, label: t.nombre })) }, 
                  { id: 'cobraImpuesto', label: 'Suma el Impuesto Global (ISV)', type: 'boolean' }, { id: 'imagenUrl', label: 'Imagen:', type: 'file' } 
              ],
              onSubmit: (datos) => { if (datos.nombre && !isNaN(parseFloat(datos.costoBase))) { setCatalogo([...catalogo, { id: `PROD_${Date.now()}`, nombre: datos.nombre, detalles: datos.detalles || '', categoriaId: datos.categoriaId || '', costoBase: parseFloat(datos.costoBase), imagenUrl: datos.imagenUrl || '', tecnicasRecomendadas: datos.tecnicasRecomendadas || [], cobraImpuesto: !!datos.cobraImpuesto }]); } }
            });
          };

          const handleEditarProducto = (prod) => {
            setModalConfig({
              titulo: "Editar Producto", 
              valoresIniciales: { nombre: prod.nombre, categoriaId: prod.categoriaId || '', costoBase: prod.costoBase, detalles: prod.detalles || '', tecnicasRecomendadas: Array.isArray(prod.tecnicasRecomendadas) ? prod.tecnicasRecomendadas : [], imagenUrl: prod.imagenUrl, cobraImpuesto: prod.cobraImpuesto !== false },
              campos: [ 
                  { id: 'nombre', label: 'Nombre:', type: 'text' }, 
                  { id: 'categoriaId', label: 'Categoría:', type: 'select', options: categorias.map(c => ({ value: c.id, label: c.nombre })) },
                  { id: 'costoBase', label: 'Costo (L):', type: 'number' }, 
                  { id: 'detalles', label: 'Detalles:', type: 'textarea', maxLength: 250 }, 
                  { id: 'tecnicasRecomendadas', label: 'Aceptadas:', type: 'checkboxGroup', options: tecnicas.map(t => ({ value: t.id, label: t.nombre })) }, 
                  { id: 'cobraImpuesto', label: 'Suma el Impuesto Global (ISV)', type: 'boolean' }, { id: 'imagenUrl', label: 'Cambiar Imagen:', type: 'file' } 
              ],
              onSubmit: (datos) => { const editado = { ...prod, nombre: datos.nombre || prod.nombre, categoriaId: datos.categoriaId || prod.categoriaId, costoBase: datos.costoBase !== undefined ? parseFloat(datos.costoBase) : prod.costoBase, detalles: datos.detalles !== undefined ? datos.detalles : prod.detalles, tecnicasRecomendadas: datos.tecnicasRecomendadas !== undefined ? datos.tecnicasRecomendadas : prod.tecnicasRecomendadas, imagenUrl: datos.imagenUrl || prod.imagenUrl, cobraImpuesto: !!datos.cobraImpuesto }; setCatalogo(catalogo.map(p => p.id === prod.id ? editado : p)); }
            });
          };

          const handleEliminarProducto = (id, nombre) => setModalConfig({ titulo: "Eliminar Producto", esConfirmacion: true, mensaje: `¿Eliminar "${nombre}"?`, campos: [], onSubmit: () => setCatalogo(catalogo.filter(p => p.id !== id)) });
          
          // ======================= HANDLERS DE TÉCNICAS =======================
          const handleCrearTecnica = () => setModalConfig({ titulo: "Nueva Técnica", valoresIniciales: { cobraImpuesto: true }, campos: [{ id: 'nombre', label: 'Nombre:', type: 'text' }, { id: 'cobraImpuesto', label: 'Suma el Impuesto Global (ISV)', type: 'boolean' }], onSubmit: (datos) => { if (datos.nombre) { const nueva = { id: `TEC_${Date.now()}`, nombre: datos.nombre, cobraImpuesto: !!datos.cobraImpuesto, minimo: 1, subcategorias: [] }; setTecnicas([...tecnicas, nueva]); setTecActivaId(nueva.id); } } });
          const handleEditarTecnicaBase = () => { if(!tecActual) return; setModalConfig({ titulo: "Editar Técnica Base", valoresIniciales: { nombre: tecActual.nombre, cobraImpuesto: tecActual.cobraImpuesto !== false }, campos: [{ id: 'nombre', label: 'Nombre:', type: 'text' }, { id: 'cobraImpuesto', label: 'Suma el Impuesto Global (ISV)', type: 'boolean' }], onSubmit: (datos) => { if(datos.nombre) updateTecnicaActual({ ...tecActual, nombre: datos.nombre, cobraImpuesto: !!datos.cobraImpuesto }); } }) };
          const handleEliminarTecnica = () => { if(!tecActual) return; setModalConfig({ titulo: "Eliminar Técnica", esConfirmacion: true, mensaje: `¿Eliminar "${tecActual.nombre}" y sus variantes?`, campos: [], onSubmit: () => { const nuevas = tecnicas.filter(t => t.id !== tecActual.id); setTecnicas(nuevas); setTecActivaId(nuevas[0]?.id || null); }}); };
          
          const agregarSubcat = () => setModalConfig({ titulo: "Nueva Ubicación", campos: [{ id: 'nombre', label: 'Nombre:', type: 'text' }], onSubmit: (datos) => { if (datos.nombre) updateTecnicaActual({ ...tecActual, subcategorias: [...tecActual.subcategorias, { id: `SUB_${Date.now()}`, nombre: datos.nombre, opciones: [] }] }); }});
          const editarSubcat = (subId, nombreActual) => setModalConfig({ titulo: "Editar Ubicación", valoresIniciales: { nombre: nombreActual }, campos: [{ id: 'nombre', label: 'Nombre:', type: 'text' }], onSubmit: (datos) => { if (datos.nombre) updateTecnicaActual({ ...tecActual, subcategorias: tecActual.subcategorias.map(s => s.id === subId ? { ...s, nombre: datos.nombre } : s) }); }});
          const eliminarSubcat = (subId, nombre) => setModalConfig({ titulo: "Eliminar Ubicación", esConfirmacion: true, mensaje: `¿Eliminar "${nombre}"?`, campos: [], onSubmit: () => updateTecnicaActual({ ...tecActual, subcategorias: tecActual.subcategorias.filter(s => s.id !== subId) }) });
          
          const agregarOpcion = (subcatId) => setModalConfig({ titulo: "Nueva Variante", campos: [{ id: 'nombre', label: 'Nombre:', type: 'text' }], onSubmit: (datos) => { if (datos.nombre) updateTecnicaActual({ ...tecActual, subcategorias: tecActual.subcategorias.map(s => s.id === subcatId ? { ...s, opciones: [...s.opciones, { id: `OP_${Date.now()}`, nombre: datos.nombre, costosFijos: [], costosVariables: [] }] } : s) }); }});
          const editarOpcion = (subId, opId, nombreActual) => setModalConfig({ titulo: "Editar Variante", valoresIniciales: { nombre: nombreActual }, campos: [{ id: 'nombre', label: 'Nombre:', type: 'text' }], onSubmit: (datos) => { if (datos.nombre) updateTecnicaActual({ ...tecActual, subcategorias: tecActual.subcategorias.map(s => s.id === subId ? { ...s, opciones: s.opciones.map(o => o.id === opId ? { ...o, nombre: datos.nombre } : o) } : s) }); }});
          const eliminarOpcion = (subId, opId, nombre) => setModalConfig({ titulo: "Eliminar Variante", esConfirmacion: true, mensaje: `¿Eliminar "${nombre}"?`, campos: [], onSubmit: () => updateTecnicaActual({ ...tecActual, subcategorias: tecActual.subcategorias.map(s => s.id === subId ? { ...s, opciones: s.opciones.filter(o => o.id !== opId) } : s) }) });
          
          const agregarCosto = (subcatId, opcionId, tipo) => setModalConfig({ titulo: `Añadir Costo ${tipo}`, campos: [{ id: 'nombre', label: `Nombre:`, type: 'text' }, { id: 'valor', label: `Valor (L):`, type: 'number' }], onSubmit: (datos) => { const valorNum = parseFloat(datos.valor); if (datos.nombre && !isNaN(valorNum)) { const key = tipo === 'Fijo' ? 'costosFijos' : 'costosVariables'; updateTecnicaActual({ ...tecActual, subcategorias: tecActual.subcategorias.map(s => s.id === subcatId ? { ...s, opciones: s.opciones.map(o => o.id === opcionId ? { ...o, [key]: [...o[key], { id: `COST_${Date.now()}`, nombre: datos.nombre, valor: valorNum }] } : o) } : s) }); } }});
          const editarCosto = (subcatId, opcionId, costo, tipo) => setModalConfig({ titulo: `Editar Costo ${tipo}`, valoresIniciales: { nombre: costo.nombre, valor: costo.valor }, campos: [{ id: 'nombre', label: 'Nombre:', type: 'text' }, { id: 'valor', label: 'Valor (L):', type: 'number' }], onSubmit: (datos) => { const valorNum = parseFloat(datos.valor); if (datos.nombre && !isNaN(valorNum)) { const key = tipo === 'Fijo' ? 'costosFijos' : 'costosVariables'; updateTecnicaActual({ ...tecActual, subcategorias: tecActual.subcategorias.map(s => s.id === subcatId ? { ...s, opciones: s.opciones.map(o => o.id === opcionId ? { ...o, [key]: o[key].map(c => c.id === costo.id ? { ...c, nombre: datos.nombre, valor: valorNum } : c) } : o) } : s) }); } }});
          const eliminarCosto = (subcatId, opcionId, costoId, tipo) => { const key = tipo === 'Fijo' ? 'costosFijos' : 'costosVariables'; updateTecnicaActual({ ...tecActual, subcategorias: tecActual.subcategorias.map(s => s.id === subcatId ? { ...s, opciones: s.opciones.map(o => o.id === opcionId ? { ...o, [key]: o[key].filter(c => c.id !== costoId) } : o) } : s) }); };

          return (
            <div className="max-w-7xl mx-auto space-y-8 relative fade-in">
              {modalConfig && <CustomModal config={modalConfig} onClose={() => setModalConfig(null)} />}
              {showTarifasModal && <ModalTarifasGlobales margenActual={margenGanancia} impuestoActual={impuestoGlobal} descuentosActuales={descuentosVolumen} onSave={setConfigGlobal} onClose={()=>setShowTarifasModal(false)} />}
              {showFichaTecnica && <ModalFichaTecnica onClose={() => setShowFichaTecnica(false)} />}
              
              <div className="flex flex-col md:flex-row justify-between items-start md:items-end mb-6 gap-4">
                <div><h1 className="text-3xl font-bold text-white mb-2">Configuración Lógica y Precios</h1></div>
                <div className="flex flex-wrap items-center gap-3">
                    <button onClick={() => setShowFichaTecnica(true)} className="bg-slate-800 hover:bg-slate-700 text-blue-400 border border-slate-700 px-4 py-2.5 rounded-xl font-bold flex items-center gap-2 transition-colors"><BookOpen size={18}/> Guía de Fórmulas</button>
                    <button onClick={() => setShowTarifasModal(true)} className="bg-blue-600 hover:bg-blue-500 text-white px-5 py-2.5 rounded-xl font-bold flex items-center gap-2 shadow-lg"><Settings size={20}/> Administrar Tarifas</button>
                </div>
              </div>

              <div className="grid grid-cols-1 xl:grid-cols-2 gap-8">
                
                {/* PANEL 1: Catálogo (AHORA CON CATEGORÍAS) */}
                <div className="bg-slate-800 rounded-3xl border border-slate-700 flex flex-col shadow-lg h-[calc(100vh-14rem)] min-h-[600px]">
                  
                  {/* CABECERA: TABS DE CATEGORÍAS */}
                  <div className="p-4 border-b border-slate-700 flex shrink-0 items-center bg-slate-800/80 rounded-t-3xl">
                    <button onClick={() => scrollTabsCat(-150)} className="p-2 text-slate-400 hover:text-white bg-slate-900 rounded-lg hidden sm:block mr-2"><ChevronLeft size={16}/></button>
                    <div ref={scrollRefCat} className="flex gap-2 overflow-x-hidden flex-1 scroll-smooth">
                        <button onClick={()=>setCategoriaActivaId('todas')} className={`px-4 py-2 rounded-lg font-bold text-sm whitespace-nowrap transition-colors ${categoriaActivaId === 'todas' ? 'bg-blue-600 text-white' : 'bg-slate-900 text-slate-400 hover:text-slate-200'}`}>Todas</button>
                        {categorias.map(c => <button key={c.id} onClick={()=>setCategoriaActivaId(c.id)} className={`px-4 py-2 rounded-lg font-bold text-sm whitespace-nowrap transition-colors ${categoriaActivaId === c.id ? 'bg-blue-600 text-white' : 'bg-slate-900 text-slate-400 hover:text-slate-200'}`}>{c.nombre}</button>)}
                    </div>
                    <button onClick={() => scrollTabsCat(150)} className="p-2 text-slate-400 hover:text-white bg-slate-900 rounded-lg hidden sm:block ml-2"><ChevronRight size={16}/></button>
                    <div className="border-l border-slate-700 pl-3 ml-2">
                        <button onClick={handleCrearCategoria} className="px-3 py-2 rounded-lg bg-emerald-600/20 text-emerald-400 hover:bg-emerald-600/30 flex items-center gap-1 shrink-0"><Plus size={16}/><span className="hidden xl:inline text-xs font-bold">Nueva</span></button>
                    </div>
                  </div>

                  {/* CONTENIDO SUPERIOR: BUSQUEDA Y EDICIÓN DE CATEGORÍA ACTIVA */}
                  <div className="p-4 border-b border-slate-700 bg-slate-800">
                      {categoriaActivaId !== 'todas' && (
                          <div className="flex items-center justify-between bg-slate-900 p-3 rounded-xl border border-slate-700 mb-4">
                              <span className="text-sm font-bold text-emerald-400">Categoría Activa: {categorias.find(c => c.id === categoriaActivaId)?.nombre}</span>
                              <div className="flex gap-2">
                                  <button onClick={handleEditarCategoria} className="text-blue-400 hover:text-blue-300 p-1.5 bg-slate-800 rounded-lg flex items-center transition-colors text-xs font-bold"><Edit3 size={14} className="mr-1"/> Editar</button>
                                  <button onClick={handleEliminarCategoria} className="text-red-400 hover:text-red-300 p-1.5 bg-slate-800 rounded-lg flex items-center transition-colors text-xs font-bold"><Trash2 size={14} className="mr-1"/> Borrar</button>
                              </div>
                          </div>
                      )}
                      
                      <div className="flex flex-col sm:flex-row gap-3 items-center">
                          <div className="relative flex-1 w-full">
                              <Search className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" size={16} />
                              <input type="text" placeholder="Buscar producto por nombre..." value={busquedaAdmin} onChange={e=>setBusquedaAdmin(e.target.value)} className="w-full pl-9 pr-3 py-2 rounded-lg border border-slate-600 bg-slate-900 text-white text-sm outline-none focus:border-blue-500" />
                          </div>
                          <select value={itemsPorPaginaAdmin} onChange={e=>setItemsPorPaginaAdmin(Number(e.target.value))} className="w-full sm:w-auto p-2 border border-slate-600 bg-slate-900 text-white rounded-lg outline-none text-sm font-bold">
                              <option value={10}>10 items</option>
                              <option value={20}>20 items</option>
                          </select>
                      </div>
                  </div>
                  
                  {/* TABLA DE PRODUCTOS */}
                  <div className="overflow-x-auto flex-1 custom-scrollbar p-2">
                    <table className="w-full text-left text-sm min-w-full">
                      <thead><tr className="border-b border-slate-700 text-slate-400"><th className="px-4 pb-3">Producto</th><th className="pb-3 text-center">Costo</th><th className="pb-3 text-center">Acciones</th></tr></thead>
                      <tbody className="divide-y divide-slate-700/50">
                        {catalogoPaginadoAdmin.map(prod => (
                          <tr key={prod.id} className="hover:bg-slate-700/30 transition-colors">
                            <td className="py-3 px-4"><div className="flex items-center gap-3"><div className="w-10 h-10 shrink-0 rounded-lg bg-slate-900 flex items-center justify-center overflow-hidden border border-slate-700 relative">{prod.imagenUrl ? <img src={prod.imagenUrl} className="w-full h-full object-cover" /> : <ImageIcon size={18} className="text-slate-500"/>}{prod.cobraImpuesto === false && <span className="absolute -bottom-1 -right-1 bg-amber-500 rounded-full w-3 h-3 border border-slate-800"></span>}</div><div><p className="text-white font-medium line-clamp-1">{prod.nombre}</p></div></div></td>
                            <td className="py-3 text-emerald-400 text-center font-mono">L {prod.costoBase}</td>
                            <td className="py-3"><div className="flex justify-center gap-1"><button onClick={() => handleEditarProducto(prod)} className="text-blue-400 p-1.5 bg-slate-900 rounded hover:bg-slate-800"><Edit3 size={16}/></button><button onClick={() => handleEliminarProducto(prod.id, prod.nombre)} className="text-red-400 p-1.5 bg-slate-900 rounded hover:bg-slate-800"><Trash2 size={16}/></button></div></td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                    {catalogoPaginadoAdmin.length === 0 && <p className="text-center text-slate-500 mt-6">No se encontraron productos en esta categoría.</p>}
                  </div>

                  <div className="p-4 border-t border-slate-700 bg-slate-800/50 rounded-b-3xl">
                     {totalPaginasAdmin > 1 && (
                         <div className="flex items-center justify-between mb-4 px-2">
                             <button disabled={paginaActualAdmin === 1} onClick={() => setPaginaActualAdmin(p => p - 1)} className="text-slate-400 hover:text-white disabled:opacity-30"><ChevronLeft size={20}/></button>
                             <span className="text-xs font-bold text-slate-500">Página {paginaActualAdmin} de {totalPaginasAdmin}</span>
                             <button disabled={paginaActualAdmin === totalPaginasAdmin} onClick={() => setPaginaActualAdmin(p => p + 1)} className="text-slate-400 hover:text-white disabled:opacity-30"><ChevronRight size={20}/></button>
                         </div>
                     )}
                    <button onClick={handleCrearProducto} className="w-full bg-slate-700 hover:bg-slate-600 text-white p-3 rounded-xl font-bold text-sm transition-colors"><Plus size={18} className="inline mr-2"/> Agregar Producto</button>
                  </div>
                </div>

                {/* PANEL 2: Técnicas */}
                <div className="bg-slate-800 rounded-3xl border border-slate-700 flex flex-col shadow-lg h-[calc(100vh-14rem)] min-h-[600px]">
                  <div className="p-4 border-b border-slate-700 flex shrink-0 items-center bg-slate-800/80 rounded-t-3xl">
                    <button onClick={() => scrollTabs(-150)} className="p-2 text-slate-400 hover:text-white bg-slate-900 rounded-lg hidden sm:block mr-2"><ChevronLeft size={16}/></button>
                    <div ref={scrollRef} className="flex gap-2 overflow-x-hidden flex-1 scroll-smooth">
                        {tecnicas.map(t => <button key={t.id} onClick={()=>setTecActivaId(t.id)} className={`px-4 py-2 rounded-lg font-bold text-sm whitespace-nowrap transition-colors ${tecActivaId === t.id ? 'bg-blue-600 text-white' : 'bg-slate-900 text-slate-400 hover:text-slate-200'}`}>{t.nombre}</button>)}
                    </div>
                    <button onClick={() => scrollTabs(150)} className="p-2 text-slate-400 hover:text-white bg-slate-900 rounded-lg hidden sm:block ml-2"><ChevronRight size={16}/></button>
                    <div className="border-l border-slate-700 pl-3 ml-2">
                        <button onClick={handleCrearTecnica} className="px-3 py-2 rounded-lg bg-emerald-600/20 text-emerald-400 hover:bg-emerald-600/30 flex items-center gap-1 shrink-0"><Plus size={16}/><span className="hidden xl:inline text-xs font-bold">Nueva</span></button>
                    </div>
                  </div>
                  
                  {tecActual ? (
                    <div className="p-6 flex-1 overflow-y-auto custom-scrollbar">
                      <div className="flex flex-wrap gap-4 items-center bg-slate-900 p-4 rounded-xl border border-slate-700 mb-6 relative">
                        {tecActual.cobraImpuesto === false && <span className="absolute top-2 right-2 text-[10px] text-amber-500 font-bold border border-amber-500/30 bg-amber-500/10 px-2 py-0.5 rounded">Exento ISV</span>}
                        <div><label className="text-xs text-slate-500 block mb-1 font-semibold uppercase">Mínimo Producción</label><input type="number" value={tecActual.minimo} onChange={e=>updateTecnicaActual({...tecActual, minimo: Number(e.target.value)})} className="w-20 p-2 rounded-lg bg-slate-800 text-white text-center border border-slate-600 focus:border-blue-500 outline-none" /></div>
                        
                        <div className="ml-auto flex items-center border-l border-slate-700 pl-4 gap-2">
                            <button onClick={handleEditarTecnicaBase} className="text-blue-400 p-2 text-sm hover:bg-slate-800 rounded-lg flex items-center transition-colors"><Edit3 size={16} className="inline mr-1"/> Editar</button>
                            <button onClick={handleEliminarTecnica} className="text-red-400 p-2 text-sm hover:bg-slate-800 rounded-lg flex items-center transition-colors"><Trash2 size={16} className="inline mr-1"/> Eliminar</button>
                        </div>
                      </div>
                      
                      <div className="space-y-6">
                        {tecActual.subcategorias.map(sub => (
                          <div key={sub.id} className="border border-slate-700 rounded-xl overflow-hidden shadow-sm">
                            <div className="bg-slate-900 px-4 py-3 border-b border-slate-700 flex justify-between items-center">
                                <div className="flex items-center gap-3">
                                    <span className="font-bold text-slate-200"><Layers size={14} className="inline mr-2 text-blue-400"/>{sub.nombre}</span>
                                    <div className="flex gap-1 ml-2">
                                        <button onClick={()=>editarSubcat(sub.id, sub.nombre)} className="text-blue-400 hover:text-blue-300 bg-slate-800 p-1 rounded"><Pencil size={12}/></button>
                                        <button onClick={()=>eliminarSubcat(sub.id, sub.nombre)} className="text-red-400 hover:text-red-300 bg-slate-800 p-1 rounded"><Trash2 size={12}/></button>
                                    </div>
                                </div>
                                <button onClick={()=>agregarOpcion(sub.id)} className="text-xs font-bold text-blue-400 bg-blue-500/10 px-2 py-1 rounded hover:bg-blue-500/20">+ Variante</button>
                            </div>
                            
                            <div className="p-4 bg-slate-800/50 space-y-4">
                              {sub.opciones.map(op => (
                                <div key={op.id} className="bg-slate-950 p-4 rounded-xl border border-slate-800 shadow-inner">
                                  <div className="flex justify-between items-center mb-3">
                                      <p className="font-bold text-white text-sm"><Edit3 size={14} className="inline mr-2 text-slate-500"/>{op.nombre}</p>
                                      <div className="flex items-center gap-3">
                                          <button onClick={() => editarOpcion(sub.id, op.id, op.nombre)} className="flex items-center gap-1 text-blue-400 hover:text-blue-300 text-xs font-medium transition-colors bg-slate-900 px-2 py-1 rounded"><Pencil size={12} /> Editar</button>
                                          <button onClick={() => eliminarOpcion(sub.id, op.id, op.nombre)} className="text-red-400 hover:bg-red-500/10 p-1 rounded"><Trash2 size={14}/></button>
                                      </div>
                                  </div>
                                  <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                    <div className="bg-slate-900 p-3 rounded-lg border border-slate-700/50">
                                        <div className="flex justify-between items-center border-b border-slate-700 pb-2 mb-3"><span className="text-xs font-bold text-slate-400">Fijos (Setups)</span><button onClick={()=>agregarCosto(sub.id, op.id, 'Fijo')} className="text-emerald-400 bg-emerald-500/10 p-1 rounded hover:bg-emerald-500/20"><Plus size={14}/></button></div>
                                        <ul className="space-y-2">
                                            {op.costosFijos.map(c => <li key={c.id} className="text-xs flex justify-between text-slate-300 items-center"><span>{c.nombre}</span> <span className="text-emerald-400 font-mono bg-slate-800 pl-2 pr-1 py-0.5 rounded flex items-center gap-1">L{c.valor} <button onClick={()=>editarCosto(sub.id, op.id, c, 'Fijo')} className="text-blue-400 hover:text-blue-300 p-0.5"><Pencil size={12}/></button><button onClick={()=>eliminarCosto(sub.id, op.id, c.id, 'Fijo')} className="text-slate-500 hover:text-red-400 p-0.5"><X size={12}/></button></span></li>)}
                                        </ul>
                                    </div>
                                    <div className="bg-slate-900 p-3 rounded-lg border border-slate-700/50">
                                        <div className="flex justify-between items-center border-b border-slate-700 pb-2 mb-3"><span className="text-xs font-bold text-slate-400">Variables (x Und)</span><button onClick={()=>agregarCosto(sub.id, op.id, 'Variable')} className="text-emerald-400 bg-emerald-500/10 p-1 rounded hover:bg-emerald-500/20"><Plus size={14}/></button></div>
                                        <ul className="space-y-2">
                                            {op.costosVariables.map(c => <li key={c.id} className="text-xs flex justify-between text-slate-300 items-center"><span>{c.nombre}</span> <span className="text-emerald-400 font-mono bg-slate-800 pl-2 pr-1 py-0.5 rounded flex items-center gap-1">L{c.valor} <button onClick={()=>editarCosto(sub.id, op.id, c, 'Variable')} className="text-blue-400 hover:text-blue-300 p-0.5"><Pencil size={12}/></button><button onClick={()=>eliminarCosto(sub.id, op.id, c.id, 'Variable')} className="text-slate-500 hover:text-red-400 p-0.5"><X size={12}/></button></span></li>)}
                                        </ul>
                                    </div>
                                  </div>
                                </div>
                              ))}
                            </div>
                          </div>
                        ))}
                        <button onClick={agregarSubcat} className="w-full border border-dashed border-slate-600 text-slate-400 font-bold py-4 rounded-xl hover:text-white hover:border-slate-500 transition-colors"><Plus size={18} className="inline mr-2"/> Añadir Ubicación</button>
                      </div>
                    </div>
                  ) : <div className="flex-1 flex flex-col items-center justify-center text-slate-500 italic text-sm p-6"><p>Selecciona o crea una técnica en el panel superior.</p></div>}
                </div>
              </div>
            </div>
          );
        }

        // ==========================================
        // COMPONENTES AUXILIARES (MODAL)
        // ==========================================
        function CustomModal({ config, onClose }) {
          const [form, setForm] = useState(config.valoresIniciales || {});
          
          const handleSubmit = (e) => { e.preventDefault(); config.onSubmit(form); onClose(); };
          const handleFileChange = (e, fieldId) => { 
            const file = e.target.files[0]; 
            if (file) { 
                if (!file.type.startsWith('image/') && file.size > 750 * 1024) {
                    alert('⚠️ El archivo PDF es muy pesado. El límite máximo para bases de datos NoSQL es de 750KB. Por favor, comprímelo.');
                    e.target.value = '';
                    return;
                }

                const reader = new FileReader(); 
                reader.onload = (event) => {
                    if(file.type.startsWith('image/')) {
                        const img = new Image();
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            let width = img.width; let height = img.height;
                            const MAX_SIZE = 800;
                            if (width > height) { if (width > MAX_SIZE) { height *= MAX_SIZE / width; width = MAX_SIZE; } } else { if (height > MAX_SIZE) { width *= MAX_SIZE / height; height = MAX_SIZE; } }
                            canvas.width = width; canvas.height = height; const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, width, height);
                            setForm({...form, [fieldId]: canvas.toDataURL('image/jpeg', 0.7)});
                        };
                        img.src = event.target.result;
                    } else {
                        setForm({...form, [fieldId]: event.target.result});
                    }
                }; 
                reader.readAsDataURL(file); 
            } 
          };
          const handleCheckboxGroup = (fieldId, value, checked) => { const currentArr = form[fieldId] || []; if (checked) setForm({...form, [fieldId]: [...currentArr, value]}); else setForm({...form, [fieldId]: currentArr.filter(v => v !== value)}); };

          return (
            <div className="fixed inset-0 bg-slate-900/80 flex items-center justify-center z-[60] fade-in p-4">
              <div className="bg-slate-800 p-8 rounded-2xl border border-slate-600 w-full max-w-lg shadow-2xl">
                <h3 className="text-xl font-bold text-white mb-6">{config.titulo}</h3>
                <form onSubmit={handleSubmit} className="flex flex-col max-h-[75vh]">
                  <div className="overflow-y-auto custom-scrollbar pr-2 space-y-5 flex-1">
                    {config.esConfirmacion ? <p className="text-slate-300 text-sm leading-relaxed">{config.mensaje}</p> : (
                        config.campos.map(c => (
                        <div key={c.id}>
                            {c.type !== 'boolean' && <label className="block text-sm font-bold text-slate-400 mb-2">{c.label}</label>}
                            
                            {c.type === 'file' ? <input type="file" accept=".pdf,image/*" onChange={(e) => handleFileChange(e, c.id)} className="text-white text-sm w-full file:mr-4 file:py-2 file:px-4 file:rounded-xl file:border-0 file:text-sm file:font-semibold file:bg-blue-500 file:text-white hover:file:bg-blue-600 cursor-pointer" /> 
                            : c.type === 'checkboxGroup' ? (
                                <div className="grid grid-cols-2 gap-2 bg-slate-900 p-3 rounded-xl border border-slate-700 max-h-40 overflow-y-auto custom-scrollbar">
                                    {c.options.map(opt => <label key={opt.value} className="flex gap-2 text-white text-sm"><input type="checkbox" checked={(form[c.id] || []).includes(opt.value)} onChange={(e) => handleCheckboxGroup(c.id, opt.value, e.target.checked)} className="accent-blue-500" /> <span className="truncate" title={opt.label}>{opt.label}</span></label>)}
                                </div>
                            )
                            : c.type === 'boolean' ? (
                                <label className="flex items-center gap-3 text-white text-sm font-bold cursor-pointer mt-2 bg-slate-900 p-3 rounded-xl border border-slate-700 hover:border-blue-500 transition-colors">
                                    <input type="checkbox" checked={!!form[c.id]} onChange={e => setForm({...form, [c.id]: e.target.checked})} className="w-5 h-5 accent-blue-500 rounded focus:ring-blue-500 focus:ring-2" />
                                    {c.label}
                                </label>
                            )
                            : c.type === 'select' ? (
                                <select required={c.required !== false} value={form[c.id] !== undefined ? form[c.id] : ''} className="w-full p-3 rounded-xl bg-slate-900 text-white outline-none border border-slate-700 focus:border-blue-500 transition-colors text-sm" onChange={e => setForm({...form, [c.id]: e.target.value})}>
                                    <option value="">-- Seleccionar --</option>
                                    {c.options.map(opt => <option key={opt.value} value={opt.value}>{opt.label}</option>)}
                                </select>
                            )
                            : c.type === 'textarea' ? (
                                <div className="relative">
                                    <textarea maxLength={c.maxLength} value={form[c.id] !== undefined ? form[c.id] : ''} className="w-full p-3 rounded-xl bg-slate-900 text-white outline-none border border-slate-700 focus:border-blue-500 transition-colors resize-none h-24 text-sm" onChange={e => setForm({...form, [c.id]: e.target.value})} placeholder={c.placeholder || ''} />
                                    {c.maxLength && <p className="text-right text-xs text-slate-500 mt-1">{(form[c.id] || '').length}/{c.maxLength}</p>}
                                </div>
                            )
                            : <input required={c.id!=='imagenUrl' && c.id!=='archivo'} type={c.type} value={form[c.id] !== undefined ? form[c.id] : ''} className="w-full p-3 rounded-xl bg-slate-900 text-white outline-none border border-slate-700 focus:border-blue-500 transition-colors" onChange={e => setForm({...form, [c.id]: e.target.value})} />
                            }
                        </div>
                        ))
                    )}
                  </div>
                  <div className="flex justify-end gap-3 mt-6 pt-4 border-t border-slate-700 shrink-0">
                      <button type="button" onClick={onClose} className="px-5 py-2.5 rounded-xl text-slate-300 font-bold hover:bg-slate-700 transition-colors">Cancelar</button>
                      <button type="submit" className={`px-5 py-2.5 rounded-xl font-bold text-white shadow-lg transition-transform hover:scale-105 ${config.esConfirmacion ? 'bg-red-600 shadow-red-600/20' : 'bg-blue-600 shadow-blue-600/20'}`}>
                          {config.submitLabel || (config.esConfirmacion ? 'Sí, Confirmar' : 'Guardar')}
                      </button>
                  </div>
                </form>
              </div>
            </div>
          );
        }

        function MenuBtn({ icon: Icon, label, active, onClick, dark = false }) {
          const baseClasses = "w-full flex items-center gap-3 px-4 py-3 rounded-xl font-bold transition-all duration-200";
          const activeClasses = dark ? "bg-emerald-500/10 text-emerald-400 border border-emerald-500/20" : "bg-blue-600 text-white shadow-md transform scale-[1.02]";
          const inactiveClasses = dark ? "text-slate-400 hover:bg-slate-800 hover:text-slate-200" : "text-slate-600 hover:bg-slate-100 hover:text-blue-600";
          return <button onClick={onClick} className={`${baseClasses} ${active ? activeClasses : inactiveClasses}`}><Icon size={20} /><span>{label}</span></button>;
        }
        
        function PanelAdmin({ ordenes, categorias, setCategorias, catalogo, setCatalogo, tecnicas, setTecnicas, margenGanancia, impuestoGlobal, descuentosVolumen, setConfigGlobal, usuarios, onActualizarUsuario, onEliminarUsuario, recursos, onActualizarRecurso, onEliminarRecurso, onActualizarOrden, onEliminarOrden, mensajesGlobales, adminSetMensajes, onLogout, isConnectedToCloud, showToast }) {
          const [vista, setVista] = useState('DASHBOARD'); 
          const ordenesValidas = ordenes.filter(o => o.estado !== 'Cancelada');
          const ingresosProyectados = ordenesValidas.reduce((sum, o) => sum + o.total, 0);

          return (
            <div className="min-h-screen bg-slate-900 text-slate-200 flex flex-col md:flex-row fade-in">
              <aside className="w-full md:w-72 bg-slate-950 flex flex-col border-r border-slate-800 z-10 md:h-screen md:sticky md:top-0">
                <div className="p-6 overflow-y-auto flex-1 custom-scrollbar">
                    <div className="flex items-center gap-3 text-emerald-500 mb-10"><Settings size={32} /><span className="text-xl font-bold text-white">ERP Admin</span></div>
                    <nav className="space-y-2">
                        <MenuBtn icon={LayoutDashboard} label="Dashboard" active={vista === 'DASHBOARD'} onClick={() => setVista('DASHBOARD')} dark />
                        <MenuBtn icon={ShoppingBag} label="Órdenes General" active={vista === 'ORDENES'} onClick={() => setVista('ORDENES')} dark />
                        <MenuBtn icon={Package} label="Catálogo & Lógica" active={vista === 'CATALOGO'} onClick={() => setVista('CATALOGO')} dark />
                        <MenuBtn icon={Users} label="Usuarios & Accesos" active={vista === 'USUARIOS'} onClick={() => setVista('USUARIOS')} dark />
                        <MenuBtn icon={Megaphone} label="Avisos y WhatsApp" active={vista === 'MENSAJES'} onClick={() => setVista('MENSAJES')} dark />
                        <MenuBtn icon={BookOpen} label="Recursos (PDFs/Guías)" active={vista === 'RECURSOS'} onClick={() => setVista('RECURSOS')} dark />
                    </nav>
                </div>
                <div className="p-6 bg-slate-950 border-t border-slate-800 mt-auto">
                    <ConnectionIndicator isConnectedToCloud={isConnectedToCloud} darkTheme={true} />
                    <button onClick={onLogout} className="w-full flex items-center justify-center gap-2 text-slate-400 hover:text-red-400 hover:bg-red-500/10 mt-4 p-3 rounded-xl font-bold transition-colors border border-transparent hover:border-red-500/20"><LogOut size={18} /> Cerrar Sesión</button>
                </div>
              </aside>
              <main className="flex-1 p-8 overflow-y-auto bg-slate-900 relative">
                {vista === 'DASHBOARD' && (
                   <div className="max-w-6xl mx-auto fade-in space-y-8">
                     <div><h1 className="text-3xl font-bold text-white">Visión General</h1><p className="text-slate-400">Métricas clave del negocio en tiempo real.</p></div>
                     <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                        <div className="bg-slate-800 rounded-2xl p-6 border border-slate-700 flex items-center gap-4"><div className="bg-blue-500/20 p-4 rounded-xl text-blue-400"><Users size={28}/></div><div><p className="text-sm text-slate-400 font-bold">Total Usuarios</p><p className="text-2xl font-black text-white">{usuarios.length}</p></div></div>
                        <div className="bg-slate-800 rounded-2xl p-6 border border-slate-700 flex items-center gap-4"><div className="bg-emerald-500/20 p-4 rounded-xl text-emerald-400"><Activity size={28}/></div><div><p className="text-sm text-slate-400 font-bold">Cotizaciones Activas</p><p className="text-2xl font-black text-white">{ordenesValidas.length}</p></div></div>
                        <div className="bg-slate-800 rounded-2xl p-6 border border-slate-700 flex items-center gap-4"><div className="bg-amber-500/20 p-4 rounded-xl text-amber-400"><TrendingUp size={28}/></div><div><p className="text-sm text-slate-400 font-bold">Ingresos Proyectados</p><p className="text-2xl font-black text-white">L {ingresosProyectados.toFixed(2)}</p></div></div>
                        <div className="bg-slate-800 rounded-2xl p-6 border border-slate-700 flex items-center gap-4"><div className="bg-red-500/20 p-4 rounded-xl text-red-400"><X size={28}/></div><div><p className="text-sm text-slate-400 font-bold">Canceladas</p><p className="text-2xl font-black text-white">{ordenes.length - ordenesValidas.length}</p></div></div>
                     </div>
                   </div>
                )}
                {vista === 'ORDENES' && <div className="max-w-6xl mx-auto space-y-4 fade-in"><div className="bg-slate-800 rounded-2xl p-6 border border-slate-700"><HistorialOrdenes ordenes={ordenes} onActualizarOrden={onActualizarOrden} onEliminarOrden={onEliminarOrden} isClient={false} mensajesGlobales={mensajesGlobales} showToast={showToast} /></div></div>}
                {vista === 'CATALOGO' && <GestionJerarquica categorias={categorias} setCategorias={setCategorias} catalogo={catalogo} setCatalogo={setCatalogo} tecnicas={tecnicas} setTecnicas={setTecnicas} margenGanancia={margenGanancia} impuestoGlobal={impuestoGlobal} descuentosVolumen={descuentosVolumen} setConfigGlobal={setConfigGlobal} />}
                {vista === 'USUARIOS' && <GestionUsuarios usuarios={usuarios} onActualizarUsuario={onActualizarUsuario} onEliminarUsuario={onEliminarUsuario} />}
                {vista === 'MENSAJES' && <GestionMensajes mensajesGlobales={mensajesGlobales} adminSetMensajes={adminSetMensajes} />}
                {vista === 'RECURSOS' && <GestionRecursos recursos={recursos} onActualizarRecurso={onActualizarRecurso} onEliminarRecurso={onEliminarRecurso} />}
              </main>
            </div>
          );
        }

        function EstadoBadge({ estado }) {
          const colores = { 'Cotización enviada': 'bg-sky-100 text-sky-700 border-sky-200', 'Pendiente': 'bg-slate-100 text-slate-700 border-slate-200', 'Aprobado / En producción': 'bg-indigo-100 text-indigo-700 border-indigo-200', 'Control de calidad': 'bg-purple-100 text-purple-700 border-purple-200', 'Listo para envío': 'bg-teal-100 text-teal-700 border-teal-200', 'Entrega parcial': 'bg-amber-100 text-amber-700 border-amber-200', 'Finalizado / Entregado': 'bg-emerald-100 text-emerald-700 border-emerald-200', 'Cancelada': 'bg-red-100 text-red-700 border-red-200' };
          const clase = colores[estado] || colores['Pendiente'];
          return <span className={`inline-flex items-center px-2.5 py-1 rounded-md text-[10px] uppercase font-bold border ${clase}`}>{estado}</span>;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
