<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrintPro - Cotizador VIP (Cloud Ready)</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        .custom-scrollbar::-webkit-scrollbar { height: 6px; width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #334155; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background-color: #475569; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        .slide-up { animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        /* ESTILOS PARA IMPRESIÓN PROFESIONAL */
        @media print {
            body * { visibility: hidden; }
            .print-area, .print-area * { visibility: visible; }
            .print-area { 
                position: absolute; 
                left: 0; top: 0; 
                width: 100%; 
                padding: 0;
                background: white; 
                color: black; 
                box-shadow: none !important;
                border: none !important;
            }
            .no-print { display: none !important; }
            .print-bg-slate-50 { background-color: #f8fafc !important; -webkit-print-color-adjust: exact; }
            .print-bg-blue-50 { background-color: #eff6ff !important; -webkit-print-color-adjust: exact; }
            .print-text-emerald { color: #059669 !important; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useMemo, useEffect, useRef } from 'https://esm.sh/react@18.2.0';
        import ReactDOM from 'https://esm.sh/react-dom@18.2.0/client';
        
        import { 
          LayoutDashboard, ShoppingBag, FileText, Settings, Users, Plus, CheckCircle, 
          Clock, Printer, LogOut, AlertCircle, Share2, Package, Edit3, Trash2, Save, X, 
          Pencil, Layers, Image as ImageIcon, Upload, MessageSquare, Eye, TrendingUp, Activity, Info, Cloud, Database, Lock, Megaphone, Bell, Calculator, BookOpen, Search, ChevronLeft, ChevronRight, ChevronDown, ChevronUp
        } from 'https://esm.sh/lucide-react@0.292.0';
        
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut, setPersistence, browserSessionPersistence } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
        import { getFirestore, collection, doc, setDoc, onSnapshot, query, deleteDoc, where } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

        const FIREBASE_PROD_CONFIG = {
          apiKey: "AIzaSyA_Xhl948W9g8vpxLdWzCFacnya8AURoXc",
          authDomain: "cotizador-pro-9ec69.firebaseapp.com",
          projectId: "cotizador-pro-9ec69",
          storageBucket: "cotizador-pro-9ec69.firebasestorage.app",
          messagingSenderId: "690349119743",
          appId: "1:690349119743:web:41530227ef8053e076d4ca",
          measurementId: "G-WGB6N9F8TC"
        };
        
        const envFirebaseConfig = typeof __firebase_config !== 'undefined' && __firebase_config ? JSON.parse(__firebase_config) : null;
        const activeConfig = FIREBASE_PROD_CONFIG || envFirebaseConfig;
        
        let app, auth, db;
        let appId = FIREBASE_PROD_CONFIG ? 'printpro-produccion' : (typeof __app_id !== 'undefined' ? __app_id : 'default-app-id');

        if (activeConfig) {
            try {
                app = initializeApp(activeConfig);
                auth = getAuth(app);
                db = getFirestore(app);
            } catch (error) { console.error("Error inicializando Firebase:", error); }
        }

        const loadLocal = (key, fallback) => { try { const item = window.localStorage.getItem(key); return item ? JSON.parse(item) : fallback; } catch (e) { return fallback; } };
        const saveLocal = (key, value) => { try { window.localStorage.setItem(key, JSON.stringify(value)); } catch(e) { console.error("Error saving local", e); } };

        const loadSession = (key, fallback) => { try { const item = window.sessionStorage.getItem(key); return item ? JSON.parse(item) : fallback; } catch (e) { return fallback; } };
        const saveSession = (key, value) => { try { window.sessionStorage.setItem(key, JSON.stringify(value)); } catch(e) { console.error("Error saving session", e); } };

        const USUARIOS_BASE = [{ id: 'ADMIN_1', rol: 'ADMIN', username: 'admin', password: '123456', nombre: 'Administrador Principal' }];
        const CATEGORIAS_BASE = [];
        const CATALOGO_BASE = [{ id: 'p1', nombre: 'Camiseta Algodón Premium', detalles: '100% algodón', categoriaId: '', tipo: 'Textil', costoBase: 80, imagenUrl: '', tecnicasRecomendadas: ['T_SERIGRAFIA'], ubicacionesPermitidas: ['SUB_PECHO'], cobraImpuesto: true }];
        const TECNICAS_BASE = [{ id: 'T_SERIGRAFIA', nombre: 'Serigrafía', cobraImpuesto: true, minimo: 12, subcategorias: [{ id: 'SUB_PECHO', nombre: 'Pecho', opciones: [ { id: 'OP_1C', nombre: '1 Color', costosFijos: [{ id: 'cf1', nombre: 'Revelado', valor: 250 }], costosVariables: [{ id: 'cv1', nombre: 'Impresión', valor: 15 }] } ] }] }];
        const DESCUENTOS_VOL_BASE = [{ id: 'd1', min: 500, pct: 15, activo: true }, { id: 'd2', min: 100, pct: 8, activo: true }, { id: 'd3', min: 50, pct: 4, activo: true }];
        const ESTADOS_DISPONIBLES = ['Cotización enviada', 'Pendiente', 'Aprobado / En producción', 'Control de calidad', 'Listo para envío', 'Entrega parcial', 'Finalizado / Entregado', 'Cancelada'];
        const MENSAJES_BASE = { bienvenida: '¡Bienvenido a tu portal VIP de cotizaciones!', promo: 'Aviso importante: Aprovecha nuestras tarifas preferenciales automatizadas.', whatsappTemplate: '¡Hola! Te comparto los detalles, orden #{ID} por un total de L {TOTAL}. Quedamos a disposición.', whatsappNumero: '' };

        function ConnectionIndicator({ isConnectedToCloud, darkTheme = false }) {
            return (
                <div className={`p-3 rounded-xl flex items-center gap-3 text-xs font-bold transition-all shadow-sm ${isConnectedToCloud ? (darkTheme ? 'bg-emerald-500/10 text-emerald-400 border border-emerald-500/30' : 'bg-emerald-50 text-emerald-700 border border-emerald-200') : (darkTheme ? 'bg-amber-500/10 text-amber-400 border border-amber-500/30' : 'bg-amber-50 text-amber-700 border border-amber-200')}`}>
                    <div className="relative flex h-3 w-3 shrink-0">{isConnectedToCloud && <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>}<span className={`relative inline-flex rounded-full h-3 w-3 ${isConnectedToCloud ? 'bg-emerald-500' : 'bg-amber-500'}`}></span></div>
                    <div><p className="uppercase tracking-wider opacity-80 text-[10px]">Estado del Sistema</p><p>{isConnectedToCloud ? 'Sincronización (Nube)' : 'Local (Sin Nube)'}</p></div>
                </div>
            );
        }

        function MenuBtn({ icon: Icon, label, active, onClick }) {
            return (
                <button onClick={onClick} className={`w-full flex items-center gap-3 p-3 rounded-xl font-bold transition-colors ${active ? 'bg-blue-600 text-white shadow-md' : 'text-slate-600 hover:bg-blue-50'}`}>
                    <Icon size={20} />{label}
                </button>
            );
        }

        function EstadoBadge({ estado }) {
            const colores = { 'Cotización enviada': 'bg-blue-100 text-blue-700', 'Pendiente': 'bg-amber-100 text-amber-700', 'Aprobado / En producción': 'bg-purple-100 text-purple-700', 'Cancelada': 'bg-red-100 text-red-700', 'Finalizado / Entregado': 'bg-emerald-100 text-emerald-700' };
            const c = colores[estado] || 'bg-slate-100 text-slate-700';
            return <span className={`px-2.5 py-1 rounded-md text-xs font-bold ${c}`}>{estado}</span>;
        }

        function CustomModal({ config, onClose }) {
            const [formData, setFormData] = useState(config.valoresIniciales || {});
            const handleSubmit = (e) => { e.preventDefault(); config.onSubmit(formData); onClose(); };
            return (
                <div className="fixed inset-0 bg-slate-900/80 flex items-center justify-center z-50 fade-in p-4">
                    <div className="bg-slate-800 rounded-2xl border border-slate-600 w-full max-w-md shadow-2xl flex flex-col max-h-[90vh]">
                        <div className="p-6 border-b border-slate-700 shrink-0 flex justify-between items-center">
                            <h3 className="text-xl font-bold text-white">{config.titulo}</h3>
                            <button onClick={onClose} className="text-slate-400 hover:text-white"><X size={20}/></button>
                        </div>
                        <div className="p-6 overflow-y-auto custom-scrollbar flex-1">
                            {config.mensaje && <p className="text-slate-300 text-sm mb-4">{config.mensaje}</p>}
                            {!config.esConfirmacion && config.campos && (
                                <form id="customModalForm" onSubmit={handleSubmit} className="space-y-4">
                                    {config.campos.map(campo => (
                                        <div key={campo.id}>
                                            <label className="block text-sm font-bold text-slate-400 mb-1">{campo.label}</label>
                                            {campo.type === 'boolean' ? ( <input type="checkbox" checked={!!formData[campo.id]} onChange={e => setFormData({...formData, [campo.id]: e.target.checked})} className="accent-blue-500 w-5 h-5" /> ) : campo.type === 'file' ? ( <input type="file" onChange={e => { const file = e.target.files[0]; if(file) { const reader = new FileReader(); reader.onloadend = () => setFormData({...formData, [campo.id]: reader.result}); reader.readAsDataURL(file); } }} className="w-full text-slate-300 text-sm" /> ) : ( <input type={campo.type} value={formData[campo.id] || ''} onChange={e => setFormData({...formData, [campo.id]: e.target.value})} className="w-full p-2.5 rounded-lg bg-slate-900 border border-slate-700 text-white outline-none focus:border-blue-500" required={campo.required !== false} /> )}
                                        </div>
                                    ))}
                                </form>
                            )}
                        </div>
                        <div className="p-6 border-t border-slate-700 bg-slate-900 rounded-b-2xl flex justify-end gap-3 shrink-0">
                            <button onClick={onClose} className="px-5 py-2.5 rounded-xl text-slate-300 font-bold hover:bg-slate-700">Cancelar</button>
                            {config.esConfirmacion ? ( <button onClick={() => { config.onSubmit(); onClose(); }} className="px-5 py-2.5 rounded-xl font-bold text-white bg-blue-600 hover:bg-blue-500">{config.submitLabel || 'Confirmar'}</button> ) : ( <button form="customModalForm" type="submit" className="px-5 py-2.5 rounded-xl font-bold text-white bg-blue-600 hover:bg-blue-500">{config.submitLabel || 'Guardar'}</button> )}
                        </div>
                    </div>
                </div>
            );
        }

        function EditorTarifasPropias({ usarTarifas, setUsarTarifas, margen, setMargen, descuentos, setDescuentos }) {
            const addTier = () => setDescuentos([...descuentos, { id: `desc_${Date.now()}`, min: 10, pct: 5, activo: true }]);
            const updateTier = (id, field, value) => setDescuentos(descuentos.map(d => d.id === id ? { ...d, [field]: field === 'activo' ? value : (value === '' ? '' : Number(value)) } : d));
            const removeTier = (id) => setDescuentos(descuentos.filter(d => d.id !== id));

            return (
                <div className="bg-slate-800 p-4 rounded-xl border border-slate-600 mt-4">
                    <label className="flex items-center gap-3 cursor-pointer mb-4 border-b border-slate-700 pb-4">
                        <div className="relative">
                            <input type="checkbox" className="sr-only" checked={usarTarifas} onChange={e => setUsarTarifas(e.target.checked)} />
                            <div className={`block w-10 h-6 rounded-full transition-colors ${usarTarifas ? 'bg-blue-500' : 'bg-slate-600'}`}></div>
                            <div className={`dot absolute left-1 top-1 bg-white w-4 h-4 rounded-full transition-transform ${usarTarifas ? 'transform translate-x-4' : ''}`}></div>
                        </div>
                        <div>
                            <span className="font-bold text-white text-sm block">Usar Tarifas y Descuentos Individuales</span>
                            <span className="text-xs text-slate-400">Anula las tarifas globales para este ítem específico.</span>
                        </div>
                    </label>
                    
                    {usarTarifas && (
                        <div className="space-y-4 fade-in">
                            <div>
                                <label className="block text-xs font-bold text-slate-400 mb-1">Margen de Ganancia Propio (%)</label>
                                <input type="number" value={margen} onChange={e => setMargen(Number(e.target.value))} className="w-full p-2.5 rounded-lg bg-slate-900 border border-slate-700 text-white outline-none focus:border-blue-500" />
                            </div>
                            <div>
                                <div className="flex justify-between items-center mb-2">
                                    <label className="block text-xs font-bold text-slate-400">Descuentos por Volumen Propios</label>
                                    <button type="button" onClick={addTier} className="text-[10px] bg-slate-700 hover:bg-slate-600 text-white px-2 py-1 rounded">+ Añadir</button>
                                </div>
                                <div className="space-y-2">
                                    {descuentos.map(d => (
                                        <div key={d.id} className="flex gap-2 items-center bg-slate-900 p-2 rounded-lg border border-slate-700">
                                            <input type="checkbox" checked={d.activo !== false} onChange={e=>updateTier(d.id, 'activo', e.target.checked)} className="accent-blue-500 w-4 h-4 cursor-pointer" title="Activar descuento" />
                                            <input type="number" placeholder="Min. Pzas" value={d.min} onChange={e=>updateTier(d.id, 'min', e.target.value)} className="w-1/2 bg-slate-800 p-1.5 rounded text-white text-xs outline-none border border-slate-600" />
                                            <input type="number" placeholder="% Desc" value={d.pct} onChange={e=>updateTier(d.id, 'pct', e.target.value)} className="w-1/2 bg-slate-800 p-1.5 rounded text-white text-xs outline-none border border-slate-600" />
                                            <button type="button" onClick={()=>removeTier(d.id)} className="text-red-400 hover:text-red-300"><Trash2 size={14}/></button>
                                        </div>
                                    ))}
                                    {descuentos.length === 0 && <p className="text-xs text-slate-500 italic">No hay descuentos propios. No se aplicará descuento por volumen a este ítem.</p>}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function ModalTarifasGlobales({ margenActual, impuestoActual, descuentosActuales, onSave, onClose }) {
            const [margen, setMargen] = useState(margenActual !== undefined ? margenActual : 0); 
            const [impuesto, setImpuesto] = useState(impuestoActual !== undefined ? impuestoActual : 0); 
            const [descuentos, setDescuentos] = useState(descuentosActuales || []);

            const addTier = () => setDescuentos([...descuentos, { id: `desc_${Date.now()}`, min: 100, pct: 5, activo: true }]);
            const updateTier = (id, field, value) => setDescuentos(descuentos.map(d => d.id === id ? { ...d, [field]: field === 'activo' ? value : (value === '' ? '' : Number(value)) } : d));
            const removeTier = (id) => setDescuentos(descuentos.filter(d => d.id !== id));
            
            return ( 
                <div className="fixed inset-0 bg-slate-900/80 flex items-center justify-center z-50 fade-in p-4">
                    <div className="bg-slate-800 rounded-2xl border border-slate-600 w-full max-w-lg shadow-2xl flex flex-col max-h-[90vh]">
                        <div className="p-8 overflow-y-auto custom-scrollbar flex-1">
                            <h3 className="text-xl font-bold text-white mb-6">Tarifas Globales</h3>
                            <div className="flex gap-4 mb-6">
                                <div className="flex-1 bg-slate-900 p-4 rounded-xl border border-slate-700"><label className="text-sm font-bold text-emerald-400 block mb-2">Margen General (%)</label><input type="number" value={margen} onChange={e=>setMargen(e.target.value === '' ? '' : Number(e.target.value))} className="w-full p-3 rounded bg-slate-800 text-white font-bold outline-none border border-slate-600 focus:border-emerald-500" /></div>
                                <div className="flex-1 bg-slate-900 p-4 rounded-xl border border-slate-700"><label className="text-sm font-bold text-amber-400 block mb-2">Impuesto Global (%)</label><input type="number" value={impuesto} onChange={e=>setImpuesto(e.target.value === '' ? '' : Number(e.target.value))} className="w-full p-3 rounded bg-slate-800 text-white font-bold outline-none border border-slate-600 focus:border-amber-500" /></div>
                            </div>
                            <div className="bg-slate-900 p-4 rounded-xl border border-slate-700 mb-6">
                                <div className="flex justify-between items-center mb-4">
                                    <label className="text-sm font-bold text-blue-400">Niveles de Descuento por Volumen</label>
                                    <button onClick={addTier} className="text-xs bg-blue-600 text-white px-3 py-1.5 rounded hover:bg-blue-500 transition-colors">+ Añadir Nivel</button>
                                </div>
                                <div className="space-y-3">
                                    {descuentos.map(d => (
                                        <div key={d.id} className="flex gap-2 items-center bg-slate-800 p-2 rounded-lg border border-slate-600">
                                            <div className="px-2 flex items-center">
                                                <input type="checkbox" checked={d.activo !== false} onChange={e=>updateTier(d.id, 'activo', e.target.checked)} className="accent-blue-500 w-4 h-4 cursor-pointer" title="Mostrar y aplicar en vista cliente" />
                                            </div>
                                            <div className="flex-1"><label className="text-[10px] text-slate-400 uppercase font-bold px-1">Min. Pzas</label><input type="number" value={d.min} onChange={e=>updateTier(d.id, 'min', e.target.value)} className="w-full bg-slate-900 p-1.5 rounded text-white text-sm outline-none" /></div>
                                            <div className="flex-1"><label className="text-[10px] text-slate-400 uppercase font-bold px-1">Desc. (%)</label><input type="number" value={d.pct} onChange={e=>updateTier(d.id, 'pct', e.target.value)} className="w-full bg-slate-900 p-1.5 rounded text-white text-sm outline-none" /></div>
                                            <button onClick={()=>removeTier(d.id)} className="mt-4 text-red-400 p-2 hover:bg-red-500/10 rounded"><Trash2 size={16}/></button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                        <div className="p-6 border-t border-slate-700 bg-slate-900 rounded-b-2xl flex justify-end gap-3 shrink-0">
                            <button onClick={onClose} className="px-5 py-2.5 rounded-xl text-slate-300 font-bold hover:bg-slate-700">Cancelar</button>
                            <button onClick={() => { onSave(margen, impuesto, descuentos); onClose(); }} className="px-5 py-2.5 rounded-xl font-bold text-white bg-blue-600 hover:bg-blue-500">Guardar Tarifas</button>
                        </div>
                    </div>
                </div> 
            )
        }

        function App() {
          const [userDb, setUserDb] = useState(null); 
          const [usuarios, setUsuarios] = useState(() => loadLocal('usuarios', USUARIOS_BASE));
          const [usuarioActual, setUsuarioActual] = useState(() => loadSession('sesionActiva', null)); 
          const [ordenes, setOrdenes] = useState(() => loadLocal('ordenes', []));
          const [categorias, setCategorias] = useState(() => loadLocal('categorias', CATEGORIAS_BASE));
          const [catalogo, setCatalogo] = useState(() => loadLocal('catalogo', CATALOGO_BASE));
          const [tecnicas, setTecnicas] = useState(() => loadLocal('tecnicas', TECNICAS_BASE)); 
          const [recursos, setRecursos] = useState(() => loadLocal('recursos', []));
          const [mensajesGlobales, setMensajesGlobales] = useState(() => loadLocal('mensajes', MENSAJES_BASE)); 
          const [margenGanancia, setMargenGanancia] = useState(() => loadLocal('margenGanancia', 40)); 
          const [impuestoGlobal, setImpuestoGlobal] = useState(() => loadLocal('impuestoGlobal', 15)); 
          const [descuentosVolumen, setDescuentosVolumen] = useState(() => loadLocal('descuentosVol', DESCUENTOS_VOL_BASE));
          
          const [loadingData, setLoadingData] = useState(true);
          const [isConnectedToCloud, setIsConnectedToCloud] = useState(!!app && !!auth);
          const [toastInfo, setToastInfo] = useState(null);

          const showToast = (message, type = 'success') => {
              setToastInfo({ message, type });
              setTimeout(() => setToastInfo(null), 3500);
          };

          useEffect(() => {
              if (usuarioActual) saveSession('sesionActiva', usuarioActual);
              else window.sessionStorage.removeItem('sesionActiva');
          }, [usuarioActual]);

          useEffect(() => {
            if (!auth) { setLoadingData(false); setIsConnectedToCloud(false); return; } 
            const initAuth = async () => { try { await setPersistence(auth, browserSessionPersistence); } catch (e) { console.error(e); } finally { setLoadingData(false); } };
            initAuth();
            const unsub = onAuthStateChanged(auth, (user) => { setUserDb(user); if(!user) { setUsuarioActual(null); } });
            return () => unsub();
          }, []);

          useEffect(() => {
            if (!db || !userDb) return;
            const basePath = 'public'; setLoadingData(true);
            const isAdmin = userDb.email === 'admin@printpro.com';
            
            const unsubCatList = onSnapshot(collection(db, 'artifacts', appId, basePath, 'data', 'categorias'), (snap) => { setCategorias(snap.docs.map(d => d.data())); }, console.error);
            const unsubCat = onSnapshot(collection(db, 'artifacts', appId, basePath, 'data', 'catalogo'), (snap) => { if (!snap.empty) setCatalogo(snap.docs.map(d => d.data())); }, console.error);
            const unsubTec = onSnapshot(collection(db, 'artifacts', appId, basePath, 'data', 'tecnicas'), (snap) => { if (!snap.empty) setTecnicas(snap.docs.map(d => d.data())); }, console.error);
            const unsubRec = onSnapshot(collection(db, 'artifacts', appId, basePath, 'data', 'recursos'), (snap) => { setRecursos(snap.docs.map(d => d.data())); }, console.error);
            
            let unsubUsu;
            if (isAdmin) { unsubUsu = onSnapshot(collection(db, 'artifacts', appId, basePath, 'data', 'usuarios'), (snap) => { const allUsers = snap.docs.map(d => d.data()); if (!snap.empty) setUsuarios(allUsers); setUsuarioActual(allUsers.find(u => u.id === userDb.uid) || { id: userDb.uid, rol: 'ADMIN', nombre: 'Administrador Principal', username: userDb.email }); }, console.error);
            } else { unsubUsu = onSnapshot(doc(db, 'artifacts', appId, basePath, 'data', 'usuarios', userDb.uid), (docSnap) => { if (docSnap.exists()) setUsuarioActual(docSnap.data()); else setUsuarioActual({ id: userDb.uid, rol: 'CLIENTE', nombre: userDb.email, descuentoGlobal: 0 }); }, console.error); }
            
            let unsubOrd;
            if (isAdmin) { unsubOrd = onSnapshot(collection(db, 'artifacts', appId, basePath, 'data', 'ordenes'), (snap) => { setOrdenes(snap.docs.map(d => d.data())); }, console.error);
            } else { unsubOrd = onSnapshot(query(collection(db, 'artifacts', appId, basePath, 'data', 'ordenes'), where('clienteId', '==', userDb.uid)), (snap) => { setOrdenes(snap.docs.map(d => d.data())); }, console.error); }
            
            const unsubConf = onSnapshot(collection(db, 'artifacts', appId, basePath, 'data', 'config'), (snap) => { 
                const configDoc = snap.docs.find(d => d.id === 'general');
                if (configDoc) { const d = configDoc.data(); setMargenGanancia(d.margenGanancia !== undefined ? d.margenGanancia : 40); setImpuestoGlobal(d.impuestoGlobal !== undefined ? d.impuestoGlobal : 15); if(d.descuentosVolumen) setDescuentosVolumen(d.descuentosVolumen); }

          const handleActualizarUsuario = async (usuAct) => { if(isConnectedToCloud) dbGuardar('usuarios', usuAct.id, usuAct); else { const newU = usuarios.map(u => u.id === usuAct.id ? usuAct : u); setUsuarios(newU); saveLocal('usuarios', newU); } showToast('Perfil actualizado'); };

          if (loadingData) return ( <div className="min-h-screen bg-slate-900 flex flex-col items-center justify-center text-white font-bold fade-in"><Database size={48} className="text-blue-500 mb-4 animate-bounce" /><p>Conectando al Sistema Seguro...</p></div> );
          
          return (

                 {toastInfo && ( <div className="fixed bottom-6 right-6 z-[9999] slide-up"><div className={`px-6 py-4 rounded-xl shadow-2xl flex items-center gap-3 text-white font-bold max-w-sm ${toastInfo.type === 'error' ? 'bg-red-600' : 'bg-slate-800 border-l-4 border-emerald-500'}`}>{toastInfo.type === 'error' ? <AlertCircle size={22}/> : <CheckCircle size={22} className="text-emerald-400" />}<p className="text-sm">{toastInfo.message}</p></div></div> )}
                 {!usuarioActual ? ( <PantallaLogin auth={auth} isConnectedToCloud={isConnectedToCloud} /> ) : usuarioActual.rol === 'ADMIN' ? (

                        ordenes={ordenes.filter(o => o.clienteId === usuarioActual.id)} onCrearOrden={handleCrearOrden} onActualizarOrden={handleActualizarOrden}
                        mensajesGlobales={mensajesGlobales} recursos={recursos} onLogout={handleLogout} isConnectedToCloud={isConnectedToCloud} showToast={showToast}
                    />
                 )}

        }

        function PantallaLogin({ auth, isConnectedToCloud }) {
          const [username, setUsername] = useState(''); const [password, setPassword] = useState(''); const [error, setError] = useState(''); const [loading, setLoading] = useState(false);
          const handleAuth = async (e) => { e.preventDefault(); setError(''); setLoading(true); try { if (isConnectedToCloud && auth) await signInWithEmailAndPassword(auth, username, password); else setError('Sistema requiere nube.'); } catch (err) { setError('Credenciales inválidas.'); } finally { setLoading(false); } };

        function PortalClienteVIP({ cliente, catalogo, categorias, tecnicas, margenGanancia, impuestoGlobal, descuentosVolumen, ordenes, onCrearOrden, onActualizarOrden, mensajesGlobales, recursos, onLogout, isConnectedToCloud, showToast }) {

        function VistaRecursosCliente({ recursos }) {
