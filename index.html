<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrintPro - Cotizador VIP (Cloud Ready)</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        .custom-scrollbar::-webkit-scrollbar { height: 6px; width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #334155; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background-color: #475569; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        .slide-up { animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        /* ESTILOS PARA IMPRESIÓN PROFESIONAL */
        @media print {
            body * { visibility: hidden; }
            .print-area, .print-area * { visibility: visible; }
            .print-area { 
                position: absolute; 
                left: 0; top: 0; 
                width: 100%; 
                padding: 0;
                background: white; 
                color: black; 
                box-shadow: none !important;
                border: none !important;
            }
            .no-print { display: none !important; }
            .print-bg-slate-50 { background-color: #f8fafc !important; -webkit-print-color-adjust: exact; }
            .print-bg-blue-50 { background-color: #eff6ff !important; -webkit-print-color-adjust: exact; }
            .print-text-emerald { color: #059669 !important; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useMemo, useEffect, useRef } from 'https://esm.sh/react@18.2.0';
        import ReactDOM from 'https://esm.sh/react-dom@18.2.0/client';
        
        import { 
          LayoutDashboard, ShoppingBag, FileText, Settings, Users, Plus, CheckCircle, 
          Clock, Printer, LogOut, AlertCircle, Share2, Package, Edit3, Trash2, Save, X, 
          Pencil, Layers, Image as ImageIcon, Upload, MessageSquare, Eye, TrendingUp, Activity, Info, Cloud, Database, Lock, Megaphone, Bell, Calculator, BookOpen, Search, ChevronLeft, ChevronRight, ChevronDown, ChevronUp
        } from 'https://esm.sh/lucide-react@0.292.0';
        
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut, setPersistence, browserSessionPersistence } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
        import { getFirestore, collection, doc, setDoc, onSnapshot, query, deleteDoc, where } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

        const FIREBASE_PROD_CONFIG = {
          apiKey: "AIzaSyA_Xhl948W9g8vpxLdWzCFacnya8AURoXc",
          authDomain: "cotizador-pro-9ec69.firebaseapp.com",
          projectId: "cotizador-pro-9ec69",
          storageBucket: "cotizador-pro-9ec69.firebasestorage.app",
          messagingSenderId: "690349119743",
          appId: "1:690349119743:web:41530227ef8053e076d4ca",
          measurementId: "G-WGB6N9F8TC"
        };
        
        const envFirebaseConfig = typeof __firebase_config !== 'undefined' && __firebase_config ? JSON.parse(__firebase_config) : null;
        const activeConfig = FIREBASE_PROD_CONFIG || envFirebaseConfig;
        
        let app, auth, db;
        let appId = FIREBASE_PROD_CONFIG ? 'printpro-produccion' : (typeof __app_id !== 'undefined' ? __app_id : 'default-app-id');

        if (activeConfig) {
            try {
                app = initializeApp(activeConfig);
                auth = getAuth(app);
                db = getFirestore(app);
            } catch (error) { console.error("Error inicializando Firebase:", error); }
        }

        const loadLocal = (key, fallback) => { try { const item = window.localStorage.getItem(key); return item ? JSON.parse(item) : fallback; } catch (e) { return fallback; } };
        const saveLocal = (key, value) => { try { window.localStorage.setItem(key, JSON.stringify(value)); } catch(e) { console.error("Error saving local", e); } };

        const loadSession = (key, fallback) => { try { const item = window.sessionStorage.getItem(key); return item ? JSON.parse(item) : fallback; } catch (e) { return fallback; } };
        const saveSession = (key, value) => { try { window.sessionStorage.setItem(key, JSON.stringify(value)); } catch(e) { console.error("Error saving session", e); } };

        const USUARIOS_BASE = [
          { id: 'ADMIN_1', rol: 'ADMIN', username: 'admin', password: '123456', nombre: 'Administrador Principal' },
        ];
        
        const CATEGORIAS_BASE = [];

        const CATALOGO_BASE = [{ id: 'p1', nombre: 'Camiseta Algodón Premium', detalles: '100% algodón, pre-encogido, peso completo 200g.', categoriaId: '', tipo: 'Textil', costoBase: 80, imagenUrl: '', tecnicasRecomendadas: ['T_SERIGRAFIA'], ubicacionesAceptadas: [], cobraImpuesto: true }];
        const TECNICAS_BASE = [{ id: 'T_SERIGRAFIA', nombre: 'Serigrafía', cobraImpuesto: true, minimo: 12, subcategorias: [{ id: 'SUB_PECHO', nombre: 'Pecho', opciones: [ { id: 'OP_1C', nombre: '1 Color', costosFijos: [{ id: 'cf1', nombre: 'Revelado', valor: 250 }], costosVariables: [{ id: 'cv1', nombre: 'Impresión', valor: 15 }] } ] }] }];
        const DESCUENTOS_VOL_BASE = [{ id: 'd1', min: 500, pct: 15, activo: true }, { id: 'd2', min: 100, pct: 8, activo: true }, { id: 'd3', min: 50, pct: 4, activo: true }];
        
        const ESTADOS_DISPONIBLES = ['Cotización enviada', 'Pendiente', 'Aprobado / En producción', 'Control de calidad', 'Listo para envío', 'Entrega parcial', 'Finalizado / Entregado', 'Cancelada'];
        
        const MENSAJES_BASE = { 
            bienvenida: '¡Bienvenido a tu portal VIP de cotizaciones!', 
            promo: 'Aviso importante: Aprovecha nuestras tarifas preferenciales automatizadas o mantente al tanto de nuestros nuevos productos aquí.', 
            whatsappTemplate: '¡Hola! Te comparto los detalles, orden #{ID} por un total de L {TOTAL}. Quedamos a disposición.',
            whatsappNumero: '' 
        };

        function App() {
          const [userDb, setUserDb] = useState(null); 
          const [usuarios, setUsuarios] = useState(() => loadLocal('usuarios', USUARIOS_BASE));
          const [usuarioActual, setUsuarioActual] = useState(() => loadSession('sesionActiva', null)); 
          const [ordenes, setOrdenes] = useState(() => loadLocal('ordenes', []));
          const [categorias, setCategorias] = useState(() => loadLocal('categorias', CATEGORIAS_BASE));
          const [catalogo, setCatalogo] = useState(() => loadLocal('catalogo', CATALOGO_BASE));
          const [tecnicas, setTecnicas] = useState(() => loadLocal('tecnicas', TECNICAS_BASE)); 
          const [recursos, setRecursos] = useState(() => loadLocal('recursos', []));
          const [mensajesGlobales, setMensajesGlobales] = useState(() => loadLocal('mensajes', MENSAJES_BASE)); 
          const [margenGanancia, setMargenGanancia] = useState(() => loadLocal('margenGanancia', 40)); 
          const [impuestoGlobal, setImpuestoGlobal] = useState(() => loadLocal('impuestoGlobal', 15)); 
          const [descuentosVolumen, setDescuentosVolumen] = useState(() => loadLocal('descuentosVol', DESCUENTOS_VOL_BASE));
          
          const [loadingData, setLoadingData] = useState(true);
          const [isConnectedToCloud, setIsConnectedToCloud] = useState(!!app && !!auth);
          const [toastInfo, setToastInfo] = useState(null);

          const showToast = (message, type = 'success') => {
              setToastInfo({ message, type });
              setTimeout(() => setToastInfo(null), 3500);
          };

          useEffect(() => {
              if (usuarioActual) saveSession('sesionActiva', usuarioActual);
              else window.sessionStorage.removeItem('sesionActiva');
          }, [usuarioActual]);

          useEffect(() => {
            if (!auth) { 
                setLoadingData(false); 
                setIsConnectedToCloud(false); 
                return; 
            } 
            const initAuth = async () => {
              try { await setPersistence(auth, browserSessionPersistence); } catch (e) { console.error("⛔ Error Auth", e); } finally { setLoadingData(false); }
            };
            initAuth();
            
            const unsub = onAuthStateChanged(auth, (user) => { 
                setUserDb(user); 
                if(!user) { setUsuarioActual(null); }
            });
            return () => unsub();
          }, []);

          useEffect(() => {
            if (!db || !userDb) { return; }
            const basePath = 'public'; 
            setLoadingData(true);
            const isAdmin = userDb.email === 'admin@printpro.com';
            
            const unsubCatList = onSnapshot(collection(db, 'artifacts', appId, basePath, 'data', 'categorias'), (snap) => { 
                setCategorias(snap.docs.map(d => d.data())); 
            }, console.error);
            const unsubCat = onSnapshot(collection(db, 'artifacts', appId, basePath, 'data', 'catalogo'), (snap) => { if (!snap.empty) setCatalogo(snap.docs.map(d => d.data())); else dbGuardarLista('catalogo', catalogo); }, console.error);
            const unsubTec = onSnapshot(collection(db, 'artifacts', appId, basePath, 'data', 'tecnicas'), (snap) => { if (!snap.empty) setTecnicas(snap.docs.map(d => d.data())); else dbGuardarLista('tecnicas', tecnicas); }, console.error);
            const unsubRec = onSnapshot(collection(db, 'artifacts', appId, basePath, 'data', 'recursos'), (snap) => { setRecursos(snap.docs.map(d => d.data())); }, console.error);
            
            let unsubUsu;
            if (isAdmin) {
                unsubUsu = onSnapshot(collection(db, 'artifacts', appId, basePath, 'data', 'usuarios'), (snap) => { 
                    const allUsers = snap.docs.map(d => d.data());
                    if (!snap.empty) setUsuarios(allUsers); 
                    setUsuarioActual(allUsers.find(u => u.id === userDb.uid) || { id: userDb.uid, rol: 'ADMIN', nombre: 'Administrador Principal', username: userDb.email });
                }, console.error);
            } else {
                unsubUsu = onSnapshot(doc(db, 'artifacts', appId, basePath, 'data', 'usuarios', userDb.uid), (docSnap) => {
                    if (docSnap.exists()) setUsuarioActual(docSnap.data());
                    else setUsuarioActual({ id: userDb.uid, rol: 'CLIENTE', nombre: userDb.email, descuentoGlobal: 0 });
                }, console.error);
            }
            
            let unsubOrd;
            if (isAdmin) {
                unsubOrd = onSnapshot(collection(db, 'artifacts', appId, basePath, 'data', 'ordenes'), (snap) => { setOrdenes(snap.docs.map(d => d.data())); }, console.error);
            } else {
                unsubOrd = onSnapshot(query(collection(db, 'artifacts', appId, basePath, 'data', 'ordenes'), where('clienteId', '==', userDb.uid)), (snap) => { setOrdenes(snap.docs.map(d => d.data())); }, console.error);
            }
            
            const unsubConf = onSnapshot(collection(db, 'artifacts', appId, basePath, 'data', 'config'), (snap) => { 
                const configDoc = snap.docs.find(d => d.id === 'general');
                if (configDoc) { 
                    const d = configDoc.data();
                    setMargenGanancia(d.margenGanancia !== undefined ? d.margenGanancia : 40); 
                    setImpuestoGlobal(d.impuestoGlobal !== undefined ? d.impuestoGlobal : 15); 
                    if(d.descuentosVolumen) setDescuentosVolumen(d.descuentosVolumen);
                }
                const msgDoc = snap.docs.find(d => d.id === 'mensajes');
                if (msgDoc) setMensajesGlobales(msgDoc.data());
            }, console.error);

            setLoadingData(false);
            return () => { unsubCatList(); unsubCat(); unsubTec(); unsubRec(); if(unsubUsu) unsubUsu(); if(unsubOrd) unsubOrd(); unsubConf(); };
          }, [userDb]);

          const dbGuardar = async (coleccion, id, data) => { 
            if (db && isConnectedToCloud) {
                try {
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', coleccion, id), data); 
                } catch (error) {
                    console.error(`Error guardando en BD (${coleccion}):`, error);
                    showToast(`Error al guardar datos. Verifica tus permisos.`, 'error');
                }
            }
          };

          const dbEliminar = async (coleccion, id) => { 
            if (db && isConnectedToCloud) {
                try {
                    await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', coleccion, id)); 
                } catch (error) {
                    console.error(`Error eliminando en BD (${coleccion}):`, error);
                    showToast(`Error al eliminar registro de la BD.`, 'error');
                }
            }
          };

          const dbGuardarLista = async (coleccion, lista) => { 
            if(db && isConnectedToCloud) {
                try {
                    await Promise.all(lista.map(item => dbGuardar(coleccion, item.id, item)));
                } catch (error) {
                    console.error(`Error guardando lista en BD (${coleccion}):`, error);
                }
            } 
          };

          const adminSetCategorias = (nuevasCategorias) => {
               if(isConnectedToCloud) {
                   const idsActuales = nuevasCategorias.map(c => c.id);
                   categorias.forEach(c => { if(!idsActuales.includes(c.id)) dbEliminar('categorias', c.id); });
                   nuevasCategorias.forEach(c => dbGuardar('categorias', c.id, c));
               } else {
                   setCategorias(nuevasCategorias); saveLocal('categorias', nuevasCategorias);
               }
               showToast('Categorías actualizadas');
          };

          const handleActualizarUsuario = async (usuAct) => {
            if (usuAct.modoTest) {
                if (isConnectedToCloud) {
                    const previousTestUsers = usuarios.filter(u => u.modoTest && u.id !== usuAct.id);
                    await dbGuardar('usuarios', usuAct.id, usuAct);
                    for (const u of previousTestUsers) {
                        await dbGuardar('usuarios', u.id, { ...u, modoTest: false });
                    }
                } else {
                    const newU = usuarios.map(u => {
                        if (u.id === usuAct.id) return usuAct;
                        return u.modoTest ? { ...u, modoTest: false } : u;
                    });
                    setUsuarios(newU);
                    saveLocal('usuarios', newU);
                }
            } else {
                if(isConnectedToCloud) dbGuardar('usuarios', usuAct.id, usuAct); 
                else { const newU = usuarios.map(u => u.id === usuAct.id ? usuAct : u); setUsuarios(newU); saveLocal('usuarios', newU); }
            }
            showToast('Perfil actualizado correctamente');
          };

          const handleEliminarUsuario = (id) => {
            if(isConnectedToCloud) dbEliminar('usuarios', id); else { const newU = usuarios.filter(u => u.id !== id); setUsuarios(newU); saveLocal('usuarios', newU); }
            showToast('Perfil de cliente removido', 'error');
          };
          const handleCrearOrden = (nuevaOrden) => {
            if(isConnectedToCloud) dbGuardar('ordenes', nuevaOrden.id, nuevaOrden); else { const newOrders = [nuevaOrden, ...ordenes]; setOrdenes(newOrders); saveLocal('ordenes', newOrders); }
            showToast('Cotización generada con éxito');
          };
          const handleActualizarOrden = (ordenAct) => {
            if(isConnectedToCloud) dbGuardar('ordenes', ordenAct.id, ordenAct); else { const newOrders = ordenes.map(o => o.id === ordenAct.id ? ordenAct : o); setOrdenes(newOrders); saveLocal('ordenes', newOrders); }
            showToast('Orden actualizada');
          }
          const handleEliminarOrden = (id) => {
             if(isConnectedToCloud) dbEliminar('ordenes', id); else { const newOrders = ordenes.filter(o => o.id !== id); setOrdenes(newOrders); saveLocal('ordenes', newOrders); }
             showToast('Orden eliminada permanentemente', 'error');
          }
          const adminSetRecursos = async (nuevoRecurso) => {
            try {
                if(isConnectedToCloud) {
                    await dbGuardar('recursos', nuevoRecurso.id, nuevoRecurso);
                } else { 
                    const newR = [nuevoRecurso, ...recursos]; setRecursos(newR); saveLocal('recursos', newR); 
                }
                showToast('Recurso publicado correctamente');
            } catch (error) {
                console.error("Error subiendo recurso:", error);
                showToast('Error al publicar. Verifica las reglas o el tamaño del archivo.', 'error');
            }
          };
          const adminEliminarRecurso = (id) => {
            if(isConnectedToCloud) dbEliminar('recursos', id); else { const newR = recursos.filter(r => r.id !== id); setRecursos(newR); saveLocal('recursos', newR); }
            showToast('Recurso eliminado del portal', 'error');
          };
          const adminSetCatalogo = (nuevoCatalogo) => {
            if(isConnectedToCloud) { const idsActuales = nuevoCatalogo.map(c => c.id); catalogo.forEach(c => { if(!idsActuales.includes(c.id)) dbEliminar('catalogo', c.id); }); nuevoCatalogo.forEach(c => dbGuardar('catalogo', c.id, c)); } 
            else { setCatalogo(nuevoCatalogo); saveLocal('catalogo', nuevoCatalogo); }
            showToast('Catálogo actualizado');
          };
          const adminSetTecnicas = (nuevasTecnicas) => {
            if(isConnectedToCloud) { const idsActuales = nuevasTecnicas.map(c => c.id); tecnicas.forEach(t => { if(!idsActuales.includes(t.id)) dbEliminar('tecnicas', t.id); }); nuevasTecnicas.forEach(t => dbGuardar('tecnicas', t.id, t)); } 
            else { setTecnicas(nuevasTecnicas); saveLocal('tecnicas', nuevasTecnicas); }
            showToast('Configuración de técnicas guardada');
          };
          const adminSetConfiguracionGlobal = (nuevoMargen, nuevoImpuesto, nuevosDescuentos) => {
            if(isConnectedToCloud) dbGuardar('config', 'general', { margenGanancia: nuevoMargen, impuestoGlobal: nuevoImpuesto, descuentosVolumen: nuevosDescuentos });
            else { 
                setMargenGanancia(nuevoMargen); saveLocal('margenGanancia', nuevoMargen); 
                setImpuestoGlobal(nuevoImpuesto); saveLocal('impuestoGlobal', nuevoImpuesto); 
                setDescuentosVolumen(nuevosDescuentos); saveLocal('descuentosVol', nuevosDescuentos); 
            }
            showToast('Tarifas globales guardadas exitosamente');
          }
          const adminSetMensajes = (nuevosMensajes) => {
              if(isConnectedToCloud) dbGuardar('config', 'mensajes', nuevosMensajes); else { setMensajesGlobales(nuevosMensajes); saveLocal('mensajes', nuevosMensajes); }
              showToast('Mensajes guardados');
          }
          const handleLogout = async () => {
              setUsuarioActual(null);
              if (auth && auth.currentUser) try { await signOut(auth); } catch(e) { console.error("Error al salir", e); }
          };

          if (loadingData) return ( <div className="min-h-screen bg-slate-900 flex flex-col items-center justify-center text-white font-bold fade-in"><Database size={48} className="text-blue-500 mb-4 animate-bounce" /><p>Conectando al Sistema Seguro...</p></div> );
          
          return (
             <>
                 {toastInfo && (
                    <div className="fixed bottom-6 right-6 z-[9999] slide-up">
                        <div className={`px-6 py-4 rounded-xl shadow-2xl flex items-center gap-3 text-white font-bold max-w-sm ${toastInfo.type === 'error' ? 'bg-red-600' : 'bg-slate-800 border-l-4 border-emerald-500'}`}>
                            {toastInfo.type === 'error' ? <AlertCircle size={22}/> : <CheckCircle size={22} className="text-emerald-400" />}
                            <p className="text-sm">{toastInfo.message}</p>
                        </div>
                    </div>
                 )}

                 {!usuarioActual ? (
                    <PantallaLogin auth={auth} isConnectedToCloud={isConnectedToCloud} />
                 ) : usuarioActual.rol === 'ADMIN' ? (
                    <PanelAdmin 
                        ordenes={ordenes} 
                        categorias={categorias} setCategorias={adminSetCategorias}
                        catalogo={catalogo} setCatalogo={adminSetCatalogo} tecnicas={tecnicas} setTecnicas={adminSetTecnicas}
                        margenGanancia={margenGanancia} impuestoGlobal={impuestoGlobal} descuentosVolumen={descuentosVolumen} setConfigGlobal={adminSetConfiguracionGlobal}
                        mensajesGlobales={mensajesGlobales} adminSetMensajes={adminSetMensajes}
                        usuarios={usuarios} onActualizarUsuario={handleActualizarUsuario} onEliminarUsuario={handleEliminarUsuario}
                        recursos={recursos} onActualizarRecurso={adminSetRecursos} onEliminarRecurso={adminEliminarRecurso}
                        onActualizarOrden={handleActualizarOrden} onEliminarOrden={handleEliminarOrden} onLogout={handleLogout} isConnectedToCloud={isConnectedToCloud} showToast={showToast}
                    />
                 ) : (
                    <PortalClienteVIP 
                        cliente={usuarioActual} catalogo={catalogo} categorias={categorias} tecnicas={tecnicas} margenGanancia={margenGanancia} impuestoGlobal={impuestoGlobal} descuentosVolumen={descuentosVolumen}
                        ordenes={ordenes.filter(o => o.clienteId === usuarioActual.id)} onCrearOrden={handleCrearOrden} onActualizarOrden={handleActualizarOrden}
                        mensajesGlobales={mensajesGlobales} recursos={recursos} onLogout={handleLogout} isConnectedToCloud={isConnectedToCloud} showToast={showToast}
                    />
                 )}
             </>
          );
        }

        function ConnectionIndicator({ isConnectedToCloud, darkTheme = false }) {
            return (
                <div className={`p-3 rounded-xl flex items-center gap-3 text-xs font-bold transition-all shadow-sm
                    ${isConnectedToCloud ? (darkTheme ? 'bg-emerald-500/10 text-emerald-400 border border-emerald-500/30' : 'bg-emerald-50 text-emerald-700 border border-emerald-200') : (darkTheme ? 'bg-amber-500/10 text-amber-400 border border-amber-500/30' : 'bg-amber-50 text-amber-700 border border-amber-200')}
                `}>
                    <div className="relative flex h-3 w-3 shrink-0">{isConnectedToCloud && <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>}<span className={`relative inline-flex rounded-full h-3 w-3 ${isConnectedToCloud ? 'bg-emerald-500' : 'bg-amber-500'}`}></span></div>
                    <div><p className="uppercase tracking-wider opacity-80 text-[10px]">Estado del Sistema</p><p>{isConnectedToCloud ? 'Sincronización (Nube)' : 'Local (Sin Nube)'}</p></div>
                </div>
            );
        }

        function PantallaLogin({ auth, isConnectedToCloud }) {
          const [username, setUsername] = useState('');
          const [password, setPassword] = useState('');
          const [error, setError] = useState('');
          const [loading, setLoading] = useState(false);

          const handleAuth = async (e) => {
            e.preventDefault();
            setError('');
            setLoading(true);
            try {
              if (isConnectedToCloud && auth) await signInWithEmailAndPassword(auth, username, password);
              else setError('El sistema requiere conexión a la nube activa.');
            } catch (err) { setError('Correo o contraseña incorrectos. Verifica tus credenciales.'); } finally { setLoading(false); }
          };

          return (
            <div className="min-h-screen bg-slate-900 flex items-center justify-center p-4">
              <div className="bg-white rounded-3xl shadow-2xl overflow-hidden w-full max-w-4xl flex fade-in">
                <div className="w-1/2 bg-blue-600 p-12 text-white flex-col justify-center hidden md:flex relative">
                  <Printer size={64} className="mb-6 z-10" />
                  <h1 className="text-4xl font-bold mb-1 z-10">PrintPro</h1>
                  <p className="text-xs font-bold text-blue-200 uppercase tracking-widest mb-6 z-10">Powered By IMPAK Print Lab</p>
                  <p className="text-blue-100 text-lg z-10 mb-8">Cotizador VIP de Servicios de Personalización, Estampado e Impresión Profesional, Todo-en-uno.</p>
                </div>
                <div className="w-full md:w-1/2 p-12 flex flex-col justify-center">
                  <h2 className="text-2xl font-bold text-slate-800 mb-2">Acceso Seguro</h2>
                  <p className="text-sm text-slate-500 mb-6">Ingresa con el correo proporcionado por tu ejecutivo.</p>
                  {error && <div className={`mb-4 p-3 rounded-xl text-sm font-semibold bg-red-100 text-red-700`}>{error}</div>}
                  <form onSubmit={handleAuth} className="space-y-4">
                    <input required type="email" placeholder="Correo Electrónico" value={username} onChange={e=>setUsername(e.target.value)} className="w-full p-3 rounded-xl border border-slate-200 outline-none focus:border-blue-500" />
                    <input required type="password" placeholder="Contraseña" value={password} onChange={e=>setPassword(e.target.value)} className="w-full p-3 rounded-xl border border-slate-200 outline-none focus:border-blue-500" />
                    <button type="submit" disabled={loading} className="w-full bg-slate-900 text-white font-bold p-4 rounded-xl hover:bg-slate-800 mt-4 transition-colors disabled:opacity-70">{loading ? 'Verificando...' : 'Ingresar'}</button>
                  </form>
                  <p className="text-slate-500 w-full mt-6 text-sm tracking-wide text-center">Acceso exclusivo por invitación. ¿No tienes cuenta? Contacta a tu proveedor de servicios.</p>
                </div>
              </div>
            </div>
          );
        }

        function PortalClienteVIP({ cliente, catalogo, categorias, tecnicas, margenGanancia, impuestoGlobal, descuentosVolumen, ordenes, onCrearOrden, onActualizarOrden, mensajesGlobales, recursos, onLogout, isConnectedToCloud, showToast }) {
          const [vista, setVista] = useState('NUEVA_COTIZACION'); 
          
          return (
            <div className="min-h-screen bg-slate-50 flex flex-col md:flex-row fade-in">
              <aside className="w-full md:w-72 bg-white border-r border-slate-200 flex flex-col shadow-sm z-10 no-print md:h-screen md:sticky md:top-0">
                <div className="p-6 overflow-y-auto flex-1 custom-scrollbar">
                    <div className="flex items-center gap-3 text-blue-600 mb-8"><Printer size={32} /><span className="text-xl font-bold">PrintPro</span></div>
                    <div className="mb-8 p-4 bg-blue-50 rounded-2xl border border-blue-100">
                    <p className="font-bold text-slate-800 truncate">{cliente.nombre}</p>
                    {cliente.descuentoGlobal > 0 && <span className="mt-2 text-xs font-semibold text-emerald-600 bg-emerald-100 px-2 py-1 rounded-md inline-block">{cliente.descuentoGlobal}% OFF VIP</span>}
                    </div>
                    <nav className="space-y-2">
                    <MenuBtn icon={Plus} label="Nueva Cotización" active={vista === 'NUEVA_COTIZACION'} onClick={() => setVista('NUEVA_COTIZACION')} />
                    <MenuBtn icon={FileText} label="Mis Órdenes" active={vista === 'HISTORIAL'} onClick={() => setVista('HISTORIAL')} />
                    <MenuBtn icon={BookOpen} label="Archivos & Guías" active={vista === 'RECURSOS'} onClick={() => setVista('RECURSOS')} />
                    </nav>
                </div>
                <div className="p-6 bg-slate-50 border-t border-slate-200 mt-auto">
                    <ConnectionIndicator isConnectedToCloud={isConnectedToCloud} darkTheme={false} />
                    <button onClick={onLogout} className="w-full flex items-center justify-center gap-2 text-slate-600 hover:text-red-600 hover:bg-red-50 mt-4 p-3 rounded-xl font-bold transition-colors border border-transparent hover:border-red-200"><LogOut size={18} /> Cerrar Sesión</button>
                </div>
              </aside>
              
              <main className="flex-1 p-8 overflow-y-auto bg-slate-50">
                {(mensajesGlobales.bienvenida || mensajesGlobales.promo) && (
                    <div className="max-w-5xl mx-auto mb-6 bg-white border border-slate-200 p-4 rounded-xl shadow-sm flex items-start gap-4 fade-in hover:shadow-md transition-shadow">
                        <div className="bg-blue-50 p-2.5 rounded-lg shrink-0">
                            <Megaphone size={20} className="text-blue-600" />
                        </div>
                        <div className="flex-1 pt-0.5">
                            {mensajesGlobales.bienvenida && <h2 className="font-bold text-slate-800 text-sm mb-1 tracking-tight">{mensajesGlobales.bienvenida}</h2>}
                            {mensajesGlobales.promo && <p className="text-slate-500 text-xs leading-relaxed max-w-4xl whitespace-pre-wrap">{mensajesGlobales.promo}</p>}
                        </div>
                    </div>
                )}
                
                {vista === 'NUEVA_COTIZACION' && <CotizadorWizard cliente={cliente} catalogo={catalogo} categorias={categorias} tecnicas={tecnicas} margenGanancia={margenGanancia} impuestoGlobal={impuestoGlobal} descuentosVolumen={descuentosVolumen} onGuardar={(o) => { onCrearOrden(o); setVista('HISTORIAL'); }} />}
                {vista === 'HISTORIAL' && <HistorialOrdenes ordenes={ordenes} onActualizarOrden={onActualizarOrden} isClient={true} cliente={cliente} mensajesGlobales={mensajesGlobales} showToast={showToast} />}
                {vista === 'RECURSOS' && <VistaRecursosCliente recursos={recursos} />}
              </main>
            </div>
          );
        }

        function VistaRecursosCliente({ recursos }) {
            return (
                <div className="max-w-5xl mx-auto space-y-4 fade-in">
                    <h2 className="text-2xl font-bold text-slate-800 mb-6">Archivos y Documentación</h2>
                    {recursos.length === 0 && <p className="text-slate-500">No hay documentos disponibles en este momento.</p>}
                    <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6">
                        {recursos.map(r => (
                            <div key={r.id} className="bg-white p-5 rounded-2xl shadow-sm border border-slate-200 hover:shadow-md transition-all">
                                <div className="flex items-start gap-3 mb-4">
                                    <div className="bg-blue-50 p-3 rounded-xl text-blue-600"><BookOpen size={24}/></div>
                                    <div>
                                        <h3 className="font-bold text-slate-700 leading-tight">{r.titulo}</h3>
                                        {r.descripcion && <p className="text-xs text-slate-500 mt-1 line-clamp-2">{r.descripcion}</p>}
                                    </div>
                                </div>
                                <a href={r.archivoBase64} download={r.titulo} className="w-full block text-center bg-slate-50 text-blue-600 font-bold py-2.5 rounded-xl border border-slate-200 hover:bg-blue-50 transition-colors text-sm">Descargar / Ver</a>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        function CotizadorWizard({ cliente, catalogo, categorias, tecnicas, margenGanancia, impuestoGlobal, descuentosVolumen, onGuardar }) {
          const [paso, setPaso] = useState(1);
          const [proveeCliente, setProveeCliente] = useState(false); 
          const [itemSelect, setItemSelect] = useState(null);
          const [aplicaciones, setAplicaciones] = useState([]);
          const [cantidad, setCantidad] = useState(50);
          const [comentario, setComentario] = useState(''); 
          const [errorValidacion, setErrorValidacion] = useState('');

          const [busqueda, setBusqueda] = useState('');
          const [categoriaFiltro, setCategoriaFiltro] = useState('');
          const [itemsPorPagina, setItemsPorPagina] = useState(10);
          const [paginaActual, setPaginaActual] = useState(1);

          useEffect(() => { setPaginaActual(1); }, [busqueda, categoriaFiltro, itemsPorPagina]);

          const catalogoFiltrado = useMemo(() => {
              return catalogo.filter(p => {
                  const matchSearch = p.nombre.toLowerCase().includes(busqueda.toLowerCase()) || (p.detalles && p.detalles.toLowerCase().includes(busqueda.toLowerCase()));
                  const matchCat = categoriaFiltro === '' || p.categoriaId === categoriaFiltro;
                  return matchSearch && matchCat;
              });
          }, [catalogo, busqueda, categoriaFiltro]);

          const totalPaginas = Math.ceil(catalogoFiltrado.length / itemsPorPagina) || 1;
          const catalogoPaginado = useMemo(() => {
              return catalogoFiltrado.slice((paginaActual - 1) * itemsPorPagina, paginaActual * itemsPorPagina);
          }, [catalogoFiltrado, paginaActual, itemsPorPagina]);

          const productoSeleccionado = catalogo.find(c => c.id === itemSelect);
          const tecnicasPermitidas = useMemo(() => {
              if (!productoSeleccionado) return [];
              if (Array.isArray(productoSeleccionado.tecnicasRecomendadas) && productoSeleccionado.tecnicasRecomendadas.length > 0) return tecnicas.filter(t => productoSeleccionado.tecnicasRecomendadas.includes(t.id));
              return tecnicas;
          }, [productoSeleccionado, tecnicas]);

          useEffect(() => { const permitidosIds = tecnicasPermitidas.map(t => t.id); setAplicaciones(prev => prev.filter(app => !app.tecnicaId || permitidosIds.includes(app.tecnicaId))); }, [tecnicasPermitidas]);

          const agregarAplicacion = () => setAplicaciones([...aplicaciones, { id: Date.now(), tecnicaId: '', subcatId: '', opcionId: '' }]);
          const actualizarAplicacion = (id, campo, valor) => { setAplicaciones(aplicaciones.map(app => { if (app.id === id) { const updated = { ...app, [campo]: valor }; if (campo === 'tecnicaId') { updated.subcatId = ''; updated.opcionId = ''; } if (campo === 'subcatId') { updated.opcionId = ''; } return updated; } return app; })); };
          const eliminarAplicacion = (id) => setAplicaciones(aplicaciones.filter(a => a.id !== id));

          const cotizacion = useMemo(() => {
            if (!productoSeleccionado) return null;
            let minRequerido = 1;
            
            aplicaciones.forEach(app => {
              if(!app.tecnicaId || !app.subcatId || !app.opcionId) return;
              const tec = tecnicas.find(t => t.id === app.tecnicaId); if(!tec) return;
              if (tec.minimo > minRequerido) minRequerido = tec.minimo;
            });

            const cantNum = Number(cantidad) || 0;
            const cantEfectiva = (cliente.modoTest || cantNum >= minRequerido) ? cantNum : minRequerido;

            const costoBaseProd = proveeCliente ? 0 : productoSeleccionado.costoBase;
            let subtotalProducto = (costoBaseProd * cantEfectiva) * (1 + (margenGanancia / 100));
            const aplicaImpProd = productoSeleccionado.cobraImpuesto !== false;
            let impuestoProducto = 0; // se calcula después de los descuentos
            
            let subtotalTecnicas = 0; 
            let impuestoTecnicas = 0;
            let subtotalTecnicasSinDesc = 0;

            // Descuentos Globales
            let descuentoVolGlobal = 0; 
            let tierActivoGlobal = null;
            if (descuentosVolumen) {
                const tiers = [...descuentosVolumen].sort((a,b) => b.min - a.min);
                for (let t of tiers) { 
                    if (t.activo !== false && cantEfectiva >= t.min) { 
                        tierActivoGlobal = t; 
                        descuentoVolGlobal = t.pct / 100;
                        break; 
                    } 
                }
            }

            let tiersUnicosActivos = [];

            aplicaciones.forEach(app => {
              if(!app.tecnicaId || !app.subcatId || !app.opcionId) return;
              const tec = tecnicas.find(t => t.id === app.tecnicaId); if(!tec) return;
              const subcat = tec.subcategorias.find(s => s.id === app.subcatId); 
              const opcion = subcat?.opciones.find(o => o.id === app.opcionId); if(!opcion) return;

              // REVISAMOS SI LA UBICACIÓN TIENE TARIFAS ÚNICAS
              const tieneUnicas = subcat.tarifasUnicas && subcat.tarifasUnicas.activo;
              const margenApp = tieneUnicas ? Number(subcat.tarifasUnicas.margen) : margenGanancia;

              const fijoApp = opcion.costosFijos.reduce((sum, c) => sum + Number(c.valor), 0);
              const varApp = opcion.costosVariables.reduce((sum, c) => sum + Number(c.valor), 0);
              
              const subtotalVentaApp = (fijoApp + (varApp * cantEfectiva)) * (1 + (margenApp / 100));
              subtotalTecnicasSinDesc += subtotalVentaApp;

              let descuentoVolApp = descuentoVolGlobal;
              
              if (tieneUnicas && subcat.tarifasUnicas.descuentosVolumen) {
                  descuentoVolApp = 0; // Reiniciar para buscar descuento específico
                  const tiers = [...subcat.tarifasUnicas.descuentosVolumen].sort((a,b) => b.min - a.min);
                  for (let t of tiers) { 
                      if (t.activo !== false && cantEfectiva >= t.min) { 
                          descuentoVolApp = t.pct / 100; 
                          if (!tiersUnicosActivos.find(x => x.nombre === subcat.nombre)) {
                              tiersUnicosActivos.push({ nombre: subcat.nombre, tier: t });
                          }
                          break; 
                      } 
                  }
              }

              const subtotalVentaAppDesc = subtotalVentaApp * (1 - descuentoVolApp);
              subtotalTecnicas += subtotalVentaAppDesc;

              if (tec.cobraImpuesto !== false) {
                  impuestoTecnicas += subtotalVentaAppDesc * (impuestoGlobal / 100);
              }
            });

            const subtotalProductoDesc = subtotalProducto * (1 - descuentoVolGlobal);
            if (aplicaImpProd) {
                impuestoProducto = subtotalProductoDesc * (impuestoGlobal / 100);
            }

            let subtotalBruto = subtotalProducto + subtotalTecnicasSinDesc;
            let subtotalConDescuento = subtotalProductoDesc + subtotalTecnicas;
            
            // Mult para Descuento VIP en cascada
            let vipMult = (1 - (cliente.descuentoGlobal / 100));
            subtotalConDescuento = subtotalConDescuento * vipMult;
            
            let impuestoTotalFinal = (impuestoProducto + impuestoTecnicas) * vipMult;
            let totalFinal = subtotalConDescuento + impuestoTotalFinal;

            return { 
                subtotalBruto, subtotalDescuento: subtotalConDescuento, impuestos: impuestoTotalFinal, 
                total: totalFinal, unitario: cantEfectiva > 0 ? totalFinal / cantEfectiva : 0, 
                minRequerido, tierActivo: tierActivoGlobal, tiersUnicos: tiersUnicosActivos,
                valido: aplicaciones.every(a => a.tecnicaId && a.subcatId && a.opcionId) || aplicaciones.length === 0, 
                cantEfectiva 
            };
          }, [productoSeleccionado, aplicaciones, cantidad, proveeCliente, margenGanancia, impuestoGlobal, cliente.descuentoGlobal, cliente.modoTest, tecnicas, descuentosVolumen]);

          useEffect(() => { 
              if (!cliente.modoTest && cotizacion && Number(cantidad) < cotizacion.minRequerido) {
                  setErrorValidacion(`Esta personalización exige un mínimo de ${cotizacion.minRequerido} pzas.`); 
              } else {
                  setErrorValidacion(''); 
              }
          }, [cantidad, cotizacion, cliente.modoTest]);

          const handleGuardar = () => {
            if(!cotizacion || !cotizacion.valido || errorValidacion) return;
            const tecnicasDetalle = aplicaciones.map(app => {
              const t = tecnicas.find(x => x.id === app.tecnicaId); const s = t?.subcategorias.find(y => y.id === app.subcatId); const o = s?.opciones.find(z => z.id === app.opcionId);
              return { tecnica: t?.nombre || 'N/A', ubicacion: s?.nombre || 'N/A', variante: o?.nombre || 'N/A' };
            });

            // Calculando ahorro total (Ahorro VIP + Ahorro Volumen)
            const ahorro = cotizacion.subtotalBruto > cotizacion.subtotalDescuento ? cotizacion.subtotalBruto - cotizacion.subtotalDescuento : 0;

            onGuardar({
              id: `ORD-${Math.floor(Math.random() * 10000)}`, clienteId: cliente.id, clienteNombre: cliente.nombre, producto: productoSeleccionado.nombre,
              proveeCliente, detalles: tecnicasDetalle.map(td => `${td.tecnica} (${td.ubicacion} - ${td.variante})`).join(' + ') || 'Sin Personalizar', tecnicasEstructuradas: tecnicasDetalle, comentario: comentario, cantidad, fecha: new Date().toLocaleDateString(),
              precioEstimado: !proveeCliente, subtotal: cotizacion.subtotalDescuento, impuestos: cotizacion.impuestos, total: cotizacion.total, ahorro: ahorro, estado: 'Cotización enviada', 
            });
          };

          return (
            <div className="w-full max-w-[1600px] mx-auto px-6 pb-12">
              <h2 className="text-3xl font-bold text-slate-800 mb-8">Nueva Cotización</h2>
              <div className="flex gap-4 mb-8">{[1, 2, 3].map(i => <div key={i} className={`flex-1 h-2 rounded-full transition-all duration-300 ${paso >= i ? 'bg-blue-600' : 'bg-slate-200'}`} />)}</div>
              
              <div className="bg-white rounded-3xl shadow-sm border border-slate-200 p-8">
                {paso === 1 && (
                  <div className="fade-in">
                    <h3 className="text-xl font-bold mb-4">1. Selección de Artículo</h3>
                    <div className="bg-blue-50 p-6 rounded-2xl mb-8 flex flex-col md:flex-row gap-4">
                      <button onClick={() => setProveeCliente(true)} className={`flex-1 p-4 rounded-xl border-2 font-bold transition-colors ${proveeCliente ? 'bg-blue-600 text-white border-blue-600' : 'bg-white text-slate-600 hover:border-blue-300'}`}>Traigo mis artículos</button>
                      <button onClick={() => setProveeCliente(false)} className={`flex-1 p-4 rounded-xl border-2 font-bold transition-colors ${!proveeCliente ? 'bg-blue-600 text-white border-blue-600' : 'bg-white text-slate-600 hover:border-blue-300'}`}>Incluir artículos del catálogo</button>
                    </div>

                    <div className="flex flex-col md:flex-row justify-between items-center mb-6 gap-4 bg-slate-50 p-4 rounded-xl border border-slate-200">
                        <div className="relative w-full md:w-auto flex-1 max-w-sm">
                            <Search className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" size={18} />
                            <input type="text" placeholder="Buscar por nombre o descripción..." value={busqueda} onChange={e=>setBusqueda(e.target.value)} className="w-full pl-10 pr-4 py-2 rounded-lg border border-slate-300 outline-none focus:border-blue-500 bg-white" />
                        </div>
                        <div className="flex flex-col sm:flex-row items-center gap-3 w-full md:w-auto">
                            <select value={categoriaFiltro} onChange={e=>setCategoriaFiltro(e.target.value)} className="w-full sm:w-auto p-2 border border-slate-300 rounded-lg outline-none bg-white text-sm font-bold text-slate-700">
                                <option value="">Todas las categorías</option>
                                {categorias.map(c => <option key={c.id} value={c.id}>{c.nombre}</option>)}
                            </select>
                            <div className="flex items-center gap-2">
                                <label className="text-sm text-slate-500 font-semibold whitespace-nowrap">Mostrar:</label>
                                <select value={itemsPorPagina} onChange={e=>setItemsPorPagina(Number(e.target.value))} className="p-2 border border-slate-300 rounded-lg outline-none bg-white text-sm font-bold text-slate-700">
                                    <option value={10}>10 artículos</option>
                                    <option value={20}>20 artículos</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4">
                      {catalogoPaginado.map(prod => {
                        const nombresTecnicas = Array.isArray(prod.tecnicasRecomendadas) && prod.tecnicasRecomendadas.length > 0 ? prod.tecnicasRecomendadas.map(id => tecnicas.find(t=>t.id===id)?.nombre).filter(Boolean).join(', ') : ''; 
                        return (
                        <button key={prod.id} onClick={() => setItemSelect(prod.id)} className={`flex flex-col items-center justify-between p-4 rounded-2xl border-2 text-center transition-all h-full ${itemSelect === prod.id ? 'border-blue-600 bg-blue-50 shadow-md transform scale-105' : 'border-slate-100 hover:border-blue-200 hover:bg-slate-50'}`}>
                          <div className="w-20 h-20 bg-slate-100 rounded-xl mb-3 flex items-center justify-center overflow-hidden border border-slate-200 relative">
                              {prod.imagenUrl ? <img src={prod.imagenUrl} alt={prod.nombre} className="w-full h-full object-cover" /> : <ImageIcon className="text-slate-400" size={32} />}
                              {prod.cobraImpuesto === false && <span className="absolute bottom-1 right-1 bg-amber-400 text-[9px] font-bold px-1 rounded shadow-sm text-amber-900">EX</span>}
                          </div>
                          <div className="flex-1 flex flex-col justify-between w-full">
                            <p className="font-bold text-slate-700 text-sm mb-1">{prod.nombre}</p>
                            {prod.detalles && <p className="text-[10px] text-slate-500 line-clamp-2 mb-2 leading-tight" title={prod.detalles}>{prod.detalles}</p>}
                            {nombresTecnicas && <span className="text-[10px] bg-emerald-100 text-emerald-700 px-2 py-1 rounded-md mt-auto line-clamp-1">Acepta: {nombresTecnicas}</span>}
                          </div>
                        </button>
                      )})}
                      {catalogoPaginado.length === 0 && <div className="col-span-full py-10 text-center text-slate-400 font-medium">No se encontraron artículos que coincidan con tu búsqueda.</div>}
                    </div>

                    {totalPaginas > 1 && (
                        <div className="flex items-center justify-center gap-4 mt-8">
                            <button disabled={paginaActual === 1} onClick={() => setPaginaActual(p => p - 1)} className="p-2 bg-slate-100 rounded-lg hover:bg-slate-200 disabled:opacity-50 transition-colors"><ChevronLeft size={20} className="text-slate-600"/></button>
                            <span className="text-sm font-bold text-slate-600">Página {paginaActual} de {totalPaginas}</span>
                            <button disabled={paginaActual === totalPaginas} onClick={() => setPaginaActual(p => p + 1)} className="p-2 bg-slate-100 rounded-lg hover:bg-slate-200 disabled:opacity-50 transition-colors"><ChevronRight size={20} className="text-slate-600"/></button>
                        </div>
                    )}

                    <div className="mt-8 flex justify-end border-t border-slate-100 pt-6"><button disabled={!itemSelect} onClick={() => setPaso(2)} className="bg-blue-600 text-white px-8 py-3 rounded-xl font-bold disabled:opacity-50 hover:bg-blue-700 transition-colors shadow-lg">Siguiente Paso</button></div>
                  </div>
                )}

                {paso === 2 && (
                  <div className="fade-in">
                    <h3 className="text-xl font-bold mb-4">2. Aplicaciones de Personalización</h3>
                    <div className="flex justify-between items-center mb-6"><p className="text-sm text-slate-500">Añade una o más técnicas para personalizar tu artículo.</p>{tecnicasPermitidas.length > 0 && <span className="bg-emerald-50 text-emerald-700 border border-emerald-200 text-xs px-3 py-1.5 rounded-lg font-semibold flex items-center gap-1">💡 Mostrando compatibles</span>}</div>
                    {tecnicasPermitidas.length === 0 && <div className="p-4 bg-amber-50 text-amber-700 border border-amber-200 rounded-xl mb-4 text-sm">Este producto no tiene técnicas compatibles configuradas en el catálogo. No se puede personalizar.</div>}
                    <div className="space-y-4 mb-6">
                      {aplicaciones.map((app, index) => {
                        const tecObj = tecnicas.find(t => t.id === app.tecnicaId); 
                        const subObj = tecObj?.subcategorias.find(s => s.id === app.subcatId);
                        
                        // Determinar las ubicaciones filtradas basado en el producto
                        const subcategoriasPermitidas = tecObj?.subcategorias.filter(s => 
                            !productoSeleccionado.ubicacionesAceptadas || 
                            productoSeleccionado.ubicacionesAceptadas.length === 0 || 
                            productoSeleccionado.ubicacionesAceptadas.includes(s.id)
                        ) || [];

                        return (
                          <div key={app.id} className="p-4 border border-slate-200 rounded-2xl bg-slate-50 relative flex flex-col md:flex-row gap-4 items-center">
                            <button onClick={() => eliminarAplicacion(app.id)} className="absolute -top-2 -right-2 bg-red-100 text-red-600 p-1.5 rounded-full hover:bg-red-200 shadow-sm transition-colors"><X size={16}/></button>
                            <div className="flex-1 w-full">
                              <label className="text-xs font-bold text-slate-500 mb-1 block">Técnica</label>
                              <select value={app.tecnicaId} onChange={e => actualizarAplicacion(app.id, 'tecnicaId', e.target.value)} className="w-full p-2.5 rounded-lg border border-slate-300 outline-none focus:border-blue-500 bg-white"><option value="">-- Seleccionar --</option>{tecnicasPermitidas.map(t => <option key={t.id} value={t.id}>{t.nombre}</option>)}</select>
                            </div>
                            <div className="flex-1 w-full">
                              <label className="text-xs font-bold text-slate-500 mb-1 block">Ubicación</label>
                              <select disabled={!tecObj} value={app.subcatId} onChange={e => actualizarAplicacion(app.id, 'subcatId', e.target.value)} className="w-full p-2.5 rounded-lg border border-slate-300 outline-none focus:border-blue-500 bg-white disabled:bg-slate-100 disabled:text-slate-400">
                                  <option value="">-- Seleccionar --</option>
                                  {subcategoriasPermitidas.map(s => <option key={s.id} value={s.id}>{s.nombre}</option>)}
                              </select>
                            </div>
                            <div className="flex-1 w-full">
                              <label className="text-xs font-bold text-slate-500 mb-1 block">Variante</label>
                              <select disabled={!subObj} value={app.opcionId} onChange={e => actualizarAplicacion(app.id, 'opcionId', e.target.value)} className="w-full p-2.5 rounded-lg border border-slate-300 outline-none focus:border-blue-500 bg-white disabled:bg-slate-100 disabled:text-slate-400"><option value="">-- Seleccionar --</option>{subObj?.opciones.map(o => <option key={o.id} value={o.id}>{o.nombre}</option>)}</select>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                    {tecnicasPermitidas.length > 0 && <button onClick={agregarAplicacion} className="w-full border-2 border-dashed border-blue-300 text-blue-600 font-bold p-4 rounded-2xl hover:bg-blue-50 flex justify-center items-center gap-2 transition-colors"><Plus size={20}/> Añadir Aplicación</button>}
                    <div className="mt-8 flex justify-between border-t border-slate-100 pt-6"><button onClick={() => setPaso(1)} className="text-slate-500 font-bold px-6 py-2 hover:bg-slate-100 rounded-xl transition-colors">Atrás</button><button disabled={aplicaciones.some(a => !a.tecnicaId || !a.subcatId || !a.opcionId)} onClick={() => setPaso(3)} className="bg-blue-600 text-white px-8 py-3 rounded-xl font-bold disabled:opacity-50 hover:bg-blue-700 transition-colors shadow-lg">Calcular Total</button></div>
                  </div>
                )}
                {paso === 3 && cotizacion && (
                  <div className="fade-in">
                    <h3 className="text-xl font-bold mb-6">3. Volumen y Total</h3>
                    <div className="flex flex-col md:flex-row gap-8">
                      <div className="flex-1 space-y-6">
                        <div>
                          <label className="block text-sm font-bold text-slate-600 mb-2">Cantidad de Unidades</label>
                          <input 
                              type="number" 
                              min={cliente.modoTest ? 1 : (cotizacion?.minRequerido || 1)} 
                              value={cantidad} 
                              onChange={(e) => setCantidad(e.target.value === '' ? '' : Number(e.target.value))} 
                              onBlur={(e) => {
                                  const val = Number(e.target.value);
                                  if (!cliente.modoTest && val < (cotizacion?.minRequerido || 1)) setCantidad(cotizacion?.minRequerido || 1);
                              }}
                              className="w-full p-4 rounded-xl border-2 border-blue-200 text-2xl font-bold focus:border-blue-600 outline-none transition-colors" 
                          />
                          {errorValidacion && (
                              <p className="text-amber-600 text-sm font-bold mt-2 flex items-center gap-1 bg-amber-50 p-2.5 rounded-lg border border-amber-200 fade-in">
                                  <AlertCircle size={16} className="shrink-0"/> {errorValidacion} (El volumen se ajustará automáticamente).
                              </p>
                          )}
                        </div>

                        {productoSeleccionado.cobraImpuesto === false && (
                            <div className="bg-amber-50 p-4 rounded-xl border border-amber-200 flex items-center gap-3 text-amber-800">
                                <Info size={20} className="shrink-0" />
                                <p className="text-sm font-bold">Has seleccionado un artículo que está marcado como Exento de ISV.</p>
                            </div>
                        )}

                        <div className="bg-slate-50 p-4 rounded-xl border border-slate-200">
                            <label className="block text-sm font-bold text-slate-600 mb-2 flex items-center gap-2"><MessageSquare size={16}/> Notas para el Taller (Opcional)</label>
                            <textarea maxLength={250} value={comentario} onChange={e=>setComentario(e.target.value)} className="w-full p-3 rounded-lg border border-slate-300 focus:border-blue-500 outline-none resize-none text-sm bg-white" rows="3" placeholder="Ej: Favor usar logo en color azul marino..."></textarea>
                            <p className="text-right text-xs text-slate-400 mt-1">{comentario.length}/250</p>
                        </div>

                        <div className="bg-emerald-50 p-4 rounded-xl border border-emerald-100">
                          <p className="text-sm text-emerald-800 font-bold">Descuentos Dinámicos Activos:</p>
                          <ul className="text-xs text-emerald-600 list-disc pl-4 mt-1 space-y-1">
                            {cliente.descuentoGlobal > 0 && <li>Cliente VIP: -{cliente.descuentoGlobal}%</li>}
                            {cotizacion.tierActivo && (
                                <li>
                                    Tarifa por Volumen (+{cotizacion.tierActivo.min}u): -{cotizacion.tierActivo.pct}%
                                    <span className="block text-[10px] text-emerald-600/80 mt-0.5">Se aplica al total base por igual.</span>
                                </li>
                            )}
                            {cotizacion.tiersUnicos && cotizacion.tiersUnicos.map((tu, i) => (
                                <li key={i}>
                                    Tarifa '{tu.nombre}' (+{tu.tier.min}u): -{tu.tier.pct}%
                                    <span className="block text-[10px] text-emerald-600/80 mt-0.5">Específico para esta ubicación.</span>
                                </li>
                            ))}
                            {cliente.descuentoGlobal === 0 && !cotizacion.tierActivo && (!cotizacion.tiersUnicos || cotizacion.tiersUnicos.length === 0) && <li className="list-none text-slate-500 italic mt-1">No hay descuentos aplicables en este volumen.</li>}
                          </ul>
                        </div>
                      </div>

                      <div className="flex-1 bg-slate-900 text-white p-6 rounded-3xl flex flex-col justify-between shadow-lg relative overflow-hidden">
                        <div>
                          <h4 className="text-lg font-bold mb-4 border-b border-slate-700 pb-2">Resumen Financiero</h4>
                          {cotizacion.cantEfectiva > Number(cantidad) && (
                              <p className="text-[10px] text-amber-400 font-bold bg-amber-500/10 px-2 py-1 rounded mb-3 border border-amber-500/20 w-fit">
                                  Proyectando base al mínimo ({cotizacion.cantEfectiva} u.)
                              </p>
                          )}
                          <div className="space-y-2 text-sm text-slate-300">
                            <div className="flex justify-between"><span>Subtotal Prod/Servicios:</span> <span>L {cotizacion.subtotalBruto.toFixed(2)}</span></div>
                            {cotizacion.subtotalDescuento !== cotizacion.subtotalBruto && <div className="flex justify-between text-emerald-400 font-medium"><span>Con Descuentos aplicados:</span> <span>L {cotizacion.subtotalDescuento.toFixed(2)}</span></div>}
                            
                            {/* AHORRO REFLEJADO */}
                            {cotizacion.subtotalBruto > cotizacion.subtotalDescuento && (
                                <div className="flex justify-between text-emerald-400 font-medium">
                                    <span>Su Ahorro:</span> 
                                    <span>- L {(cotizacion.subtotalBruto - cotizacion.subtotalDescuento).toFixed(2)}</span>
                                </div>
                            )}

                            <div className="flex justify-between">
                                <span>Impuestos:</span> 
                                <span>L {cotizacion.impuestos.toFixed(2)}</span>
                            </div>
                          </div>
                        </div>
                        <div className="border-t border-slate-700 mt-6 pt-4">
                          <div className="flex justify-between items-end"><span className="font-bold text-lg text-slate-400">Total Final:</span><div className="text-right"><span className="text-3xl font-black text-blue-400">L {cotizacion.total.toFixed(2)}</span><p className="text-xs text-slate-400 mt-1">L {cotizacion.unitario.toFixed(2)} c/u</p></div></div>
                        </div>
                        <button onClick={handleGuardar} disabled={!!errorValidacion} className="w-full bg-blue-600 text-white py-4 rounded-xl font-bold mt-6 hover:bg-blue-500 disabled:opacity-50 transition-colors shadow-lg shadow-blue-500/20">Generar Cotización</button>
                      </div>
                    </div>
                    <div className="mt-8 border-t border-slate-100 pt-6"><button onClick={() => setPaso(2)} className="text-slate-500 font-bold px-6 py-2 hover:bg-slate-100 rounded-xl transition-colors">Atrás</button></div>
                  </div>
                )}
              </div>
            </div>
          );
        }

        function HistorialOrdenes({ ordenes, onActualizarOrden, onEliminarOrden, isClient = false, cliente = null, mensajesGlobales, showToast }) {
          const [ordenSeleccionada, setOrdenSeleccionada] = useState(null);
          if (ordenes.length === 0) return <div className="text-center py-20 fade-in"><p className="text-slate-400">No hay cotizaciones registradas.</p></div>;
          
          const handleShare = (orden) => {
             let template = mensajesGlobales?.whatsappTemplate || "Hola, te envío los detalles de la orden {ID} por L {TOTAL}";
             let msj = template.replace(/{ID}/g, orden.id).replace(/{TOTAL}/g, orden.total.toFixed(2));
             let telefonoEmpresa = mensajesGlobales?.whatsappNumero ? mensajesGlobales.whatsappNumero.replace(/[^0-9]/g, '') : '';
             let waUrl = telefonoEmpresa ? `https://wa.me/${telefonoEmpresa}?text=${encodeURIComponent(msj)}` : `https://wa.me/?text=${encodeURIComponent(msj)}`;
             window.open(waUrl, '_blank');
             if(showToast) showToast('Abriendo WhatsApp...');
          };

          return (
            <div className="max-w-5xl mx-auto space-y-4 fade-in relative">
              {ordenSeleccionada && (
                  <ModalDetalleOrden 
                    orden={ordenSeleccionada} isClient={isClient} clienteInfo={cliente} onClose={() => setOrdenSeleccionada(null)}
                    onActualizarOrden={(actualizada) => { onActualizarOrden(actualizada); setOrdenSeleccionada(actualizada); }}
                    onCancelar={() => { onActualizarOrden({...ordenSeleccionada, estado: 'Cancelada'}); setOrdenSeleccionada(null); }}
                    onEliminarAdmin={() => { onEliminarOrden(ordenSeleccionada.id); setOrdenSeleccionada(null); }}
                  />
              )}
              <h2 className="text-2xl font-bold text-slate-800 mb-6">Gestión de Cotizaciones</h2>
              {ordenes.map(orden => {
                const esCancelada = orden.estado === 'Cancelada';
                return (
                <div key={orden.id} className={`bg-white rounded-2xl shadow-sm border p-6 flex justify-between items-center gap-4 hover:shadow-md transition-shadow ${esCancelada ? 'border-red-200 bg-red-50/30 opacity-75' : 'border-slate-200'}`}>
                  <div className="flex-1 grid grid-cols-2 md:grid-cols-5 gap-4 items-center">
                    <div><p className="text-xs text-slate-400">ID</p><p className="font-bold text-slate-700">{orden.id}</p></div>
                    <div><p className="text-xs text-slate-400">Detalle</p><p className="font-bold text-slate-700 truncate" title={orden.producto}>{orden.producto} x{orden.cantidad}</p></div>
                    <div><p className="text-xs text-slate-400">Total</p><p className={`font-bold ${esCancelada ? 'text-red-500 line-through' : 'text-emerald-600'}`}>L {orden.total.toFixed(2)}</p></div>
                    <div><p className="text-xs text-slate-400">Estado</p><EstadoBadge estado={orden.estado}/></div>
                    <div><button onClick={() => setOrdenSeleccionada(orden)} className="flex items-center gap-1 text-sm font-bold text-blue-600 hover:text-blue-800 bg-blue-50 px-3 py-1.5 rounded-lg transition-colors"><Eye size={16}/> Detalles</button></div>
                  </div>
                  <div className="flex items-center gap-2 shrink-0">
                     {!esCancelada && <button className="bg-green-500 text-white p-2.5 rounded-xl hover:bg-green-600 transition-colors shadow-sm" title="Compartir Detalles" onClick={() => handleShare(orden)}><Share2 size={18}/></button>}
                  </div>
                </div>
              )})}
            </div>
          );
        }

        function ModalDetalleOrden({ orden, isClient, clienteInfo, onClose, onActualizarOrden, onCancelar, onEliminarAdmin }) {
            const esCancelada = orden.estado === 'Cancelada';
            const [modalConfirmacion, setModalConfirmacion] = useState(null);

            return (
                <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4 fade-in">
                    {modalConfirmacion && ( <CustomModal config={{ titulo: modalConfirmacion.titulo, esConfirmacion: true, mensaje: modalConfirmacion.mensaje, submitLabel: modalConfirmacion.submitLabel, campos: [], onSubmit: modalConfirmacion.onConfirm }} onClose={() => setModalConfirmacion(null)} /> )}
                    <div className="bg-white rounded-2xl shadow-2xl w-full max-w-2xl overflow-hidden border border-slate-200 flex flex-col max-h-[90vh] print-area">
                        <div className="hidden print:block p-6 border-b border-slate-200 mb-4 text-center">
                            <h1 className="text-3xl font-bold text-blue-600 mb-2">PrintPro</h1>
                            <p className="text-slate-500 text-sm">Cotización Formal de Servicios</p>
                        </div>
                        <div className="bg-slate-50 print-bg-slate-50 p-6 border-b border-slate-200 flex justify-between items-start">
                            <div><h3 className="text-xl font-bold text-slate-800 flex items-center gap-2"><FileText size={20} className="text-blue-600"/> Cotización #{orden.id}</h3><p className="text-sm text-slate-500 mt-1">Fecha: {orden.fecha} • Cliente: {orden.clienteNombre}</p></div>
                            <button onClick={onClose} className="p-2 bg-slate-200 hover:bg-slate-300 rounded-full text-slate-600 transition-colors no-print"><X size={16}/></button>
                        </div>
                        
                        <div className="p-6 overflow-y-auto flex-1 space-y-6">
                            {esCancelada && <div className="bg-red-50 border border-red-200 text-red-700 p-4 rounded-xl flex items-center gap-3 font-bold text-sm"><AlertCircle size={20}/> Esta cotización fue cancelada.</div>}
                            {!isClient && !esCancelada && (
                                <div className="bg-slate-50 p-4 rounded-xl border border-blue-200 no-print">
                                    <label className="text-xs font-bold text-blue-700 mb-2 block uppercase tracking-wide">Actualizar Estado de Producción:</label>
                                    <select value={orden.estado} onChange={(e) => onActualizarOrden({...orden, estado: e.target.value})} className="w-full p-2.5 rounded-lg border border-blue-300 outline-none focus:border-blue-600 text-sm font-semibold text-slate-700 bg-white">
                                        {ESTADOS_DISPONIBLES.map(est => <option key={est} value={est}>{est}</option>)}
                                    </select>
                                </div>
                            )}
                            <div className="grid grid-cols-2 gap-4">
                                <div className="bg-slate-50 p-4 rounded-xl border border-slate-100"><p className="text-xs text-slate-400 font-bold uppercase mb-1">Producto Base</p><p className="font-bold text-slate-700">{orden.producto}</p><p className="text-sm text-slate-500">{orden.proveeCliente ? 'Cliente provee' : 'Incluido del catálogo'}</p></div>
                                <div className="bg-slate-50 p-4 rounded-xl border border-slate-100"><p className="text-xs text-slate-400 font-bold uppercase mb-1">Volumen Solicitado</p><p className="font-bold text-slate-700">{orden.cantidad} unidades</p></div>
                            </div>
                            <div>
                                <h4 className="text-sm font-bold text-slate-700 border-b border-slate-200 pb-2 mb-3 flex items-center gap-2"><Layers size={16}/> Técnicas Solicitadas</h4>
                                {orden.tecnicasEstructuradas && orden.tecnicasEstructuradas.length > 0 ? (
                                    <ul className="space-y-2">{orden.tecnicasEstructuradas.map((tec, i) => (<li key={i} className="bg-blue-50 text-blue-800 text-sm px-3 py-2 rounded-lg border border-blue-100"><span className="font-bold">{tec.tecnica}</span> • {tec.ubicacion} • {tec.variante}</li>))}</ul>
                                ) : <p className="text-sm text-slate-500 bg-slate-50 p-3 rounded-lg">{orden.detalles || 'Sin personalizar'}</p>}
                            </div>
                            <div className="border-t border-slate-200 pt-4 mt-6">
                                <div className="flex justify-end">
                                    <div className="w-full md:w-1/2 space-y-2 text-sm text-slate-600">
                                        <div className="flex justify-between"><span>Subtotal:</span> <span>L {orden.subtotal ? orden.subtotal.toFixed(2) : '0.00'}</span></div>
                                        {orden.ahorro > 0 && (
                                            <div className="flex justify-between text-emerald-600 print-text-emerald font-bold">
                                                <span>Su Ahorro:</span> 
                                                <span>- L {orden.ahorro.toFixed(2)}</span>
                                            </div>
                                        )}
                                        <div className="flex justify-between"><span>Impuestos:</span> <span>L {orden.impuestos ? orden.impuestos.toFixed(2) : '0.00'}</span></div>
                                        <div className="flex justify-between font-bold text-lg text-slate-800 border-t border-slate-200 pt-2 mt-2"><span>TOTAL:</span> <span className="print-text-emerald">L {orden.total.toFixed(2)}</span></div>
                                    </div>
                                </div>
                            </div>
                            {orden.comentario && <div className="bg-amber-50 border-l-4 border-amber-400 p-4 rounded-r-xl shadow-sm"><h4 className="text-sm font-black text-amber-800 mb-2 flex items-center gap-2 uppercase tracking-wide"><MessageSquare size={16}/> Notas para el Taller</h4><p className="text-sm text-amber-900 whitespace-pre-wrap leading-relaxed">{orden.comentario}</p></div>}
                        </div>
                        <div className="bg-slate-50 p-6 border-t border-slate-200 flex flex-wrap justify-end gap-3 no-print">
                            <button onClick={() => window.print()} className="px-5 py-2.5 rounded-xl font-bold bg-slate-800 text-white hover:bg-slate-700 transition-colors flex items-center gap-2"><Printer size={18}/> Imprimir</button>
                            <button onClick={onClose} className="px-5 py-2.5 rounded-xl font-bold text-slate-600 hover:bg-slate-200 transition-colors">Cerrar</button>
                            {isClient && !esCancelada && <button onClick={() => setModalConfirmacion({ titulo: 'Cancelar Orden', mensaje: '¿Seguro que deseas cancelar tu orden de forma permanente?', submitLabel: 'Sí, Cancelar', onConfirm: onCancelar })} className="px-5 py-2.5 rounded-xl font-bold bg-red-100 text-red-600 hover:bg-red-200 transition-colors flex items-center gap-2"><Trash2 size={18}/> Cancelar Orden</button>}
                            {!isClient && <button onClick={() => setModalConfirmacion({ titulo: 'Eliminar Orden del Sistema', mensaje: 'Se eliminará permanentemente. ¿Continuar?', submitLabel: 'Eliminar', onConfirm: onEliminarAdmin })} className="px-5 py-2.5 rounded-xl font-bold bg-red-600 text-white hover:bg-red-700 transition-colors flex items-center gap-2"><Trash2 size={18}/> Eliminar de BD</button>}
                        </div>
                    </div>
                </div>
            )
        }

        function GestionUsuarios({ usuarios, onActualizarUsuario, onEliminarUsuario }) {
            const [modalUsuario, setModalUsuario] = useState(null);
            const [modalConfirmacion, setModalConfirmacion] = useState(null);

            const handleCrearPerfil = () => {
                setModalUsuario({
                    titulo: `Vincular Nuevo Cliente`,
                    mensaje: `IMPORTANTE: Primero crea la cuenta en tu consola de Firebase Authentication y copia el "User UID".`,
                    valoresIniciales: { id: '', nombre: '', telefono: '', descuentoGlobal: 0, modoTest: false },
                    campos: [
                        { id: 'id', label: 'Firebase User UID:', type: 'text' },
                        { id: 'nombre', label: 'Nombre de Empresa / Contacto:', type: 'text' },
                        { id: 'telefono', label: 'Teléfono:', type: 'text' },
                        { id: 'descuentoGlobal', label: 'Descuento VIP Permanente (%):', type: 'number' },
                        { id: 'modoTest', label: 'Modo Test (Permitir cotizar por debajo del mínimo):', type: 'boolean' }
                    ],
                    onSubmit: (datos) => {
                        onActualizarUsuario({ id: datos.id.trim(), rol: 'CLIENTE', nombre: datos.nombre, telefono: datos.telefono, descuentoGlobal: Number(datos.descuentoGlobal), modoTest: !!datos.modoTest });
                    }
                });
            };

            const handleEditar = (user) => {
                setModalUsuario({
                    titulo: `Editar Perfil: ${user.nombre}`,
                    valoresIniciales: { nombre: user.nombre, telefono: user.telefono || '', descuentoGlobal: user.descuentoGlobal || 0, modoTest: !!user.modoTest },
                    campos: [
                        { id: 'nombre', label: 'Nombre de Empresa / Contacto:', type: 'text' },
                        { id: 'telefono', label: 'Teléfono:', type: 'text' },
                        { id: 'descuentoGlobal', label: 'Descuento VIP Permanente (%):', type: 'number' },
                        { id: 'modoTest', label: 'Modo Test (Permitir cotizar por debajo del mínimo):', type: 'boolean' }
                    ],
                    onSubmit: (datos) => {
                        onActualizarUsuario({ ...user, nombre: datos.nombre, telefono: datos.telefono, descuentoGlobal: Number(datos.descuentoGlobal), modoTest: !!datos.modoTest });
                    }
                });
            };

            const handleEliminar = (id, nombre, rol) => {
                if(rol === 'ADMIN') return alert("No puedes eliminar al administrador principal desde aquí.");
                setModalConfirmacion({
                    titulo: 'Eliminar Perfil',
                    mensaje: `¿Eliminar el perfil de "${nombre}"?`,
                    submitLabel: 'Sí, Eliminar Perfil',
                    onConfirm: () => onEliminarUsuario(id)
                });
            };

            return (
                <div className="max-w-6xl mx-auto space-y-4 fade-in">
                    {modalUsuario && <CustomModal config={modalUsuario} onClose={() => setModalUsuario(null)} />}
                    {modalConfirmacion && <CustomModal config={{ titulo: modalConfirmacion.titulo, esConfirmacion: true, mensaje: modalConfirmacion.mensaje, submitLabel: modalConfirmacion.submitLabel, campos: [], onSubmit: modalConfirmacion.onConfirm }} onClose={() => setModalConfirmacion(null)} />}
                    
                    <div className="flex justify-between items-end mb-6">
                        <div>
                            <h2 className="text-2xl font-bold text-white mb-1">Perfiles de Clientes</h2>
                            <p className="text-sm text-slate-400">Vincula los perfiles de los usuarios que ya registraste en Firebase Auth.</p>
                        </div>
                        <button onClick={handleCrearPerfil} className="bg-blue-600 hover:bg-blue-500 text-white px-5 py-2.5 rounded-xl font-bold flex items-center gap-2 shadow-lg transition-transform hover:scale-105">
                            <Plus size={20}/> Vincular Cliente
                        </button>
                    </div>
                    
                    <div className="bg-slate-800 rounded-2xl p-6 border border-slate-700 overflow-x-auto">
                        <table className="w-full text-left text-sm min-w-full">
                            <thead>
                                <tr className="border-b border-slate-700 text-slate-400">
                                    <th className="pb-3 font-semibold">Cliente</th>
                                    <th className="pb-3 font-semibold">Firebase UID</th>
                                    <th className="pb-3 font-semibold">Rol & VIP</th>
                                    <th className="pb-3 font-semibold text-right">Acciones</th>
                                </tr>
                            </thead>
                            <tbody className="divide-y divide-slate-700/50">
                                {usuarios.map(u => (
                                    <tr key={u.id} className="hover:bg-slate-700/30 transition-colors">
                                        <td className="py-4">
                                            <p className="text-white font-bold">{u.nombre}</p>
                                            <p className="text-slate-400 text-xs mt-1">Tel: {u.telefono || 'N/D'}</p>
                                        </td>
