                          })} className="bg-emerald-600 hover:bg-emerald-500 text-white px-4 py-2.5 rounded-xl font-bold shadow-lg transition-transform text-sm flex items-center gap-2">Margen Global: {margenGanancia}%</button>
                          
                          <button onClick={() => setModalConfig({

                          <button onClick={() => setShowFichaTecnica(true)} className="bg-slate-700 hover:bg-slate-600 text-white px-4 py-2.5 rounded-xl font-bold shadow-lg transition-transform flex items-center gap-2 text-sm"><Calculator size={18}/> Ficha Técnica</button>

                  <div className="flex gap-2 mb-6 bg-slate-950 p-2 rounded-2xl border border-slate-800">
                      <button onClick={() => setTabActivo('PRODUCTOS')} className={`flex-1 py-3 px-4 rounded-xl font-bold transition-colors ${tabActivo === 'PRODUCTOS' ? 'bg-blue-600 text-white shadow-md' : 'text-slate-400 hover:bg-slate-800'}`}>Categorías y Productos</button>
                      <button onClick={() => setTabActivo('TECNICAS')} className={`flex-1 py-3 px-4 rounded-xl font-bold transition-colors ${tabActivo === 'TECNICAS' ? 'bg-blue-600 text-white shadow-md' : 'text-slate-400 hover:bg-slate-800'}`}>Técnicas y Ubicaciones</button>

                                </div>

                        </div>

                        {tecActual && (
                            <div className="bg-slate-800 p-6 rounded-2xl border border-slate-700">
                                <div className="flex justify-between items-center mb-6">
                                    <div>
                                        <h3 className="text-xl font-bold text-white flex items-center gap-2">Configuración: {tecActual.nombre}</h3>
                                        <div className="flex items-center gap-3 mt-1">
                                            <p className="text-sm text-slate-400">Mínimo Exigido: <span className="text-emerald-400 font-bold">{tecActual.minimo} u.</span></p>
                                            <p className="text-sm text-slate-400">Aplica Impuesto (ISV): <span className={tecActual.cobraImpuesto !== false ? 'text-emerald-400 font-bold' : 'text-amber-400 font-bold'}>{tecActual.cobraImpuesto !== false ? 'SÍ' : 'NO'}</span></p>
                                        </div>

                                                                    <ul className="space-y-2">
                                                                        {opc.costosVariables.map(c => (

        function GestionUsuarios({ usuarios, onActualizarUsuario, onEliminarUsuario }) {
            const [modalUsuario, setModalUsuario] = useState(null);
            const [modalConfirmacion, setModalConfirmacion] = useState(null);

            const handleCrearPerfil = () => {
                setModalUsuario({
                    titulo: `Vincular Nuevo Cliente`,
                    mensaje: `IMPORTANTE: Primero crea la cuenta en tu consola de Firebase Authentication y copia el "User UID".`,
                    valoresIniciales: { id: '', nombre: '', telefono: '', descuentoGlobal: 0, modoTest: false },
                    campos: [
                        { id: 'id', label: 'Firebase User UID:', type: 'text' },
                        { id: 'nombre', label: 'Nombre de Empresa / Contacto:', type: 'text' },
                        { id: 'telefono', label: 'Teléfono:', type: 'text' },
                        { id: 'descuentoGlobal', label: 'Descuento VIP Permanente (%):', type: 'number' },
                        { id: 'modoTest', label: 'Modo Test (Permitir cotizar por debajo del mínimo):', type: 'boolean' }
                    ],
                    onSubmit: (datos) => {
                        onActualizarUsuario({ id: datos.id.trim(), rol: 'CLIENTE', nombre: datos.nombre, telefono: datos.telefono, descuentoGlobal: Number(datos.descuentoGlobal), modoTest: !!datos.modoTest });
                    }
                });
            };

            const handleEditar = (user) => {
                setModalUsuario({
                    titulo: `Editar Perfil: ${user.nombre}`,
                    valoresIniciales: { nombre: user.nombre, telefono: user.telefono || '', descuentoGlobal: user.descuentoGlobal || 0, modoTest: !!user.modoTest },
                    campos: [
                        { id: 'nombre', label: 'Nombre de Empresa / Contacto:', type: 'text' },
                        { id: 'telefono', label: 'Teléfono:', type: 'text' },
                        { id: 'descuentoGlobal', label: 'Descuento VIP Permanente (%):', type: 'number' },
                        { id: 'modoTest', label: 'Modo Test (Permitir cotizar por debajo del mínimo):', type: 'boolean' }
                    ],
                    onSubmit: (datos) => {
                        onActualizarUsuario({ ...user, nombre: datos.nombre, telefono: datos.telefono, descuentoGlobal: Number(datos.descuentoGlobal), modoTest: !!datos.modoTest });
                    }
                });
            };

            const handleEliminar = (id, nombre, rol) => {
                if(rol === 'ADMIN') return alert("No puedes eliminar al administrador principal desde aquí.");
                setModalConfirmacion({
                    titulo: 'Eliminar Perfil', mensaje: `¿Eliminar el perfil de "${nombre}"?`, submitLabel: 'Sí, Eliminar Perfil',
                    onConfirm: () => onEliminarUsuario(id)
                });
            };

            return (
                <div className="max-w-6xl mx-auto space-y-4 fade-in">
                    {modalUsuario && <CustomModal config={modalUsuario} onClose={() => setModalUsuario(null)} />}
                    {modalConfirmacion && <CustomModal config={{ titulo: modalConfirmacion.titulo, esConfirmacion: true, mensaje: modalConfirmacion.mensaje, submitLabel: modalConfirmacion.submitLabel, campos: [], onSubmit: modalConfirmacion.onConfirm }} onClose={() => setModalConfirmacion(null)} />}
                    
                    <div className="flex justify-between items-end mb-6">
                        <div><h2 className="text-2xl font-bold text-white mb-1">Perfiles de Clientes</h2><p className="text-sm text-slate-400">Vincula los perfiles de los usuarios que ya registraste en Firebase Auth.</p></div>
                        <button onClick={handleCrearPerfil} className="bg-blue-600 hover:bg-blue-500 text-white px-5 py-2.5 rounded-xl font-bold flex items-center gap-2 shadow-lg transition-transform hover:scale-105"><Plus size={20}/> Vincular Cliente</button>
                    </div>
                    
                    <div className="bg-slate-800 rounded-2xl p-6 border border-slate-700 overflow-x-auto">
                        <table className="w-full text-left text-sm min-w-full">
                            <thead><tr className="border-b border-slate-700 text-slate-400"><th className="pb-3 font-semibold">Cliente</th><th className="pb-3 font-semibold">Firebase UID</th><th className="pb-3 font-semibold">Rol & VIP</th><th className="pb-3 font-semibold text-right">Acciones</th></tr></thead>
                            <tbody className="divide-y divide-slate-700/50">
                                {usuarios.map(u => (
                                    <tr key={u.id} className="hover:bg-slate-700/30 transition-colors">
                                        <td className="py-4"><p className="text-white font-bold">{u.nombre}</p><p className="text-slate-400 text-xs mt-1">Tel: {u.telefono || 'N/D'}</p></td>
                                        <td className="py-4"><div className="bg-slate-900 inline-block p-2 rounded-lg border border-slate-700 text-xs font-mono text-slate-400">{u.id}</div></td>
                                        <td className="py-4">
                                            {u.rol === 'ADMIN' ? (<span className="bg-purple-500/20 text-purple-400 border border-purple-500/30 px-2 py-1 rounded text-xs font-bold">ADMINISTRADOR</span>) : (
                                                <div>
                                                    <span className="bg-blue-500/20 text-blue-400 border border-blue-500/30 px-2 py-1 rounded text-xs font-bold">CLIENTE</span>
                                                    {u.descuentoGlobal > 0 && <span className="ml-2 text-emerald-400 text-xs font-bold">VIP: -{u.descuentoGlobal}% OFF</span>}
                                                    {u.modoTest && <span className="bg-amber-500/20 text-amber-400 border border-amber-500/30 px-2 py-1 rounded text-[10px] font-bold mt-2 block w-max">MODO TEST</span>}
                                                </div>
                                            )}
                                        </td>
                                        <td className="py-4 text-right">
                                            <div className="flex items-center justify-end gap-2">
                                                <button onClick={() => handleEditar(u)} className="text-blue-400 hover:text-blue-300 p-2 rounded bg-slate-900 hover:bg-slate-700 transition" title="Editar Perfil"><Edit3 size={16}/></button>
                                                <button onClick={() => handleEliminar(u.id, u.nombre, u.rol)} className="text-red-400 hover:text-red-300 p-2 rounded bg-slate-900 hover:bg-slate-700 transition" title="Eliminar Perfil"><Trash2 size={16}/></button>
                                            </div>
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        }

        function GestionMensajes({ mensajesGlobales, adminSetMensajes }) {
            const [form, setForm] = useState(mensajesGlobales);
            const handleSave = (e) => { e.preventDefault(); adminSetMensajes(form); }

            return (
                <div className="max-w-4xl mx-auto space-y-4 fade-in">
                    <div><h2 className="text-2xl font-bold text-white mb-2">Avisos y Plantillas</h2></div>
                    <form onSubmit={handleSave} className="bg-slate-800 rounded-2xl p-6 border border-slate-700 space-y-6 shadow-lg">
                        <div className="bg-slate-900 p-5 rounded-xl border border-slate-700">
                            <h3 className="text-lg font-bold text-blue-400 flex items-center gap-2 mb-4"><Megaphone size={20}/> Mensajes en Panel Cliente</h3>
                            <div className="space-y-4">
                                <div><label className="block text-sm font-bold text-slate-400 mb-2">Mensaje Principal (Bienvenida)</label><input type="text" value={form.bienvenida || ''} onChange={(e) => setForm({...form, bienvenida: e.target.value})} className="w-full p-3 rounded-xl bg-slate-800 border border-slate-600 text-white outline-none focus:border-blue-500" /></div>
                                <div>
                                    <label className="block text-sm font-bold text-slate-400 mb-2">Aviso General / Texto Promocional</label>
                                    <p className="text-xs text-slate-500 mb-2">Usa este espacio para informar modificaciones de precios, actualizaciones de productos o promociones vigentes.</p>
                                    <textarea value={form.promo || ''} onChange={(e) => setForm({...form, promo: e.target.value})} className="w-full p-3 rounded-xl bg-slate-800 border border-slate-600 text-white outline-none focus:border-blue-500 resize-none h-24"></textarea>
                                </div>
                            </div>
                        </div>
                        <div className="bg-slate-900 p-5 rounded-xl border border-slate-700">
                            <h3 className="text-lg font-bold text-emerald-400 flex items-center gap-2 mb-4"><Share2 size={20}/> Plantilla de WhatsApp</h3>
                            <div className="space-y-4">
                                <div><label className="block text-sm font-bold text-slate-400 mb-2">Número de WhatsApp de la Empresa (Opcional)</label><input type="text" value={form.whatsappNumero || ''} onChange={(e) => setForm({...form, whatsappNumero: e.target.value.replace(/[^0-9]/g, '')})} className="w-full p-3 rounded-xl bg-slate-800 border border-slate-600 text-white outline-none focus:border-emerald-500" /></div>
                                <div><label className="block text-sm font-bold text-slate-400 mb-2">Plantilla al Compartir Cotización</label><textarea value={form.whatsappTemplate || ''} onChange={(e) => setForm({...form, whatsappTemplate: e.target.value})} className="w-full p-3 rounded-xl bg-slate-800 border border-slate-600 text-white outline-none focus:border-emerald-500 resize-none h-24"></textarea></div>
                            </div>
                        </div>
                        <div className="flex justify-end pt-4"><button type="submit" className="bg-blue-600 text-white px-8 py-3 rounded-xl font-bold hover:bg-blue-500">Guardar Configuración</button></div>
                    </form>
                </div>
            )
        }

        function GestionRecursos({ recursos, onActualizarRecurso, onEliminarRecurso }) {
            const [modalConfig, setModalConfig] = useState(null);
            
            const handleCrear = () => {
                setModalConfig({
                    titulo: "Subir Nuevo Archivo/Guía",
                    campos: [ { id: 'titulo', label: 'Título del documento:', type: 'text' }, { id: 'descripcion', label: 'Descripción breve:', type: 'text' }, { id: 'archivo', label: 'Archivo (PDF, PNG, JPG):', type: 'file' } ],
                    onSubmit: (datos) => { if (datos.titulo && datos.archivo) { onActualizarRecurso({ id: `REC_${Date.now()}`, titulo: datos.titulo, descripcion: datos.descripcion || '', archivoBase64: datos.archivo }); } }
                });
            };

            return (
                <div className="max-w-6xl mx-auto space-y-4 fade-in">
                    {modalConfig && <CustomModal config={modalConfig} onClose={() => setModalConfig(null)} />}
                    <div className="flex justify-between items-end mb-6">
                        <div><h2 className="text-2xl font-bold text-white mb-1">Gestión de Archivos Compartidos</h2><p className="text-sm text-slate-400">Sube PDFs o imágenes (guías de tallas, manuales) para que tus clientes las descarguen.</p></div>
                        <button onClick={handleCrear} className="bg-blue-600 hover:bg-blue-500 text-white px-5 py-2.5 rounded-xl font-bold flex items-center gap-2 shadow-lg transition-transform hover:scale-105"><Upload size={20}/> Subir Archivo</button>
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                        {recursos.map(r => (
                            <div key={r.id} className="bg-slate-800 rounded-2xl p-5 border border-slate-700 flex flex-col hover:border-slate-600 transition-colors shadow-sm">
                                <div className="flex justify-between items-start mb-3"><div className="bg-slate-900 p-3 rounded-xl text-blue-400"><BookOpen size={24}/></div><button onClick={() => onEliminarRecurso(r.id)} className="text-red-400 hover:text-red-300 p-2 bg-slate-900 rounded-lg transition-colors" title="Eliminar"><Trash2 size={16}/></button></div>
                                <h3 className="text-white font-bold text-lg mb-1">{r.titulo}</h3><p className="text-slate-400 text-sm mb-4 flex-1 line-clamp-2">{r.descripcion}</p>
                                <a href={r.archivoBase64} download={r.titulo} className="w-full block text-center bg-slate-700 text-white font-bold py-2.5 rounded-xl hover:bg-slate-600 transition-colors text-sm">Previsualizar / Descargar</a>
                            </div>
                        ))}
                        {recursos.length === 0 && <div className="col-span-full py-10 text-center text-slate-500 font-medium bg-slate-800/50 rounded-2xl border border-dashed border-slate-700">No hay recursos subidos actualmente.</div>}
                    </div>
                </div>
            );
        }

        function PanelAdmin({ ordenes, categorias, setCategorias, catalogo, setCatalogo, tecnicas, setTecnicas, margenGanancia, impuestoGlobal, descuentosVolumen, setConfigGlobal, mensajesGlobales, adminSetMensajes, usuarios, onActualizarUsuario, onEliminarUsuario, recursos, onActualizarRecurso, onEliminarRecurso, onActualizarOrden, onEliminarOrden, onLogout, isConnectedToCloud, showToast }) {
            const [vistaAdmin, setVistaAdmin] = useState('CATALOGO');

            return (
                <div className="min-h-screen bg-slate-900 flex flex-col md:flex-row fade-in">
                    <aside className="w-full md:w-72 bg-slate-950 border-r border-slate-800 flex flex-col z-10 no-print md:h-screen md:sticky md:top-0">
                        <div className="p-6 overflow-y-auto flex-1 custom-scrollbar">
                            <div className="flex items-center gap-3 text-blue-500 mb-8"><Printer size={32} /><span className="text-xl font-bold text-white">PrintPro Admin</span></div>
                            <nav className="space-y-2">
                                <MenuBtnAdmin icon={Layers} label="Catálogo y Técnicas" active={vistaAdmin === 'CATALOGO'} onClick={() => setVistaAdmin('CATALOGO')} />
                                <MenuBtnAdmin icon={FileText} label="Gestión de Cotizaciones" active={vistaAdmin === 'COTIZACIONES'} onClick={() => setVistaAdmin('COTIZACIONES')} />
                                <MenuBtnAdmin icon={Users} label="Perfiles de Clientes" active={vistaAdmin === 'USUARIOS'} onClick={() => setVistaAdmin('USUARIOS')} />
                                <MenuBtnAdmin icon={Megaphone} label="Avisos y WhatsApp" active={vistaAdmin === 'MENSAJES'} onClick={() => setVistaAdmin('MENSAJES')} />
                                <MenuBtnAdmin icon={BookOpen} label="Archivos y Recursos" active={vistaAdmin === 'RECURSOS'} onClick={() => setVistaAdmin('RECURSOS')} />
                            </nav>
                        </div>
                        <div className="p-6 bg-slate-950 border-t border-slate-800 mt-auto">
                            <ConnectionIndicator isConnectedToCloud={isConnectedToCloud} darkTheme={true} />
                            <button onClick={onLogout} className="w-full flex items-center justify-center gap-2 text-slate-400 hover:text-red-400 hover:bg-red-500/10 mt-4 p-3 rounded-xl font-bold transition-colors border border-transparent hover:border-red-500/20"><LogOut size={18} /> Salir del Panel</button>
                        </div>
                    </aside>

                    <main className="flex-1 p-8 overflow-y-auto bg-slate-900 text-slate-300">
                        {vistaAdmin === 'CATALOGO' && (
                            <GestionJerarquica 
                                categorias={categorias} setCategorias={setCategorias}
                                catalogo={catalogo} setCatalogo={setCatalogo}
                                tecnicas={tecnicas} setTecnicas={setTecnicas}
                                margenGanancia={margenGanancia} impuestoGlobal={impuestoGlobal} 
                                descuentosVolumen={descuentosVolumen} setConfigGlobal={setConfigGlobal}
                            />
                        )}
                        {vistaAdmin === 'COTIZACIONES' && (
                            <HistorialOrdenes ordenes={ordenes} onActualizarOrden={onActualizarOrden} onEliminarOrden={onEliminarOrden} isClient={false} cliente={null} mensajesGlobales={mensajesGlobales} showToast={showToast} />
                        )}
                        {vistaAdmin === 'USUARIOS' && (
                            <GestionUsuarios usuarios={usuarios} onActualizarUsuario={onActualizarUsuario} onEliminarUsuario={onEliminarUsuario} />
                        )}
                        {vistaAdmin === 'MENSAJES' && (
                            <GestionMensajes mensajesGlobales={mensajesGlobales} adminSetMensajes={adminSetMensajes} />
                        )}
                        {vistaAdmin === 'RECURSOS' && (
                            <GestionRecursos recursos={recursos} onActualizarRecurso={onActualizarRecurso} onEliminarRecurso={onEliminarRecurso} />
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
