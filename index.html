                    <div className="bg-slate-800 p-6 rounded-xl border border-slate-600 w-full max-w-2xl shadow-2xl text-slate-300 max-h-[90vh] overflow-y-auto custom-scrollbar">
                        <div className="flex justify-between items-start mb-4">
                            <div>
                                <h3 className="text-lg font-bold text-white flex items-center gap-2"><Calculator size={20} className="text-blue-400"/> Guía de Fórmulas</h3>
                                <p className="text-slate-400 text-xs mt-1">Cómo calcula el sistema los precios.</p>
                            </div>
                        </div>
                        
                        <div className="space-y-4 text-xs">
                            <div className="bg-slate-900 p-4 rounded-lg border border-blue-500/30 shadow-inner">
                                <h4 className="font-bold text-blue-400 text-sm mb-2">Paso 1: Venta Producto</h4>
                                <div className="bg-slate-950 p-2 rounded font-mono text-emerald-400 text-[10px] border border-slate-800">
                                    <p>Costo = Costo Base × Cantidad</p>
                                    <p>Venta = Costo × (1 + [Margen / 100])</p>
                                </div>
                            </div>
                            <div className="bg-slate-900 p-4 rounded-lg border border-emerald-500/30 shadow-inner">
                                <h4 className="font-bold text-emerald-400 text-sm mb-2">Paso 2: Venta Técnica</h4>
                                <div className="bg-slate-950 p-2 rounded font-mono text-emerald-400 text-[10px] border border-slate-800 space-y-1">
                                    <p>Venta = (Setups + (Variable × Cant)) × (1 + [Margen / 100])</p>
                                </div>
                            </div>
                            <div className="bg-slate-900 p-4 rounded-lg border border-amber-500/30 shadow-inner">
                                <h4 className="font-bold text-amber-400 text-sm mb-2">Paso 3: Descuentos</h4>
                                <div className="bg-slate-950 p-2 rounded text-[10px] border border-slate-800 text-slate-300 font-mono">
                                    <p className="text-amber-400">Total = Bruto × (1 - % Vol) × (1 - % VIP)</p>
                                </div>
                            </div>
                        </div>

                        <div className="flex justify-end mt-6 border-t border-slate-700 pt-3">
                            <button onClick={onClose} className="px-5 py-2 rounded-lg text-sm font-bold text-white bg-blue-600 hover:bg-blue-500 transition-colors">Cerrar</button>
                        </div>
                    </div>
                </div>
            )
        }

        function ModalTarifasUbicacion({ ubicacion, margenGlobal, onSave, onClose }) {
            const [margen, setMargen] = useState(ubicacion.margen !== undefined ? ubicacion.margen : margenGlobal); 
            const [descuentos, setDescuentos] = useState(ubicacion.descuentosVolumen || []);

            const addTier = () => setDescuentos([...descuentos, { id: `desc_${Date.now()}`, min: 100, pct: 5, activo: true }]);
            const updateTier = (id, field, value) => setDescuentos(descuentos.map(d => d.id === id ? { ...d, [field]: field === 'activo' ? value : (value === '' ? '' : Number(value)) } : d));
            const removeTier = (id) => setDescuentos(descuentos.filter(d => d.id !== id));
            
            return ( 
                <div className="fixed inset-0 bg-slate-900/80 flex items-center justify-center z-50 fade-in p-4">
                    <div className="bg-slate-800 p-6 rounded-xl border border-slate-600 w-full max-w-md shadow-2xl max-h-[90vh] overflow-y-auto custom-scrollbar">
                        <h3 className="text-lg font-bold text-white mb-1">Tarifas: {ubicacion.nombre}</h3>
                        <p className="text-xs text-slate-400 mb-4">Configura el margen y niveles para esta ubicación.</p>
                        
                        <div className="bg-slate-900 p-3 rounded-lg border border-slate-700 mb-4 shadow-inner"><label className="text-xs font-bold text-emerald-400 block mb-1">Margen Específico (%)</label><input type="number" value={margen} onChange={e=>setMargen(e.target.value === '' ? '' : Number(e.target.value))} className="w-full p-2 rounded-md bg-slate-800 text-white text-sm font-bold outline-none border border-slate-600 focus:border-emerald-500" /></div>
                        
                        <div className="bg-slate-900 p-3 rounded-lg border border-slate-700 mb-4 shadow-inner">
                            <div className="flex justify-between items-center mb-3">
                                <label className="text-xs font-bold text-blue-400">Descuentos Volumen</label>
                                <button onClick={addTier} className="text-[10px] bg-blue-600 text-white px-2 py-1 rounded hover:bg-blue-500 transition-colors">+ Añadir</button>
                            </div>
                            <div className="space-y-2">
                                {descuentos.map(d => (
                                    <div key={d.id} className="flex gap-2 items-center bg-slate-800 p-2 rounded-lg border border-slate-600">
                                        <div className="px-1 flex items-center">
                                            <input type="checkbox" checked={d.activo !== false} onChange={e=>updateTier(d.id, 'activo', e.target.checked)} className="accent-blue-500 w-4 h-4 cursor-pointer" />
                                        </div>
                                        <div className="flex-1"><label className="text-[9px] text-slate-400 uppercase font-bold block">Mín (Pzas)</label><input type="number" value={d.min} onChange={e=>updateTier(d.id, 'min', e.target.value)} className="w-full bg-slate-900 p-1.5 rounded text-white text-xs outline-none border border-slate-700" /></div>
                                        <div className="flex-1"><label className="text-[9px] text-slate-400 uppercase font-bold block">Desc (%)</label><input type="number" value={d.pct} onChange={e=>updateTier(d.id, 'pct', e.target.value)} className="w-full bg-slate-900 p-1.5 rounded text-white text-xs outline-none border border-slate-700" /></div>
                                        <button onClick={()=>removeTier(d.id)} className="mt-4 text-red-400 p-1.5 hover:bg-red-500/20 rounded transition-colors"><Trash2 size={14}/></button>
                                    </div>
                                ))}
                                {descuentos.length === 0 && <p className="text-[10px] text-slate-500 italic">No hay descuentos.</p>}
                            </div>
                        </div>
                        <div className="flex justify-end gap-2 mt-4">
                            <button onClick={onClose} className="px-4 py-2 rounded-lg text-xs font-bold text-slate-300 hover:bg-slate-700 transition-colors">Cancelar</button>
                            <button onClick={() => { onSave(margen, descuentos); onClose(); }} className="px-4 py-2 rounded-lg text-xs font-bold text-white bg-blue-600 hover:bg-blue-500 transition-colors shadow-sm">Guardar</button>
                        </div>
                    </div>
                </div> 
            )
        }

        function GestionJerarquica({ categorias, setCategorias, catalogo, setCatalogo, tecnicas, setTecnicas, margenGanancia, impuestoGlobal, descuentosVolumen, setConfigGlobal }) {
          const [tecActivaId, setTecActivaId] = useState(tecnicas[0]?.id || null);
          const [categoriaActivaId, setCategoriaActivaId] = useState('todas');
          const [modalConfig, setModalConfig] = useState(null); 
          const [showFichaTecnica, setShowFichaTecnica] = useState(false);
          const [showTarifasUbicacionModal, setShowTarifasUbicacionModal] = useState(false);
          const [subcatTarifasActiva, setSubcatTarifasActiva] = useState(null);
          const [tabActivo, setTabActivo] = useState('PRODUCTOS');
          
          const tecActual = tecnicas.find(t => t.id === tecActivaId);
          const updateTecnicaActual = (updatedTecObj) => setTecnicas(tecnicas.map(t => t.id === tecActivaId ? updatedTecObj : t));

          const scrollRef = useRef(null);
          const scrollRefCat = useRef(null);
          const scrollTabs = (offset) => { if (scrollRef.current) scrollRef.current.scrollBy({ left: offset, behavior: 'smooth' }); };
          const scrollTabsCat = (offset) => { if (scrollRefCat.current) scrollRefCat.current.scrollBy({ left: offset, behavior: 'smooth' }); };

          const [busquedaAdmin, setBusquedaAdmin] = useState('');
          const [itemsPorPaginaAdmin, setItemsPorPaginaAdmin] = useState(10);
          const [paginaActualAdmin, setPaginaActualAdmin] = useState(1);

          useEffect(() => { setPaginaActualAdmin(1); }, [busquedaAdmin, itemsPorPaginaAdmin, categoriaActivaId]);

          const catalogoFiltradoAdmin = useMemo(() => {
             return catalogo.filter(p => {
                 const matchBusqueda = p.nombre.toLowerCase().includes(busquedaAdmin.toLowerCase());
                 const matchCat = categoriaActivaId === 'todas' || p.categoriaId === categoriaActivaId;
                 return matchBusqueda && matchCat;
             });
          }, [catalogo, busquedaAdmin, categoriaActivaId]);
          
          const totalPaginasAdmin = Math.ceil(catalogoFiltradoAdmin.length / itemsPorPaginaAdmin) || 1;
          const catalogoPaginadoAdmin = useMemo(() => catalogoFiltradoAdmin.slice((paginaActualAdmin - 1) * itemsPorPaginaAdmin, paginaActualAdmin * itemsPorPaginaAdmin), [catalogoFiltradoAdmin, paginaActualAdmin, itemsPorPaginaAdmin]);

          const handleCrearCategoria = () => {
             setModalConfig({
                 titulo: "Nueva Categoría", campos: [{ id: 'nombre', label: 'Nombre:', type: 'text' }],
                 onSubmit: (d) => { if (d.nombre) { const nueva = { id: `CAT_${Date.now()}`, nombre: d.nombre }; setCategorias([...categorias, nueva]); setCategoriaActivaId(nueva.id); } }
             });
          };

          const handleEditarCategoria = () => {
             const cat = categorias.find(c => c.id === categoriaActivaId); if (!cat) return;
             setModalConfig({
                 titulo: "Editar Categoría", valoresIniciales: { nombre: cat.nombre }, campos: [{ id: 'nombre', label: 'Nombre:', type: 'text' }],
                 onSubmit: (d) => { if (d.nombre) setCategorias(categorias.map(c => c.id === categoriaActivaId ? { ...c, nombre: d.nombre } : c)); }
             });
          };

          const handleEliminarCategoria = () => {
             const cat = categorias.find(c => c.id === categoriaActivaId); if (!cat) return;
             const prodEnCat = catalogo.filter(p => p.categoriaId === cat.id);
             if (prodEnCat.length > 0) {
                 setModalConfig({
                     titulo: "Aviso", esConfirmacion: true, mensaje: `Categoría contiene ${prodEnCat.length} productos. Imposible eliminar.`, submitLabel: "Entendido", campos: [], onSubmit: () => {}
                 }); return;
             }
             setModalConfig({ titulo: "Eliminar Categoría", esConfirmacion: true, mensaje: `¿Eliminar "${cat.nombre}"?`, campos: [], onSubmit: () => { setCategorias(categorias.filter(c => c.id !== categoriaActivaId)); setCategoriaActivaId('todas'); } });
          };

          const handleCrearProducto = () => {
            setModalConfig({
              titulo: "Nuevo Producto", valoresIniciales: { costoBase: 0, categoriaId: categoriaActivaId !== 'todas' ? categoriaActivaId : '', cobraImpuesto: true },
              campos: [ 
                  { id: 'nombre', label: 'Nombre:', type: 'text' }, { id: 'categoriaId', label: 'Categoría:', type: 'select', options: categorias.map(c => ({ value: c.id, label: c.nombre })) },
                  { id: 'costoBase', label: 'Costo Base (L):', type: 'number' }, { id: 'detalles', label: 'Detalles:', type: 'textarea', maxLength: 250 }, 
                  { id: 'tecnicasRecomendadas', label: 'Técnicas Aceptadas:', type: 'checkboxGroup', options: tecnicas.map(t => ({ value: t.id, label: t.nombre })) }, 
                  { id: 'ubicacionesAceptadas', label: 'Ubicaciones Aceptadas (Vacío = Todas):', type: 'checkboxGroup', options: tecnicas.flatMap(t => t.subcategorias ? t.subcategorias.map(s => ({ value: s.id, label: `${t.nombre} - ${s.nombre}` })) : []) },
                  { id: 'cobraImpuesto', label: 'Suma Impuesto (ISV)', type: 'boolean' }, { id: 'imagenUrl', label: 'Imagen:', type: 'file' } 
              ],
              onSubmit: (d) => { 
                  if (d.nombre && !isNaN(parseFloat(d.costoBase))) { 
                      setCatalogo([...catalogo, { id: `PROD_${Date.now()}`, nombre: d.nombre, detalles: d.detalles || '', categoriaId: d.categoriaId || '', costoBase: parseFloat(d.costoBase), imagenUrl: d.imagenUrl || '', tecnicasRecomendadas: d.tecnicasRecomendadas || [], ubicacionesAceptadas: d.ubicacionesAceptadas || [], cobraImpuesto: !!d.cobraImpuesto }]); 
                  } 
              }
            });
          };

          const handleEditarProducto = (prod) => {
            setModalConfig({
              titulo: "Editar Producto", 
              valoresIniciales: { nombre: prod.nombre, categoriaId: prod.categoriaId || '', costoBase: prod.costoBase, detalles: prod.detalles || '', tecnicasRecomendadas: Array.isArray(prod.tecnicasRecomendadas) ? prod.tecnicasRecomendadas : [], ubicacionesAceptadas: Array.isArray(prod.ubicacionesAceptadas) ? prod.ubicacionesAceptadas : [], cobraImpuesto: prod.cobraImpuesto !== false, imagenUrl: prod.imagenUrl || '' },
              campos: [ 
                  { id: 'nombre', label: 'Nombre:', type: 'text' }, { id: 'categoriaId', label: 'Categoría:', type: 'select', options: categorias.map(c => ({ value: c.id, label: c.nombre })) },
                  { id: 'costoBase', label: 'Costo Base (L):', type: 'number' }, { id: 'detalles', label: 'Detalles:', type: 'textarea', maxLength: 250 }, 
                  { id: 'tecnicasRecomendadas', label: 'Técnicas Aceptadas:', type: 'checkboxGroup', options: tecnicas.map(t => ({ value: t.id, label: t.nombre })) }, 
                  { id: 'ubicacionesAceptadas', label: 'Ubicaciones (Vacío = Todas):', type: 'checkboxGroup', options: tecnicas.flatMap(t => t.subcategorias ? t.subcategorias.map(s => ({ value: s.id, label: `${t.nombre} - ${s.nombre}` })) : []) },
                  { id: 'cobraImpuesto', label: 'Suma Impuesto (ISV)', type: 'boolean' }, { id: 'imagenUrl', label: 'Imagen:', type: 'file' } 
              ],
              onSubmit: (d) => { 
                  if (d.nombre && !isNaN(parseFloat(d.costoBase))) { 
                      setCatalogo(catalogo.map(p => p.id === prod.id ? { ...p, nombre: d.nombre, detalles: d.detalles || '', categoriaId: d.categoriaId || '', costoBase: parseFloat(d.costoBase), imagenUrl: d.imagenUrl || '', tecnicasRecomendadas: d.tecnicasRecomendadas || [], ubicacionesAceptadas: d.ubicacionesAceptadas || [], cobraImpuesto: !!d.cobraImpuesto } : p)); 
                  } 
              }
            });
          };

          const handleEliminarProducto = (id) => { setModalConfig({ titulo: "Eliminar Producto", esConfirmacion: true, mensaje: "¿Eliminar permanentemente?", campos: [], onSubmit: () => setCatalogo(catalogo.filter(p => p.id !== id)) }); };

          const handleCrearTecnica = () => { setModalConfig({ titulo: "Nueva Técnica", campos: [ { id: 'nombre', label: 'Nombre:', type: 'text' }, { id: 'minimo', label: 'Mínimo de uds:', type: 'number' }, { id: 'cobraImpuesto', label: 'Suma Impuesto (ISV)', type: 'boolean' } ], onSubmit: (d) => { if (d.nombre) setTecnicas([...tecnicas, { id: `TEC_${Date.now()}`, nombre: d.nombre, minimo: Number(d.minimo) || 1, cobraImpuesto: !!d.cobraImpuesto, subcategorias: [] }]); } }); };
          const handleEditarTecnica = (tec) => { setModalConfig({ titulo: "Editar Técnica", valoresIniciales: { nombre: tec.nombre, minimo: tec.minimo, cobraImpuesto: tec.cobraImpuesto !== false }, campos: [ { id: 'nombre', label: 'Nombre:', type: 'text' }, { id: 'minimo', label: 'Mínimo de uds:', type: 'number' }, { id: 'cobraImpuesto', label: 'Suma Impuesto (ISV)', type: 'boolean' } ], onSubmit: (d) => { if (d.nombre) setTecnicas(tecnicas.map(t => t.id === tec.id ? { ...t, nombre: d.nombre, minimo: Number(d.minimo) || 1, cobraImpuesto: !!d.cobraImpuesto } : t)); } }); };
          const handleEliminarTecnica = (id) => { setModalConfig({ titulo: "Eliminar Técnica", esConfirmacion: true, mensaje: "¿Eliminar técnica y costos?", campos: [], onSubmit: () => { setTecnicas(tecnicas.filter(t => t.id !== id)); if(tecActivaId === id) setTecActivaId(tecnicas.find(t => t.id !== id)?.id || null); } }); };

          const handleCrearSubcat = () => { setModalConfig({ titulo: "Nueva Ubicación", campos: [ { id: 'nombre', label: 'Nombre:', type: 'text' } ], onSubmit: (d) => { if(d.nombre && tecActual) updateTecnicaActual({...tecActual, subcategorias: [...tecActual.subcategorias, { id: `SUB_${Date.now()}`, nombre: d.nombre, opciones: [] }]}); } }); };
          const handleEditarSubcat = (sub) => { setModalConfig({ titulo: "Editar Ubicación", valoresIniciales: { nombre: sub.nombre }, campos: [ { id: 'nombre', label: 'Nombre:', type: 'text' } ], onSubmit: (d) => { if(d.nombre && tecActual) updateTecnicaActual({...tecActual, subcategorias: tecActual.subcategorias.map(s => s.id === sub.id ? {...s, nombre: d.nombre} : s)}); } }); };
          const handleEliminarSubcat = (id) => { setModalConfig({ titulo: "Eliminar Ubicación", esConfirmacion: true, mensaje: "¿Eliminar permanentemente?", campos: [], onSubmit: () => { if(tecActual) updateTecnicaActual({...tecActual, subcategorias: tecActual.subcategorias.filter(s => s.id !== id)}); } }); };

          const handleCrearOpcion = (subId) => { setModalConfig({ titulo: "Nueva Variante", campos: [ { id: 'nombre', label: 'Nombre:', type: 'text' } ], onSubmit: (d) => { if(d.nombre && tecActual) updateTecnicaActual({...tecActual, subcategorias: tecActual.subcategorias.map(s => s.id === subId ? {...s, opciones: [...s.opciones, { id: `OPC_${Date.now()}`, nombre: d.nombre, costosFijos: [], costosVariables: [] }]} : s)}); } }); };
          const handleEditarOpcion = (subId, opc) => { setModalConfig({ titulo: "Editar Variante", valoresIniciales: { nombre: opc.nombre }, campos: [ { id: 'nombre', label: 'Nombre:', type: 'text' } ], onSubmit: (d) => { if(d.nombre && tecActual) updateTecnicaActual({...tecActual, subcategorias: tecActual.subcategorias.map(s => s.id === subId ? {...s, opciones: s.opciones.map(o => o.id === opc.id ? {...o, nombre: d.nombre} : o)} : s)}); } }); };
          const handleEliminarOpcion = (subId, opcId) => { setModalConfig({ titulo: "Eliminar Variante", esConfirmacion: true, mensaje: "¿Eliminar variante?", campos: [], onSubmit: () => { if(tecActual) updateTecnicaActual({...tecActual, subcategorias: tecActual.subcategorias.map(s => s.id === subId ? {...s, opciones: s.opciones.filter(o => o.id !== opcId)} : s)}); } }); };

          const handleAgregarCosto = (subId, opcId, tipo) => { setModalConfig({ titulo: `Añadir Costo ${tipo === 'fijos' ? 'Fijo (Setup)' : 'Variable (U)'}`, campos: [ { id: 'nombre', label: 'Concepto:', type: 'text' }, { id: 'valor', label: 'Costo (L):', type: 'number' } ], onSubmit: (d) => { if(d.nombre && !isNaN(Number(d.valor)) && tecActual) { const nCosto = { id: `CST_${Date.now()}`, nombre: d.nombre, valor: Number(d.valor) }; updateTecnicaActual({...tecActual, subcategorias: tecActual.subcategorias.map(s => s.id === subId ? {...s, opciones: s.opciones.map(o => o.id === opcId ? {...o, [tipo === 'fijos' ? 'costosFijos' : 'costosVariables']: [...(tipo === 'fijos' ? o.costosFijos : o.costosVariables), nCosto]} : o)} : s)}); } } }); };
          const handleEliminarCosto = (subId, opcId, tipo, costoId) => { if(tecActual) updateTecnicaActual({...tecActual, subcategorias: tecActual.subcategorias.map(s => s.id === subId ? {...s, opciones: s.opciones.map(o => o.id === opcId ? {...o, [tipo === 'fijos' ? 'costosFijos' : 'costosVariables']: (tipo === 'fijos' ? o.costosFijos : o.costosVariables).filter(c => c.id !== costoId)} : o)} : s)}); };

        return (
            <div className="space-y-4 fade-in max-w-7xl mx-auto">
                {modalConfig && <CustomModal config={modalConfig} onClose={() => setModalConfig(null)} />}
                {showFichaTecnica && <ModalFichaTecnica onClose={() => setShowFichaTecnica(false)} />}
                {showTarifasUbicacionModal && subcatTarifasActiva && (
                     <ModalTarifasUbicacion 
                         ubicacion={subcatTarifasActiva} margenGlobal={margenGanancia} 
                         onSave={(margen, desc) => {
                             if(tecActual) updateTecnicaActual({...tecActual, subcategorias: tecActual.subcategorias.map(s => s.id === subcatTarifasActiva.id ? {...s, margen, descuentosVolumen: desc} : s)});
                         }} 
                         onClose={() => {setShowTarifasUbicacionModal(false); setSubcatTarifasActiva(null);}} 
                     />
                )}
                
                <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3 mb-3">
                    <h2 className="text-xl font-bold text-slate-800">Catálogo y Técnicas</h2>
                    <button onClick={() => setShowFichaTecnica(true)} className="text-[10px] bg-blue-100 text-blue-700 font-bold px-2.5 py-1.5 rounded hover:bg-blue-200 flex items-center gap-1"><Calculator size={12}/> Fórmulas</button>
                </div>

                <div className="flex gap-1 border-b border-slate-200 mb-3">
                    <button onClick={() => setTabActivo('PRODUCTOS')} className={`px-4 py-2 font-bold text-xs border-b-2 transition-colors ${tabActivo === 'PRODUCTOS' ? 'border-blue-600 text-blue-600' : 'border-transparent text-slate-500 hover:text-slate-700'}`}>Productos Base</button>
                    <button onClick={() => setTabActivo('TECNICAS')} className={`px-4 py-2 font-bold text-xs border-b-2 transition-colors ${tabActivo === 'TECNICAS' ? 'border-blue-600 text-blue-600' : 'border-transparent text-slate-500 hover:text-slate-700'}`}>Técnicas y Costos</button>
                </div>

                {tabActivo === 'PRODUCTOS' && (
                    <div className="space-y-3 fade-in">
                        <div className="flex items-center gap-1 bg-white p-1.5 rounded-lg shadow-sm border border-slate-200">
                             <button onClick={() => scrollTabsCat(-200)} className="p-1 text-slate-400 hover:text-slate-600"><ChevronLeft size={14}/></button>
                             <div ref={scrollRefCat} className="flex-1 flex gap-1.5 overflow-x-auto custom-scrollbar pb-1">

                    onSubmit: (d) => { if(d.nombre && d.email) onActualizarUsuario({ id: d.email, rol: 'CLIENTE', nombre: d.nombre, email: d.email, descuentoGlobal: Number(d.descuentoGlobal)||0, modoTest: !!d.modoTest }); }
                });
            };

            const handleEditarCliente = (u) => {
                 setModalConfig({
                    titulo: "Editar Cliente", valoresIniciales: { nombre: u.nombre, descuentoGlobal: u.descuentoGlobal, modoTest: u.modoTest },
                    campos: [ { id: 'nombre', label: 'Nombre:', type: 'text' }, { id: 'descuentoGlobal', label: 'Descuento VIP (%):', type: 'number' }, { id: 'modoTest', label: 'Modo Pruebas', type: 'boolean' } ],
                    onSubmit: (d) => { if(d.nombre) onActualizarUsuario({ ...u, nombre: d.nombre, descuentoGlobal: Number(d.descuentoGlobal)||0, modoTest: !!d.modoTest }); }

            return (

        function AjustesGlobales({ margenGanancia, impuestoGlobal, descuentosVolumen, setConfigGlobal, mensajesGlobales, adminSetMensajes }) {
             const [margen, setMargen] = useState(margenGanancia);
             const [impuesto, setImpuesto] = useState(impuestoGlobal);
             const [descuentos, setDescuentos] = useState(descuentosVolumen || []);
             const [mensajes, setMensajes] = useState(mensajesGlobales);

             const addTier = () => setDescuentos([...descuentos, { id: `desc_${Date.now()}`, min: 100, pct: 5, activo: true }]);
             const updateTier = (id, field, value) => setDescuentos(descuentos.map(d => d.id === id ? { ...d, [field]: field === 'activo' ? value : (value === '' ? '' : Number(value)) } : d));
             const removeTier = (id) => setDescuentos(descuentos.filter(d => d.id !== id));
             const handleSave = () => { setConfigGlobal(Number(margen), Number(impuesto), descuentos); adminSetMensajes(mensajes); };

             return (
                 <div className="space-y-4 fade-in max-w-4xl mx-auto">
                     <h2 className="text-xl font-bold text-slate-800">Ajustes Globales</h2>
                     <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                         <div className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm space-y-3">
                             <h3 className="font-bold text-xs text-blue-700 border-b border-slate-100 pb-1.5">Márgenes e Impuestos</h3>
                             <div><label className="text-[10px] font-bold text-slate-500 block mb-1">Margen Global (%)</label><input type="number" value={margen} onChange={e=>setMargen(e.target.value)} className="w-full p-2 rounded border border-slate-300 outline-none text-xs"/></div>
                             <div><label className="text-[10px] font-bold text-slate-500 block mb-1">Impuesto (ISV) (%)</label><input type="number" value={impuesto} onChange={e=>setImpuesto(e.target.value)} className="w-full p-2 rounded border border-slate-300 outline-none text-xs"/></div>
                         </div>
                         <div className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm space-y-3">
                             <div className="flex justify-between items-center border-b border-slate-100 pb-1.5">
                                 <h3 className="font-bold text-xs text-blue-700">Descuentos Volumen Globales</h3>
                                 <button onClick={addTier} className="text-[10px] bg-blue-100 text-blue-700 px-2 py-1 rounded hover:bg-blue-200 font-bold">+ Nivel</button>
                             </div>
                             <div className="space-y-1.5 max-h-[120px] overflow-y-auto custom-scrollbar">
                                 {descuentos.map(d => (
                                     <div key={d.id} className="flex gap-1.5 items-center text-xs">
                                         <input type="checkbox" checked={d.activo!==false} onChange={e=>updateTier(d.id, 'activo', e.target.checked)} className="w-3 h-3"/>
                                         <input type="number" placeholder="Min" value={d.min} onChange={e=>updateTier(d.id, 'min', e.target.value)} className="w-full p-1.5 rounded border border-slate-300 text-[10px]"/>
                                         <input type="number" placeholder="% OFF" value={d.pct} onChange={e=>updateTier(d.id, 'pct', e.target.value)} className="w-full p-1.5 rounded border border-slate-300 text-[10px]"/>
                                         <button onClick={()=>removeTier(d.id)} className="text-red-500 p-1"><Trash2 size={12}/></button>
                                     </div>
                                 ))}
                                 {descuentos.length===0 && <p className="text-[10px] text-slate-500">Sin descuentos.</p>}
                             </div>
                         </div>
                     </div>
                     <div className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm space-y-3">
                         <h3 className="font-bold text-xs text-blue-700 border-b border-slate-100 pb-1.5">Comunicaciones</h3>
                         <div><label className="text-[10px] font-bold text-slate-500 block mb-1">Aviso Portal Cliente</label><input type="text" value={mensajes.bienvenida||''} onChange={e=>setMensajes({...mensajes, bienvenida: e.target.value})} className="w-full p-2 rounded border border-slate-300 outline-none text-xs"/></div>
                         <div><label className="text-[10px] font-bold text-slate-500 block mb-1">Mensaje Promocional</label><textarea value={mensajes.promo||''} onChange={e=>setMensajes({...mensajes, promo: e.target.value})} className="w-full p-2 rounded border border-slate-300 outline-none text-xs h-12 resize-none"/></div>
                         <div className="grid grid-cols-2 gap-3">
                             <div><label className="text-[10px] font-bold text-slate-500 block mb-1">WhatsApp Empresa</label><input type="text" placeholder="Ej: 50499999999" value={mensajes.whatsappNumero||''} onChange={e=>setMensajes({...mensajes, whatsappNumero: e.target.value})} className="w-full p-2 rounded border border-slate-300 outline-none text-xs"/></div>
                             <div><label className="text-[10px] font-bold text-slate-500 block mb-1">Plantilla WhatsApp</label><textarea placeholder="{ID} y {TOTAL}" value={mensajes.whatsappTemplate||''} onChange={e=>setMensajes({...mensajes, whatsappTemplate: e.target.value})} className="w-full p-2 rounded border border-slate-300 outline-none text-xs h-12 resize-none"/></div>
                         </div>
                     </div>
                     <div className="flex justify-end"><button onClick={handleSave} className="bg-blue-600 text-white px-5 py-2 rounded-lg text-sm font-bold shadow-sm hover:bg-blue-500 flex items-center gap-1.5"><Save size={14}/> Guardar Todo</button></div>
                 </div>
             )
        }

        function PanelAdmin({ ordenes, categorias, setCategorias, catalogo, setCatalogo, tecnicas, setTecnicas, margenGanancia, impuestoGlobal, descuentosVolumen, setConfigGlobal, mensajesGlobales, adminSetMensajes, usuarios, onActualizarUsuario, onEliminarUsuario, recursos, onActualizarRecurso, onEliminarRecurso, onActualizarOrden, onEliminarOrden, onLogout, isConnectedToCloud, showToast }) {
            const [vista, setVista] = useState('DASHBOARD');
            const ingresosTotales = ordenes.filter(o => o.estado !== 'Cancelada').reduce((acc, o) => acc + (o.total || 0), 0);

            return (
                <div className="min-h-screen bg-slate-100 flex flex-col md:flex-row fade-in">
                    <aside className="w-full md:w-56 bg-slate-900 text-slate-300 flex flex-col shadow-xl z-20 md:h-screen md:sticky md:top-0">
                        <div className="p-4 border-b border-slate-800 flex items-center gap-2 text-white">
                            <div className="bg-blue-600 p-1.5 rounded"><Printer size={18} /></div>
                            <div>
                                <span className="text-sm font-bold leading-none block">PrintPro</span>
                                <span className="text-[8px] text-slate-400 font-bold uppercase tracking-widest">Admin</span>
                            </div>
                        </div>
                        <nav className="p-3 space-y-1 flex-1 overflow-y-auto custom-scrollbar">
                            <MenuBtnAdmin icon={LayoutDashboard} label="Dashboard" active={vista === 'DASHBOARD'} onClick={() => setVista('DASHBOARD')} />
                            <MenuBtnAdmin icon={ShoppingBag} label="Órdenes" active={vista === 'ORDENES'} onClick={() => setVista('ORDENES')} />
                            <MenuBtnAdmin icon={Layers} label="Catálogo/Costos" active={vista === 'CATALOGO'} onClick={() => setVista('CATALOGO')} />
                            <MenuBtnAdmin icon={Users} label="Clientes" active={vista === 'USUARIOS'} onClick={() => setVista('USUARIOS')} />
                            <MenuBtnAdmin icon={BookOpen} label="Archivos" active={vista === 'RECURSOS'} onClick={() => setVista('RECURSOS')} />
                            <MenuBtnAdmin icon={Settings} label="Ajustes Globales" active={vista === 'AJUSTES'} onClick={() => setVista('AJUSTES')} />
                        </nav>
                        <div className="p-3 border-t border-slate-800 bg-slate-900/50">
                            <ConnectionIndicator isConnectedToCloud={isConnectedToCloud} darkTheme={true} />
                            <button onClick={onLogout} className="w-full flex items-center justify-center gap-1.5 text-slate-400 hover:text-white hover:bg-red-600 mt-2 p-2 rounded-lg font-bold transition-colors text-xs"><LogOut size={14} /> Salir</button>
                        </div>
                    </aside>
                    <main className="flex-1 p-4 md:p-6 overflow-y-auto w-full">
                        {vista === 'DASHBOARD' && <DashboardAdmin ordenes={ordenes} ingresosTotales={ingresosTotales} />}
                        {vista === 'ORDENES' && <HistorialOrdenes ordenes={ordenes} onActualizarOrden={onActualizarOrden} onEliminarOrden={onEliminarOrden} mensajesGlobales={mensajesGlobales} showToast={showToast} />}
                        {vista === 'CATALOGO' && <GestionJerarquica categorias={categorias} setCategorias={setCategorias} catalogo={catalogo} setCatalogo={setCatalogo} tecnicas={tecnicas} setTecnicas={setTecnicas} margenGanancia={margenGanancia} impuestoGlobal={impuestoGlobal} descuentosVolumen={descuentosVolumen} setConfigGlobal={setConfigGlobal} />}
                        {vista === 'USUARIOS' && <GestionUsuarios usuarios={usuarios} onActualizarUsuario={onActualizarUsuario} onEliminarUsuario={onEliminarUsuario} />}
                        {vista === 'RECURSOS' && <GestionRecursos recursos={recursos} onActualizarRecurso={onActualizarRecurso} onEliminarRecurso={onEliminarRecurso} />}
                        {vista === 'AJUSTES' && <AjustesGlobales margenGanancia={margenGanancia} impuestoGlobal={impuestoGlobal} descuentosVolumen={descuentosVolumen} setConfigGlobal={setConfigGlobal} mensajesGlobales={mensajesGlobales} adminSetMensajes={adminSetMensajes} />}
                    </main>
                </div>
            );
        }

        const rootElement = document.getElementById('root');
        const root = ReactDOM.createRoot(rootElement);
        root.render(<App />);
    </script>
</body>
</html>
