<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrintPro - Cotizador VIP (Cloud Ready)</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        .custom-scrollbar::-webkit-scrollbar { height: 6px; width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #334155; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background-color: #475569; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        .slide-up { animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        /* ESTILOS PARA IMPRESIÓN PROFESIONAL */
        @media print {
            body * { visibility: hidden; }
            .print-area, .print-area * { visibility: visible; }
            .print-area { 
                position: absolute; 
                left: 0; top: 0; 
                width: 100%; 
                padding: 0;
                background: white; 
                color: black; 
                box-shadow: none !important;
                border: none !important;
            }
            .no-print { display: none !important; }
            .print-bg-slate-50 { background-color: #f8fafc !important; -webkit-print-color-adjust: exact; }
            .print-bg-blue-50 { background-color: #eff6ff !important; -webkit-print-color-adjust: exact; }
            .print-text-emerald { color: #059669 !important; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useMemo, useEffect, useRef } from 'https://esm.sh/react@18.2.0';
        import ReactDOM from 'https://esm.sh/react-dom@18.2.0/client';
        
        import { 
          LayoutDashboard, ShoppingBag, FileText, Settings, Users, Plus, CheckCircle, 
          Clock, Printer, LogOut, AlertCircle, Share2, Package, Edit3, Trash2, Save, X, 
          Pencil, Layers, Image as ImageIcon, Upload, MessageSquare, Eye, TrendingUp, Activity, Info, Cloud, Database, Lock, Megaphone, Bell, Calculator, BookOpen, Search, ChevronLeft, ChevronRight, ChevronDown, ChevronUp, MapPin, DollarSign, Percent, List
        } from 'https://esm.sh/lucide-react@0.292.0';
        
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut, setPersistence, browserSessionPersistence } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
        import { getFirestore, collection, doc, setDoc, onSnapshot, query, deleteDoc, where } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

        // Configuración Firebase
        const FIREBASE_PROD_CONFIG = {
          apiKey: "AIzaSyA_Xhl948W9g8vpxLdWzCFacnya8AURoXc",
          authDomain: "cotizador-pro-9ec69.firebaseapp.com",
          projectId: "cotizador-pro-9ec69",
          storageBucket: "cotizador-pro-9ec69.firebasestorage.app",
          messagingSenderId: "690349119743",
          appId: "1:690349119743:web:41530227ef8053e076d4ca",
          measurementId: "G-WGB6N9F8TC"
        };
        
        let app, auth, db;
        let appId = 'printpro-produccion';

        if (FIREBASE_PROD_CONFIG) {
            try {
                app = initializeApp(FIREBASE_PROD_CONFIG);
                auth = getAuth(app);
                db = getFirestore(app);
            } catch (error) { console.error("Error inicializando Firebase:", error); }
        }

        const loadLocal = (key, fallback) => { try { const item = window.localStorage.getItem(key); return item ? JSON.parse(item) : fallback; } catch (e) { return fallback; } };
        const saveLocal = (key, value) => { try { window.localStorage.setItem(key, JSON.stringify(value)); } catch(e) { console.error("Error saving local", e); } };
        const loadSession = (key, fallback) => { try { const item = window.sessionStorage.getItem(key); return item ? JSON.parse(item) : fallback; } catch (e) { return fallback; } };
        const saveSession = (key, value) => { try { window.sessionStorage.setItem(key, JSON.stringify(value)); } catch(e) { console.error("Error saving session", e); } };

        // Bases de datos iniciales
        const USUARIOS_BASE = [{ id: 'ADMIN_1', rol: 'ADMIN', username: 'admin', password: '123456', nombre: 'Administrador Principal' }];
        const CATEGORIAS_BASE = [{ id: 'cat1', nombre: 'Textiles' }, { id: 'cat2', nombre: 'Promocionales' }];
        const CATALOGO_BASE = [{ id: 'p1', nombre: 'Camiseta Algodón Premium', detalles: '100% algodón, pre-encogido, peso completo 200g.', categoriaId: 'cat1', tipo: 'Textil', costoBase: 80, imagenUrl: '', tecnicasRecomendadas: ['T_SERIGRAFIA'], ubicacionesAceptadas: [], cobraImpuesto: true }];
        const TECNICAS_BASE = [{ id: 'T_SERIGRAFIA', nombre: 'Serigrafía', cobraImpuesto: true, minimo: 12, subcategorias: [{ id: 'SUB_PECHO', nombre: 'Pecho', margen: 40, descuentosVolumen: [], opciones: [ { id: 'OP_1C', nombre: '1 Color', costosFijos: [{ id: 'cf1', nombre: 'Revelado', valor: 250 }], costosVariables: [{ id: 'cv1', nombre: 'Impresión', valor: 15 }] } ] }] }];
        const DESCUENTOS_VOL_BASE = [{ id: 'd1', min: 500, pct: 15, activo: true }, { id: 'd2', min: 100, pct: 8, activo: true }, { id: 'd3', min: 50, pct: 4, activo: true }];
        const ESTADOS_DISPONIBLES = ['Cotización enviada', 'Pendiente', 'Aprobado / En producción', 'Control de calidad', 'Listo para envío', 'Entrega parcial', 'Finalizado / Entregado', 'Cancelada'];
        const MENSAJES_BASE = { bienvenida: '¡Bienvenido a tu portal VIP de cotizaciones!', promo: 'Aviso importante: Aprovecha nuestras tarifas preferenciales automatizadas.', whatsappTemplate: '¡Hola! Te comparto los detalles, orden #{ID} por un total de L {TOTAL}. Quedamos a disposición.', whatsappNumero: '' };

        function MenuBtn({ icon: Icon, label, active, onClick }) {
            return (
                <button onClick={onClick} className={`w-full flex items-center gap-3 p-3.5 rounded-xl font-bold transition-all ${active ? 'bg-blue-600 text-white shadow-md' : 'text-slate-600 hover:bg-slate-100 hover:text-slate-900'}`}>
                    <Icon size={20} /> <span>{label}</span>
                </button>
            );
        }

        function MenuBtnAdmin({ icon: Icon, label, active, onClick }) {
            return (
                <button onClick={onClick} className={`w-full flex items-center gap-3 p-3.5 rounded-xl font-bold transition-all ${active ? 'bg-blue-600 text-white shadow-md shadow-blue-900/20' : 'text-slate-400 hover:bg-slate-800 hover:text-white'}`}>
                    <Icon size={20} /> <span className="hidden lg:inline">{label}</span>
                </button>
            );
        }

        function EstadoBadge({ estado }) {
            const colors = {
                'Cotización enviada': 'bg-blue-100 text-blue-700 border-blue-200',
                'Pendiente': 'bg-amber-100 text-amber-700 border-amber-200',
                'Aprobado / En producción': 'bg-purple-100 text-purple-700 border-purple-200',
                'Control de calidad': 'bg-indigo-100 text-indigo-700 border-indigo-200',
                'Listo para envío': 'bg-cyan-100 text-cyan-700 border-cyan-200',
                'Entrega parcial': 'bg-teal-100 text-teal-700 border-teal-200',
                'Finalizado / Entregado': 'bg-emerald-100 text-emerald-700 border-emerald-200',
                'Cancelada': 'bg-red-100 text-red-700 border-red-200'
            };
            const c = colors[estado] || 'bg-slate-100 text-slate-700 border-slate-200';
            return <span className={`px-2.5 py-1 rounded-lg text-[10px] font-bold border uppercase tracking-wider ${c}`}>{estado}</span>;
        }

        function CustomModal({ config, onClose }) {
            const [form, setForm] = useState(config.valoresIniciales || {});
            const handleChange = (id, val) => setForm(prev => ({...prev, [id]: val}));
            
            const handleFile = (id, file) => {
                if(!file) return;
                const reader = new FileReader();
                reader.onload = (e) => handleChange(id, e.target.result);
                reader.readAsDataURL(file);
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                config.onSubmit(form);
                onClose();
            };

            return (
                <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-sm flex items-center justify-center z-[100] p-4 fade-in">
                    <div className="bg-slate-800 rounded-2xl shadow-2xl w-full max-w-lg border border-slate-600 overflow-hidden flex flex-col max-h-[90vh]">
                        <div className="p-6 border-b border-slate-700 flex justify-between items-center bg-slate-800/80 sticky top-0 z-10">
                            <h3 className="text-xl font-bold text-white">{config.titulo}</h3>
                            <button onClick={onClose} type="button" className="text-slate-400 hover:text-white transition-colors bg-slate-900 p-1.5 rounded-lg border border-slate-700"><X size={20}/></button>
                        </div>
                        <div className="p-6 overflow-y-auto custom-scrollbar flex-1">
                            {config.esConfirmacion ? (
                                <p className="text-slate-300 text-lg mb-6 text-center py-4">{config.mensaje}</p>
                            ) : (
                                <form id="modal-form" onSubmit={handleSubmit} className="space-y-4">
                                    {config.campos.map(c => (
                                        <div key={c.id}>
                                            <label className="block text-sm font-bold text-slate-400 mb-2">{c.label}</label>
                                            {c.type === 'textarea' ? (
                                                <textarea value={form[c.id] || ''} onChange={e=>handleChange(c.id, e.target.value)} maxLength={c.maxLength} className="w-full p-3 rounded-xl bg-slate-900 border border-slate-700 text-white outline-none focus:border-blue-500 resize-none h-24 shadow-inner" />
                                            ) : c.type === 'select' ? (
                                                <select value={form[c.id] || ''} onChange={e=>handleChange(c.id, e.target.value)} className="w-full p-3 rounded-xl bg-slate-900 border border-slate-700 text-white outline-none focus:border-blue-500 shadow-inner">
                                                    <option value="">-- Seleccionar --</option>
                                                    {c.options.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}
                                                </select>
                                            ) : c.type === 'checkboxGroup' ? (
                                                <div className="bg-slate-900 border border-slate-700 rounded-xl p-3 max-h-40 overflow-y-auto space-y-2 custom-scrollbar shadow-inner">
                                                    {c.options.map(o => (
                                                        <label key={o.value} className="flex items-center gap-2 text-sm text-slate-300 hover:bg-slate-800 p-1.5 rounded-lg cursor-pointer transition-colors">
                                                            <input type="checkbox" checked={(form[c.id] || []).includes(o.value)} onChange={(e) => {
                                                                const current = form[c.id] || [];
                                                                handleChange(c.id, e.target.checked ? [...current, o.value] : current.filter(x => x !== o.value));
                                                            }} className="accent-blue-500 w-4 h-4 cursor-pointer" />
                                                            {o.label}
                                                        </label>
                                                    ))}
                                                    {c.options.length === 0 && <p className="text-xs text-slate-500 italic p-2">No hay opciones disponibles.</p>}
                                                </div>
                                            ) : c.type === 'boolean' ? (
                                                <label className="flex items-center gap-3 text-sm font-bold text-slate-300 mt-2 bg-slate-900 p-3 rounded-xl border border-slate-700 cursor-pointer">
                                                    <input type="checkbox" checked={!!form[c.id]} onChange={e=>handleChange(c.id, e.target.checked)} className="accent-blue-500 w-5 h-5 cursor-pointer" />
                                                    Activar
                                                </label>
                                            ) : (
                                                <input type={c.type} step={c.type === 'number' ? 'any' : undefined} value={form[c.id] !== undefined ? form[c.id] : ''} onChange={e=>handleChange(c.id, e.target.value)} className="w-full p-3 rounded-xl bg-slate-900 border border-slate-700 text-white outline-none focus:border-blue-500 shadow-inner" required={c.required} />
                                            )}
                                        </div>
                                    ))}
                                </form>
                            )}
                        </div>
                        <div className="p-6 border-t border-slate-700 flex justify-end gap-3 bg-slate-800/80 sticky bottom-0 z-10">
                            <button type="button" onClick={onClose} className="px-6 py-3 rounded-xl font-bold text-slate-300 hover:bg-slate-700 hover:text-white transition-colors">Cancelar</button>
                            <button type="submit" form={!config.esConfirmacion ? "modal-form" : undefined} onClick={config.esConfirmacion ? handleSubmit : undefined} className={`px-8 py-3 rounded-xl font-bold text-white shadow-lg transition-colors ${config.esConfirmacion ? 'bg-red-600 hover:bg-red-500' : 'bg-blue-600 hover:bg-blue-500'}`}>
                                {config.submitLabel || 'Guardar Datos'}
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        function ConnectionIndicator({ isConnectedToCloud, darkTheme = false }) {
            return (
                <div className={`p-3 rounded-xl flex items-center gap-3 text-xs font-bold transition-all shadow-sm
                    ${isConnectedToCloud ? (darkTheme ? 'bg-emerald-500/10 text-emerald-400 border border-emerald-500/30' : 'bg-emerald-50 text-emerald-700 border border-emerald-200') : (darkTheme ? 'bg-amber-500/10 text-amber-400 border border-amber-500/30' : 'bg-amber-50 text-amber-700 border border-amber-200')}
                `}>
                    <div className="relative flex h-3 w-3 shrink-0">{isConnectedToCloud && <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>}<span className={`relative inline-flex rounded-full h-3 w-3 ${isConnectedToCloud ? 'bg-emerald-500' : 'bg-amber-500'}`}></span></div>
                    <div><p className="uppercase tracking-wider opacity-80 text-[10px]">Estado del Sistema</p><p>{isConnectedToCloud ? 'Sincronización (Nube)' : 'Local (Sin Nube)'}</p></div>
                </div>
            );
        }

        function App() {
          const [userDb, setUserDb] = useState(null); 
          const [usuarios, setUsuarios] = useState(() => loadLocal('usuarios', USUARIOS_BASE));
          const [usuarioActual, setUsuarioActual] = useState(() => loadSession('sesionActiva', null)); 
          const [ordenes, setOrdenes] = useState(() => loadLocal('ordenes', []));
          const [categorias, setCategorias] = useState(() => loadLocal('categorias', CATEGORIAS_BASE));
          const [catalogo, setCatalogo] = useState(() => loadLocal('catalogo', CATALOGO_BASE));
          const [tecnicas, setTecnicas] = useState(() => loadLocal('tecnicas', TECNICAS_BASE)); 
          const [recursos, setRecursos] = useState(() => loadLocal('recursos', []));
          const [mensajesGlobales, setMensajesGlobales] = useState(() => loadLocal('mensajes', MENSAJES_BASE)); 
          const [margenGanancia, setMargenGanancia] = useState(() => loadLocal('margenGanancia', 40)); 
          const [impuestoGlobal, setImpuestoGlobal] = useState(() => loadLocal('impuestoGlobal', 15)); 
          const [descuentosVolumen, setDescuentosVolumen] = useState(() => loadLocal('descuentosVol', DESCUENTOS_VOL_BASE));
          
          const [loadingData, setLoadingData] = useState(true);
          const [isConnectedToCloud, setIsConnectedToCloud] = useState(!!app && !!auth);
          const [toastInfo, setToastInfo] = useState(null);

          const showToast = (message, type = 'success') => {
              setToastInfo({ message, type });
              setTimeout(() => setToastInfo(null), 3500);
          };

          useEffect(() => {
              if (usuarioActual) saveSession('sesionActiva', usuarioActual);
              else window.sessionStorage.removeItem('sesionActiva');
          }, [usuarioActual]);

          useEffect(() => {
            if (!auth) { 
                setLoadingData(false); 
                setIsConnectedToCloud(false); 
                return; 
            } 
            const initAuth = async () => {
              try { await setPersistence(auth, browserSessionPersistence); } catch (e) { console.error("⛔ Error Auth", e); } finally { setLoadingData(false); }
            };
            initAuth();
            
            const unsub = onAuthStateChanged(auth, (user) => { 
                setUserDb(user); 
                if(!user) { setUsuarioActual(null); }
            });
            return () => unsub();
          }, []);

          useEffect(() => {
            if (!db || !userDb) { return; }
            const basePath = 'public'; 
            setLoadingData(true);
            const isAdmin = userDb.email === 'admin@printpro.com';
            
            const unsubCatList = onSnapshot(collection(db, 'artifacts', appId, basePath, 'data', 'categorias'), (snap) => { 
                setCategorias(snap.docs.map(d => d.data())); 
            }, console.error);
            const unsubCat = onSnapshot(collection(db, 'artifacts', appId, basePath, 'data', 'catalogo'), (snap) => { if (!snap.empty) setCatalogo(snap.docs.map(d => d.data())); else dbGuardarLista('catalogo', catalogo); }, console.error);
            const unsubTec = onSnapshot(collection(db, 'artifacts', appId, basePath, 'data', 'tecnicas'), (snap) => { if (!snap.empty) setTecnicas(snap.docs.map(d => d.data())); else dbGuardarLista('tecnicas', tecnicas); }, console.error);
            const unsubRec = onSnapshot(collection(db, 'artifacts', appId, basePath, 'data', 'recursos'), (snap) => { setRecursos(snap.docs.map(d => d.data())); }, console.error);
            
            let unsubUsu;
            if (isAdmin) {
                unsubUsu = onSnapshot(collection(db, 'artifacts', appId, basePath, 'data', 'usuarios'), (snap) => { 
                    const allUsers = snap.docs.map(d => d.data());
                    if (!snap.empty) setUsuarios(allUsers); 
                    setUsuarioActual(allUsers.find(u => u.id === userDb.uid) || { id: userDb.uid, rol: 'ADMIN', nombre: 'Administrador Principal', username: userDb.email });
                }, console.error);
            } else {
                unsubUsu = onSnapshot(doc(db, 'artifacts', appId, basePath, 'data', 'usuarios', userDb.uid), (docSnap) => {
                    if (docSnap.exists()) setUsuarioActual(docSnap.data());
                    else setUsuarioActual({ id: userDb.uid, rol: 'CLIENTE', nombre: userDb.email, descuentoGlobal: 0 });
                }, console.error);
            }
            
            let unsubOrd;
            if (isAdmin) {
                unsubOrd = onSnapshot(collection(db, 'artifacts', appId, basePath, 'data', 'ordenes'), (snap) => { setOrdenes(snap.docs.map(d => d.data())); }, console.error);
            } else {
                unsubOrd = onSnapshot(query(collection(db, 'artifacts', appId, basePath, 'data', 'ordenes'), where('clienteId', '==', userDb.uid)), (snap) => { setOrdenes(snap.docs.map(d => d.data())); }, console.error);
            }
            
            const unsubConf = onSnapshot(collection(db, 'artifacts', appId, basePath, 'data', 'config'), (snap) => { 
                const configDoc = snap.docs.find(d => d.id === 'general');
                if (configDoc) { 
                    const d = configDoc.data();
                    setMargenGanancia(d.margenGanancia !== undefined ? d.margenGanancia : 40); 
                    setImpuestoGlobal(d.impuestoGlobal !== undefined ? d.impuestoGlobal : 15); 
                    if(d.descuentosVolumen) setDescuentosVolumen(d.descuentosVolumen);
                }
                const msgDoc = snap.docs.find(d => d.id === 'mensajes');
                if (msgDoc) setMensajesGlobales(msgDoc.data());
            }, console.error);

            setLoadingData(false);
            return () => { unsubCatList(); unsubCat(); unsubTec(); unsubRec(); if(unsubUsu) unsubUsu(); if(unsubOrd) unsubOrd(); unsubConf(); };
          }, [userDb]);

          const dbGuardar = async (coleccion, id, data) => { 
            if (db && isConnectedToCloud) {
                try { await setDoc(doc(db, 'artifacts', appId, 'public', 'data', coleccion, id), data); } 
                catch (error) { console.error(`Error guardando (${coleccion}):`, error); showToast(`Error al guardar datos.`, 'error'); }
            }
          };
          const dbEliminar = async (coleccion, id) => { 
            if (db && isConnectedToCloud) {
                try { await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', coleccion, id)); } 
                catch (error) { console.error(`Error eliminando (${coleccion}):`, error); showToast(`Error al eliminar registro.`, 'error'); }
            }
          };
          const dbGuardarLista = async (coleccion, lista) => { 
            if(db && isConnectedToCloud) {
                try { await Promise.all(lista.map(item => dbGuardar(coleccion, item.id, item))); } 
                catch (error) { console.error(`Error guardando lista (${coleccion}):`, error); }
            } 
          };

          // Admin Handlers
          const adminSetCategorias = (nuevasCategorias) => {
               if(isConnectedToCloud) {
                   const idsActuales = nuevasCategorias.map(c => c.id);
                   categorias.forEach(c => { if(!idsActuales.includes(c.id)) dbEliminar('categorias', c.id); });
                   nuevasCategorias.forEach(c => dbGuardar('categorias', c.id, c));
               } else { setCategorias(nuevasCategorias); saveLocal('categorias', nuevasCategorias); }
               showToast('Categorías actualizadas');
          };
          const adminSetCatalogo = (nuevoCatalogo) => {
            if(isConnectedToCloud) { const idsActuales = nuevoCatalogo.map(c => c.id); catalogo.forEach(c => { if(!idsActuales.includes(c.id)) dbEliminar('catalogo', c.id); }); nuevoCatalogo.forEach(c => dbGuardar('catalogo', c.id, c)); } 
            else { setCatalogo(nuevoCatalogo); saveLocal('catalogo', nuevoCatalogo); }
            showToast('Catálogo actualizado');
          };
          const adminSetTecnicas = (nuevasTecnicas) => {
            if(isConnectedToCloud) { const idsActuales = nuevasTecnicas.map(c => c.id); tecnicas.forEach(t => { if(!idsActuales.includes(t.id)) dbEliminar('tecnicas', t.id); }); nuevasTecnicas.forEach(t => dbGuardar('tecnicas', t.id, t)); } 
            else { setTecnicas(nuevasTecnicas); saveLocal('tecnicas', nuevasTecnicas); }
            showToast('Configuración de técnicas guardada');
          };

          const handleActualizarOrden = (ordenAct) => {
            if(isConnectedToCloud) dbGuardar('ordenes', ordenAct.id, ordenAct); else { const newOrders = ordenes.map(o => o.id === ordenAct.id ? ordenAct : o); setOrdenes(newOrders); saveLocal('ordenes', newOrders); }
            showToast('Orden actualizada');
          }
          const handleCrearOrden = (nuevaOrden) => {
            if(isConnectedToCloud) dbGuardar('ordenes', nuevaOrden.id, nuevaOrden); else { const newOrders = [nuevaOrden, ...ordenes]; setOrdenes(newOrders); saveLocal('ordenes', newOrders); }
            showToast('Cotización generada con éxito');
          };
          const handleEliminarOrden = (id) => {
              if(isConnectedToCloud) dbEliminar('ordenes', id); else { const newOrders = ordenes.filter(o => o.id !== id); setOrdenes(newOrders); saveLocal('ordenes', newOrders); }
              showToast('Orden eliminada');
          };
          
          const handleLogout = async () => {
              setUsuarioActual(null);
              if (auth && auth.currentUser) try { await signOut(auth); } catch(e) { console.error("Error al salir", e); }
          };

          if (loadingData) return ( <div className="min-h-screen bg-slate-900 flex flex-col items-center justify-center text-white font-bold fade-in"><Database size={48} className="text-blue-500 mb-4 animate-bounce" /><p>Conectando al Sistema Seguro...</p></div> );
          
          return (
             <>
                 {toastInfo && (
                    <div className="fixed bottom-6 right-6 z-[9999] slide-up">
                        <div className={`px-6 py-4 rounded-xl shadow-2xl flex items-center gap-3 text-white font-bold max-w-sm ${toastInfo.type === 'error' ? 'bg-red-600' : 'bg-slate-800 border-l-4 border-emerald-500'}`}>
                            {toastInfo.type === 'error' ? <AlertCircle size={22}/> : <CheckCircle size={22} className="text-emerald-400" />}
                            <p className="text-sm">{toastInfo.message}</p>
                        </div>
                    </div>
                 )}

                 {!usuarioActual ? (
                    <PantallaLogin auth={auth} isConnectedToCloud={isConnectedToCloud} />
                 ) : usuarioActual.rol === 'ADMIN' ? (
                    <PanelAdmin 
                        ordenes={ordenes} 
                        categorias={categorias} setCategorias={adminSetCategorias}
                        catalogo={catalogo} setCatalogo={adminSetCatalogo} 
                        tecnicas={tecnicas} setTecnicas={adminSetTecnicas}
                        onActualizarOrden={handleActualizarOrden} onEliminarOrden={handleEliminarOrden} onLogout={handleLogout} isConnectedToCloud={isConnectedToCloud} showToast={showToast}
                    />
                 ) : (
                    <PortalClienteVIP 
                        cliente={usuarioActual} catalogo={catalogo} categorias={categorias} tecnicas={tecnicas} margenGanancia={margenGanancia} impuestoGlobal={impuestoGlobal} descuentosVolumen={descuentosVolumen}
                        ordenes={ordenes.filter(o => o.clienteId === usuarioActual.id)} onCrearOrden={handleCrearOrden} onActualizarOrden={handleActualizarOrden}
                        mensajesGlobales={mensajesGlobales} recursos={recursos} onLogout={handleLogout} isConnectedToCloud={isConnectedToCloud} showToast={showToast}
                    />
                 )}
             </>
          );
        }

        function PantallaLogin({ auth, isConnectedToCloud }) {
          const [username, setUsername] = useState('');
          const [password, setPassword] = useState('');
          const [error, setError] = useState('');
          const [loading, setLoading] = useState(false);

          const handleAuth = async (e) => {
            e.preventDefault();
            setError(''); setLoading(true);
            try {
              if (isConnectedToCloud && auth) await signInWithEmailAndPassword(auth, username, password);
              else setError('El sistema requiere conexión a la nube activa.');
            } catch (err) { setError('Correo o contraseña incorrectos. Verifica tus credenciales.'); } finally { setLoading(false); }
          };

          return (
            <div className="min-h-screen bg-slate-900 flex items-center justify-center p-4">
              <div className="bg-white rounded-3xl shadow-2xl overflow-hidden w-full max-w-4xl flex fade-in">
                <div className="w-1/2 bg-blue-600 p-12 text-white flex-col justify-center hidden md:flex relative">
                  <Printer size={64} className="mb-6 z-10" />
                  <h1 className="text-4xl font-bold mb-1 z-10">PrintPro</h1>
                  <p className="text-xs font-bold text-blue-200 uppercase tracking-widest mb-6 z-10">Powered By IMPAK Print Lab</p>
                  <p className="text-blue-100 text-lg z-10 mb-8">Cotizador VIP de Servicios de Personalización, Estampado e Impresión Profesional, Todo-en-uno.</p>
                </div>
                <div className="w-full md:w-1/2 p-12 flex flex-col justify-center">
                  <h2 className="text-2xl font-bold text-slate-800 mb-2">Acceso Seguro</h2>
                  <p className="text-sm text-slate-500 mb-6">Ingresa con el correo proporcionado por tu ejecutivo.</p>
                  {error && <div className={`mb-4 p-3 rounded-xl text-sm font-semibold bg-red-100 text-red-700`}>{error}</div>}
                  <form onSubmit={handleAuth} className="space-y-4">
                    <input required type="email" placeholder="Correo Electrónico" value={username} onChange={e=>setUsername(e.target.value)} className="w-full p-3 rounded-xl border border-slate-200 outline-none focus:border-blue-500" />
                    <input required type="password" placeholder="Contraseña" value={password} onChange={e=>setPassword(e.target.value)} className="w-full p-3 rounded-xl border border-slate-200 outline-none focus:border-blue-500" />
                    <button type="submit" disabled={loading} className="w-full bg-slate-900 text-white font-bold p-4 rounded-xl hover:bg-slate-800 mt-4 transition-colors disabled:opacity-70">{loading ? 'Verificando...' : 'Ingresar'}</button>
                  </form>
                </div>
              </div>
            </div>
          );
        }

        function PanelAdmin({ ordenes, categorias, setCategorias, catalogo, setCatalogo, tecnicas, setTecnicas, onActualizarOrden, onEliminarOrden, onLogout, isConnectedToCloud, showToast }) {
            const [vista, setVista] = useState('DASHBOARD'); 

            return (
                <div className="min-h-screen bg-slate-900 flex flex-col md:flex-row fade-in text-white">
                    <aside className="w-full md:w-64 bg-slate-950 border-r border-slate-800 flex flex-col shadow-2xl z-10 no-print md:h-screen md:sticky md:top-0">
                        <div className="p-6 flex items-center gap-3 text-blue-500 border-b border-slate-800">
                            <Printer size={28} /><span className="text-xl font-bold tracking-tight">PrintPro <span className="text-xs text-slate-500 font-normal">ADMIN</span></span>
                        </div>
                        <nav className="p-4 space-y-1 overflow-y-auto flex-1 custom-scrollbar">
                            <p className="text-xs font-bold text-slate-600 mb-3 px-2 mt-2 uppercase tracking-wider">Gestión Principal</p>
                            <MenuBtnAdmin icon={LayoutDashboard} label="Dashboard & Cotiz." active={vista === 'DASHBOARD'} onClick={() => setVista('DASHBOARD')} />
                            <MenuBtnAdmin icon={ShoppingBag} label="Catálogo Base" active={vista === 'CATALOGO'} onClick={() => setVista('CATALOGO')} />
                            <MenuBtnAdmin icon={Settings} label="Técnicas y Ubicaciones" active={vista === 'TECNICAS'} onClick={() => setVista('TECNICAS')} />
                        </nav>
                        <div className="p-4 border-t border-slate-800 bg-slate-950/50">
                            <ConnectionIndicator isConnectedToCloud={isConnectedToCloud} darkTheme={true} />
                            <button onClick={onLogout} className="w-full flex items-center justify-center gap-2 text-slate-400 hover:text-red-400 hover:bg-red-950 mt-4 p-3 rounded-xl font-bold transition-colors border border-transparent hover:border-red-900/50"><LogOut size={18} /> Salir del Panel</button>
                        </div>
                    </aside>

                    <main className="flex-1 p-4 md:p-8 overflow-y-auto custom-scrollbar relative">
                        {vista === 'DASHBOARD' && <AdminDashboardCotizaciones ordenes={ordenes} onActualizarOrden={onActualizarOrden} onEliminarOrden={onEliminarOrden} />}
                        {vista === 'CATALOGO' && <AdminCatalogo catalogo={catalogo} setCatalogo={setCatalogo} categorias={categorias} tecnicas={tecnicas} showToast={showToast} />}
                        {vista === 'TECNICAS' && <AdminTecnicas tecnicas={tecnicas} setTecnicas={setTecnicas} showToast={showToast} />}
                    </main>
                </div>
            );
        }

        function AdminDashboardCotizaciones({ ordenes, onActualizarOrden, onEliminarOrden }) {
            const ingresosTotales = ordenes.reduce((acc, ord) => acc + ord.total, 0);
            const pendientes = ordenes.filter(o => ['Pendiente', 'Cotización enviada'].includes(o.estado)).length;

            return (
                <div className="max-w-7xl mx-auto fade-in">
                    <h2 className="text-3xl font-bold mb-6">Dashboard y Gestión de Cotizaciones</h2>
                    
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                        <div className="bg-slate-800 border border-slate-700 p-6 rounded-2xl flex items-center gap-4">
                            <div className="p-3 bg-blue-500/20 text-blue-400 rounded-xl"><FileText size={24} /></div>
                            <div><p className="text-slate-400 text-sm font-bold">Total Órdenes</p><p className="text-2xl font-bold">{ordenes.length}</p></div>
                        </div>
                        <div className="bg-slate-800 border border-slate-700 p-6 rounded-2xl flex items-center gap-4">
                            <div className="p-3 bg-emerald-500/20 text-emerald-400 rounded-xl"><TrendingUp size={24} /></div>
                            <div><p className="text-slate-400 text-sm font-bold">Volumen Generado</p><p className="text-2xl font-bold">L {ingresosTotales.toFixed(2)}</p></div>
                        </div>
                        <div className="bg-slate-800 border border-slate-700 p-6 rounded-2xl flex items-center gap-4">
                            <div className="p-3 bg-amber-500/20 text-amber-400 rounded-xl"><Clock size={24} /></div>
                            <div><p className="text-slate-400 text-sm font-bold">Trámites Pendientes</p><p className="text-2xl font-bold">{pendientes}</p></div>
                        </div>
                    </div>

                    <div className="bg-slate-800 border border-slate-700 rounded-2xl overflow-hidden shadow-lg">
                        <div className="p-6 border-b border-slate-700 flex justify-between items-center bg-slate-800/80">
                            <h3 className="font-bold text-lg flex items-center gap-2"><List size={20} className="text-blue-400" /> Historial de Cotizaciones</h3>
                        </div>
                        <div className="overflow-x-auto">
                            <table className="w-full text-left text-sm">
                                <thead className="bg-slate-900/50 text-slate-400 border-b border-slate-700 text-xs uppercase">
                                    <tr>
                                        <th className="p-4 font-bold">ID / Fecha</th>
                                        <th className="p-4 font-bold">Cliente / Proyecto</th>
                                        <th className="p-4 font-bold">Cantidad</th>
                                        <th className="p-4 font-bold">Total</th>
                                        <th className="p-4 font-bold">Estado</th>
                                        <th className="p-4 font-bold text-right">Acciones</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {ordenes.length === 0 ? (
                                        <tr><td colSpan="6" className="p-8 text-center text-slate-500">No hay órdenes registradas.</td></tr>
                                    ) : (
                                        ordenes.map(ord => (
                                            <tr key={ord.id} className="border-b border-slate-700/50 hover:bg-slate-700/30 transition-colors">
                                                <td className="p-4"><p className="font-bold text-blue-400">{ord.id}</p><p className="text-xs text-slate-500">{ord.fecha}</p></td>
                                                <td className="p-4"><p className="font-bold">{ord.clienteNombre}</p><p className="text-xs text-slate-400 max-w-xs truncate">{ord.producto}</p></td>
                                                <td className="p-4 font-bold">{ord.cantidad}</td>
                                                <td className="p-4 font-bold text-emerald-400">L {ord.total.toFixed(2)}</td>
                                                <td className="p-4"><EstadoBadge estado={ord.estado} /></td>
                                                <td className="p-4 text-right flex justify-end gap-2">
                                                    <select value={ord.estado} onChange={(e) => onActualizarOrden({...ord, estado: e.target.value})} className="bg-slate-900 border border-slate-600 rounded-lg p-2 text-xs outline-none text-slate-300 focus:border-blue-500">
                                                        {ESTADOS_DISPONIBLES.map(est => <option key={est} value={est}>{est}</option>)}
                                                    </select>
                                                    <button onClick={() => { if(confirm('¿Eliminar esta orden?')) onEliminarOrden(ord.id); }} className="p-2 bg-slate-900 border border-red-900/30 text-red-400 rounded-lg hover:bg-red-900 hover:text-white transition-colors"><Trash2 size={16}/></button>
                                                </td>
                                            </tr>
                                        ))
                                    )}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        }

        function AdminCatalogo({ catalogo, setCatalogo, categorias, tecnicas, showToast }) {
            const [modalConfig, setModalConfig] = useState(null);

            const handleEditar = (prod = null) => {
                setModalConfig({
                    titulo: prod ? 'Editar Producto' : 'Nuevo Producto',
                    valoresIniciales: prod || { cobraImpuesto: true, tecnicasRecomendadas: [] },
                    campos: [
                        { id: 'nombre', label: 'Nombre del Producto', type: 'text', required: true },
                        { id: 'categoriaId', label: 'Categoría', type: 'select', options: categorias.map(c => ({value: c.id, label: c.nombre})) },
                        { id: 'tipo', label: 'Tipo', type: 'select', options: [{value: 'Textil', label: 'Textil'}, {value: 'Promocional', label: 'Promocional'}] },
                        { id: 'costoBase', label: 'Costo Base (L)', type: 'number', required: true },
                        { id: 'detalles', label: 'Detalles / Descripción', type: 'textarea' },
                        { id: 'tecnicasRecomendadas', label: 'Técnicas Permitidas', type: 'checkboxGroup', options: tecnicas.map(t => ({value: t.id, label: t.nombre})) },
                        { id: 'cobraImpuesto', label: '¿Aplica Impuesto (ISV)?', type: 'boolean' }
                    ],
                    onSubmit: (form) => {
                        const nuevoProd = { ...form, id: prod ? prod.id : `PROD_${Date.now()}`, costoBase: Number(form.costoBase) };
                        if (prod) setCatalogo(catalogo.map(c => c.id === prod.id ? nuevoProd : c));
                        else setCatalogo([...catalogo, nuevoProd]);
                        showToast(`Producto ${prod ? 'actualizado' : 'creado'} exitosamente.`);
                    }
                });
            };

            const handleEliminar = (id) => {
                if(confirm('¿Estás seguro de eliminar este producto del catálogo?')) {
                    setCatalogo(catalogo.filter(c => c.id !== id));
                    showToast('Producto eliminado');
                }
            };

            return (
                <div className="max-w-7xl mx-auto fade-in">
                    <div className="flex justify-between items-center mb-6">
                        <h2 className="text-3xl font-bold">Catálogo de Productos</h2>
                        <button onClick={() => handleEditar()} className="bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded-xl font-bold flex items-center gap-2"><Plus size={18}/> Nuevo Producto</button>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-4">
                        {catalogo.map(prod => (
                            <div key={prod.id} className="bg-slate-800 border border-slate-700 rounded-2xl p-5 hover:border-slate-500 transition-colors flex flex-col h-full shadow-md">
                                <div className="flex justify-between items-start mb-2">
                                    <span className="text-xs font-bold text-blue-400 bg-blue-900/30 px-2 py-1 rounded-md">{prod.tipo}</span>
                                    <div className="flex gap-1">
                                        <button onClick={() => handleEditar(prod)} className="p-1.5 text-slate-400 hover:text-white bg-slate-700/50 rounded hover:bg-blue-600 transition-colors"><Pencil size={14}/></button>
                                        <button onClick={() => handleEliminar(prod.id)} className="p-1.5 text-slate-400 hover:text-white bg-slate-700/50 rounded hover:bg-red-600 transition-colors"><Trash2 size={14}/></button>
                                    </div>
                                </div>
                                <h3 className="font-bold text-lg mb-1">{prod.nombre}</h3>
                                <p className="text-slate-400 text-xs mb-4 line-clamp-2">{prod.detalles}</p>
                                <div className="mt-auto pt-4 border-t border-slate-700 flex justify-between items-center">
                                    <span className="text-sm text-slate-500">Costo Base:</span>
                                    <span className="text-lg font-bold text-emerald-400">L {Number(prod.costoBase).toFixed(2)}</span>
                                </div>
                            </div>
                        ))}
                        {catalogo.length === 0 && <div className="col-span-full p-12 text-center text-slate-500 bg-slate-800 rounded-2xl border border-slate-700">El catálogo está vacío.</div>}
                    </div>

                    {modalConfig && <CustomModal config={modalConfig} onClose={() => setModalConfig(null)} />}
                </div>
            );
        }

        function AdminTecnicas({ tecnicas, setTecnicas, showToast }) {
            const [busqueda, setBusqueda] = useState('');
            const [itemsPorPagina, setItemsPorPagina] = useState(5);
            const [paginaActual, setPaginaActual] = useState(1);
            const [modalConfig, setModalConfig] = useState(null);

            const tecnicasFiltradas = useMemo(() => {
                return tecnicas.filter(t => t.nombre.toLowerCase().includes(busqueda.toLowerCase()));
            }, [tecnicas, busqueda]);

            const totalPaginas = Math.ceil(tecnicasFiltradas.length / itemsPorPagina) || 1;
            const tecnicasPaginadas = useMemo(() => {
                return tecnicasFiltradas.slice((paginaActual - 1) * itemsPorPagina, paginaActual * itemsPorPagina);
            }, [tecnicasFiltradas, paginaActual, itemsPorPagina]);

            useEffect(() => { setPaginaActual(1); }, [busqueda, itemsPorPagina]);

            const handleEditarSubcategoria = (tecnica, subcategoria) => {
                setModalConfig({
                    titulo: `Configurar Ubicación: ${subcategoria.nombre} (${tecnica.nombre})`,
                    valoresIniciales: { 
                        nombre: subcategoria.nombre,
                        margen: subcategoria.margen !== undefined ? subcategoria.margen : 40,
                        descVolActivo: subcategoria.descuentosVolumen && subcategoria.descuentosVolumen.length > 0 
                    },
                    campos: [
                        { id: 'nombre', label: 'Nombre de la Ubicación (Ej. Pecho, Espalda)', type: 'text', required: true },
                        { id: 'margen', label: 'Margen de Ganancia Específico (%)', type: 'number', required: true },
                        { id: 'descVolActivo', label: 'Habilitar Descuentos por Volumen para esta ubicación', type: 'boolean' }
                    ],
                    onSubmit: (form) => {
                        const newDescuentos = form.descVolActivo ? (subcategoria.descuentosVolumen || DESCUENTOS_VOL_BASE) : [];
                        const subActualizada = { ...subcategoria, nombre: form.nombre, margen: Number(form.margen), descuentosVolumen: newDescuentos };
                        
                        const newTecnicas = tecnicas.map(t => {
                            if(t.id === tecnica.id) {
                                return { ...t, subcategorias: t.subcategorias.map(s => s.id === subcategoria.id ? subActualizada : s) };
                            }
                            return t;
                        });
                        setTecnicas(newTecnicas);
                        showToast(`Tarifas y ubicación "${form.nombre}" actualizadas`);
                    }
                });
            };

            return (
                <div className="max-w-7xl mx-auto fade-in">
                    <div className="flex justify-between items-center mb-6">
                        <h2 className="text-3xl font-bold">Técnicas y Ubicaciones</h2>
                    </div>

                    <div className="bg-slate-800 p-4 rounded-xl border border-slate-700 flex flex-col sm:flex-row justify-between items-center gap-4 mb-6 shadow-sm">
                        <div className="relative w-full sm:w-96">
                            <Search className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" size={18} />
                            <input type="text" placeholder="Buscar técnica o ubicación..." value={busqueda} onChange={e=>setBusqueda(e.target.value)} className="w-full pl-10 pr-4 py-2.5 rounded-lg border border-slate-600 bg-slate-900 text-white outline-none focus:border-blue-500 shadow-inner transition-colors" />
                        </div>
                        <div className="flex items-center gap-3 w-full sm:w-auto">
                            <label className="text-sm text-slate-400 font-semibold whitespace-nowrap">Ver cantidad:</label>
                            <select value={itemsPorPagina} onChange={e=>setItemsPorPagina(Number(e.target.value))} className="p-2.5 border border-slate-600 rounded-lg outline-none bg-slate-900 text-white text-sm font-bold shadow-inner focus:border-blue-500 cursor-pointer">
                                <option value={5}>5 ítems</option>
                                <option value={10}>10 ítems</option>
                                <option value={20}>20 ítems</option>
                            </select>
                        </div>
                    </div>

                    <div className="space-y-4 mb-6">
                        {tecnicasPaginadas.length === 0 ? (
                            <div className="p-8 text-center bg-slate-800 border border-slate-700 rounded-xl text-slate-500">No se encontraron técnicas.</div>
                        ) : (
                            tecnicasPaginadas.map(tec => (
                                <div key={tec.id} className="bg-slate-800 border border-slate-700 rounded-2xl overflow-hidden shadow-md">
                                    <div className="p-4 bg-slate-700/30 border-b border-slate-700 flex justify-between items-center">
                                        <div>
                                            <h3 className="font-bold text-lg text-white flex items-center gap-2"><Layers size={18} className="text-blue-400" /> {tec.nombre}</h3>
                                            <p className="text-xs text-slate-400 mt-1">Mínimo: {tec.minimo} pzas | Impuesto: {tec.cobraImpuesto ? 'Sí' : 'No'}</p>
                                        </div>
                                    </div>
                                    <div className="p-4 grid grid-cols-1 md:grid-cols-2 gap-4">
                                        {tec.subcategorias.map(sub => (
                                            <div key={sub.id} className="bg-slate-900 border border-slate-700 p-4 rounded-xl relative group">
                                                <div className="flex justify-between items-start mb-3">
                                                    <h4 className="font-bold text-slate-300 flex items-center gap-2"><MapPin size={16} className="text-emerald-500"/> {sub.nombre}</h4>
                                                    <button onClick={() => handleEditarSubcategoria(tec, sub)} className="text-blue-400 bg-blue-500/10 hover:bg-blue-500/20 px-2 py-1 rounded text-xs font-bold border border-blue-500/20 flex items-center gap-1 transition-colors"><Settings size={12}/> Tarifas/Ubic.</button>
                                                </div>
                                                <div className="text-xs text-slate-500 space-y-1 mb-3">
                                                    <p className="flex justify-between border-b border-slate-800 pb-1"><span>Margen Ganancia:</span> <span className="text-emerald-400 font-bold">{sub.margen !== undefined ? sub.margen : 'Global'}%</span></p>
                                                    <p className="flex justify-between"><span>Descuentos Vol:</span> <span className="text-amber-400 font-bold">{sub.descuentosVolumen?.length > 0 ? 'Activo' : 'Inactivo'}</span></p>
                                                </div>
                                                
                                                <div className="mt-2 space-y-2">
                                                    {sub.opciones.map(op => (
                                                        <div key={op.id} className="bg-slate-800 p-2 rounded-lg text-xs border border-slate-700 flex justify-between">
                                                            <span className="font-semibold text-slate-300">{op.nombre}</span>
                                                            <span className="text-slate-400">CF: {op.costosFijos.reduce((a,c)=>a+Number(c.valor),0)} | CV: {op.costosVariables.reduce((a,c)=>a+Number(c.valor),0)}</span>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            ))
                        )}
                    </div>

                    {totalPaginas > 1 && (
                        <div className="flex items-center justify-between bg-slate-800 p-4 rounded-xl border border-slate-700 shadow-sm">
                            <span className="text-sm font-bold text-slate-400">Mostrando {tecnicasPaginadas.length} de {tecnicasFiltradas.length} resultados</span>
                            <div className="flex items-center gap-2">
                                <button disabled={paginaActual === 1} onClick={() => setPaginaActual(p => p - 1)} className="p-2 bg-slate-900 border border-slate-600 rounded-lg hover:bg-slate-700 disabled:opacity-50 transition-colors text-white"><ChevronLeft size={20}/></button>
                                <span className="text-sm font-bold text-slate-300 px-3 py-1 bg-slate-900 rounded-lg border border-slate-700">{paginaActual} / {totalPaginas}</span>
                                <button disabled={paginaActual === totalPaginas} onClick={() => setPaginaActual(p => p + 1)} className="p-2 bg-slate-900 border border-slate-600 rounded-lg hover:bg-slate-700 disabled:opacity-50 transition-colors text-white"><ChevronRight size={20}/></button>
                            </div>
                        </div>
                    )}
                    
                    {modalConfig && <CustomModal config={modalConfig} onClose={() => setModalConfig(null)} />}
                </div>
            );
        }

        function PortalClienteVIP({ cliente, catalogo, categorias, tecnicas, margenGanancia, impuestoGlobal, descuentosVolumen, ordenes, onCrearOrden, onActualizarOrden, mensajesGlobales, recursos, onLogout, isConnectedToCloud, showToast }) {
          const [vista, setVista] = useState('NUEVA_COTIZACION'); 
          
          return (
            <div className="min-h-screen bg-slate-50 flex flex-col md:flex-row fade-in">
              <aside className="w-full md:w-72 bg-white border-r border-slate-200 flex flex-col shadow-sm z-10 no-print md:h-screen md:sticky md:top-0">
                <div className="p-6 overflow-y-auto flex-1 custom-scrollbar">
                    <div className="flex items-center gap-3 text-blue-600 mb-8"><Printer size={32} /><span className="text-xl font-bold">PrintPro</span></div>
                    <div className="mb-8 p-4 bg-blue-50 rounded-2xl border border-blue-100">
                    <p className="font-bold text-slate-800 truncate">{cliente.nombre}</p>
                    {cliente.descuentoGlobal > 0 && <span className="mt-2 text-xs font-semibold text-emerald-600 bg-emerald-100 px-2 py-1 rounded-md inline-block">{cliente.descuentoGlobal}% OFF VIP</span>}
                    </div>
                    <nav className="space-y-2">
                    <MenuBtn icon={Plus} label="Nueva Cotización" active={vista === 'NUEVA_COTIZACION'} onClick={() => setVista('NUEVA_COTIZACION')} />
                    <MenuBtn icon={FileText} label="Mis Órdenes" active={vista === 'HISTORIAL'} onClick={() => setVista('HISTORIAL')} />
                    </nav>
                </div>
                <div className="p-6 bg-slate-50 border-t border-slate-200 mt-auto">
                    <ConnectionIndicator isConnectedToCloud={isConnectedToCloud} darkTheme={false} />
                    <button onClick={onLogout} className="w-full flex items-center justify-center gap-2 text-slate-600 hover:text-red-600 hover:bg-red-50 mt-4 p-3 rounded-xl font-bold transition-colors border border-transparent hover:border-red-200"><LogOut size={18} /> Cerrar Sesión</button>
                </div>
              </aside>
              
              <main className="flex-1 p-8 overflow-y-auto bg-slate-50">
                {(mensajesGlobales.bienvenida || mensajesGlobales.promo) && (
                    <div className="max-w-5xl mx-auto mb-6 bg-white border border-slate-200 p-4 rounded-xl shadow-sm flex items-start gap-4 fade-in hover:shadow-md transition-shadow">
                        <div className="bg-blue-50 p-2.5 rounded-lg shrink-0">
                            <Megaphone size={20} className="text-blue-600" />
                        </div>
                        <div className="flex-1 pt-0.5">
                            {mensajesGlobales.bienvenida && <h2 className="font-bold text-slate-800 text-sm mb-1 tracking-tight">{mensajesGlobales.bienvenida}</h2>}
                            {mensajesGlobales.promo && <p className="text-slate-500 text-xs leading-relaxed max-w-4xl whitespace-pre-wrap">{mensajesGlobales.promo}</p>}
                        </div>
                    </div>
                )}
                
                {vista === 'NUEVA_COTIZACION' && <CotizadorWizard cliente={cliente} catalogo={catalogo} tecnicas={tecnicas} margenGlobal={margenGanancia} impuestoGlobal={impuestoGlobal} onGuardar={(o) => { onCrearOrden(o); setVista('HISTORIAL'); }} />}
                {vista === 'HISTORIAL' && <HistorialOrdenes ordenes={ordenes} />}
              </main>
            </div>
          );
        }

        function HistorialOrdenes({ ordenes }) {
            return (
                <div className="max-w-5xl mx-auto fade-in bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
                    <div className="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                        <h3 className="font-bold text-xl text-slate-800 flex items-center gap-2"><List size={20} className="text-blue-600" /> Mi Historial de Órdenes</h3>
                    </div>
                    <div className="overflow-x-auto">
                        <table className="w-full text-left text-sm">
                            <thead className="bg-slate-50 text-slate-500 border-b border-slate-200 text-xs uppercase">
                                <tr>
                                    <th className="p-4 font-bold">ID / Fecha</th>
                                    <th className="p-4 font-bold">Producto</th>
                                    <th className="p-4 font-bold">Cantidad</th>
                                    <th className="p-4 font-bold">Total</th>
                                    <th className="p-4 font-bold">Estado</th>
                                </tr>
                            </thead>
                            <tbody>
                                {ordenes.length === 0 ? (
                                    <tr><td colSpan="5" className="p-8 text-center text-slate-500 font-medium">Aún no tienes cotizaciones u órdenes registradas.</td></tr>
                                ) : (
                                    ordenes.map(ord => (
                                        <tr key={ord.id} className="border-b border-slate-100 hover:bg-slate-50 transition-colors">
                                            <td className="p-4"><p className="font-bold text-blue-600">{ord.id}</p><p className="text-xs text-slate-400">{ord.fecha}</p></td>
                                            <td className="p-4 font-medium text-slate-700">{ord.producto}</td>
                                            <td className="p-4 text-slate-600">{ord.cantidad} pzas</td>
                                            <td className="p-4 font-bold text-emerald-600">L {ord.total.toFixed(2)}</td>
                                            <td className="p-4"><EstadoBadge estado={ord.estado} /></td>
                                        </tr>
                                    ))
                                )}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        }

        function CotizadorWizard({ cliente, catalogo, tecnicas, margenGlobal, impuestoGlobal, onGuardar }) {
          const [paso, setPaso] = useState(1);
          const [itemSelect, setItemSelect] = useState(null);
          const [cantidad, setCantidad] = useState(50);
          const [aplicaciones, setAplicaciones] = useState([]);

          const productoSeleccionado = catalogo.find(c => c.id === itemSelect);
          
          // Técnicas permitidas por el producto
          const tecnicasPermitidas = useMemo(() => {
              if(!productoSeleccionado) return [];
              return tecnicas.filter(t => productoSeleccionado.tecnicasRecomendadas?.includes(t.id));
          }, [productoSeleccionado, tecnicas]);

          const agregarAplicacion = () => setAplicaciones([...aplicaciones, { id: Date.now(), tecnicaId: '', subcatId: '', opcionId: '' }]);
          
          const actualizarAplicacion = (id, campo, valor) => { 
              setAplicaciones(aplicaciones.map(app => { 
                  if (app.id === id) { 
                      const updated = { ...app, [campo]: valor }; 
                      if (campo === 'tecnicaId') { updated.subcatId = ''; updated.opcionId = ''; } 
                      if (campo === 'subcatId') { updated.opcionId = ''; } 
                      return updated; 
                  } 
                  return app; 
              })); 
          };
          
          const eliminarAplicacion = (id) => setAplicaciones(aplicaciones.filter(a => a.id !== id));

          // Motor de Cálculo Reconstruido
          const cotizacion = useMemo(() => {
              if(!productoSeleccionado || cantidad < 1) return { valido: false };
              
              let costoBaseTotal = Number(productoSeleccionado.costoBase) * cantidad;
              let costoAplicacionesTotal = 0;
              let minRequerido = 1; // Base

              for(const app of aplicaciones) {
                  if(!app.tecnicaId || !app.subcatId || !app.opcionId) continue;
                  
                  const tec = tecnicas.find(t => t.id === app.tecnicaId);
                  if(!tec) continue;
                  if(tec.minimo > minRequerido) minRequerido = tec.minimo;

                  const sub = tec.subcategorias.find(s => s.id === app.subcatId);
                  const op = sub?.opciones.find(o => o.id === app.opcionId);
                  
                  if(sub && op) {
                      const totalFijos = op.costosFijos.reduce((sum, c) => sum + Number(c.valor), 0);
                      const totalVariables = op.costosVariables.reduce((sum, c) => sum + Number(c.valor), 0);
                      
                      let costoAppBase = totalFijos + (totalVariables * cantidad);
                      
                      // Aplicar margen de la ubicación (o global si no tiene)
                      const margenApp = sub.margen !== undefined ? sub.margen : margenGlobal;
                      const precioVentaApp = costoAppBase / (1 - (margenApp / 100));
                      
                      // Descuentos por volumen específicos de la ubicación
                      let descuentoPct = 0;
                      if(sub.descuentosVolumen && sub.descuentosVolumen.length > 0) {
                          const descAplicable = [...sub.descuentosVolumen].sort((a,b)=>b.min-a.min).find(d => d.activo && cantidad >= d.min);
                          if(descAplicable) descuentoPct = descAplicable.pct;
                      }

                      costoAplicacionesTotal += precioVentaApp * (1 - (descuentoPct / 100));
                  }
              }

              // Margen para el producto base (asume global)
              let precioVentaProductoBase = costoBaseTotal / (1 - (margenGlobal / 100));
              let subtotal = precioVentaProductoBase + costoAplicacionesTotal;

              // Descuento VIP Cliente
              if(cliente.descuentoGlobal > 0) {
                  subtotal = subtotal * (1 - (cliente.descuentoGlobal / 100));
              }

              let impuestos = 0;
              // Simplificación: si el producto cobra impuesto, cobramos al total para agilizar.
              if(productoSeleccionado.cobraImpuesto) {
                  impuestos = subtotal * (impuestoGlobal / 100);
              }

              const total = subtotal + impuestos;

              return { 
                  valido: cantidad >= minRequerido, 
                  subtotal, 
                  impuestos, 
                  total, 
                  unitario: total / cantidad, 
                  minRequerido 
              };
          }, [productoSeleccionado, aplicaciones, cantidad, tecnicas, margenGlobal, impuestoGlobal, cliente]);

          const handleGuardar = () => {
              if(!cotizacion.valido) return;
              onGuardar({ 
                  id: `ORD-${Date.now()}`, 
                  clienteId: cliente.id, 
                  clienteNombre: cliente.nombre, 
                  producto: productoSeleccionado.nombre, 
                  cantidad,
                  aplicaciones: aplicaciones, // Guardamos la conf
                  total: cotizacion.total, 
                  estado: 'Cotización enviada', 
                  fecha: new Date().toLocaleDateString() 
              });
          };

          return (
            <div className="w-full max-w-[1200px] mx-auto pb-12">
              <h2 className="text-3xl font-bold text-slate-800 mb-8">Nueva Cotización</h2>
              <div className="flex gap-4 mb-8">{[1, 2, 3].map(i => <div key={i} className={`flex-1 h-2 rounded-full transition-all duration-300 ${paso >= i ? 'bg-blue-600' : 'bg-slate-200'}`} />)}</div>
              
              <div className="bg-white rounded-3xl shadow-sm border border-slate-200 p-8">
                {paso === 1 && (
                  <div className="fade-in">
                    <h3 className="text-xl font-bold mb-4 text-slate-800">1. Selección de Artículo y Cantidad</h3>
                    
                    <div className="mb-8 p-4 bg-slate-50 border border-slate-200 rounded-xl">
                        <label className="block text-sm font-bold text-slate-700 mb-2">Cantidad Total a Cotizar</label>
                        <input type="number" min="1" value={cantidad} onChange={e=>setCantidad(Number(e.target.value))} className="w-full md:w-64 p-3 rounded-xl border border-slate-300 outline-none focus:border-blue-500 font-bold text-lg" />
                    </div>

                    <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                        {catalogo.map(prod => (
                            <button key={prod.id} onClick={() => setItemSelect(prod.id)} className={`flex flex-col items-center justify-between p-4 rounded-2xl border-2 text-center transition-all h-full ${itemSelect === prod.id ? 'border-blue-600 bg-blue-50 shadow-md transform scale-105' : 'border-slate-100 hover:border-blue-200 hover:bg-slate-50'}`}>
                                <span className="text-xs font-bold text-slate-400 mb-2 uppercase">{prod.tipo}</span>
                                <p className="font-bold text-slate-700 text-sm mb-1">{prod.nombre}</p>
                            </button>
                        ))}
                    </div>
                    <div className="mt-8 flex justify-end border-t border-slate-100 pt-6"><button disabled={!itemSelect || cantidad < 1} onClick={() => setPaso(2)} className="bg-blue-600 text-white px-8 py-3 rounded-xl font-bold disabled:opacity-50 hover:bg-blue-700 transition-colors shadow-lg">Siguiente Paso</button></div>
                  </div>
                )}

                {paso === 2 && (
                  <div className="fade-in">
                    <div className="mb-6 pb-4 border-b border-slate-100">
                        <h3 className="text-xl font-bold text-slate-800">2. Áreas de Impresión / Técnicas</h3>
                        <p className="text-slate-500 text-sm mt-1">Configura dónde y cómo quieres estampar el producto seleccionado ({productoSeleccionado?.nombre}).</p>
                    </div>
                    
                    <div className="space-y-4 mb-6">
                      {aplicaciones.map((app) => {
                          const tecSeleccionada = tecnicasPermitidas.find(t => t.id === app.tecnicaId);
                          const subSeleccionada = tecSeleccionada?.subcategorias.find(s => s.id === app.subcatId);

                          return (
                          <div key={app.id} className="p-4 border border-slate-200 rounded-2xl bg-slate-50 relative flex flex-col md:flex-row gap-4 items-start md:items-center">
                            <button onClick={() => eliminarAplicacion(app.id)} className="absolute -top-3 -right-3 bg-white border border-slate-200 text-slate-400 hover:text-red-500 hover:border-red-200 p-1.5 rounded-full shadow-sm transition-colors z-10"><X size={16} /></button>
                            
                            <div className="w-full">
                                <label className="text-xs font-bold text-slate-500 mb-1 block">Técnica</label>
                                <select value={app.tecnicaId} onChange={e=>actualizarAplicacion(app.id, 'tecnicaId', e.target.value)} className="w-full p-2.5 rounded-xl border border-slate-300 outline-none focus:border-blue-500 bg-white font-semibold text-slate-700">
                                    <option value="">Seleccionar...</option>
                                    {tecnicasPermitidas.map(t => <option key={t.id} value={t.id}>{t.nombre}</option>)}
                                </select>
                            </div>

                            <div className="w-full">
                                <label className="text-xs font-bold text-slate-500 mb-1 block">Ubicación</label>
                                <select disabled={!tecSeleccionada} value={app.subcatId} onChange={e=>actualizarAplicacion(app.id, 'subcatId', e.target.value)} className="w-full p-2.5 rounded-xl border border-slate-300 outline-none focus:border-blue-500 bg-white font-semibold text-slate-700 disabled:bg-slate-100">
                                    <option value="">Seleccionar...</option>
                                    {tecSeleccionada?.subcategorias.map(s => <option key={s.id} value={s.id}>{s.nombre}</option>)}
                                </select>
                            </div>

                            <div className="w-full">
                                <label className="text-xs font-bold text-slate-500 mb-1 block">Detalle / Opción</label>
                                <select disabled={!subSeleccionada} value={app.opcionId} onChange={e=>actualizarAplicacion(app.id, 'opcionId', e.target.value)} className="w-full p-2.5 rounded-xl border border-slate-300 outline-none focus:border-blue-500 bg-white font-semibold text-slate-700 disabled:bg-slate-100">
                                    <option value="">Seleccionar...</option>
                                    {subSeleccionada?.opciones.map(o => <option key={o.id} value={o.id}>{o.nombre}</option>)}
                                </select>
                            </div>
                          </div>
                      )})}
                      {aplicaciones.length === 0 && <div className="p-6 text-center text-slate-400 bg-slate-50 rounded-2xl border border-slate-200 border-dashed">No has agregado áreas de impresión. El producto se cotizará liso.</div>}
                    </div>
                    <button onClick={agregarAplicacion} className="w-full py-4 rounded-xl border-2 border-dashed border-slate-300 text-slate-500 hover:border-blue-400 hover:text-blue-600 font-bold flex items-center justify-center gap-2 transition-colors bg-white"><Plus size={20} /> Añadir área de impresión</button>
                    
                    {!cotizacion.valido && aplicaciones.length > 0 && (
                        <div className="mt-4 p-4 bg-amber-50 text-amber-700 rounded-xl flex items-center gap-2 text-sm font-bold border border-amber-200">
                            <AlertCircle size={18}/> La cantidad ingresada ({cantidad}) no cumple el mínimo requerido ({cotizacion.minRequerido}) para las técnicas seleccionadas.
                        </div>
                    )}

                    <div className="mt-8 flex justify-between border-t border-slate-100 pt-6">
                        <button onClick={() => setPaso(1)} className="text-slate-500 px-6 py-3 rounded-xl font-bold hover:bg-slate-100 transition-colors">Volver</button>
                        <button disabled={!cotizacion.valido} onClick={() => setPaso(3)} className="bg-blue-600 text-white px-8 py-3 rounded-xl font-bold disabled:opacity-50 hover:bg-blue-700 transition-colors shadow-lg">Calcular Totales</button>
                    </div>
                  </div>
                )}
                
                {paso === 3 && (
                    <div className="fade-in">
                        <h3 className="text-2xl font-bold text-slate-800 mb-6 text-center">Resumen de Cotización</h3>
                        
                        <div className="max-w-2xl mx-auto bg-slate-50 p-8 rounded-3xl border border-slate-200 mb-8">
                            <div className="flex justify-between items-end border-b border-slate-200 pb-4 mb-4">
                                <div>
                                    <p className="text-sm font-bold text-slate-500">Producto</p>
                                    <p className="text-lg font-bold text-slate-800">{productoSeleccionado?.nombre}</p>
                                </div>
                                <div className="text-right">
                                    <p className="text-sm font-bold text-slate-500">Cantidad</p>
                                    <p className="text-lg font-bold text-slate-800">{cantidad} unid.</p>
                                </div>
                            </div>
                            
                            <div className="space-y-3 mb-6">
                                <div className="flex justify-between text-slate-600"><span className="font-medium">Subtotal</span><span>L {cotizacion.subtotal?.toFixed(2)}</span></div>
                                <div className="flex justify-between text-slate-600"><span className="font-medium">Impuestos (ISV)</span><span>L {cotizacion.impuestos?.toFixed(2)}</span></div>
                                {cliente.descuentoGlobal > 0 && (
                                    <div className="flex justify-between text-emerald-600"><span className="font-medium">Descuento VIP Cliente ({cliente.descuentoGlobal}%)</span><span>Aplicado en subtotal</span></div>
                                )}
                            </div>

                            <div className="flex justify-between items-center border-t border-slate-200 pt-4">
                                <span className="text-xl font-bold text-slate-800">Total a Pagar</span>
                                <div className="text-right">
                                    <span className="text-3xl font-black text-blue-600">L {cotizacion.total?.toFixed(2)}</span>
                                    <p className="text-xs text-slate-500 font-bold mt-1">Unitario: L {cotizacion.unitario?.toFixed(2)} / pza</p>
                                </div>
                            </div>
                        </div>

                        <div className="flex justify-center gap-4">
                            <button onClick={() => setPaso(2)} className="text-slate-500 px-6 py-3 rounded-xl font-bold hover:bg-slate-100 transition-colors">Modificar</button>
                            <button onClick={handleGuardar} className="bg-emerald-600 text-white px-8 py-3 rounded-xl font-bold hover:bg-emerald-500 transition-colors shadow-lg flex items-center gap-2"><CheckCircle size={20}/> Aprobar y Enviar Orden</button>
                        </div>
                    </div>
                )}
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
